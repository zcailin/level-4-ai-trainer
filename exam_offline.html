ps 的选取会极大影响最终结果。要是 eps 设定得过小，可能引发（）情况。","options":[{"label":"A","text":"降低聚类的准确性"},{"label":"B","text":"产生过度稠密的聚类簇"},{"label":"C","text":"形成太多的聚类簇"},{"label":"D","text":"产生太多的噪声点"}],"answer":"C","analysis":"题考查了eps取值对结果的影响，选项D是错误的，因为eps太小会使得更少的点被视为噪声点。选项C是正确的，因为如果eps太小，则会形成过多的聚类簇，对于实际问题的解释和理解不够直观。选项B是eps过大的情况，而选项D并不是eps取值的后果，所以选项A也是错误的。"},{"id":102746,"order":66,"type":"single_choice","question":"岭回归属于一种（）方法。","options":[{"label":"A","text":"逻辑回归"},{"label":"B","text":"非线性回归"},{"label":"C","text":"线性回归"},{"label":"D","text":"最小二乘回归"}],"answer":"C","analysis":"岭回归属于线性回归，用于存在多重共线性(自变量高度相关)的数据"},{"id":102747,"order":67,"type":"single_choice","question":"制定数据质量标准评价标准，它的主要目的是（）。","options":[{"label":"A","text":"评估数据质量和可信度"},{"label":"B","text":"提高数据的存储效率"},{"label":"C","text":"加强数据的传输安全性"},{"label":"D","text":"降低数据处理的成本"}],"answer":"A","analysis":"数据质量标准评价标准的主要目的是评估数据的质量和可信度，以确定数据是否满足预期的要求和标准"},{"id":102748,"order":68,"type":"single_choice","question":"依据《中华人民共和国劳动合同法》，劳动合同期限介于三个月到一年之间（不含一年）的，试用期不得超过（）。","options":[{"label":"A","text":"1周"},{"label":"B","text":"3个月"},{"label":"C","text":"2个月"},{"label":"D","text":"1个月"}],"answer":"D","analysis":"《中华人民共和国劳动合同法》第十九条规定，劳动合同期限三个月以上不满一年的，试用期不得超过一个月；劳动合同期限一年以上不满三年的，试用期不得超过二个月；三年以上固定期限和无固定期限的劳动合同，试用期不得超过六个月"},{"id":102749,"order":69,"type":"single_choice","question":"聚类和分类在算法选择上的主要差异体现在（）。","options":[{"label":"A","text":"聚类算法属于无监督学习，而分类算法属于有监督学习"},{"label":"B","text":"聚类算法需预先定义类别，分类算法自动发现类别"},{"label":"C","text":"聚类和分类的算法选择没有固定的区别"},{"label":"D","text":"聚类和分类的算法选择完全相同"}],"answer":"A","analysis":"聚类（无监督）与分类（有监督）的本质区别在于是否需要标签数据，算法选择直接受此影响。聚类无需预先定义类别（自动发现），而分类必须依赖预定义的类别标签。两者算法选择有明显差异（无监督 vs. 有监督），例如聚类不涉及损失函数优化，而分类需通过损失函数（如交叉熵）调整模型参数。"},{"id":102750,"order":70,"type":"single_choice","question":"HTTP所使用的端口号具体是（）。","options":[{"label":"A","text":"8443"},{"label":"B","text":"443"},{"label":"C","text":"8080"},{"label":"D","text":"80"}],"answer":"D","analysis":"HTTP使用的端口号为80，HTTPS使用的端口号为443"},{"id":102751,"order":71,"type":"single_choice","question":"对于 Excel 里的 COUNTA 函数，它的作用是（）？","options":[{"label":"A","text":"统计空单元格数量"},{"label":"B","text":"统计包含任意值的单元格数量"},{"label":"C","text":"统计不包含数字的单元格数量"},{"label":"D","text":"统计包含数字的单元格数量"}],"answer":"B","analysis":"COUNTA用于统计包含任意值（数字、文本、错误值等）的单元格数量。"},{"id":102752,"order":72,"type":"single_choice","question":"求同法的基本思路是（）。","options":[{"label":"A","text":"利用数学模型和算法解决复杂问题"},{"label":"B","text":"从不同角度观察问题，寻找问题中的共性和普遍规律"},{"label":"C","text":"分析问题的原因和影响，制定对策和解决方案"},{"label":"D","text":"根据已有事实和数据，进行逻辑推理，找出问题的解决方案"}],"answer":"B","analysis":"求同法的基本思路是从不同角度观察问题，寻找问题中的共性和普遍规律"},{"id":102753,"order":73,"type":"single_choice","question":"由于 seaborn 库能画出富有吸引力的图表，Matplotlib 库能绘制更具特色的图表，所以 seaborn 库可看作是 Matplotlib 库的什么？（）","options":[{"label":"A","text":"补充"},{"label":"B","text":"替代"},{"label":"C","text":"变换"},{"label":"D","text":"转换"}],"answer":"A","analysis":"seaborn可视为Matplotlib的补充。"},{"id":102754,"order":74,"type":"single_choice","question":"下列哪一项只能通过输入切片索引对 DataFrame 数据进行筛选？（）","options":[{"label":"A","text":"loc[]"},{"label":"B","text":"iloc[]"},{"label":"C","text":"merge()"},{"label":"D","text":"drop_duplicates()"}],"answer":"B","analysis":".loc[]可以根据行标签或列标签对DataFrame进行选取和筛选。.iloc[]方法基于整数位置的索引，只能使用整数位置或切片来选择行和列。Merge（）用于合并两个DataFrame对象。drop_duplicates（） 用于删除DataFrame中的重复行。"},{"id":102755,"order":75,"type":"single_choice","question":"线性回归里的权重向量 w 代表着什么含义？（）","options":[{"label":"A","text":"目标变量的值"},{"label":"B","text":"每个样本点的权重"},{"label":"C","text":"每个特征在预测结果中的作用大小"},{"label":"D","text":"直线的截距和斜率"}],"answer":"C","analysis":"权重向量w表示每个特征在预测结果中的作用大小。"},{"id":102756,"order":76,"type":"single_choice","question":"在特征工程中，（）方法是针对数据不均衡的问题处理特征数据的方法。","options":[{"label":"A","text":"下采样"},{"label":"B","text":"增加样本量"},{"label":"C","text":"对特征数据进行标准化"},{"label":"D","text":"以上选项均正确"}],"answer":"A","analysis":"特征数据的不均衡会对分类器的性能产生负面影响，下采样是一种常用的解决方法。通过减少部分数据的样本数量，使得数据分布更加均衡。"},{"id":102757,"order":77,"type":"single_choice","question":"下列选项中，不属于计算机输出设备的是（）","options":[{"label":"A","text":"屏幕"},{"label":"B","text":"麦克风"},{"label":"C","text":"音响"},{"label":"D","text":"打印机"}],"answer":"B","analysis":"打印机可以输出纸质文档，屏幕可以显示计算机输出的信息，音响可以输出音频信号，而麦克风是一种输入设备，用于录制声音输入到计算机里"},{"id":102758,"order":78,"type":"single_choice","question":"下列哪一项是 DENCLUE 密度聚类算法的优势体现？（）","options":[{"label":"A","text":"只能处理数值型数据"},{"label":"B","text":"对数据分布形态没有要求"},{"label":"C","text":"需要事先指定聚类中心点"},{"label":"D","text":"需要事先确定聚类个数"}],"answer":"B","analysis":"DENCLUE密度聚类算法不需要事先确定聚类个数或指定聚类中心点，并且对数据分布形态没有要求，能够有效地处理复杂的非线性数据"},{"id":102759,"order":79,"type":"single_choice","question":"下列哪一项不属于数据审核的流程（）？","options":[{"label":"A","text":"合规性审核"},{"label":"B","text":"一致性核验"},{"label":"C","text":"数据加密审核"},{"label":"D","text":"完整性检查"}],"answer":"C","analysis":"数据审核的基本方法包括数据检查、数据验证和数据核对等步骤，以确保数据的准确性和完整性"},{"id":102760,"order":80,"type":"single_choice","question":"Matplotlib 库在 Python 中属于哪一类库？（）","options":[{"label":"A","text":"以上选项均错误"},{"label":"B","text":"动态交互绘图"},{"label":"C","text":"3D绘图"},{"label":"D","text":"2D绘图"}],"answer":"D","analysis":"Matplotlib是目前非常流行的用于绘制数据图表的Python库，是Python的2D绘图库"},{"id":102761,"order":81,"type":"single_choice","question":"在智能交通系统里，下列哪项属于车辆间通信的标准协议？（）","options":[{"label":"A","text":"Bluetooth"},{"label":"B","text":"DSRC"},{"label":"C","text":"LTE"},{"label":"D","text":"Wi-Fi"}],"answer":"B","analysis":"DSRC（DedicatedShortRangeCommunications，短距离专用通信）是车辆间通信的标准协议，用于实现车辆之间和车辆与基础设施之间的通信"},{"id":102762,"order":82,"type":"single_choice","question":"操作系统的结构指的是系统内部各个组成部分及其相互间的联系，下列哪一项不属于操作系统的结构组成部分（）。","options":[{"label":"A","text":"内存管理"},{"label":"B","text":"网络管理"},{"label":"C","text":"文件管理"},{"label":"D","text":"进程管理"}],"answer":"B","analysis":"操作系统的结构包括进程管理、文件管理、内存管理等组件，但不包括网络管理"},{"id":102763,"order":83,"type":"single_choice","question":"在 Word 里，能让页码从特定页面开始计数的操作是（）。","options":[{"label":"A","text":"在“视图”选项卡中选择“导航窗格”，在“页码”中输入起始页码"},{"label":"B","text":"在“布局”选项卡中选择“页面设置”，在“起始页码”中输入起始页码"},{"label":"C","text":"在“插入”选项卡中依次选择“页码”→“设置页码格式”，在“页码格式”窗口中输入起始页码"},{"lab 法不属于数据规范化方法。"},{"id":102770,"order":90,"type":"single_choice","question":"下列哪项并非数据筛选的目的？（）","options":[{"label":"A","text":"提取重要数据"},{"label":"B","text":"去除噪声数据"},{"label":"C","text":"提升数据质量"},{"label":"D","text":"增加数据的容量"}],"answer":"D","analysis":"增加数据的容量并不是数据筛选的目的，数据筛选旨在从原始数据中去除噪声数据、提取重要数据，提升数据的质量。"},{"id":102771,"order":91,"type":"single_choice","question":"什么是回归预测？（）","options":[{"label":"A","text":"对于未知数据，直接给出未来数据的预测结果。"},{"label":"B","text":"对于已知数据，直接给出未来数据的预测结果；"},{"label":"C","text":"对于未知数据，通过建立数学模型来预测未来数据；"},{"label":"D","text":"对于已知数据，通过建立数学模型来预测未来数据；"}],"answer":"C","analysis":"在回归模型中，自变量(特征)与因变量(目标)具有相关关系，自变量的值是已知的，因变量是要预测的"},{"id":102772,"order":92,"type":"single_choice","question":"标注者在对文本数据进行标注时，面临的难点有哪些？（）","options":[{"label":"A","text":"数据清洗困难"},{"label":"B","text":"缺乏合适的标注工具"},{"label":"C","text":"数据存储和处理的技术问题"},{"label":"D","text":"语言的多样性"}],"answer":"D","analysis":"语言的多样性使得标注者在理解和解释文本时面临困难"},{"id":102773,"order":93,"type":"single_choice","question":"DBSCAN 属于哪一种聚类算法（）。","options":[{"label":"A","text":"基于滑动窗口的"},{"label":"B","text":"基于密度的"},{"label":"C","text":"基于距离的"},{"label":"D","text":"基于层次的"}],"answer":"B","analysis":"DBSCAN是一种基于密度的聚类算法，通过确定样本点的邻域大小和密度来实现聚类的目的"},{"id":102774,"order":94,"type":"single_choice","question":"在回归预测算法里，通过在回归优化函数中添加一个绝对值偏差（即 L1 正则项），来减轻共线性的影响，从而降低模型方差，该算法是（）。","options":[{"label":"A","text":"弹性网络回归"},{"label":"B","text":"Lasso回归"},{"label":"C","text":"岭回归"},{"label":"D","text":"线性回归"}],"answer":"B","analysis":"在回归预测算法中，Lasso回归通过在回归优化函数中增加一个偏置项（绝对值偏差，L1正则项），以减少共线性的影响，从而减少模型方差"},{"id":102775,"order":95,"type":"single_choice","question":"在 Excel 里，能用来算出数据平均值的函数是（）。","options":[{"label":"A","text":"COUNT"},{"label":"B","text":"SUM"},{"label":"C","text":"AVERAGE"},{"label":"D","text":"MAX"}],"answer":"C","analysis":"AVERAGE函数可用于计算数据的平均值。例如：=AVERAGE(A1:A10)会返回 A1 到 A10 单元格的平均值"},{"id":102776,"order":96,"type":"single_choice","question":"数据筛选是为了方便后续对数据开展（）。","options":[{"label":"A","text":"数据清洗"},{"label":"B","text":"数据预处 ,"options":[{"label":"A","text":"成本高昂"},{"label":"B","text":"无法进行统计分析"},{"label":"C","text":"抽样时可能存在误差"},{"label":"D","text":"可能出现样品污染"}],"answer":"A","analysis":"全样检验的缺点是成本高昂，需要耗费大量的人力精力集中进行，对于人员不足或时间不够的情况，较难实行"},{"id":102803,"order":123,"type":"single_choice","question":"当使用Selenium（Python版）获取网页元素的文本信息时，应使用（）。","options":[{"label":"A","text":"get_url()"},{"label":"B","text":"get_title()"},{"label":"C","text":".text"},{"label":"D","text":"get_attribute()"}],"answer":"C","analysis":"WedElement对象的.text属性可以获取网页元素的文本内容"},{"id":102804,"order":124,"type":"single_choice","question":"在多轮抽样检验中，要是标注员没有出现或只出现过一轮抽样检验的标注数据不合格的情况，需采取的措施是（）。","options":[{"label":"A","text":"需要重新进行抽样检查"},{"label":"B","text":"只需删除不合格的标注数据"},{"label":"C","text":"只需改正不合格的标注数据"},{"label":"D","text":"需要重新进行全样检验"}],"answer":"C","analysis":"在多轮的抽样检验中，如果标注员没有或只有一轮的抽样检验存在不合格的数据标注则认定该标注员的数据标注为合格"},{"id":102805,"order":125,"type":"single_choice","question":"下列哪项行为违反了《计算机软件保护条例》（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"未经授权制作软件"},{"label":"C","text":"未经授权销售软件"},{"label":"D","text":"未经授权复制软件"}],"answer":"A","analysis":"《计算机软件保护条例》第二十四条规定，除《中华人民共和国著作权法》、本条例或者其他法律、行政法规另有规定外，未经软件著作权人许可，有下列侵权行为的，应当根据情况，承担相应法律责任：(一)复制或者部分复制著作权人的软件的;(二)向公众发行、出租、通过信息网络传播著作权人的软件的;(三)故意避开或者破坏著作权人为保护其软件著作权而采取的技术措施的;(四)故意删除或者改变软件权利管理电子信息的;(五)转让或者许可他人行使著作权人的软件著作权的"},{"id":102806,"order":126,"type":"single_choice","question":"下列哪项不属于算法领域中通过分解子问题来求解复杂问题的策略？（）","options":[{"label":"A","text":"归纳法"},{"label":"B","text":"递归法"},{"label":"C","text":"分治法"},{"label":"D","text":"动态规划法"}],"answer":"A","analysis":"数据拆解的方法包括归纳法、递归法、分治法和动态规划法。归纳法是通过证明某个定理在一定条件下成立，推而广之，得出结论的方法，不是数据拆解的方法。"},{"id":102807,"order":127,"type":"single_choice","question":"设备管理是操作系统的主要功能之一，下列哪一项不在设备管理的主要功能范围内（）。","options":[{"label":"A","text":"虚拟设备"},{"label":"B","text":"设备驱动"},{"label":"C","text":"缓冲区管理"},{"label":"D","text":"地址映射"}],"answer":"D","analysis":"操作系统的主要功能之一是设备管理，其主要功能有缓冲区管理、设备分配、设备驱动和虚拟设备等功能"},{"id":102808,"order":128,"type":"single_choice","question":"在 PowerPoint 母版视图里修改主题颜色，会对什么元素产生影响？（）","options":[{"label":"A","text":"文字颜色"},{"label":"B","text":"背景颜色"},{"label":"C","text":"列表符号样式"},{"label":"D","text":"以上选项均正确"}],"answer":"D","analysis":"在 PowerPoint 母版视图中，修改主题颜色会影响幻灯片的文字颜色、背景颜色和列表符号的颜色 ，但不会改变字体样式或图片内容。"},{"id":102809,"order":129,"type":"single_choice","question":"图像数据标注时，会对标注质量产生影响的因素是（）。","options":[{"label":"A","text":"标注的格式的统一"},{"label":"B","text":"标注的方式"},{"label":"C","text":"标注的颜色"},{"label":"D","text":"标注类别的数量"}],"answer":"A","analysis":"在图像数据标注中，标注格式的统一性会影响图像标注数据的质量，因此在标注工作之前，需要对标注的格式进行统一"},{"id":102810,"order":130,"type":"single_choice","question":"下面哪一项不属于图像数据标注的主要难题？（）","options":[{"label":"A","text":"标注任务质量与效率的平衡"},{"label":"B","text":"标注的可行性"},{"label":"C","text":"标注场景的复杂性"},{"label":"D","text":"图像数据的多样性"}],"answer":"B","analysis":"图像数据标注的主要难点是图像数据的多样性、标注场景的复杂性以及标注质量与效率的平衡"},{"id":102811,"order":131,"type":"single_choice","question":"数据采集方法的优化中，不包含下列哪一项（）。","options":[{"label":"A","text":"精准地制定数据采集计划"},{"label":"B","text":"合理安排数据采集的时间和地点"},{"label":"C","text":"尽可能多地采集数据"},{"label":"D","text":"对数据采集的过程和结果进行评估和反馈"}],"answer":"C","analysis":"虽然在数据采集过程中收集越多的数据会有可能提高数据准确性和有效性，但是也会浪费时间和资源，造成不必要的开销。所以，采集足够而非过多的数据是优化数据采集的建议。"},{"id":102812,"order":132,"type":"single_choice","question":"数据质量分析中有一个关键指标是（）。","options":[{"label":"A","text":"数据采集成本"},{"label":"B","text":"数据传输速度"},{"label":"C","text":"数据存储量"},{"label":"D","text":"数据可靠性"}],"answer":"D","analysis":"数据质量分析的一个关键指标是数据可靠性，即数据中是否存在脏数据"},{"id":102813,"order":133,"type":"single_choice","question":"在数据整理的步骤中，合并不同数据表所使用的操作是（）。","options":[{"label":"A","text":"排序"},{"label":"B","text":"连接"},{"label":"C","text":"过滤"},{"label":"D","text":"去重"}],"answer":"B","analysis":"数据整合的步骤包括合并、重构和变形，其中合并不同数据表使用的是连接操作"},{"id":102814,"order":134,"type":"single_choice","question":"在 CSV 格式里，通常用什么符号来作为数据的分隔符（）。","options":[{"label":"A","text":"竖线"},{"label":"B","text":"逗号"},{"label":"C","text":"分号"},{"label":"D","text":"冒号"}],"answer":"B","analysis":"逗号是 CSV 格式常用的分隔符，它用于标识不同数据之间的边界"},{"id":102815,"order":135,"type":"single_choice","question":"在 PowerPoint 里插入 SmartArt 时，下面哪种说法是正确的？（）","options":[{"label":"A","text":"SmartArt仅适用于PowerPoint2016及以上版本。"},{"label":"B","text":"SmartArt支持多种类型的图表。"},{"label":"C","text":"SmartArt只能用于制作流程图。"},{"label":"D","text":"SmartArt无法在幻灯片中进行编辑。"}],"answer":"B","analysis":"SmartArt图表是用于在PowerPoint中创建图像的便捷方法。它们可帮助快速可视化想法、流程等。"},{"id":102816,"order":136,"type":"single_choice","question":"在以下情况中，哪种情况可以不对数据进行标准化处理？（）","options":[{"label":"A","text":"数据集中没有异常值"},{"label":"B","text":"数据集很大"},{"label":"C","text":"数据集很小"},{"label":"D","text":"数据已经处于相同的尺度下"}],"answer":"D","analysis":"如果数据已经处于相同的尺度下，就不需要进行数据标准化"},{"id":102817,"order":137,"type":"single_choice","question":"图像标注里的一致性标准具体是指（）。","options":[{"label":"A","text":"标注文本和图像内容之间的一致性"},{"label":"B","text":"不同标注者在标注同一类图像时的一致性"},{"label":"C","text":"一个标注者对同一图像进行标注时的一致性"},{"label":"D","text":"不同标注者对同一图像进行标注时的相似度"}],"answer":"B","analysis":"图像标注一致性指不同标注者在标注同类图像时的一致性。"},{"id":102818,"order":138,"type":"single_choice","question":"在 OPTICS 算法中，用于判断聚类群体的密度临界值 minPts，其确定方式应当是（）。","options":[{"label":"A","text":"根据算法的迭代次数来确定"},{"label":"B","text":"根据eps的取值来确定"},{"label":"C","text":"根据不同的问题要求来确定"},{"label":"D","text":"根据数据集的大小来确定"}],"answer":"C","analysis":"题考查了minPts的确定方法，选项D和B都是错误的，因为数据集的大小和eps的取值并不决定minPts的取值，而选项A是错误的，因为minPts的取值和算法的迭代次数无关"},{"id":102819,"order":139,"type":"single_choice","question":"在 AGNES 层次聚类算法里，最初的初始状态对应的步骤是（）。","options":[{"label":"A","text":"组合相似度最高的样本"},{"label":"B","text":"将所有样本看作一个聚类"},{"label":"C","text":"随机将样本分成多个聚类"},{"label":"D","text":"将每个样本看作一个单独的聚类"}],"answer":"D","analysis":"在AGNES层次聚类算法最初的初始状态，每个样本被看作一个单独的聚类"},{"id":102820,"order":140,"type":"single_choice","question":"对于一个数据处理系统，（）不属于数据审核需要考量的范畴。","options":[{"label":"A","text":"数据的存储容量"},{"label":"B","text":"安全性检查"},{"label":"C","text":"数据合规性检查"},{"label":"D","text":"数据质量评估"}],"answer":"A","analysis":"数据存储容量不属于数据审核范畴。"},{"id":102821,"order":141,"type":"single_choice","question":"当从服务器获取数据且需要设定超时时长时，应该采取（）举措。","options":[{"label":"A","text":"使用requests.post(timeout=10)"},{"label":"B","text":"使用requests.get(timeout=5)"},{"label":"C","text":"在headers参数中添加timeout键值对"},{"label":"D","text":"使用requests.timeout()"}],"answer":"B","analysis":"在Requests库中，从服务器获取数据使用get()方法，并且可以使用timeout参数来设置超时时间，该参数接收一个整数或浮点数，单位为秒"},{"id":102822,"order":142,"type":"single_choice","question":"在 Word 2019 中，将文本字体大小调整为 14 磅的正确操作是（）。","options":[{"label":"A","text":"选择\"段落\"选项卡，选择\"更多字体大小\"，选择\"14\""},{"label":"B","text":"选择\"开始\"选项卡的\"字号\"，选择\"14\""},{"label":"C","text":"选择\"字体\"选项卡，选择\"更多字体大小\"，选择\"14\""},{"label":"D","text":"选择\"字体\"选项卡，选择\"14\""}],"answer":"B","analysis":"在\"开始\"选项卡的\"字号\"中选择14磅即可设置字体大小。"},{"id":102823,"order":143,"type":"single_choice","question":"下列哪项算法不属于分治法的范畴？（）","options":[{"label":"A","text":"快排"},{"label":"B","text":"归并排序"},{"label":"C","text":"堆排序"},{"label":"D","text":"插入排序"}],"answer":"D","analysis":"分治法是将一个大问题分解为若干个小问题，将小问题分别解决，然后把小问题的解合并成大问题的解。快排、归并排序和堆排序都是分治法的经典算法，而插入排序不属于分治法。"},{"id":102824,"order":144,"type":"single_choice","question":"实现DIANA 层次聚类算法的第二步是（）。","options":[{"label":"A","text":"从当前的簇集合中选择一个直径最大的簇"},{"label":"B","text":"将簇分裂成子簇"},{"label":"C","text":"计算类簇之间的距离"},{"label":"D","text":"计算所有样本点之间的距离"}],"answer":"A","analysis":"DIANA层次聚类算法的实现步骤中，第二步是需选择当前簇集合中直径最大的簇进行分裂，选项A是正确的。在DIANA算法中，需要计算当前所有簇的直径，选择直径最大的簇进行分裂，得到更小的子簇。"},{"id":102825,"order":145,"type":"single_choice","question":"在分类预测方法里，（）算法具备自动化特征学习的能力。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"K近邻"},{"label":"C","text":"决策树"},{"label":"D","text":"神经网络"}],"answer":"D","analysis":"神经网络具备架构优化能力和自动化特征学习能力，因此在大规模文本分类任务中成为主流模型"},{"id":102826,"order":146,"type":"single_choice","question":"依据《中华人民共和国个人信息保护法》，在哪些行为中，经过个人同意后可以收集个人信息（）。","options":[{"label":"A","text":"与个人信息主体签订合同或者履行其他法律义务所必需的个人信息"},{"label":"B","text":"为维护国家安全、公共安全等公共利益所必需的个人信息"},{"label":"C","text":"经过个人信息主体同意的其他用途"},{"label":"D","text":"以上选项均正确"}],"answer":"D","analysis":"根据《中华人民共和国个人信息保护法》第十三条规定，符合下列情形之一的，个人信息处理者方可处理个人信息：（一）取得个人的同意；（二）为订立、履行个人作为一方当事人的合同所必需，或者按照依法制定的劳动规章制度和依法签订的集体合同实施人力资源管理所必需；（三）为履行法定职责或者法定义务所必需；（四）为应对突发公共卫生事件，或者紧急情况下为保护自然人的生命健康和财产安全所必需；（五）为公共利益实施新闻报道、舆论监督等行为，在合理的范围内处理个人信息；（六）依照本法规定在合理的范围内处理个人自行公开或者其他已经合法公开的个人信息；（七）法律、行政法规规定的其他情形。依照本法其他有关规定，处理个人信息应当取得个人同意，但是有前款第二项至第七项规定情形的，不需取得个人同意。"},{"id":102827,"order":147,"type":"single_choice","question":"在 Python 里，能够实现数据筛选的函数是（）。","options":[{"label":"A","text":"filter"},{"label":"B","text":"map"},{"label":"C","text":"reduce"},{"label":"D","text":"sort"}],"answer":"A","analysis":"filter函数可以根据指定条件筛选数据，而map、reduce和sort函数都不是为数据筛选而设计的。"},{"id":102828,"order":148,"type":"single_choice","question":"由于数据标注行业缺乏统一的行业标准，使得文本数据标注面临的困难是（）。","options":[{"label":"A","text":"标注任务的可扩展性"},{"label":"B","text":"标注任务的不完整性"},{"label":"C","text":"标注者的标准化和一致性"},{"label":"D","text":"数据采集和清理的难度"}],"answer":"C","analysis":"缺乏统一标准导致文本数据标注的标准化和一致性困难。"},{"id":102829,"order":149,"type":"single_choice","question":"针对一组年龄数据，运用（）方法可以把数据划分成多个年龄段。","options":[{"label":"A","text":"异常值处理"},{"label":"B","text":"数据离散化"},{"label":"C","text":"PCA降维"},{"label":"D","text":"线性回归"}],"answer":"B","analysis":"数据离散化可将连续年龄划分为多个年龄段。"},{"id":102830,"order":150,"type":"single_choice","question":"在数据质量把控流程中，数据审核包含哪些环节？（）","options":[{"label":"A","text":"数据采集、数据筛查、数据评估"},{"label":"B","text":"数据采集、数据清洗、数据加密"},{"label":"C","text":"数据校验、数据修正、数据验证"},{"label":"D","text":"数据整合、数据分析、数据可视化"}],"answer":"C","analysis":"数据审核主要包括数据校验、数据修正和数据验证三个环节，旨在确保数据质量符合要求"},{"id":102831,"order":151,"type":"single_choice","question":"下列哪个函数可用于绘制热力图？（）","options":[{"label":"A","text":"scatterplot"},{"label":"B","text":"lineplot"},{"label":"C","text":"heatmap"},{"label":"D","text":"barplot"}],"answer":"C","analysis":"heatmap()函数用于绘制热力图。"},{"id":102832,"order":152,"type":"single_choice","question":"《中华人民共和国劳动合同法》规定，劳动合同应当采用（）形式。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"手写"},{"label":"C","text":"书面"},{"label":"D","text":"口头"}],"answer":"C","analysis":"《中华人民共和国劳动合同法》第十条规定，建立劳动关系，应当订立书面劳动合同"},{"id":102833,"order":153,"type":"single_choice","question":"在静态网页数据爬取过程中，下列（）方法能够模拟真实的浏览器请求，从而降低被网站识别为爬虫的概率。","options":[{"label":"A","text":"处理验证码"},{"label":"B","text":"使用代理IP"},{"label":"C","text":"设置请求头信息"},{"label":"D","text":"使用随机延时"}],"answer":"C","analysis":"在静态网页数据的爬取过程中，通过设置请求头信息，可以模拟真实的浏览器请求"},{"id":102834,"order":154,"type":"single_choice","question":"下列哪项不属于文本数据标注的实际应用场景？（）","options":[{"label":"A","text":"语音识别"},{"label":"B","text":"机器翻译"},{"label":"C","text":"图像识别"},{"label":"D","text":"自然语言处理"}],"answer":"C","analysis":"文本数据标注主要应用于自然语言处理、机器翻译、语音识别等领域，不涉及图像识别"},{"id":102835,"order":155,"type":"single_choice","question":"勤勉好学这一准则的基本要求包括哪些内容（）。","options":[{"label":"A","text":"积极主动、刻苦努力和不断学习"},{"label":"B","text":"只要能完成工作任务就行，不需要额外学习"},{"label":"C","text":"只需要在工作和学习中选择一个投入即可"},{"label":"D","text":"只需要认真学习，工作马虎完成即可"}],"answer":"A","analysis":"职业守则中的\"勤勉好学\"基本要求指的是从业人员应该具备积极主动、刻苦努力和不断学习的态度。"},{"id":102836,"order":156,"type":"single_choice","question":"在数据处理环节，下列哪项方式可以增强数据处理的可靠性（）。","options":[{"label":"A","text":"提高数据的质量和准确性"},{"label":"B","text":"增加数据的数量"},{"label":"C","text":"并行处理数据"},{"label":"D","text":"减少数据的存储空间"}],"answer":"A","analysis":"提高数据质量与准确性可增强数据处理可靠性。"},{"id":102837,"order":157,"type":"single_choice","question":"在 Python 里，可通过（）获取 DBSCAN 算法的聚类结果。","options":[{"label":"A","text":"调用DBSCAN对象的labels_属性"},{"label":"B","text":"调用DBSCAN对象的predict方法"},{"label":"C","text":"调用DBSCAN对象的cluster_centers_属性"},{"label":"D","text":"调用DBSCAN对象的transform方法"}],"answer":"A","analysis":"通过DBSCAN对象的labels_属性获取聚类结果。"},{"id":102838,"order":158,"type":"single_choice","question":"智能化系统集成项目的施工阶段，其核心是严格依照（）开展施工工作。","options":[{"label":"A","text":"以往项目的施工经验"},{"label":"B","text":"设计图纸和施工规范"},{"label":"C","text":"用户的临时要求"},{"label":"D","text":"项目经理的口头指示"}],"answer":"B","analysis":"智能化系统集成项目的施工阶段，其核心是严格按照设计图纸和施工规范进行施工"},{"id":102839,"order":159,"type":"single_choice","question":"下列哪项行为无法体现恪尽职守的基本要求（）。​","options":[{"label":"A","text":"确保客户的利益不受损害"},{"label":"B","text":"不私自泄露公司机密信息"},{"label":"C","text":"出售公司信息"},{"label":"D","text":"保守商业机密"}],"answer":"C","analysis":"恪尽职守的基本要求之一是保守秘密，即从业人员应该严格遵守保密规定，对工作中的机密信息予以妥善保管，并不得泄露相关信息"},{"id":102840,"order":160,"type":"single_choice","question":"运算器作为计算机的核心部件，它的功能是（）。","options":[{"label":"A","text":"连接计算机和外部设备"},{"label":"B","text":"用于执行各种算术和逻辑运算"},{"label":"C","text":"控制计算机的运行"},{"label":"D","text":"存储数据"}],"answer":"B","analysis":"运算器是计算机的核心部件，主要作用是进行算术和逻辑运算，能够对数据进行计算和处理"},{"id":102841,"order":161,"type":"single_choice","question":"开展数据筛选，其目的是（）。","options":[{"label":"A","text":"提高数据可用性"},{"label":"B","text":"减小存储压力"},{"label":"C","text":"压缩数据维度"},{"label":"D","text":"提升运行效率"}],"answer":"A","analysis":"数据筛选的目的是为了提高之前收集存储的相关数据的可用性，更利于后期数据分析。"},{"id":102842,"order":162,"type":"single_choice","question":"下列哪项行为符合严谨求是这一准则的基本要求（）。","options":[{"label":"A","text":"自己认为正确就可以了，不需要考虑其他因素"},{"label":"B","text":"从众心态，跟随大众观点"},{"label":"C","text":"全面的思考，细致地分析问题"},{"label":"D","text":"不参考权威资料，直接编写自己的观点"}],"answer":"C","analysis":"深入思考是严谨求是的核心要求"},{"id":102843,"order":163,"type":"single_choice","question":"在求异法中，“比较现象存在与不存在的场合” 这一步骤，主要是为了达到什么目的？（）","options":[{"label":"A","text":"实施对照实验并验证假设"},{"label":"B","text":"测量变量间的共变关系"},{"label":"C","text":"归纳所有场合中的共同特征"},{"label":"D","text":"确定现象与条件的唯一差异因素"}],"answer":"D","analysis":"求异法的核心逻辑是通过比较正例（现象存在）与反例（现象不存在）的场合，​锁定唯一差异因素作为原因"},{"id":102844,"order":164,"type":"single_choice","question":"文本数据归类的过程包含哪些步骤？（）","options":[{"label":"A","text":"数据处理、特征选择、模型训练、模型评估、模型应用"},{"label":"B","text":"数据抽取、文本分类、模型训练、模型评估、模型应用"},{"label":"C","text":"文本预处理、特征提取、模型训练、模型评估、模型应用"},{"label":"D","text":"文本获取、文本预处理、模型训练、模型评估、模型应用"}],"answer":"C","analysis":"文本数据归类的过程一般包括文本预处理、特征提取、模型训练、模型评估、模型应用等步骤"},{"id":102845,"order":165,"type":"single_choice","question":"当面临数据量极为庞大，且仅有极少数行出现数据缺失的状况时，（）这种缺失数据处理手段最为适宜。","options":[{"label":"A","text":"用最近值填充"},{"label":"B","text":"删除含有缺失数据的行"},{"label":"C","text":"中位数填充"},{"label":"D","text":"随机填充"}],"answer":"B","analysis":"如果简单地删除小部分记录就可以达成既定的目标，那么删除含有缺失值的记录这种方法是最有效的"},{"id":102846,"order":166,"type":"single_choice","question":"开展数据标注质量检测，其目的在于（）。","options":[{"label":"A","text":"增加数据标注的数量"},{"label":"B","text":"降低数据标注的成本"},{"label":"C","text":"确保数据标注的准确性"},{"label":"D","text":"提高数据标注的效率"}],"answer":"C","analysis":"数据标注质量检测的主要目的是确保数据标注的准确性，保证所标注的数据符合数据标准，从而避免模型由于标注数据不准确而导致的问题"},{"id":102847,"order":167,"type":"single_choice","question":"存储性是计算机的主要特点之一，这表明计算机（）。","options":[{"label":"A","text":"可以存储大量的数据"},{"label":"B","text":"可以自我学习和适应环境"},{"label":"C","text":"可以根据用户的需求执行不同的任务"},{"label":"D","text":"可以执行复杂的算术和逻辑运算"}],"answer":"A","analysis":"计算机的存储性意味着它可以存储大量的数据，包括程序、数据和中间结果等"},{"id":102848,"order":168,"type":"single_choice","question":"在数据规约的各种方法里，哪一种不能起到降低数据维度的作用（）。","options":[{"label":"A","text":"集成学习"},{"label":"B","text":"因子分析"},{"label":"C","text":"线性判别分析"},{"label":"D","text":"主成分分析"}],"answer":"A","analysis":"在数据规约中，主成分分析、线性判别分析和因子分析都可以帮助我们减少数据的维度"},{"id":102849,"order":169,"type":"single_choice","question":"不属于智能安防系统的组成部分的是（）。","options":[{"label":"A","text":"监控摄像头"},{"label":"B","text":"入侵报警系统"},{"label":"C","text":"水电系统"},{"label":"D","text":"智能控制中心"}],"answer":"C","analysis":"智能安防系统通常由监控摄像头、入侵报警系统、门禁系统、报警设备和智能控制中心等组成，用于实现视频监控、数据存储与管理等功能。水电系统不属于智能安防系统的组成部分，它是基础设施的一部分。"},{"id":102850,"order":170,"type":"single_choice","question":"若要在请求里添加HTTP请求头信息，需运用（）方法中的headers参数来达成。","options":[{"label":"A","text":"requests.headers()"},{"label":"B","text":"requests.add_header()"},{"label":"C","text":"requests.get()"},{"label":"D","text":"requests.data()"}],"answer":"C","analysis":"添加请求头需通过headers参数传递至requests.get()或requests.post()方法，而非调用独立方法"},{"id":102851,"order":171,"type":"single_choice","question":"利用 Python 进行密度聚类时，首先需要定义（）参数。","options":[{"label":"A","text":"数据数量和聚类标识数目"},{"label":"B","text":"数据分布形态和聚类分布形态"},{"label":"C","text":"聚类中心和数据维度"},{"label":"D","text":"最小样本数和邻域半径"}],"answer":"D","analysis":"在使用Python进行密度聚类时，需要先定义最小样本数和邻域半径两个参数"},{"id":102852,"order":172,"type":"single_choice","question":"下列哪一项不属于数据质量评估的指标？（）","options":[{"label":"A","text":"时效性"},{"label":"B","text":"可用性"},{"label":"C","text":"多样性"},{"label":"D","text":"精准性"}],"answer":"C","analysis":"多样性不属于数据质量评估指标。"},{"id":102853,"order":173,"type":"single_choice","question":"在遵章守法的基本要求里，遵守法律法规具体指的是（）。​","options":[{"label":"A","text":"遵守与个人意愿相符的法律法规"},{"label":"B","text":"遵守国家制定的法律法规以及地方性法规"},{"label":"C","text":"只遵守与个人利益相关的法律法规"},{"label":"D","text":"只遵守国家制定的法律法规"}],"answer":"B","analysis":"法律法规的遵守要求从业人员应该了解并遵守与他们所从事的领域和职业相关的法律法规"},{"id":102854,"order":174,"type":"single_choice","question":"在智能化系统集成项目的项目准备阶段，下列哪一项不属于该阶段的工作内容？（）","options":[{"label":"A","text":"资源准备"},{"label":"B","text":"需求确认"},{"label":"C","text":"团队组建"},{"label":"D","text":"施工图设计"}],"answer":"D","analysis":"在智能化系统集成项目的项目准备阶段，施工图设计不是该阶段的工作内容"},{"id":102855,"order":175,"type":"single_choice","question":"下列哪项不属于特征变换的方法？（）","options":[{"label":"A","text":"字典学习"},{"label":"B","text":"特征离散化"},{"label":"C","text":"独热编码"},{"label":"D","text":"特征缩放"}],"answer":"A","analysis":"字典学习不属于特征变换方法。"},{"id":102856,"order":176,"type":"single_choice","question":"什么是K折交叉验证？（）","options":[{"label":"A","text":"将数据集随机分为K等份，每次使用其中1份作为验证集，剩余的K-1份作为训练集，重复K次"},{"label":"B","text":"随机选取K个数据样本，其中1份作为验证集，剩余的K-1份作为训练集，重复K次"},{"label":"C","text":"将数据集划分为K等份，每次使用其中K-1份作为训练集，剩余1份作为验证集，重复K次"},{"label":"D","text":"分层选取K个数据样本，其中1份作为验证集，剩余的K-1份作为训练集，重复K次"}],"answer":"A","analysis":"K折交叉验证将数据集随机分为K等份，每次使用其中1份作为验证集，剩余的K-1份作为训练集，重复K次，最终得到K个模型的性能评价结果"},{"id":102857,"order":177,"type":"single_choice","question":"世界上第一台采用通用程序控制的计算机是（）。","options":[{"label":"A","text":"IBM701"},{"label":"B","text":"EDSAC"},{"label":"C","text":"UNIVAC"},{"label":"D","text":"ENIAC"}],"answer":"B","analysis":"EDSAC是第一个使用通用程序控制的计算机"},{"id":102858,"order":178,"type":"single_choice","question":"在 Word 中，能够通过什么方式插入页脚（）。","options":[{"label":"A","text":"在“布局”选项卡中选择“页脚”命令"},{"label":"B","text":"在“插入”选项卡中选择“页脚”命令"},{"label":"C","text":"右键单击页面顶部，选择“页码”命令"},{"label":"D","text":"右键单击页面底部，选择“页码”命令"}],"answer":"B","analysis":"在Word中插入页脚，需要先在“插入”选项卡中找到“页脚”命令，选择后再选择“底部页边距”或“页底端”位置，即可插入页脚"},{"id":102859,"order":179,"type":"single_choice","question":"下列哪段代码能够筛选出字典中 value 大于 10 的项？（）","options":[{"label":"A","text":"{k: v for k, v in dict.items() if v > 10}"},{"label":"B","text":"{k in dict.items() if v > 10}"},{"label":"C","text":"{for k, v in dict.items() if v > 10}"},{"label":"D","text":"{k: v in dict.items() if v > 10}"}],"answer":"A","analysis":"字典推导式可以方便简洁地对字典进行筛选、变换等操作。语法为：{key_expression: value_expression for (key, value) in iterable if condition}，其中“key_expression”和“value_expression”分别表示对key和value进行的操作，“iterable”表示原始字典的键值对，“condition”表示用于筛选键值对的条件。"},{"id":102860,"order":180,"type":"single_choice","question":"下面哪一项并非职业道德所具有的特点（）？","options":[{"label":"A","text":"社会规范性"},{"label":"B","text":"行为指导性"},{"label":"C","text":"多样性"},{"label":"D","text":"个人主观性"}],"answer":"D","analysis":"职业道德的特征包括社会规范性、行为指导性、多样性等，不同的行业和不同的职业，有不同的职业道德标准。它们是客观存在的，而不受个人主观意愿的影响。"},{"id":102861,"order":181,"type":"single_choice","question":"在 K-Means 聚类算法里，可采用哪一种方法来评估聚类的效果。（）","options":[{"label":"A","text":"精度值"},{"label":"B","text":"AUC值"},{"label":"C","text":"NMI值"},{"label":"D","text":"F1值"}],"answer":"C","analysis":"K-Means可使用NMI（归一化互信息）评估聚类效果。"},{"id":102862,"order":182,"type":"single_choice","question":"在采集数据的过程中，导致缺失值出现的原因有哪些？（）","options":[{"label":"A","text":"有些信息暂时无法获取"},{"label":"B","text":"有些信息是被遗漏的"},{"label":"C","text":"字段不存在"},{"label":"D","text":"以上都对"}],"answer":"D","analysis":"数据的缺失主要包括记录的缺失和记录中某个字段信息的缺失。缺失值产生的原因主要有：有些信息暂时无法获取，或者获取信息的代价太大；有些信息是被遗漏的；字段不存在。"},{"id":102863,"order":183,"type":"single_choice","question":"恪尽职守中 \"尊重他人\" 这一要求的具体内容是（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"不歧视、辱骂他人"},{"label":"C","text":"和他人礼貌地交往"},{"label":"D","text":"尊重他人的权益"}],"answer":"A","analysis":"尊重他人包括尊重权益、礼貌交往、不歧视辱骂。"},{"id":102864,"order":184,"type":"single_choice","question":"遵章守法这一要求的基本要求是（）。​","options":[{"label":"A","text":"遵守个人意愿"},{"label":"B","text":"遵守领导指令"},{"label":"C","text":"遵守企业管理规定"},{"label":"D","text":"遵守法律法规和相关规定"}],"answer":"D","analysis":"遵章守法要求遵守法律法规与相关规定。"},{"id":102865,"order":185,"type":"single_choice","question":"对于同一域名下不同子域名或路径的网站，它们之间的 Cookie 处于（）状态。","options":[{"label":"A","text":"取决于cookie中path和domain属性设置是否支持共享"},{"label":"B","text":"只有部分Cookie可以共享"},{"label":"C","text":"不可以共享"},{"label":"D","text":"全部可以共享"}],"answer":"A","analysis":"Cookie是否共享取决于Domain和Path属性设置。"},{"id":102866,"order":186,"type":"single_choice","question":"下列哪一项是勤勉好学带来的积极影响（）。","options":[{"label":"A","text":"勤勉好学可以提升专业素养和能力"},{"label":"B","text":"勤勉好学可以提高工作效率和质量"},{"label":"C","text":"勤勉好学有助于个人的成长和全面发展"},{"label":"D","text":"以上答案均正确"}],"answer":"D","analysis":"遵守\"勤勉好学\"的基本要求，从业人员可以保持积极主动的工作态度，不断提升自己的专业素养和能力。这有助于提高工作效率和质量，同时也为个人的职业发展和成功创造更多机会。此外，勤勉好学的精神也有助于个人的成长和全面发展。"},{"id":102867,"order":187,"type":"single_choice","question":"智能预问诊系统的主要功能是什么？（）","options":[{"label":"A","text":"面向患者自动发起满意度调查，分析反馈并提供优化建议"},{"label":"B","text":"对患者的恢复情况进行随访调查，并提供即时自助式解答服务"},{"label":"C","text":"在医生问诊前，采集患者临床专科病史信息，辅助生成电子病历"},{"label":"D","text":"为患者提供就诊时间和地点推送、就诊路径推荐等服务"}],"answer":"C","analysis":"根据中华人民共和国国家卫生健康委员会官方网站发布的《卫生健康行业人工智能应用场景参考指引》，智能预问诊是在医生问诊前，通过图文、语音等人机交互方式，采集患者临床专科病史信息，辅助生成电子病历"},{"id":102868,"order":188,"type":"single_choice","question":"下列哪一项不属于数据质量问题？（）","options":[{"label":"A","text":"数据重复"},{"label":"B","text":"数据异常"},{"label":"C","text":"数据过多"},{"label":"D","text":"数据缺失"}],"answer":"C","analysis":"数据缺失、异常、重复都是数据质量问题"},{"id":102869,"order":189,"type":"single_choice","question":"在职业道德规范中，要求从业者具备的素养之一为（）？","options":[{"label":"A","text":"忠诚、诚信"},{"label":"B","text":"自私自利"},{"label":"C","text":"不诚实"},{"label":"D","text":"利己主义"}],"answer":"A","analysis":"职业道德要求从业者表现出忠诚与诚信的品质，即对职业和职业责任的忠诚，以及真实、诚实、守信的行为准则"},{"id":102870,"order":190,"type":"single_choice","question":"什么是 Cookie 机制（）。","options":[{"label":"A","text":"一种密码存储方法"},{"label":"B","text":"一种用于保持用户状态的机制"},{"label":"C", （平滑）手段之一，以下哪项描述准确契合高斯滤波的原理？（）","options":[{"label":"A","text":"对图像中的每个像素点的像素值进行统计分析，根据统计结果进行去噪处理"},{"label":"B","text":"使用高斯函数对图像进行卷积，通过对周围像素的加权平均得到去噪后的图像"},{"label":"C","text":"通过选择像素值在一定范围内的像素点进行排序，并取中间值作为去噪后的像素值"},{"label":"D","text":"将图像中每个像素点的值与其相邻像素点的值进行加权平均，得到去噪后的图像"}],"answer":"B","analysis":"高斯滤波是一种线性平滑滤波器，它使用高斯函数对图像进行卷积，通过对周围像素的加权平均得到去噪后的图像"},{"id":102917,"order":237,"type":"single_choice","question":"什么是数据规约的定义（）。","options":[{"label":"A","text":"从数据中移除含有噪音的数据"},{"label":"B","text":"将数据平滑化"},{"label":"C","text":"产生更小且保持原数据集完整性的新数据集"},{"label":"D","text":"将数据转化为机器学习算法可识别的形式"}],"answer":"C","analysis":"数据规约指的是产生更小且保持原数据集完整性的新数据集"},{"id":102918,"order":238,"type":"single_choice","question":"在数据处理过程中，以下哪项措施可以直接缩短数据处理所耗费的时间（）。","options":[{"label":"A","text":"压缩数据"},{"label":"B","text":"并行处理数据"},{"label":"C","text":"增加数据的数量"},{"label":"D","text":"提高数据的质量和准确性"}],"answer":"B","analysis":"并行处理数据可以减少数据处理的时间，通过同时处理多个数据任务，可以提高数据处理的效率"},{"id":102919,"order":239,"type":"single_choice","question":"对一组数据的特征分布状况进行分析时，可以用来衡量数据的离散程度的指标是（）。","options":[{"label":"A","text":"方差"},{"label":"B","text":"均值"},{"label":"C","text":"中位数"},{"label":"D","text":"众数"}],"answer":"A","analysis":"针对数据特征内部分布情况进行分析，离散程度是一个重要的指标。方差是数据分布离散程度的指标之一，可以反映数据的波动情况。"},{"id":102920,"order":240,"type":"single_choice","question":"在Excel软件操作中，若要对一列数据执行去重操作，应首先进行（）操作。","options":[{"label":"A","text":"任意选择一个单元格"},{"label":"B","text":"选择该列的整个范围"},{"label":"C","text":"该列中的最后一个单元格"},{"label":"D","text":"该列中的第一个单元格"}],"answer":"B","analysis":"在Excel中，如果想要对一列数据进行去重操作，需要选择该列的整个范围，因为REMOVE DUPLICATES功能只能作用于选中的整个数据范围"},{"id":102921,"order":241,"type":"single_choice","question":"在图像数据里，所谓的颜色深度指的是（）。","options":[{"label":"A","text":"图像中的颜色数量"},{"label":"B","text":"颜色的亮度"},{"label":"C","text":"颜色在图像中的位置"},{"label":"D","text":"颜色的取值范围"}],"answer":"D","analysis":"颜色深度指的是每个像素可以使用的颜色值的数量。颜色深度越高，每个像素可以使用的颜色值就越多。例如，一张8位颜色深度的图片每个像素可以使用256个颜色值，而24位颜色深度的图片每个像素可以使用约1670万个颜色值。因此，选项D描述了颜色深度的正确含义。"},{"id":102922,"order":242,"type":"single_choice","question":"在文本数据标注中，不同标注者可能对同一段文本给出不同的标注结果，这会对（）产生影响。","options":[{"label":"A","text":"标注任务的复杂性"},{"label":"B","text":"标注结果的一致性"},{"label":"C","text":"标注结果的可复现性"},{"label":"D","text":"数据的缺乏和不完整性"}],"answer":"B","analysis":"在文本数据标注过程中，标注结果的一致性是一个重要的难点，因为不同标注者可能会对同一文本做出不同的标注"},{"id":102923,"order":243,"type":"single_choice","question":"《中华人民共和国计算机软件保护条例》中，以下哪一项不在计算机软件著作权的保护范畴内？","options":[{"label":"A","text":"软件的测试报告"},{"label":"B","text":"软件的用户手册"},{"label":"C","text":"开发软件所用的计算机硬件"},{"label":"D","text":"软件的源代码"}],"answer":"C","analysis":"根据《中华人民共和国计算机软件保护条例》第二条，计算机软件著作权保护的对象是计算机程序及其相关文档，不包括开发软件所用的计算机硬件或软件所处理的数据"},{"id":102924,"order":244,"type":"single_choice","question":"在静态网页数据爬取过程中，可通过（）来完成网页解析。","options":[{"label":"A","text":"pandas库"},{"label":"B","text":"BeautifulSoup库"},{"label":"C","text":"requests库"},{"label":"D","text":"urllib库"}],"answer":"B","analysis":"BeautifulSoup库用于解析静态网页结构。"},{"id":102925,"order":245,"type":"single_choice","question":"操作系统和计算机系统之间存在着怎样的关系（）。","options":[{"label":"A","text":"操作系统是管理硬件与资源的核心软件，属于计算机系统的一部分"},{"label":"B","text":"操作系统与计算机系统无关，仅用于运行应用程序"},{"label":"C","text":"操作系统是计算机系统中唯一必需的软件"},{"label":"D","text":"操作系统是计算机系统的物理组成部分"}],"answer":"A","analysis":"操作系统是计算机系统的核心软件，管理硬件资源、提供接口和运行环境。"},{"id":102926,"order":246,"type":"single_choice","question":"下列哪项不属于文档的管理制度范畴？（）","options":[{"label":"A","text":"文档使用权限控制规则"},{"label":"B","text":"文档借阅记录的登记制度"},{"label":"C","text":"建立文档的相关规范"},{"label":"D","text":"文档不需要按照主题或内容进行划分"}],"answer":"D","analysis":"文档需要按主题或内容划分，这不属于管理制度范畴。"},{"id":102927,"order":247,"type":"single_choice","question":"数据清洗流程里的“异常值处理”具体指的是（）方面的工作。","options":[{"label":"A","text":"更改数据格式"},{"label":"B","text":"去除重复行"},{"label":"C","text":"处理样本中的个别数值明显偏离其余的观测值"},{"label":"D","text":"填补缺失值"}],"answer":"C","analysis":"异常值处理指的是处理错误或与测量数据偏差过大的情况"},{"id":102928,"order":248,"type":"single_choice","question":"对于商标注册，下列说法不正确的是（）。","options":[{"label":"A","text":"仅有本商品的通用名称可作为商标注册"},{"label":"B","text":"商标注册申请人若有不服可以自收到通知之日起十五日内向商标评审委员会申请复审"},{"label":"C","text":"商标注册所得权利的保护期限为10年"},{"label":"D","text":"注册商标的专用权，以核准注册的商标和核定使用的商品为限。"}],"answer":"A","analysis":"《中华人民共和国商标法》第十一条规定，下列标志不得作为商标注册：（一）仅有本商品的通用名称、图形、型号的；（二）仅直接表示商品的质量、主要原料、功能、用途、重量、数量及其他特点的；（三）其他缺乏显著特征的"},{"id":102929,"order":249,"type":"single_choice","question":"特征工程最终要达成的目标是什么？（）","options":[{"label":"A","text":"增加模型的复杂度"},{"label":"B","text":"精简数据集"},{"label":"C","text":"优化模型预测结果"},{"label":"D","text":"提高模型训练速度"}],"answer":"C","analysis":"特征工程是指通过对原始数据进行处理和转换，以获取更有价值、更具代表性和更易处理的特征，使得特征能在机器学习算法上发挥更好的作用的过程，最终优化模型的预测结果"},{"id":102930,"order":250,"type":"single_choice","question":"Excel 里的 SUM 函数，其主要作用是（）？","options":[{"label":"A","text":"计算单元格数值的最小值"},{"label":"B","text":"计算单元格数值的和"},{"label":"C","text":"计算单元格数值的最大值"},{"label":"D","text":"计算单元格数值的平均值"}],"answer":"B","analysis":"SUM 函数用于计算选定单元格范围内所有数值的总和"},{"id":102931,"order":251,"type":"single_choice","question":"针对图像标注任务，下列哪一种方法能够提高标注的准确度（）。","options":[{"label":"A","text":"提高标注工人的工作时间"},{"label":"B","text":"对标注进行质量核验"},{"label":"C","text":"增加标注物体的数量"},{"label":"D","text":"缩小标注物体的大小"}],"answer":"B","analysis":"对标注进行质量核验是提高标注准确度的有效方法"},{"id":102932,"order":252,"type":"single_choice","question":"在数据整理过程中，可用（）方法来去除重复值。","options":[{"label":"A","text":"Add"},{"label":"B","text":"Drop_duplicates"},{"label":"C","text":"Merge"},{"label":"D","text":"Group-by"}],"answer":"B","analysis":"使用drop_duplicates方法可以去除数据中的重复值，该方法可以对所有列进行去重操作"},{"id":102933,"order":253,"type":"single_choice","question":"在动态网页数据爬取中，元素选取方法 find_element () 里，参数 by 的取值可以是（）。","options":[{"label":"A","text":"By.ID"},{"label":"B","text":"By.NAMES"},{"label":"C","text":"By.TEXT"},{"label":"D","text":"By.CLASS"}],"answer":"A","analysis":"find_element()方法的参数by的取值有：By.ID、By.XPATH、By.CSS_SELECTOR等八种。B和C选项书写错误。"},{"id":102934,"order":254,"type":"single_choice","question":"数据质检作为决策依据，其重要性表现为（）。","options":[{"label":"A","text":"维护品牌声誉和用户满意度"},{"label":"B","text":"增加数据的维度，提升算法复杂度"},{"label":"C","text":"及时发现并纠正数据错误，提高决策的准确性"},{"label":"D","text":"发现数据的复杂性和多样性"}],"answer":"C","analysis":"准确的数据是决策的基础，低质量的数据可能导致错误的决策"},{"id":102935,"order":255,"type":"single_choice","question":"开展实体关系标注工作时，下列哪一种方法属于正确的标注方式？","options":[{"label":"A","text":"随意标注，无需遵循特定规范"},{"label":"B","text":"采用BIO标注法，标注实体并确定实体之间的关系"},{"label":"C","text":"只需标注关系，无需标注实体"},{"label":"D","text":"只需标注实体，无需标注实体之间的关系"}],"answer":"B","analysis":"实体关系标注应采用BIO标注法标注实体并确定关系。"},{"id":102936,"order":256,"type":"single_choice","question":"下列哪一项不属于计算机文件系统的主要功能（）。","options":[{"label":"A","text":"分析数据"},{"label":"B","text":"检索数据"},{"label":"C","text":"组织数据"},{"label":"D","text":"存储数据"}],"answer":"A","analysis":"计算机文件系统的主要功能是存储数据、组织数据和检索数据"},{"id":102937,"order":257,"type":"single_choice","question":"在 Excel 2013 及更新版本中，给图表添加数据标签的操作是（）。","options":[{"label":"A","text":"选中图表，在“插入”选项卡中点击“数据标签”"},{"label":"B","text":"在“页面布局”选项卡中选择“数据标签”"},{"label":"C","text":"选中图表，点击图表右侧的“+”图标勾选“数据标签”"},{"label":"D","text":"双击数据系列，在格式面板中勾选“数据标签”"}],"answer":"C","analysis":"在Excel中，要添加数据标签到图表上，可以通过多种方式。最常见的方式是点击图表右侧的‘+’图标，并勾选‘数据标签’。"},{"id":102938,"order":258,"type":"single_choice","question":"数据规约中的特征选择指的是什么（）。","options":[{"label":"A","text":"通过减少数据的特征来降低数据复杂性"},{"label":"B","text":"通过增加数据的特征来降低数据复杂性"},{"label":"C","text":"通过减少数据的特征来提高数据质量"},{"label":"D","text":"通过增加数据的特征来提高数据质量"}],"answer":"A","analysis":"数据规约中的特征选择是通过减少数据的特征数量来降低数据的复杂性，并提高数据分析和建模的效率"},{"id":102939,"order":259,"type":"single_choice","question":"对数据质量标准进行评价，其主要的评价标准包含（）。","options":[{"label":"A","text":"数据的加密和解密算法"},{"label":"B","text":"数据的备份和恢复能力"},{"label":"C","text":"数据的存储效率和传输速度"},{"label":"D","text":"数据的完整性和准确性"}],"answer":"D","analysis":"数据质量标准评价标准主要关注数据的完整性和准确性，即数据是否完整、准确、一致等"},{"id":102940,"order":260,"type":"single_choice","question":"在异常值检测工作里，（）方法一般不适用于连续性数据的异常值查找。","options":[{"label":"A","text":"离群点检测算法"},{"label":"B","text":"相关度分析"},{"label":"C","text":"基于聚类的异常值检测"},{"label":"D","text":"卡方检验"}],"answer":"D","analysis":"卡方检验属于自变量和因变量都是离散型的，且只能检测两个变量之间是否有关系的检验方法，不适用于连续型数据的异常值检测。离群点检测算法、相关度分析和基于聚类的异常值检测都适用于连续型数据。"},{"id":102941,"order":261,"type":"single_choice","question":"以下哪一项不在勤勉好学的基本要求范畴内（）。","options":[{"label":"A","text":"保持高度的责任心和工作效率"},{"label":"B","text":"具备积极探索和创新的精神"},{"label":"C","text":"追求高薪高职，以此为奋斗目标"},{"label":"D","text":"虚心接受他人的建议和批评"}],"answer":"C","analysis":"勤勉好学的基本要求包括保持高度的责任心和工作效率、具备积极探索和创新的精神、虚心接受他人的建议和批评。不包括追求高薪高职，以此为奋斗目标。"},{"id":102942,"order":262,"type":"single_choice","question":"以下关于爬虫程序的说法，哪一项是错误的（）。","options":[{"label":"A","text":"爬虫程序需要妥善处理异常情况"},{"label":"B","text":"爬虫程序可以使用多线程技术提高抓取效率"},{"label":"C","text":"爬虫程序需要处理网站反爬虫机制"},{"label":"D","text":"爬虫程序可以随意修改网站的内容"}],"answer":"D","analysis":"爬虫程序只能获取网站的内容，但不能修改其内容"},{"id":102943,"order":263,"type":"single_choice","question":"以下（）表达式能够选取所有带有\"value\"属性的input元素。","options":[{"label":"A","text":"//input/@value"},{"label":"B","text":"//input[@attribute(value)]"},{"label":"C","text":"//input[value]"},{"label":"D","text":"//input[@value]"}],"answer":"D","analysis":"Xpath中使用@符号表示选取元素的属性，所以//input[@value]可以选取所有包含\"value\"属性的input元素"},{"id":102944,"order":264,"type":"single_choice","question":"数据质量验证与校验的主要方法中，不包含（）。","options":[{"label":"A","text":"检查数据的储存性能"},{"label":"B","text":"检查数据的完整性"},{"label":"C","text":"检查数据的唯一标识"},{"label":"D","text":"验证数据的格式"}],"answer":"A","analysis":"数据质量验证和校验的主要方法包括完整性检查、格式验证、范围检查、一致性检查和唯一性验证"},{"id":102945,"order":265,"type":"single_choice","question":"以下哪一项不是智能安防系统的特点？（）","options":[{"label":"A","text":"自动化与智能化"},{"label":"B","text":"降低系统效率"},{"label":"C","text":"高效与可扩展性"},{"label":"D","text":"远程控制与预警"}],"answer":"B","analysis":"智能安防系统具有自动化与智能化、高效与可扩展性、远程控制与预警等特点，其目的是提高安防系统的效率和可靠性，降低系统效率并不是智能安防系统的特点。"},{"id":102946,"order":266,"type":"single_choice","question":"下列哪项操作能够调整表格中单元格的大小（）。","options":[{"label":"A","text":"点击\"工具\"，选择\"单元格大小\"。"},{"label":"B","text":"点击\"样式\"，选择\"单元格大小\"。"},{"label":"C","text":"双击单元格，直接输入新的尺寸。"},{"label":"D","text":"选择单元格，然后拖动其边缘。"}],"answer":"D","analysis":"选中单元格后拖动边缘可调整其大小。"},{"id":102947,"order":267,"type":"single_choice","question":"pandas库中的fillna方法，其默认的填充操作是（）。","options":[{"label":"A","text":"不填充，需用户显式定义策略"},{"label":"B","text":"填充为均值"},{"label":"C","text":"填充为后一个值"},{"label":"D","text":"填充为前一个值"}],"answer":"A","analysis":"fillna() 方法 无默认填充值，必须通过参数（如 value、method）显式指定填充策略"},{"id":102948,"order":268,"type":"single_choice","question":"微型计算机的特点中，不包含下列哪一项（）。","options":[{"label":"A","text":"适合进行日常办公等简单应用"},{"label":"B","text":"处理速度快，计算能力强"},{"label":"C","text":"使用广泛，成本低廉"},{"label":"D","text":"体积小，便于携带"}],"answer":"B","analysis":"微型计算机体积小、便携、成本低，但处理能力相对较弱。"},{"id":102949,"order":269,"type":"single_choice","question":"AGNES 层次聚类算法中，划分聚类的决策是根据（）来制定的。","options":[{"label":"A","text":"最小方差准则"},{"label":"B","text":"平均距离准则"},{"label":"C","text":"最大距离准则"},{"label":"D","text":"最小距离准则"}],"answer":"D","analysis":"AGNES层次聚类算法中，划分聚类的决策是基于最小距离准则"},{"id":102950,"order":270,"type":"single_choice","question":"在文本分类中，（）方法特别适合处理高维的 TF-IDF 特征，而且能借助核函数高效解决非线性分类问题。","options":[{"label":"A","text":"逻辑回归"},{"label":"B","text":"决策树"},{"label":"C","text":"支持向量机"},{"label":"D","text":"朴素贝叶斯"}],"answer":"C","analysis":"支持向量机适合处理高维TF-IDF特征，借助核函数解决非线性分类。"},{"id":102951,"order":271,"type":"single_choice","question":"下列不属于DBSCAN 密度聚类的优点的是（）。","options":[{"label":"A","text":"执行速度非常快"},{"label":"B","text":"对噪声点不敏感"},{"label":"C","text":"可以识别任意形状的簇"},{"label":"D","text":"不需要指定聚类个数"}],"answer":"A","analysis":"DBSCAN优点包括无需指定聚类数、识别任意形状簇、对噪声不敏感，但执行速度不快。"},{"id":102952,"order":272,"type":"single_choice","question":"在当下，（）可以说是应用最广泛的音频压缩格式。","options":[{"label":"A","text":"WAV"},{"label":"B","text":"MP3"},{"label":"C","text":"MP4"},{"label":"D","text":"WMA"}],"answer":"B","analysis":"MP3(MPEG Layer 3)格式:是一种有损失的压缩格式，它舍弃了音频数据中人类几乎听不到的声音，因此文件很小，但音质表现比WAV差，也由于文件小的缘故，相当适合网络传输，因此MP3可以说是目前最普遍的音频压缩格式。"},{"id":102953,"order":273,"type":"single_choice","question":"在 Word 中，插入目录的正确操作步骤是（）。","options":[{"label":"A","text":"在“格式”选项卡中选择“目录”，然后选择“自动目录”。"},{"label":"B","text":"在“布局”选项卡中选择“目录”，然后选择“自动目录”。"},{"label":"C","text":"在“设计”选项卡中选择“目录”，然后选择“自动目录”。"},{"label":"D","text":"在“引用”选项卡中选择“目录”，然后选择“自动目录”。"}],"answer":"D","analysis":"在Word中插入目录的方法是在“引用”选项卡中选择“目录”，然后选择“自动目录”"},{"id":102954,"order":274,"type":"single_choice","question":"在 DIANA 层次聚类中，初始状态下所有数据点被归为一类，而在每次迭代过程中都会执行（）操作。","options":[{"label":"A","text":"选择包含最少数据点的类簇进行合并"},{"label":"B","text":"随机删除一个类簇"},{"label":"C","text":"选择当前簇中与其他点平均相异度最大的点进行分裂"},{"label":"D","text":"随机选取两个类簇合并"}],"answer":"C","analysis":"DIANA层次聚类是一种自顶向下的聚类方法，每次迭代都是选择当前簇中与其他点平均相异度最大的点进行分裂"},{"id":102955,"order":275,"type":"single_choice","question":"实现 DENCLUE 密度聚类算法的第三步是（）。","options":[{"label":"A","text":"计算数据点的核密度估计"},{"label":"B","text":"通过梯度上升法确定密度吸引子"},{"label":"C","text":"将数据点分配到最近的密度吸引子"},{"label":"D","text":"合并密度路径相连的密度吸引子"}],"answer":"D","analysis":"DENCLUE层次聚类算法的实现步骤中，第三步是合并密度吸引子（若两个吸引子密度路径连通则合并簇）"},{"id":102956,"order":276,"type":"single_choice","question":"智能系统在安防领域有哪些常见的应用方式？（）","options":[{"label":"A","text":"视频监控与分析"},{"label":"B","text":"出入口管控与门禁系统"},{"label":"C","text":"智能报警与应急响应"},{"label":"D","text":"以上选项均正确"}],"answer":"D","analysis":"智能系统在安防领域的一些常见运用方式包括视频监控与分析、出入口管控与门禁系统、智能报警与应急响应、智能巡更与巡检、安防联动与整合管理等。"},{"id":102957,"order":277,"type":"single_choice","question":"在实际开展测量工作时，异常值产生的原因通常有（）。","options":[{"label":"A","text":"测量人员读错、记错"},{"label":"B","text":"仪器示值突然跳动"},{"label":"C","text":"测量操作失误"},{"label":"D","text":"以上都对"}],"answer":"D","analysis":"异常值是指样本中个别数值明显偏离所属样本的其余观测值。在实际测量中，异常值的产生一般是由疏忽、失误或突然发生的意外造成的，如读错、记错、仪器示值突然跳动、突然震动、操作失误等。"},{"id":102958,"order":278,"type":"single_choice","question":"HTTP属于（）。","options":[{"label":"A","text":"数据链路层协议"},{"label":"B","text":"网络层协议"},{"label":"C","text":"传输层协议"},{"label":"D","text":"应用层协议"}],"answer":"D","analysis":"HTTP是应用层协议，它的作用是在客户端和服务器之间传输数据"},{"id":102959,"order":279,"type":"single_choice","question":"数据筛选的目的在于提高后续（）的效果。","options":[{"label":"A","text":"数据分析"},{"label":"B","text":"数据采集"},{"label":"C","text":"数据存储"},{"label":"D","text":"数据清洗"}],"answer":"A","analysis":"数据筛选的目的是为了优化数据结构，去除无关数据，提取有用信息，以便进提升后续数据分析的效果。"},{"id":102960,"order":280,"type":"single_choice","question":"职业道德具有推动行业发展的功能，其最直观的体现是（）？","options":[{"label":"A","text":"提供职业培训和晋升机会"},{"label":"B","text":"支持个人利益追求"},{"label":"C","text":"从业人员有责任心"},{"label":"D","text":"允许通过虚假宣传吸引客户"}],"answer":"C","analysis":"行业、企业的发展有赖于高的经济效益，而高的经济效益源于高的员工素质。员工素质主要包含知识、能力、责任心三个方面，其中责任心是最重要的。而职业道德水平高的从业人员有责任心是必要的，因此，职业道德能促进本行业的发展。"},{"id":102961,"order":281,"type":"single_choice","question":"求同法在科学研究领域有怎样的实际应用？（）","options":[{"label":"A","text":"从已有事实和数据中寻找共同点"},{"label":"B","text":"分析问题的原因和影响"},{"label":"C","text":"通过实验和观察总结规律"},{"label":"D","text":"提供解决问题的对策和建议"}],"answer":"A","analysis":"求同法在科学研究中的应用是从已有事实和数据中寻找共同点和普遍规律"},{"id":102962,"order":282,"type":"single_choice","question":"遵章守法对于个人而言，所起到的作用是（）。​","options":[{"label":"A","text":"扩大个人权力范围"},{"label":"B","text":"增加个人经济收益"},{"label":"C","text":"建立良好的社会形象"},{"label":"D","text":"提升个人社会地位"}],"answer":"C","analysis":"通过遵守\"遵章守法\"的基本要求，个人可以保证自己的行为合法合规，并维护职业的声誉和信誉"},{"id":102963,"order":283,"type":"single_choice","question":"某气象站观察到这样一种情况：4 次强降雨来临前，当地云层里都检测到气溶胶浓度异常上升；而在 3 次预报有降雨但实际未降雨的案例中，云层的气溶胶浓度都处于正常水平。研究者由此认为，气溶胶浓度异常是引发强降雨的关键条件。这一推理所遵循的逻辑方法是（）。","options":[{"label":"A","text":"剩余法"},{"label":"B","text":"求同求异并用法"},{"label":"C","text":"求异法"},{"label":"D","text":"共变法"}],"answer":"B","analysis":"符合求同求异并用法的判定条件：正面场合求同：所有强降雨发生前（现象出现）均存在气溶胶浓度异常的共性；反面场合求同：所有未降雨案例（现象未出现）均不存在气溶胶浓度异常的共性"},{"id":102964,"order":284,"type":"single_choice","question":"主动降噪技术是通过（）手段来消除噪声的。","options":[{"label":"A","text":"改变信号的频率"},{"label":"B","text":"使用滤波器去除噪声"},{"label":"C","text":"添加与噪声相反的信号"},{"label":"D","text":"增加噪声的幅度"}],"answer":"C","analysis":"主动降噪通过添加反向信号抵消噪声。"},{"id":102965,"order":285,"type":"single_choice","question":"在图像处理领域，噪声是普遍存在的问题，以下（）选项并非处理噪声的方法。","options":[{"label":"A","text":"均值滤波"},{"label":"B","text":"边缘检测"},{"label":"C","text":"高斯滤波"},{"label":"D","text":"中值滤波"}],"answer":"B","analysis":"边缘检测不是噪声处理的方法，它是一种图像特征提取的方法"},{"id":102966,"order":2
