<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="renderer" content="webkit">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="x5-orientation" content="portrait">
    <meta name="x5-fullscreen" content="true">
    <meta name="x5-page-mode" content="app">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="theme-color" content="#667eea">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
    <title>人工智能四级-题库练习(离线版)</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6fa; min-height: 100vh; padding-bottom: 60px; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 44px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 600; color: #333; z-index: 100; border-bottom: 1px solid #eee; }
        .main-content { padding-top: 44px; }
        .question-section { background: #fff; padding: 20px 16px; margin-bottom: 10px; }
        .question-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .q-type { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
        .q-type.judge { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .q-number { color: #999; font-size: 14px; }
        .exam-badge { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
        .q-title { font-size: 17px; line-height: 1.7; color: #333; font-weight: 500; }
        .options-section { background: #fff; padding: 10px 16px 10px; }
        .option-item { display: flex; align-items: flex-start; padding: 16px; margin-bottom: 12px; background: #f8f9fc; border-radius: 12px; border: 2px solid transparent; cursor: pointer; transition: all 0.15s ease; position: relative; }
        .option-item:active { transform: scale(0.98); }
        .option-item.correct { background: #ecfdf5; border-color: #10b981; }
        .option-item.wrong { background: #fef2f2; border-color: #ef4444; }
        .option-item.disabled { pointer-events: none; }
        .option-letter { width: 28px; height: 28px; border-radius: 50%; background: #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #6b7280; margin-right: 14px; flex-shrink: 0; }
        .option-item.correct .option-letter { background: #10b981; color: #fff; }
        .option-item.wrong .option-letter { background: #ef4444; color: #fff; }
        .option-content { flex: 1; font-size: 16px; line-height: 1.6; color: #374151; padding-top: 2px; }
        .option-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 22px; }
        .answer-card { background: #fff; margin: 0; padding: 0 16px 16px; display: none; }
        .answer-card.show { display: block; }
        .wrong-tip { display: flex; align-items: center; gap: 6px; padding: 12px; background: #fef3c7; border-radius: 8px; font-size: 14px; color: #d97706; margin-top: 12px; }
        .analysis-section { background: #fff; margin: 0; padding: 0 16px 16px; display: none; }
        .analysis-section.show { display: block; }
        .analysis-title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 600; color: #333; margin-bottom: 10px; }
        .analysis-title::before { content: '💡'; font-size: 18px; }
        .analysis-content { font-size: 15px; line-height: 1.8; color: #555; background: #f8f9fc; padding: 14px; border-radius: 8px; border-left: 3px solid #667eea; }
        .nav-section { display: flex; padding: 0; gap: 12px; margin-top: 0; }
        .nav-btn { flex: 1; height: 48px; border: none; border-radius: 24px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.15s ease; }
        .nav-btn:active { transform: scale(0.96); }
        .nav-btn.prev { background: #f3f4f6; color: #6b7280; }
        .nav-btn.next { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .nav-btn:disabled { opacity: 0.4; pointer-events: none; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: #fff; display: flex; border-top: 1px solid #eee; z-index: 100; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; color: #9ca3af; transition: color 0.15s ease; }
        .tab-item.active { color: #667eea; }
        .tab-icon { font-size: 22px; margin-bottom: 2px; }
        .tab-label { font-size: 11px; }
        .tab-badge { position: absolute; top: 6px; right: 50%; transform: translateX(18px); min-width: 18px; height: 18px; background: #ef4444; color: #fff; font-size: 11px; font-weight: 600; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
        .tab-badge:empty { display: none; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: #fff; width: 90%; max-width: 380px; max-height: 75vh; border-radius: 16px; overflow: hidden; }
        .modal-head { padding: 16px 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; display: flex; align-items: center; justify-content: space-between; }
        .modal-title { font-size: 17px; font-weight: 600; }
        .modal-close { font-size: 26px; cursor: pointer; line-height: 1; }
        .modal-body { padding: 16px; max-height: 55vh; overflow-y: auto; }
        .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; border: none; border-radius: 20px; font-size: 13px; cursor: pointer; background: #f3f4f6; color: #6b7280; transition: all 0.15s ease; }
        .filter-btn.active { background: #667eea; color: #fff; }
        .grid-box { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .grid-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; background: #f3f4f6; color: #6b7280; transition: all 0.15s ease; }
        .grid-cell:hover { transform: scale(1.1); box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
        .grid-cell:active { transform: scale(0.95); }
        .grid-cell.done { background: #dbeafe; color: #3b82f6; }
        .grid-cell.right { background: #d1fae5; color: #059669; }
        .grid-cell.wrong { background: #fee2e2; color: #dc2626; }
        .grid-cell.star { background: #fef3c7; color: #d97706; }
        .grid-cell.now { background: #667eea; color: #fff; }
        .stats-page { padding: 44px 12px 70px; display: none; }
        .stats-page.show { display: block; }
        .stats-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .stats-head { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 12px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .stat-box { background: #f8f9fc; border-radius: 10px; padding: 16px; text-align: center; }
        .stat-num { font-size: 28px; font-weight: 700; color: #667eea; }
        .stat-num.green { color: #10b981; }
        .stat-num.red { color: #ef4444; }
        .stat-txt { font-size: 12px; color: #9ca3af; margin-top: 4px; }

        .empty-box { text-align: center; padding: 40px 20px; color: #9ca3af; }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .search-bar { display: none; padding: 10px 16px; background: #fff; border-bottom: 1px solid #eee; }
        .search-bar.show { display: block; }
        .search-input-wrap { display: flex; align-items: center; background: #f3f4f6; border-radius: 20px; padding: 0 12px; }
        .search-input { flex: 1; border: none; background: transparent; padding: 10px 8px; font-size: 15px; outline: none; }
        .search-clear { font-size: 18px; color: #9ca3af; cursor: pointer; padding: 4px; }
        .search-results { background: #fff; max-height: 60vh; overflow-y: auto; }
        .search-item { padding: 14px 16px; border-bottom: 1px solid #f3f4f6; cursor: pointer; }
        .search-item:active { background: #f8f9fc; }
        .search-item-title { font-size: 15px; color: #333; margin-bottom: 6px; line-height: 1.5; }
        .search-item-title mark { background: #fef3c7; color: #d97706; padding: 0 2px; border-radius: 2px; }
        .search-item-meta { font-size: 12px; color: #9ca3af; }
        .search-count { padding: 12px 16px; background: #f8f9fc; font-size: 13px; color: #6b7280; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 44px; background: #fff; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 100; border-bottom: 1px solid #eee; }
        .top-bar-title { font-size: 17px; font-weight: 600; color: #333; }
        .top-bar-icon { font-size: 20px; cursor: pointer; padding: 8px; }
    </style>
</head>
<body>
    <div class="top-bar">
        <span></span>
        <span class="top-bar-title">题库练习 (离线版)</span>
        <span class="top-bar-icon" onclick="toggleSearch()">🔍</span>
    </div>
    <div class="search-bar" id="searchBar">
        <div class="search-input-wrap">
            <span style="color: #9ca3af; font-size: 16px;">🔍</span>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索题目关键词..." oninput="doSearch(this.value)">
            <span class="search-clear" onclick="clearSearch()">×</span>
        </div>
    </div>
    <div class="search-results" id="searchResults" style="display: none;"></div>
    <div class="main-content" id="mainContent">
        <div class="question-section" id="questionSection"></div>
        <div class="options-section" id="optionsSection"></div>
        <div class="answer-card" id="answerCard"></div>
        <div class="analysis-section" id="analysisSection"></div>
    </div>
    <div class="stats-page" id="statsPage">
        <div class="stats-card">
            <div class="stats-head">答题统计</div>
            <div class="stats-grid">
                <div class="stat-box"><div class="stat-num" id="sAnswered">0</div><div class="stat-txt">已答题</div></div>
                <div class="stat-box"><div class="stat-num green" id="sCorrect">0</div><div class="stat-txt">正确</div></div>
                <div class="stat-box"><div class="stat-num red" id="sWrong">0</div><div class="stat-txt">错误</div></div>
                <div class="stat-box"><div class="stat-num" id="sRate">0%</div><div class="stat-txt">正确率</div></div>
            </div>
        </div>
        <div class="stats-card"><div class="stats-head">错题本 <span id="wrongNum"></span></div><div id="wrongGrid"></div></div>
        <div class="stats-card"><div class="stats-head">收藏夹 <span id="favNum"></span></div><div id="favGrid"></div></div>
        <div class="stats-card">
            <div class="stats-head">智能标记</div>
            <div style="padding: 12px; background: #f8f9fc; border-radius: 8px; margin-bottom: 12px; font-size: 14px; color: #6b7280;">
                系统已根据人工智能训练师四级考试核心知识点自动标记重点题目
            </div>
            <button onclick="resetMarking()" style="width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer;">重新标记重点题目</button>
        </div>
    </div>
    <div class="bottom-bar">
        <div class="tab-item active" id="bank1Tab" onclick="switchBank(1)"><span class="tab-icon">📚</span><span class="tab-label">原题库</span></div>
        <div class="tab-item" id="bank2Tab" onclick="switchBank(2)"><span class="tab-icon">📖</span><span class="tab-label">演练题库</span></div>
        <div class="tab-item" id="examTab" onclick="switchBank(3)"><span class="tab-icon">📝</span><span class="tab-label">考试</span></div>
        <div class="tab-item" onclick="showWrongList()"><span class="tab-icon">❌</span><span class="tab-label">错题</span><span class="tab-badge" id="wrongBadge"></span></div>
        <div class="tab-item" onclick="showFavList()"><span class="tab-icon">⭐</span><span class="tab-label">收藏</span><span class="tab-badge" id="favBadge"></span></div>
        <div class="tab-item" onclick="showGridModal()"><span class="tab-icon">📋</span><span class="tab-label">题号</span></div>
    </div>
    <div class="modal-overlay" id="gridModal">
        <div class="modal-box">
            <div class="modal-head"><span class="modal-title">题目导航（点击题号跳转）</span><span class="modal-close" onclick="closeGridModal()">×</span></div>
            <div class="modal-body">
                <div class="filter-row">
                    <button class="filter-btn active" onclick="filterQ('all')">全部</button>
                    <button class="filter-btn" onclick="filterQ('done')">已答</button>
                    <button class="filter-btn" onclick="filterQ('undone')">未答</button>
                    <button class="filter-btn" onclick="filterQ('wrong')">错题</button>
                    <button class="filter-btn" onclick="filterQ('star')">收藏</button>
                </div>
                <div class="grid-box" id="gridBox"></div>
            </div>
        </div>
    </div>
    <script>
        const originalList = [{"id":96562,"order":1,"type":"single_choice","question":"在 Python 中运用 K-Means 算法开展聚类分析时，需要调用哪个库（）。","options":[{"label":"A","text":"Matplotlib"},{"label":"B","text":"Scikit-learn"},{"label":"C","text":"Pandas"},{"label":"D","text":"NumPy"}],"answer":"B","analysis":"使用Scikit-learn库实现K-Means聚类分析。"},{"id":96236,"order":2,"type":"single_choice","question":"下列哪一项属于小型计算机的范畴（）。","options":[{"label":"A","text":"IBMAS/400"},{"label":"B","text":"普通家用电脑"},{"label":"C","text":"掌上电脑"},{"label":"D","text":"服务器"}],"answer":"A","analysis":"计算机根据规模可以分为大型计算机、中型计算机、小型计算机和微型计算机"},{"id":96923,"order":3,"type":"single_choice","question":"在分类预测任务里，混淆矩阵的主要功能是（）。","options":[{"label":"A","text":"表示样本特征之间相关程度的矩阵"},{"label":"B","text":"评估分类模型效果的矩阵"},{"label":"C","text":"表示样本之间相似度的矩阵"},{"label":"D","text":"表示不同类别之间的相关程度的矩阵"}],"answer":"B","analysis":"混淆矩阵是用于评估分类模型效果的矩阵，它用于描述分类模型在不同类别上的预测结果"},{"id":96680,"order":4,"type":"single_choice","question":"以下哪项属于图像标注质量标准中的指标之一？（）","options":[{"label":"A","text":"标注成本"},{"label":"B","text":"标注主观性"},{"label":"C","text":"标注准确性"},{"label":"D","text":"标注速度"}],"answer":"C","analysis":"图像标注质量标准的指标之一是标注准确性，即标注结果与真实标签之间的一致性"},{"id":96437,"order":5,"type":"single_choice","question":"运用最小 - 最大标准化方法，会将数据转换为何种形式？（）","options":[{"label":"A","text":"负数"},{"label":"B","text":"0到1之间的数值"},{"label":"C","text":"二值化"},{"label":"D","text":"正态分布"}],"answer":"B","analysis":"最小-最大标准化是将数据转换为0到1之间的数值，公式为(x-min)/(max-min)，其中min为数据集中最小值，max为最大值"},{"id":96480,"order":6,"type":"single_choice","question":"在 Cookie 机制中，Cookie 是由哪个主体生成的（）。","options":[{"label":"A","text":"数据库"},{"label":"B","text":"客户端浏览器"},{"label":"C","text":"客户机"},{"label":"D","text":"服务器"}],"answer":"D","analysis":"在Cookie机制中，Cookie的生成是由服务器完成的"},{"id":96406,"order":7,"type":"single_choice","question":"中值滤波是常用的去噪（平滑）方法，以下哪项描述最能体现中值滤波的原理？（）","options":[{"label":"A","text":"对图像中的每个像素点的像素值进行统计分析，根据统计结果进行去噪处理"},{"label":"B","text":"使用高斯函数对图像进行卷积，通过对周围像素的加权平均得到去噪后的图像"},{"label":"C","text":"通过选择像素值在一定范围内的像素点进行排序，并取中间值作为去噪后的像素值"},{"label":"D","text":"将图像中每个像素点的值与其相邻像素点的值进行加权平均，得到去噪后的图像"}],"answer":"C","analysis":"中值滤波对邻域像素排序取中间值，用于去噪并保护细节。"},{"id":96607,"order":8,"type":"single_choice","question":"以下哪一项不属于数据分类要遵循的基本原则？（）","options":[{"label":"A","text":"按照数据大小进行分类"},{"label":"B","text":"按照数据来源进行分类"},{"label":"C","text":"按照数据类型进行分类"},{"label":"D","text":"按照数据格式进行分类"}],"answer":"A","analysis":"数据大小不是数据分类的基本原则。"},{"id":96905,"order":9,"type":"single_choice","question":"在开展回归预测时，进行特征选择这一步骤的目的在于（）。","options":[{"label":"A","text":"提高预测的准确率"},{"label":"B","text":"去除噪声数据"},{"label":"C","text":"提高数据可视化效果"},{"label":"D","text":"避免欠拟合问题"}],"answer":"A","analysis":"特征选择的目标是寻找到最优的特征子集，其能够将不相关或者冗余的特征从原本的特征集合中剔除出去，从而有效地缩小特征集合的规模，进一步减少模型的运行时间，同时提高模型的精确度和增强有效性"},{"id":96833,"order":10,"type":"single_choice","question":"智能系统的无服务器部署，意思是将系统部署在（）服务模式里。","options":[{"label":"A","text":"FaaS"},{"label":"B","text":"SaaS"},{"label":"C","text":"PaaS"},{"label":"D","text":"IaaS"}],"answer":"A","analysis":"智能系统的无服务器部署是指将系统部署在函数即服务（FaaS）的服务模式中，系统的代码逻辑被封装成函数，并由云平台自动管理函数的运行环境和资源分配"},{"id":96499,"order":11,"type":"single_choice","question":"数和数据之间的不同之处在于什么（）。","options":[{"label":"A","text":"数是定量，数据可以是定量或定性的"},{"label":"B","text":"数是计算机程序中的变量，数据是程序执行时的输入或输出"},{"label":"C","text":"数是有限无穷，数据是无限无穷"},{"label":"D","text":"数是抽象概念，数据是具体实例"}],"answer":"A","analysis":"数和数据都是描述事物的量，在计算机应用中，数和数据都是重要的概念"},{"id":96435,"order":12,"type":"single_choice","question":"数据标准化的定义具体是什么？（）","options":[{"label":"A","text":"将数据进行分类汇总"},{"label":"B","text":"将数据转换为文本格式"},{"label":"C","text":"将数据缩放到特定区间"},{"label":"D","text":"将数据分组展示"}],"answer":"C","analysis":"数据标准化是将数据缩放到特定区间的过程，目的是为了减少数据值之间的差异性，便于数据分析"},{"id":96412,"order":13,"type":"single_choice","question":"在数据分析过程中，异常值所代表的含义是什么？（）","options":[{"label":"A","text":"为零的数据"},{"label":"B","text":"缺失的的数据"},{"label":"C","text":"重复的数据"},{"label":"D","text":"样本中的个别数值明显偏离其余的观测值"}],"answer":"D","analysis":"异常值是指样本中的个别值，其数值明显偏离它（或他们）所属样本的其余观测值。"},{"id":96667,"order":14,"type":"single_choice","question":"数据标注审核流程的目的在于（）。","options":[{"label":"A","text":"增加标注数据的数量"},{"label":"B","text":"确保标注师的准确性"},{"label":"C","text":"加速标注过程"},{"label":"D","text":"确保标注数据质量从而提高模型训练效果"}],"answer":"D","analysis":"数据标注审核流程的核心目的是确保标注数据的质量"},{"id":96751,"order":15,"type":"single_choice","question":"抽样检验具有什么优点？（）","options":[{"label":"A","text":"可以减少收集数据时产生的偏差"},{"label":"B","text":"可以减少收集数据的时间和成本"},{"label":"C","text":"可以确定样本和总体的关系"},{"label":"D","text":"可以用较小的样本推断总体情况"}],"answer":"D","analysis":"抽样检验可以用较小的样本去推断总体的情况，这样可以节省检查的时间和成本"},{"id":96694,"order":16,"type":"single_choice","question":"文本数据标注在自然语言处理（NLP）中的实际应用场景是（）。","options":[{"label":"A","text":"数据库管理"},{"label":"B","text":"声音识别"},{"label":"C","text":"图像识别"},{"label":"D","text":"机器翻译"}],"answer":"D","analysis":"文本数据标注在NLP中应用于机器翻译。"},{"id":96380,"order":17,"type":"single_choice","question":"若要在请求里添加HTTP请求头信息，需运用（）方法中的headers参数来达成。","options":[{"label":"A","text":"requests.headers()"},{"label":"B","text":"requests.add_header()"},{"label":"C","text":"requests.get()"},{"label":"D","text":"requests.data()"}],"answer":"C","analysis":"添加请求头需通过headers参数传递至requests.get()或requests.post()方法，而非调用独立方法"},{"id":96321,"order":18,"type":"single_choice","question":"依据《中华人民共和国专利法》，下列哪一项不在专利保护的范畴内？","options":[{"label":"A","text":"商业秘密"},{"label":"B","text":"外观设计"},{"label":"C","text":"实用新型"},{"label":"D","text":"发明"}],"answer":"A","analysis":"根据《中华人民共和国专利法》第二条，专利保护的范围包括发明、实用新型和外观设计，但不包括商业秘密"},{"id":96292,"order":19,"type":"single_choice","question":"在 Excel 中，哪种图表最适用于对比不同类别之间的数值大小？（）","options":[{"label":"A","text":"饼图"},{"label":"B","text":"条形图"},{"label":"C","text":"散点图"},{"label":"D","text":"折线图"}],"answer":"B","analysis":"条形图最适合用于比较不同类别数值大小。饼图通常用于显示每个类别占总量的比例，散点图通常用于显示两个变量之间的关系，折线图通常用于显示随时间变化的趋势。"},{"id":96843,"order":20,"type":"single_choice","question":"智能系统在医疗领域应用的目的是（）。","options":[{"label":"A","text":"限制病人看病的渠道"},{"label":"B","text":"增加医疗资源消耗"},{"label":"C","text":"增加医疗成本"},{"label":"D","text":"提高医疗效率"}],"answer":"D","analysis":"智能系统在医疗领域运用的目的是提高医疗效率，而非增加医疗成本、增加医疗资源消耗、限制病人看病的渠道"},{"id":96205,"order":21,"type":"single_choice","question":"遵章守法对于个人而言，所起到的作用是（）。​","options":[{"label":"A","text":"扩大个人权力范围"},{"label":"B","text":"增加个人经济收益"},{"label":"C","text":"建立良好的社会形象"},{"label":"D","text":"提升个人社会地位"}],"answer":"C","analysis":"通过遵守\"遵章守法\"的基本要求，个人可以保证自己的行为合法合规，并维护职业的声誉和信誉"},{"id":96870,"order":22,"type":"single_choice","question":"可视化分析中不常用的软件或工具是（）。","options":[{"label":"A","text":"Python"},{"label":"B","text":"Photoshop"},{"label":"C","text":"Excel"},{"label":"D","text":"Tableau"}],"answer":"B","analysis":"Photoshop不是可视化分析常用工具。"},{"id":96275,"order":23,"type":"single_choice","question":"在 Word 中，执行哪项操作可以添入一张图片（）。","options":[{"label":"A","text":"点击“工具”选项卡，选择“插入图片”，然后从计算机中选择图片文件。"},{"label":"B","text":"点击“格式”选项卡，选择“插入图片”，然后从计算机中选择图片文件。"},{"label":"C","text":"点击“编辑”选项卡，选择“插入图片”，然后从计算机中选择图片文件。"},{"label":"D","text":"点击“插入” 选项卡，选择“图片”，点击“此设备”，然后从计算机中选择图片文件。"}],"answer":"D","analysis":"在Word中插入图片，首先进入“插入”选项卡，在“插入”选项卡中选择“图片”命令，可以插入本地图片或者在线图片"},{"id":96839,"order":24,"type":"single_choice","question":"智能系统在零售业当中，可能起到的作用是（）。","options":[{"label":"A","text":"增加人力成本"},{"label":"B","text":"个性化推荐"},{"label":"C","text":"规避金融风险"},{"label":"D","text":"降低企业管理效率"}],"answer":"B","analysis":"零售业中智能系统的作用包括个性化推荐、智能支付、库存管理与预测等方面"},{"id":96421,"order":25,"type":"single_choice","question":"在Python环境下，针对异常值，可采取（）的处理举措。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"对异常值进行变换"},{"label":"C","text":"用相邻的值填充异常值"},{"label":"D","text":"替换异常值"}],"answer":"A","analysis":"对于异常值，我们可以根据具体情况采取不同的策略：替换异常值（A），视为缺失值用相邻的值填充异常值（例如使用前一个值或后一个值，选项B），或对异常值进行变换（例如对数变换、Box-Cox变换等，选项C）用于降低异常值的影响"},{"id":96302,"order":26,"type":"single_choice","question":"在 PowerPoint 中，要让文本从左侧飞入，正确的操作方式是（）。","options":[{"label":"A","text":"选中文本框，选择“动画效果”选项卡中的“飞入”选择“效果选项”的“自左侧”"},{"label":"B","text":"右键文本框，选择“动画效果”，选择“从左侧-进入”"},{"label":"C","text":"点击文本框，按下“Ctrl+Shift+L”，选择“从左边-进入”"},{"label":"D","text":"无法使文本框从左边划入"}],"answer":"A","analysis":"在PowerPoint中，选中文本框，选择“动画效果”选项卡中的“飞入”选择“效果选项”的“自左侧”来实现文本框从左侧飞入的操作。"},{"id":96552,"order":27,"type":"single_choice","question":"在 K-Means 聚类的过程中，通过哪一种（）方法能更合理地选择 K 值。","options":[{"label":"A","text":"以上选项均错误"},{"label":"B","text":"使用肘方法"},{"label":"C","text":"进行聚类分析，通过可视化图形来确定"},{"label":"D","text":"根据经验确定一个估计值"}],"answer":"B","analysis":"在K-Means聚类过程中，应该选择合适的K值"},{"id":96472,"order":28,"type":"single_choice","question":"在数据处理过程中，以下哪项措施可以直接缩短数据处理所耗费的时间（）。","options":[{"label":"A","text":"压缩数据"},{"label":"B","text":"并行处理数据"},{"label":"C","text":"增加数据的数量"},{"label":"D","text":"提高数据的质量和准确性"}],"answer":"B","analysis":"并行处理数据可以减少数据处理的时间，通过同时处理多个数据任务，可以提高数据处理的效率"},{"id":96578,"order":29,"type":"single_choice","question":"AGNES 层次聚类算法在进行聚类时所采用的策略是（）。","options":[{"label":"A","text":"贪心分裂策略"},{"label":"B","text":"随机分裂策略"},{"label":"C","text":"自底向上的策略"},{"label":"D","text":"自顶向下的策略"}],"answer":"C","analysis":"AGNES采用自底向上的聚合策略。"},{"id":96617,"order":30,"type":"single_choice","question":"在对文本数据进行归类时，特征提取的主要目的是（）。","options":[{"label":"A","text":"减少文本处理中的噪声和干扰"},{"label":"B","text":"通过对文本数据进行降维处理，提高文本分类的准确度"},{"label":"C","text":"降低文本处理的复杂性"},{"label":"D","text":"帮助分类器更好地理解文本的含义"}],"answer":"B","analysis":"特征提取是文本数据归类过程中非常重要的一步，其通过将文本数据降维并保留关键信息，优化分类器的输入数据，从而提高分类准确度"},{"id":96890,"order":31,"type":"single_choice","question":"数据质量分析中有一个关键指标是（）。","options":[{"label":"A","text":"数据采集成本"},{"label":"B","text":"数据传输速度"},{"label":"C","text":"数据存储量"},{"label":"D","text":"数据可靠性"}],"answer":"D","analysis":"数据质量分析的一个关键指标是数据可靠性，即数据中是否存在脏数据"},{"id":96353,"order":32,"type":"single_choice","question":"数据质量检测可以为企业提供哪些帮助？（）","options":[{"label":"A","text":"提高数据的传输速度"},{"label":"B","text":"确保数据的准确性与完整性"},{"label":"C","text":"降低数据的存储成本"},{"label":"D","text":"发现数据的潜在价值"}],"answer":"B","analysis":"数据质量检测的核心作用是确保数据的准确性、完整性、一致性，通过校验和验证发现数据问题，从而提升数据可靠性"},{"id":96535,"order":33,"type":"single_choice","question":"下列能够精准阐释 DENCLUE 密度聚类核心思路的选项是（）。","options":[{"label":"A","text":"只有密度相等的数据点才能被聚成一类"},{"label":"B","text":"局部密度相对较小的区域内，数据点趋向于聚成一类"},{"label":"C","text":"只有明显的聚类中心才能被聚成一类"},{"label":"D","text":"通过寻找密度波峰确定聚类簇"}],"answer":"D","analysis":"DENCLUE通过核密度估计构建密度函数，并寻找其局部极大值（密度波峰）作为聚类中心，数据点根据梯度方向收敛到最近的波峰形成簇"},{"id":96268,"order":34,"type":"single_choice","question":"在 Word 里，插入脚注的正确操作步骤是（）。","options":[{"label":"A","text":"在“设计”选项卡中选择“脚注”。"},{"label":"B","text":"在“页面布局”选项卡中选择“脚注”。"},{"label":"C","text":"在“参考文献”选项卡中选择“脚注”。"},{"label":"D","text":"在“引用”选项卡中选择“插入脚注”。"}],"answer":"D","analysis":"在Word中插入脚注的方法是在“引用”选项卡中选择“插入脚注”"},{"id":96391,"order":35,"type":"single_choice","question":"对数据进行处理的主要目的是（）。","options":[{"label":"A","text":"优化数据的格式"},{"label":"B","text":"减少数据的量"},{"label":"C","text":"提高数据的安全性"},{"label":"D","text":"获取有意义信息的数据"}],"answer":"D","analysis":"数据处理旨在从数据中提取有价值、有意义的信息。"},{"id":96610,"order":36,"type":"single_choice","question":"在进行数据分类时，选用合适的分类标准能起到（）作用。","options":[{"label":"A","text":"节省时间和资源"},{"label":"B","text":"更好地满足需求"},{"label":"C","text":"提高数据的准确性"},{"label":"D","text":"减少分类的复杂度"}],"answer":"B","analysis":"选择适当的分类标准可以更好地满足需求"},{"id":96225,"order":37,"type":"single_choice","question":"与电子管计算机相比，晶体管计算机具有哪些（）优势。","options":[{"label":"A","text":"速度慢，功耗低，可靠性高"},{"label":"B","text":"速度快，功耗高，可靠性低"},{"label":"C","text":"速度慢，功耗高，可靠性低"},{"label":"D","text":"速度快，功耗低，可靠性高"}],"answer":"D","analysis":"晶体管计算机与电子管计算机相比，速度更快，功耗更低，可靠性更高"},{"id":96705,"order":38,"type":"single_choice","question":"下列哪些标注方式不属于图像标注所采用的方法（）。","options":[{"label":"A","text":"像素标注"},{"label":"B","text":"点标注"},{"label":"C","text":"画面标注"},{"label":"D","text":"边框标注"}],"answer":"C","analysis":"图像标注的类型有：分类标注、线标注、点标注、边界框标注、像素标注等等"},{"id":96643,"order":39,"type":"single_choice","question":"下列选项中，能够在保留关键信息的前提下降低特征向量维度的是（）。","options":[{"label":"A","text":"傅里叶变换"},{"label":"B","text":"高斯混合模型"},{"label":"C","text":"梅尔倒谱系数"},{"label":"D","text":"特征提取"}],"answer":"C","analysis":"梅尔倒谱系数的优点是可以在保留关键信息的同时减小特征向量的维度，使得处理速度更快，同时也降低了过拟合的风险。"},{"id":96650,"order":40,"type":"single_choice","question":"聚类算法和分类算法的不同之处是（）。","options":[{"label":"A","text":"聚类算法不需要预先指定类别，分类算法需要预先指定类别。"},{"label":"B","text":"聚类算法基于数据种类，分类算法基于数据相似性。"},{"label":"C","text":"聚类算法可以处理无标记的数据，分类算法只能处理有标记的数据。"},{"label":"D","text":"聚类算法可以将数据分组，分类算法可以将数据分类。"}],"answer":"A","analysis":"聚类算法是通过数据点之间的相似性来将数据分组，不需要预先指定类别，而归类算法则需要预先设定类别。"},{"id":96426,"order":41,"type":"single_choice","question":"在Python编程里，下列（）函数能够去除列表中的重复元素。","options":[{"label":"A","text":"set"},{"label":"B","text":"remove"},{"label":"C","text":"pop"},{"label":"D","text":"del"}],"answer":"A","analysis":"使用set()转换列表可去重。"},{"id":96823,"order":42,"type":"single_choice","question":"下列哪项不是变更管理的常见引发原因？（）","options":[{"label":"A","text":"增值变更"},{"label":"B","text":"内部事件"},{"label":"C","text":"应对风险的紧急计划或回避计划"},{"label":"D","text":"产品范围(成果)定义的过失或者疏忽"}],"answer":"B","analysis":"变更的常见原因:产品范围(成果)定义的过失或者疏忽、项目范围(工作)定义的过失或者疏忽、增值变更、应对风险的紧急计划或回避计划、项目执行过程与基准要求不一致带来的被动调整、外部事件"},{"id":96338,"order":43,"type":"single_choice","question":"《中华人民共和国个人信息保护法》规定，处理个人信息应当遵循哪些原则（）。","options":[{"label":"A","text":"合法性、正当性、必要性"},{"label":"B","text":"合法性、正当性、全面性"},{"label":"C","text":"合法性、公开性、必要性"},{"label":"D","text":"正当性、必要性、公开性"}],"answer":"A","analysis":"根据《中华人民共和国个人信息保护法》第五条规定，处理个人信息应当遵循合法、正当、必要和诚信原则，不得通过误导、欺诈、胁迫等方式处理个人信息。"},{"id":96649,"order":44,"type":"single_choice","question":"在数据挖掘中，聚类与分类的目标主要存在的不同是（）。","options":[{"label":"A","text":"聚类的目标是将数据点分配到预定义的类别中，而分类的目标是将数据点划分到不同的组中"},{"label":"B","text":"聚类和分类的目标没有固定的区别"},{"label":"C","text":"聚类的目标是将数据点划分到不同的组中，而分类的目标是将数据点分配到预定义的类别中"},{"label":"D","text":"聚类和分类的目标完全相同"}],"answer":"C","analysis":"聚类是无监督学习任务，旨在通过相似性度量（如欧氏距离）将数据自动划分为不同组，以发现数据内在结构（如K-means、DBSCAN算法）；分类是有监督学习任务，需基于标注数据训练模型（如决策树、支持向量机），将新数据分配到预定义类别中。两者的核心差异在于是否依赖预定义标签。"},{"id":96204,"order":45,"type":"single_choice","question":"在遵章守法的基本要求里，遵守法律法规具体指的是（）。​","options":[{"label":"A","text":"遵守与个人意愿相符的法律法规"},{"label":"B","text":"遵守国家制定的法律法规以及地方性法规"},{"label":"C","text":"只遵守与个人利益相关的法律法规"},{"label":"D","text":"只遵守国家制定的法律法规"}],"answer":"B","analysis":"法律法规的遵守要求从业人员应该了解并遵守与他们所从事的领域和职业相关的法律法规"},{"id":96308,"order":46,"type":"single_choice","question":"按照《中华人民共和国劳动法》的规定，在哪些情况下用人单位可以延长职工的工作时间？（）","options":[{"label":"A","text":"出于职工自愿的需要"},{"label":"B","text":"出于增加加班费的需要"},{"label":"C","text":"出于提高经济效益的需要"},{"label":"D","text":"出于生产特点和工作安排需要"}],"answer":"D","analysis":"根据《中华人民共和国劳动法》第四十一条规定，用人单位由于生产经营需要，经与工会和劳动者协商后可以延长工作时间，一般每日不得超过一小时；因特殊原因需要延长工作时间的，在保障劳动者身体健康的条件下延长工作时间每日不得超过三小时，但是每月不得超过三十六小时"},{"id":96776,"order":47,"type":"single_choice","question":"数据清洗能够执行哪些（）操作？","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"确保数据一致性"},{"label":"C","text":"处理缺失值"},{"label":"D","text":"处理无效值"}],"answer":"A","analysis":"数据清洗就是把没有意义的数据清洗掉，可以进行的操作有：处理无效值、缺失值，确保数据一致性，因此D选项正确"},{"id":96832,"order":48,"type":"single_choice","question":"下列哪种部署方式对于处理高频的 API 请求或者微服务之间的通信尤为适合？（）","options":[{"label":"A","text":"虚拟化部署"},{"label":"B","text":"无服务器架构"},{"label":"C","text":"容器化部署"},{"label":"D","text":"传统服务器部署"}],"answer":"B","analysis":"无服务器架构，如AWS Lambda或Azure Functions，允许开发者将计算任务作为无服务器函数在云平台上运行，无需管理服务器或网络基础设施，而是通过API调用来触发和执行计算任务"},{"id":96878,"order":49,"type":"single_choice","question":"在 Matplotlib 库中，哪个函数是用来设置图表标题的？（）","options":[{"label":"A","text":"legend"},{"label":"B","text":"ylabel"},{"label":"C","text":"xlabel"},{"label":"D","text":"title"}],"answer":"D","analysis":"title()函数用于设置图表标题。"},{"id":96304,"order":50,"type":"single_choice","question":"想要在 PowerPoint 中插入 SmartArt，应该如何操作？（）","options":[{"label":"A","text":"从“插入”选项卡中选择“SmartArt”"},{"label":"B","text":"从“开始”选项卡中选择“格式”"},{"label":"C","text":"从“视图”选项卡中选择“幻灯片放映”"},{"label":"D","text":"从“数据”选项卡中选择“排序”"}],"answer":"A","analysis":"在PowerPoint中，可以通过从“插入”选项卡中选择“SmartArt”来插入SmartArt。"},{"id":96372,"order":51,"type":"single_choice","question":"以下选项中，属于静态网页特性的是（）。","options":[{"label":"A","text":"页面访问速度快，不需要服务器支持"},{"label":"B","text":"页面内容需要服务器进行动态生成和更新"},{"label":"C","text":"页面内容动态变化，支持用户交互"},{"label":"D","text":"页面内容静止不变"}],"answer":"D","analysis":"静态网页的内容事先准备好，不会根据用户的交互而产生变化，不能实现交互功能"},{"id":96529,"order":52,"type":"single_choice","question":"在 OPTICS 算法中，用于判断聚类群体的密度临界值 minPts，其确定方式应当是（）。","options":[{"label":"A","text":"根据算法的迭代次数来确定"},{"label":"B","text":"根据eps的取值来确定"},{"label":"C","text":"根据不同的问题要求来确定"},{"label":"D","text":"根据数据集的大小来确定"}],"answer":"C","analysis":"题考查了minPts的确定方法，选项D和B都是错误的，因为数据集的大小和eps的取值并不决定minPts的取值，而选项A是错误的，因为minPts的取值和算法的迭代次数无关"},{"id":96497,"order":53,"type":"single_choice","question":"数据采集方法的优化中，不包含下列哪一项（）。","options":[{"label":"A","text":"精准地制定数据采集计划"},{"label":"B","text":"合理安排数据采集的时间和地点"},{"label":"C","text":"尽可能多地采集数据"},{"label":"D","text":"对数据采集的过程和结果进行评估和反馈"}],"answer":"C","analysis":"虽然在数据采集过程中收集越多的数据会有可能提高数据准确性和有效性，但是也会浪费时间和资源，造成不必要的开销。所以，采集足够而非过多的数据是优化数据采集的建议。"},{"id":96374,"order":54,"type":"single_choice","question":"以下（）内容不属于动态网页与静态网页在实现方式上的区别。","options":[{"label":"A","text":"AJAX"},{"label":"B","text":"HTML"},{"label":"C","text":"PHP"},{"label":"D","text":"JavaScript"}],"answer":"B","analysis":"HTML是一种用于创建网页的标准标记语言，是一种基础技术，但动态网页有别于静态网页是由JavaScript、PHP、AJAX等技术实现的"},{"id":96200,"order":55,"type":"single_choice","question":"严谨求是这一准则的基本要求是（）。","options":[{"label":"A","text":"对某个观点偏向某一方"},{"label":"B","text":"随意进行揣测和猜测"},{"label":"C","text":"收集和利用合适的数据进行决策"},{"label":"D","text":"盲目行动或决策"}],"answer":"C","analysis":"严谨求实的基本准则是从业人员在工作中应该以严谨和求实的态度对待问题，坚持事实真相，不随意臆断"},{"id":96859,"order":56,"type":"single_choice","question":"在物流行业中，智能系统所起到的作用是（）。","options":[{"label":"A","text":"增加货物运输时间"},{"label":"B","text":"降低货物运输安全性"},{"label":"C","text":"提高工作效率"},{"label":"D","text":"增加人力成本"}],"answer":"C","analysis":"智能系统可以自动化处理很多重复性、规律性的工作，提高物流工作效率，并降低人为因素的干扰"},{"id":96577,"order":57,"type":"single_choice","question":"AGNES 层次聚类算法中，划分聚类的决策是根据（）来制定的。","options":[{"label":"A","text":"最小方差准则"},{"label":"B","text":"平均距离准则"},{"label":"C","text":"最大距离准则"},{"label":"D","text":"最小距离准则"}],"answer":"D","analysis":"AGNES层次聚类算法中，划分聚类的决策是基于最小距离准则"},{"id":96812,"order":58,"type":"single_choice","question":"当数据集中存在缺失值时，下列（）方法可用于填充缺失值。","options":[{"label":"A","text":"Stack"},{"label":"B","text":"Pivot-table"},{"label":"C","text":"Group-by"},{"label":"D","text":"Fillna"}],"answer":"D","analysis":"使用fillna方法可以根据指定的值填充缺失值"},{"id":96869,"order":59,"type":"single_choice","question":"下列哪项不是 Python 中常用的可视化库？（）","options":[{"label":"A","text":"SnowNLP"},{"label":"B","text":"pyecharts"},{"label":"C","text":"seaborn"},{"label":"D","text":"Mathplotlib"}],"answer":"A","analysis":"Python中常用的可视化库主要是Mathplotlib、seaborn、pyecharts等，而SnowNLP是中文自然语言处理库，专为处理中文文本而设计"},{"id":96865,"order":60,"type":"single_choice","question":"以下哪一项不是智能安防系统的特点？（）","options":[{"label":"A","text":"自动化与智能化"},{"label":"B","text":"降低系统效率"},{"label":"C","text":"高效与可扩展性"},{"label":"D","text":"远程控制与预警"}],"answer":"B","analysis":"智能安防系统具有自动化与智能化、高效与可扩展性、远程控制与预警等特点，其目的是提高安防系统的效率和可靠性，降低系统效率并不是智能安防系统的特点。"},{"id":96262,"order":61,"type":"single_choice","question":"操作系统的外壳有命令行界面和图形界面两种类型，其中以图形为主要表现形式的是（）。","options":[{"label":"A","text":"触摸界面"},{"label":"B","text":"无界面"},{"label":"C","text":"用户图形界面"},{"label":"D","text":"命令行界面"}],"answer":"C","analysis":"用户图形界面（GUI）以图形元素（窗口、图标）为主进行交互。"},{"id":96456,"order":62,"type":"single_choice","question":"以下哪种方法能够把来自不同渠道的数据集成在一起？（）","options":[{"label":"A","text":"数据仓库"},{"label":"B","text":"数据去重"},{"label":"C","text":"条件随机场"},{"label":"D","text":"聚类"}],"answer":"A","analysis":"数据仓库是将不同来源的数据（如关系型数据、面向对象的数据、XML等）进行抽取、转换和加载统一存储的一种技术，是数据集成的重要方法"},{"id":96572,"order":63,"type":"single_choice","question":"属于 AGNES 层次聚类的优点的是（）。","options":[{"label":"A","text":"必须预先指定聚类个数"},{"label":"B","text":"仅适用于欧氏距离"},{"label":"C","text":"能够生成具有层次结构的可视化聚类结果"},{"label":"D","text":"能够处理大规模数据集"}],"answer":"C","analysis":"AGNES层次聚类的优点包括能够保持数据的完整性、不需要预先设置聚类个数、能够生成具有层次结构的可视化聚类结果、能够处理不同类型的数据等"},{"id":96285,"order":64,"type":"single_choice","question":"Excel 中的 IF 函数，它的功能体现在（）？","options":[{"label":"A","text":"按照一定的规则对数据进行排序"},{"label":"B","text":"判断条件是否成立，若成立则返回一个值，否则返回另一个值"},{"label":"C","text":"求数据的平均值"},{"label":"D","text":"对数据进行四舍五入"}],"answer":"B","analysis":"IF函数的作用是根据给定的条件返回一个值或另一个值"},{"id":96381,"order":65,"type":"single_choice","question":"以下（）途径能够自动对Cookies进行管理，并在发送HTTP请求时一并携带。","options":[{"label":"A","text":"requests.session().get()"},{"label":"B","text":"requests.cookies()"},{"label":"C","text":"requests.post()"},{"label":"D","text":"requests.get()"}],"answer":"A","analysis":"在Requests库中，可以使用session对象来发送带有cookies的HTTP请求"},{"id":96502,"order":66,"type":"single_choice","question":"数和数据都可以直接或者经过转换之后，用来进行什么（）。","options":[{"label":"A","text":"语音处理"},{"label":"B","text":"文本处理"},{"label":"C","text":"图像处理"},{"label":"D","text":"数值处理"}],"answer":"D","analysis":"数和数据主要用于数值处理，如图像文本语音处理需特定算法。"},{"id":96190,"order":67,"type":"single_choice","question":"职业道德的职业性，具体是指（）？","options":[{"label":"A","text":"与社会关系无关"},{"label":"B","text":"与个人主观意愿相关"},{"label":"C","text":"要求从业人员具备专业技能"},{"label":"D","text":"职业道德的内容与职业实践活动紧密相连"}],"answer":"D","analysis":"职业道德的职业属性指的是职业道德的内容与职业实践密切相关，要求从业人员遵守和践行该行业或职业所特有的道德规范"},{"id":96451,"order":68,"type":"single_choice","question":"数据集成的具体含义是什么？（）","options":[{"label":"A","text":"将数据进行加密保护"},{"label":"B","text":"将数据分类存储以便于查询"},{"label":"C","text":"将数据存储于不同硬件设备上以备份"},{"label":"D","text":"将多个异构数据源的数据进行整合"}],"answer":"D","analysis":"数据集成是将来自不同数据源的数据整合在一起，使得用户能够以统一的方式查看和管理数据"},{"id":96311,"order":69,"type":"single_choice","question":"《中华人民共和国劳动合同法》规定，劳动合同应当采用（）形式。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"手写"},{"label":"C","text":"书面"},{"label":"D","text":"口头"}],"answer":"C","analysis":"《中华人民共和国劳动合同法》第十条规定，建立劳动关系，应当订立书面劳动合同"},{"id":96528,"order":70,"type":"single_choice","question":"在 OPTICS 算法里，距离临界值 eps 的选取会极大影响最终结果。要是 eps 设定得过小，可能引发（）情况。","options":[{"label":"A","text":"降低聚类的准确性"},{"label":"B","text":"产生过度稠密的聚类簇"},{"label":"C","text":"形成太多的聚类簇"},{"label":"D","text":"产生太多的噪声点"}],"answer":"C","analysis":"题考查了eps取值对结果的影响，选项D是错误的，因为eps太小会使得更少的点被视为噪声点。选项C是正确的，因为如果eps太小，则会形成过多的聚类簇，对于实际问题的解释和理解不够直观。选项B是eps过大的情况，而选项D并不是eps取值的后果，所以选项A也是错误的。"},{"id":96701,"order":71,"type":"single_choice","question":"下列哪一种标注方式适合用于图像目标检测（）。","options":[{"label":"A","text":"实例标注"},{"label":"B","text":"像素标注"},{"label":"C","text":"标框标注"},{"label":"D","text":"分类标注"}],"answer":"C","analysis":"图像目标检测需要同时识别物体的类别和位置，因此需要使用标框标注，即框选要标注的对象"},{"id":96281,"order":72,"type":"single_choice","question":"进行邮件合并时，下列可以作为数据源的是（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"Access数据库"},{"label":"C","text":"Outlook联系人列表"},{"label":"D","text":"Excel文件"}],"answer":"A","analysis":"在Word中，可以使用多种格式的文件作为邮件合并的数据源，包括Excel文件、Outlook联系人列表以及Access数据库等"},{"id":96914,"order":73,"type":"single_choice","question":"在线性回归中，损失函数的作用是（）。","options":[{"label":"A","text":"更新模型的权重和偏置"},{"label":"B","text":"控制模型的复杂度"},{"label":"C","text":"表示回归系数的重要性"},{"label":"D","text":"计算预测值与真实值之间的误差"}],"answer":"D","analysis":"在线性回归中，损失函数用来计算预测值与真实值之间的误差"},{"id":96772,"order":74,"type":"single_choice","question":"作为数据质量控制的方法之一，数据清洗的目的是（）。","options":[{"label":"A","text":"备份存储数据以防丢失"},{"label":"B","text":"分析数据的趋势和规律"},{"label":"C","text":"加密保护数据的安全性"},{"label":"D","text":"提升数据的质量"}],"answer":"D","analysis":"数据清洗是数据质量控制的重要环节"},{"id":96199,"order":75,"type":"single_choice","question":"下列哪项行为符合严谨求是这一准则的基本要求（）。","options":[{"label":"A","text":"自己认为正确就可以了，不需要考虑其他因素"},{"label":"B","text":"从众心态，跟随大众观点"},{"label":"C","text":"全面的思考，细致地分析问题"},{"label":"D","text":"不参考权威资料，直接编写自己的观点"}],"answer":"C","analysis":"深入思考是严谨求是的核心要求"},{"id":96203,"order":76,"type":"single_choice","question":"遵章守法这一要求的基本要求是（）。​","options":[{"label":"A","text":"遵守个人意愿"},{"label":"B","text":"遵守领导指令"},{"label":"C","text":"遵守企业管理规定"},{"label":"D","text":"遵守法律法规和相关规定"}],"answer":"D","analysis":"遵章守法要求遵守法律法规与相关规定。"},{"id":96531,"order":77,"type":"single_choice","question":"以下哪一项不属于 DENCLUE 密度聚类的基本操作步骤？（）","options":[{"label":"A","text":"计算点与点之间的距离"},{"label":"B","text":"将与密度吸引点相关联的点构成簇"},{"label":"C","text":"通过全局密度函数求出密度吸引点"},{"label":"D","text":"推导全局密度函数"}],"answer":"A","analysis":"DENCLUE密度聚类的基本步骤包括： 1、对数据点所占据的空间推导全局密度函数； 2、通过全局密度函数求出局部极大值点，即密度吸引点； 3、对于数据集中的每个点，通过沿全局密度函数在该点的梯度方向，将该点关联到一个密度吸引点； 4、定义与特定的密度吸引点相关联的点构成的簇； 5、丢弃那些密度吸引点的密度小于用户指定阈值E的簇； 6、对于能够通过密度大于活等于E的点路径连接的簇，将其合并"},{"id":96478,"order":78,"type":"single_choice","question":"反爬虫技术中的哪项措施，能够有效降低爬虫发起请求的频率（）。","options":[{"label":"A","text":"快速响应请求"},{"label":"B","text":"增加请求数据量"},{"label":"C","text":"设置访问频度"},{"label":"D","text":"定时更新数据"}],"answer":"C","analysis":"设置访问频度可限制爬虫请求频率。"},{"id":96545,"order":79,"type":"single_choice","question":"在使用 Python 进行密度聚类时，DBSCAN 算法中 eps 参数的作用是（）。","options":[{"label":"A","text":"数据平衡"},{"label":"B","text":"特征降维"},{"label":"C","text":"确定邻域大小"},{"label":"D","text":"确定初始中心点"}],"answer":"C","analysis":"DBSCAN算法的eps参数是密度系数，表示相邻的同类样本之间能容忍的最大距离，用于确定邻域大小"},{"id":96880,"order":80,"type":"single_choice","question":"在 seaborn 库中，使用 scatterplot 函数能够绘制什么图表？（）","options":[{"label":"A","text":"直方图"},{"label":"B","text":"散点图"},{"label":"C","text":"饼图"},{"label":"D","text":"折线图"}],"answer":"B","analysis":"sns.scatterplot()可以用来创建散点图"},{"id":96669,"order":81,"type":"single_choice","question":"常被使用在数据标注审核流程中的工具是（）。","options":[{"label":"A","text":"数据库系统"},{"label":"B","text":"数据挖掘工具"},{"label":"C","text":"数据标注平台"},{"label":"D","text":"数据清洗工具"}],"answer":"C","analysis":"数据标注审核流程通常使用数据标注平台来进行，通过平台来查看标注数据的准确性和质量"},{"id":96183,"order":82,"type":"single_choice","question":"职业道德所具备的作用包括（）？","options":[{"label":"A","text":"促进自我实现"},{"label":"B","text":"保障个体独立性"},{"label":"C","text":"维护行业信誉"},{"label":"D","text":"保护个人隐私权"}],"answer":"C","analysis":"职业道德主要作用是维护行业信誉，建立公众信任。"},{"id":96279,"order":83,"type":"single_choice","question":"在 Word 中进行邮件合并操作时，需要用到哪个选项卡（）。","options":[{"label":"A","text":"导出"},{"label":"B","text":"视图"},{"label":"C","text":"首页"},{"label":"D","text":"邮件"}],"answer":"D","analysis":"邮件合并是一种使用微软Word软件进行的批量邮件发送技术，而在Word中，可以通过“邮件”选项卡中的“开始邮件合并”选项来进行相关操作"},{"id":96530,"order":84,"type":"single_choice","question":"若想提升 OPTICS 算法聚类的精准度，可采用的（）办法是有效的。","options":[{"label":"A" "analysis":"在机器学习中，如果某个样本的特征缺失，会导致模型的精度下降"},{"id":96180,"order":130,"type":"single_choice","question":"以下各项中，属于职业道德基本范畴的是（）？","options":[{"label":"A","text":"追求个人权益"},{"label":"B","text":"尊重他人"},{"label":"C","text":"自我实现"},{"label":"D","text":"利益最大化"}],"answer":"B","analysis":"职业道德的核心内容是尊重他人，涵盖对他人的权益、隐私和尊严表示尊重，建立良好的职业人际关系"},{"id":96297,"order":131,"type":"single_choice","question":"在 PowerPoint 母版视图里修改主题颜色，会对什么元素产生影响？（）","options":[{"label":"A","text":"文字颜色"},{"label":"B","text":"背景颜色"},{"label":"C","text":"列表符号样式"},{"label":"D","text":"以上选项均正确"}],"answer":"D","analysis":"在 PowerPoint 母版视图中，修改主题颜色会影响幻灯片的文字颜色、背景颜色和列表符号的颜色 ，但不会改变字体样式或图片内容。"},{"id":96697,"order":132,"type":"single_choice","question":"就声纹识别而言，语音数据标注可用于（）。","options":[{"label":"A","text":"音乐生成"},{"label":"B","text":"音色标记"},{"label":"C","text":"机器翻译"},{"label":"D","text":"语音合成"}],"answer":"B","analysis":"声纹识别是通过声音信号的特征来识别和验证说话者的身份，而语音数据标注可以帮助提供清晰、准确的语音数据，从而提升声纹识别系统的性能，因此语音标注能够用于音色标记"},{"id":96584,"order":133,"type":"single_choice","question":"求同法的基本思路是（）。","options":[{"label":"A","text":"利用数学模型和算法解决复杂问题"},{"label":"B","text":"从不同角度观察问题，寻找问题中的共性和普遍规律"},{"label":"C","text":"分析问题的原因和影响，制定对策和解决方案"},{"label":"D","text":"根据已有事实和数据，进行逻辑推理，找出问题的解决方案"}],"answer":"B","analysis":"求同法的基本思路是从不同角度观察问题，寻找问题中的共性和普遍规律"},{"id":96441,"order":134,"type":"single_choice","question":"对于稀疏数据而言，哪种标准化方法最为适用？（）","options":[{"label":"A","text":"小数定标标准化"},{"label":"B","text":"MaxAbs标准化"},{"label":"C","text":"Z-score标准化"},{"label":"D","text":"Min-max 标准化"}],"answer":"B","analysis":"最大绝对值缩放（MaxAbs Scaling）专为稀疏数据而设计不会破坏稀疏数据的结构，是最适合处理稀疏数据的标准化方法"},{"id":96781,"order":135,"type":"single_choice","question":"下列哪项标准主要关注环境管理及可持续发展方面的管理？（）","options":[{"label":"A","text":"ISO 9001"},{"label":"B","text":"ISO 14001"},{"label":"C","text":"ISO 27001"},{"label":"D","text":"ISO 8000"}],"answer":"B","analysis":"ISO 14001是国际上用于环境管理的标准，它关注组织对环境的管理和可持续发展，包括环境政策、资源利用、环境性能评估等方面的要求。"},{"id":96864,"order":136,"type":"single_choice","question":"智能系统在安防领域有哪些常见的应用方式？（）","options":[{"label":"A","text":"视频监控与分析"},{"label":"B","text":"出入口管控与门禁系统"},{"label":"C","text":"智能报警与应急响应"},{"label":"D","text":"以上选项均正确"}],"answer":"D","analysis":"智能系统在安防领域的一些常见运用方式包括视频监控与分析、出入口管控与门禁系统、智能报警与应急响应、智能巡更与巡检、安防联动与整合管理 等。"},{"id":96652,"order":137,"type":"single_choice","question":"数据审核所包含的主要步骤有（）。","options":[{"label":"A","text":"数据准备、数据审查、意见反馈、数据报告"},{"label":"B","text":"数据收集、数据存储、数据过滤、数据分类"},{"label":"C","text":"数据备份、数据恢复、数据优化、数据清理"},{"label":"D","text":"数据采集、数据清洗、数据分析、数据可视化"}],"answer":"A","analysis":"数据审核的标准流程为：数据准备，收集历史数据、本年度业务数据及分单位数据；数据审查，包括规范性审核、完整性审核、宏观审核、微观审核；意见反馈：将审核问题反馈至相关单位核实修改；数据报告：汇总最终审核结果并提交"},{"id":96462,"order":138,"type":"single_choice","question":"进行数据规约时，选择数据子集需要依据哪些指标（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"分布均匀性"},{"label":"C","text":"数据的相关性"},{"label":"D","text":"数据的冗余程度"}],"answer":"A","analysis":"数据规约依据冗余度、相关性、分布均匀性等指标。"},{"id":96485,"order":139,"type":"single_choice","question":"若要设置 Cookie 的过期时间（采用 GMT 格式的绝对时间），可通过哪个（）参数来实现。","options":[{"label":"A","text":"max-age"},{"label":"B","text":"expires"},{"label":"C","text":"domain"},{"label":"D","text":"path"}],"answer":"B","analysis":"Cookie的过期时间可以通过expires参数指定格式为“Wdy, DD-Mon-YYYY HH:MM:SS GMT”"},{"id":96258,"order":140,"type":"single_choice","question":"文件系统的权限控制所不涉及的内容是（）。","options":[{"label":"A","text":"文件大小"},{"label":"B","text":"文件权限"},{"label":"C","text":"文件组"},{"label":"D","text":"文件所有者"}],"answer":"A","analysis":"权限控制涉及所有者、组和权限，不包括文件大小。"},{"id":96325,"order":141,"type":"single_choice","question":"有关婚姻家庭的表述，下列正确的是（）。","options":[{"label":"A","text":"协议离婚需要双方协商并达成一致意见"},{"label":"B","text":"子女对父母没有赡养的义务"},{"label":"C","text":"夫妻共同财产可以由任一方独立支配"},{"label":"D","text":"男女双方自愿结婚，不受限制"}],"answer":"A","analysis":"在《中华人民共和国民法典》1076条中规定，夫妻双方自愿离婚的，应当签订书面离婚协议，并亲自到婚姻登记机关申请离婚登记"},{"id":96290,"order":142,"type":"single_choice","question":"在 Excel 里，能依据条件筛选出符合要求的行并显示的功能是（）。","options":[{"label":"A","text":"排序功能"},{"label":"B","text":"数据透视表"},{"label" er":"D","analysis":"通过对数据进行分类，可以使得数据更加有条理，提高数据分析的效率"},{"id":96242,"order":246,"type":"single_choice","question":"计算机系统中的内存条，其功能是临时存放用户当下正在处理和运行的数据，它是一种（）。","options":[{"label":"A","text":"执行指令"},{"label":"B","text":"高速缓存"},{"label":"C","text":"用户数据和程序"},{"label":"D","text":"操作系统核心文件"}],"answer":"C","analysis":"内存条用于临时存储正在运行的用户程序与数据。"},{"id":96835,"order":247,"type":"single_choice","question":"在智能化系统集成项目的项目准备阶段，下列哪一项不属于该阶段的工作内容？（）","options":[{"label":"A","text":"资源准备"},{"label":"B","text":"需求确认"},{"label":"C","text":"团队组建"},{"label":"D","text":"施工图设计"}],"answer":"D","analysis":"在智能化系统集成项目的项目准备阶段，施工图设计不是该阶段的工作内容"},{"id":96515,"order":248,"type":"single_choice","question":"对于 DBSCAN 密度聚类算法的步骤，下列说法正确的是（）。","options":[{"label":"A","text":"将所有点都标记为未访问状态，然后随机选择一个点作为核心点，将其密度可达范围内的点划分为一簇。"},{"label":"B","text":"遍历所有点，寻找到一个未访问的点，将其密度可达范围内的点划分为一簇。"},{"label":"C","text":"将所有点都标记为未访问状态，然后从未访问的点开始，寻找与之密度可达的点，将其划分为一簇。"},{"label":"D","text":"随机选择一个点作为核心点，将其密度可达范围内的点划分为一簇。"}],"answer":"A","analysis":"DBSCAN算法的步骤是首先将所有点都标记为未访问状态随机选择一个点作为核心点，然后将其密度可达范围内的点划分为一簇，然后将这些点标记为已访问，然后继续寻找未访问的点，重复以上步骤"},{"id":96720,"order":249,"type":"single_choice","question":"在文本数据标注中，不同标注者可能对同一段文本给出不同的标注结果，这会对（）产生影响。","options":[{"label":"A","text":"标注任务的复杂性"},{"label":"B","text":"标注结果的一致性"},{"label":"C","text":"标注结果的可复现性"},{"label":"D","text":"数据的缺乏和不完整性"}],"answer":"B","analysis":"在文本数据标注过程中，标注结果的一致性是一个重要的难点，因为不同标注者可能会对同一文本做出不同的标注"},{"id":96282,"order":250,"type":"single_choice","question":"在 Word 的邮件合并功能里，通过什么方式可以设置合并的条件（）。","options":[{"label":"A","text":"格式"},{"label":"B","text":"规则"},{"label":"C","text":"首页"},{"label":"D","text":"插入"}],"answer":"B","analysis":"通过\"规则\"选项可设置邮件合并条件。"},{"id":96815,"order":251,"type":"single_choice","question":"下列哪项不属于数据整理的步骤？（）","options":[{"label":"A","text":"以下选项均属于数据整理步骤"},{"label":"B","text":"检测异常值"},{"label":"C","text":"转换数据"},{"label":"D","text":"抓取原始数据"}],"answer":"A","analysis":"数据整理工作主要包括以下几个步骤:从多个源(包括网络和数据库表)抓取原始数据、填补、格式化和转换数据--使其基本可在建模过程中使用(如高级机器学习)、处理读/写错误、检测异常值、执行快速可视化(绘图)和基本统计分析，以判断格式化数据的质量"},{"id":96739,"order":252,"type":"single_choice","question":"全样检验指的是什么？（）","options":[{"label":"A","text":"对部分样本进行完全检查"},{"label":"B","text":"对部分样本进行抽样检验"},{"label":"C","text":"对已完成标注的数据集进行集中全量检验"},{"label":"D","text":"对已完成标注的数据集进行抽样检验"}],"answer":"C","analysis":"全样检验是对已完成标注的数据集进行集中全量检验，即对总体中的每个个体进行观察或测量"},{"id":96266,"order":253,"type":"single_choice","question":"在 Word 2019 中，将文本字体大小调整为 14 磅的正确操作是（）。","options":[{"label":"A","text":"选择\"段落\"选项卡，选择\"更多字体大小\"，选择\"14\""},{"label":"B","text":"选择\"开始\"选项卡的\"字号\"，选择\"14\""},{"label":"C","text":"选择\"字体\"选项卡，选择\"更多字体大小\"，选择\"14\""},{"label":"D","text":"选择\"字体\"选项卡，选择\"14\""}],"answer":"B","analysis":"在\"开始\"选项卡的\"字号\"中选择14磅即可设置字体大小。"},{"id":96500,"order":254,"type":"single_choice","question":"数与数据都能够直接用来描述什么（）。","options":[{"label":"A","text":"感知属性(如颜色、气味等)"},{"label":"B","text":"逻辑关系"},{"label":"C","text":"抽象概念"},{"label":"D","text":"物理量"}],"answer":"D","analysis":"数和数据都可以用来描述物理量，如温度、长度、重量等"},{"id":96837,"order":255,"type":"single_choice","question":"下列选项中，哪个不属于智能化系统集成项目在技术方面的核心要求？（）","options":[{"label":"A","text":"系统测试与维护技术"},{"label":"B","text":"项目成本控制能力"},{"label":"C","text":"系统集成与实施能力"},{"label":"D","text":"系统分析与设计能力"}],"answer":"B","analysis":"智能化系统集成项目的关键技术要求包括系统分析与设计能力、系统集成与实施能力以及系统测试与维护技术，不包含项目成本控制能力"},{"id":96687,"order":256,"type":"single_choice","question":"在文本标注的质量标准中，（）指的是标注人员在开展标注工作时需要遵守的规则和准则。","options":[{"label":"A","text":"标注指导"},{"label":"B","text":"标注流程"},{"label":"C","text":"标注准则"},{"label":"D","text":"标注评估"}],"answer":"C","analysis":"标注准则是指标注员在标注时需要遵循的规范和要求，根据规范进行标注能够提高文本标注的精度和一致性"},{"id":96735,"order":257,"type":"single_choice","question":"在数据标注任务里，开展实时检验的主要目的是什么？（）","options":[{"label":"A","text":"审查前端设计"},{"label":"B","text":"检查系统运行状态"},{"label":"C","text":"检查数据备份情况"},{"label":"D","text":"提高数据质量"}],"answer":"D","analysis":"在数据标注领域，加入实时检验的环节能够减少数据标注过程中出现重复的错误问题，从而提高数据的质量"},{"id":96460,"order":258,"type":"single_choice","question":"在数据规约的各种方法里，哪一种不能起到降低数据维度的作用（）。 （五）为公共利益实施新闻报道、舆论监督等行为，在合理的范围内处理个人信息；（六）依照本法规定在合理的范围内处理个人自行公开或者其他已经合法公开的个人信息；（七）法律、行政法规规定的其他情形。依照本法其他有关规定，处理个人信息应当取得个人同意，但是有前款第二项至第七项规定情形的，不需取得个人同意。"},{"id":96510,"order":290,"type":"single_choice","question":"采用二进制编码时，最高位的作用是（）。","options":[{"label":"A","text":"汉字位"},{"label":"B","text":"小数位"},{"label":"C","text":"整数位"},{"label":"D","text":"符号位"}],"answer":"D","analysis":"二进制编码中最高位通常用作符号位。"},{"id":96257,"order":291,"type":"single_choice","question":"下列哪一项不属于计算机文件系统的主要功能（）。","options":[{"label":"A","text":"分析数据"},{"label":"B","text":"检索数据"},{"label":"C","text":"组织数据"},{"label":"D","text":"存储数据"}],"answer":"A","analysis":"计算机文件系统的主要功能是存储数据、组织数据和检索数据"},{"id":96467,"order":292,"type":"single_choice","question":"在特征构造的各类方法中，哪一种无法将文本特征转换为数值特征（）。","options":[{"label":"A","text":"信息增益"},{"label":"B","text":"TF-IDF"},{"label":"C","text":"词袋模型"},{"label":"D","text":"One-hot编码"}],"answer":"A","analysis":"独热编码是将离散特征转换为二进制向量，可以将文本特征（如类别变量）转换为数值特征"},{"id":96492,"order":293,"type":"single_choice","question":"在 Python 中，可使用（）来模拟浏览器进行动态网页数据的爬取。","options":[{"label":"A","text":"requests库"},{"label":"B","text":"urllib库"},{"label":"C","text":"Selenium库"},{"label":"D","text":"BeautifulSoup库"}],"answer":"C","analysis":"模拟浏览器进行动态网页数据爬取的工具主要有Selenium库和PhantomJS库。其中，Selenium库比较常用，可以通过编写代码模拟用户使用浏览器访问网页。"},{"id":96621,"order":294,"type":"single_choice","question":"在文本分类中，有一种（）方法，可以通过提取文本数据中的关键词，得到用于分类的文本数据特征向量。","options":[{"label":"A","text":"文本向量化"},{"label":"B","text":"决策树"},{"label":"C","text":"聚类"},{"label":"D","text":"相似度计算"}],"answer":"A","analysis":"将文本数据转化为特定的向量形式，就是文本向量化"},{"id":96762,"order":295,"type":"single_choice","question":"下列哪一项不是评估数据质量问题的指标？（）","options":[{"label":"A","text":"迭代次数"},{"label":"B","text":"一致性"},{"label":"C","text":"可靠性"},{"label":"D","text":"准确性"}],"answer":"A","analysis":"迭代次数不是数据质量评估指标。"},{"id":96318,"order":296,"type":"single_choice","question":"网络运营者有责任制定（），以便对系统漏洞、计算机病毒、网络攻击、网络侵入等安全风险进行及时处理。","options":[{"label":"A","text":"网络安全事件应急预案"},{"label":"B","text":"网络安全责任书"},{"label":"C","text":"网络信息安全管理条例"},{"label":"D","text":"网络安全标准"}],"answer":"A","analysis":"网络运营者需制定网络安全事件应急预案以应对安全风险。"},{"id":96294,"order":297,"type":"single_choice","question":"在 Excel 里，通过以下哪种方式可以挑选要插入的图表类型？","options":[{"label":"A","text":"单击“确定”按钮"},{"label":"B","text":"单击“取消”按钮"},{"label":"C","text":"从“插入”选项卡中选择所需的图表类型"},{"label":"D","text":"从“数据”选项卡中选择所需的图表类型"}],"answer":"C","analysis":"在Excel中，可以通过从“插入”选项卡中选择所需的图表类型来选择要插入的图表类型。"},{"id":96503,"order":298,"type":"single_choice","question":"在各种数据文件格式中，属于二进制数据格式的是（）。","options":[{"label":"A","text":"BSON"},{"label":"B","text":"XML"},{"label":"C","text":"JSON"},{"label":"D","text":"CSV"}],"answer":"A","analysis":"BSON（二进制 JSON）是一种二进制编码格式，用于存储和交换文档或数据序列"},{"id":96371,"order":299,"type":"single_choice","question":"静态网页和动态网页最为显著的差异体现在（）。","options":[{"label":"A","text":"动态网页的访问速度比静态网页快"},{"label":"B","text":"静态网页可以实现账户登录和数据传输，而动态网页不支持"},{"label":"C","text":"动态网页可以根据用户的交互实现内容的更新和生成，而静态网页不支持交互"},{"label":"D","text":"静态网页需要服务器进行内容生成和更新，而动态网页不需要"}],"answer":"C","analysis":"动态网页支持交互与内容实时更新，静态网页不支持。"},{"id":96714,"order":300,"type":"single_choice","question":"在语音标注过程中，下列哪一项是需要重点关注的注意事项？（）","options":[{"label":"A","text":"确保一致性和准确性"},{"label":"B","text":"忽略语音中的语气和情绪"},{"label":"C","text":"不需要考虑语因标注背景差异"},{"label":"D","text":"忽略语音质量问题"}],"answer":"A","analysis":"语音标注需重点确保一致性和准确性。"},{"id":96944,"order":301,"type":"single_choice","question":"在通用的实时数据处理场景中，智能系统优化的首要衡量指标是（）。","options":[{"label":"A","text":"精度"},{"label":"B","text":"召回率"},{"label":"C","text":"F1值"},{"label":"D","text":"速度"}],"answer":"D","analysis":"在通用实时场景下，速度是首要指标。"},{"id":96333,"order":302,"type":"single_choice","question":"下列哪种行为属于无需获得著作权人许可的 “合理使用” 范畴（）。","options":[{"label":"A","text":"将他人的截图用于商业宣传"},{"label":"B","text":"为学校课堂教学或者科学研究，播放已经发表的作品"},{"label":"C","text":"将他人的电影作为背景放在自己的视频中"},{"label":"D","text":"在网站上转载他人的文章"}],"answer":"B","analysis":"根据《中华人民共和国著作权法》第二十四（六）规定，为学校课堂教学或者科学研究，翻译、改编、汇编、播放或者少量复制已经发表的作品，供教学或者科研人员使用，但不得出版发行"},{"id":96624,"order":303,"type":"single_choice","question":"构成图像数据的底层元素包括（）。","options":[{"label":"A","text":"长度、宽度、颜色深度"},{"label":"B","text":"长度、宽度、像素密度"},{"label":"C","text":"长度、宽度、图像分辨率"},{"label":"D","text":"行数、列数、像素值"}],"answer":"D","analysis":"图像数据通常以二维或三维数组形式存储，数组的行数（高度/长度）和列数（宽度）定义了图像尺寸，数组中的每个元素为像素值。因此，选项D最接近实际存储结构。"},{"id":96382,"order":304,"type":"single_choice","question":"当从服务器获取数据且需要设定超时时长时，应该采取（）举措。","options":[{"label":"A","text":"使用requests.post(timeout=10)"},{"label":"B","text":"使用requests.get(timeout=5)"},{"label":"C","text":"在headers参数中添加timeout键值对"},{"label":"D","text":"使用requests.timeout()"}],"answer":"B","analysis":"在Requests库中，从服务器获取数据使用get()方法，并且可以使用timeout参数来设置超时时间，该参数接收一个整数或浮点数，单位为秒"},{"id":96590,"order":305,"type":"single_choice","question":"求异法的基本内容不包含下列哪一项？（）","options":[{"label":"A","text":"排除干扰变量以验证因果关系"},{"label":"B","text":"分析现象存在与不存在的条件差异"},{"label":"C","text":"通过对照场合确定唯一差异因素"},{"label":"D","text":"从自我角度思考问题，寻找解决方案"}],"answer":"D","analysis":"求异法不包含从自我角度思考问题。"},{"id":96440,"order":306,"type":"single_choice","question":"Min - Max标准化存在的不足之处是（）。","options":[{"label":"A","text":"无显著缺点"},{"label":"B","text":"会增加数据的复杂度"},{"label":"C","text":"对异常值比较敏感"},{"label":"D","text":"不适合处理稀疏数据"}],"answer":"C","analysis":"Min-Max标准化法对于数据中的异常值比较敏感，可能会对标准化后的数据产生较大的影响"},{"id":96817,"order":307,"type":"single_choice","question":"在数据整理的步骤中，合并不同数据表所使用的操作是（）。","options":[{"label":"A","text":"排序"},{"label":"B","text":"连接"},{"label":"C","text":"过滤"},{"label":"D","text":"去重"}],"answer":"B","analysis":"数据整合的步骤包括合并、重构和变形，其中合并不同数据表使用的是连接操作"},{"id":96496,"order":308,"type":"single_choice","question":"在各种数据采集方法中，能够提高数据采集效率的是（）。","options":[{"label":"A","text":"手动输入数据"},{"label":"B","text":"自动化脚本采集数据"},{"label":"C","text":"随机选择数据"},{"label":"D","text":"忽略数据采集过程"}],"answer":"B","analysis":"自动化脚本采集数据可以减少人工操作，提高数据采集的效率。"},{"id":96925,"order":309,"type":"single_choice","question":"在分类预测场景中，必然属于过拟合情况的是（）。","options":[{"label":"A","text":"训练误差较高"},{"label":"B","text":"模型学习过多的随机噪音而无法泛化"},{"label":"C","text":"模型过于简单，无法适应数据"},{"label":"D","text":"数据不足的情况下，模型无法拟合数据"}],"answer":"B","analysis":"过拟合是一种现象，表现为模型在训练时过度适应训练数据，学习过多的随机噪音而无法泛化"},{"id":96822,"order":310,"type":"single_choice","question":"下列哪项不属于数据规范化的方法？（）","options":[{"label":"A","text":"小数定标规范化"},{"label":"B","text":"最大似然估计法"},{"label":"C","text":"Z-score规范化"},{"label":"D","text":"最小-最大规范化"}],"answer":"B","analysis":"最大似然估计法不属于数据规范化方法。"},{"id":96186,"order":311,"type":"single_choice","question":"职业道德在调节人际关系方面的作用体现在（）？","options":[{"label":"A","text":"增加工作时间"},{"label":"B","text":"促进团队合作"},{"label":"C","text":"加强个人权益保护"},{"label":"D","text":"降低工作负荷"}],"answer":"B","analysis":"职业道德的主要作用是调节职能关系"},{"id":96332,"order":312,"type":"single_choice","question":"著作权人所享有的权利，其有效期限为多久（）。","options":[{"label":"A","text":"终身+死后50年"},{"label":"B","text":"50年"},{"label":"C","text":"20年"},{"label":"D","text":"10年"}],"answer":"A","analysis":"根据《中华人民共和国著作权法》第二十三条规定，自然人的作品，其发表权、本法第十条第一款第五项至第十七项规定的权利的保护期为作者终生及其死亡后五十年，截止于作者死亡后第五十年的12月31日；如果是合作作品，截止于最后死亡的作者死亡后第五十年的12月31日"},{"id":96466,"order":313,"type":"single_choice","question":"抽样属于数据规约的方法之一，下列哪一项不属于常用的抽样方法（）。","options":[{"label":"A","text":"聚类抽样"},{"label":"B","text":"极端值抽样"},{"label":"C","text":"分层抽样"},{"label":"D","text":"随机抽样"}],"answer":"B","analysis":"极端值抽样不属于常用抽样方法。"},{"id":96757,"order":314,"type":"single_choice","question":"在数据标注规则里，所谓的标注质量指的是（）。","options":[{"label":"A","text":"标注工具的稳定性和易用性"},{"label":"B","text":"标注数据的数量和多样性"},{"label":"C","text":"标注的结果有价值，符合应用目的"},{"label":"D","text":"标注者的工作效率和准确性"}],"answer":"C","analysis":"在数据标注规则中，标注质量是指数据标注结果有价值，符合数据需求方的特定应用目的"},{"id":96491,"order":315,"type":"single_choice","question":"运用 Selenium 爬取动态网页时，其典型的流程包含（）。","options":[{"label":"A","text":"打开浏览器并访问目标页面"},{"label":"B","text":"在页面中定位元素"},{"label":"C","text":"对WebElement对象进行交互操作"},{"label":"D","text":"以上选项均正确"}],"answer":"D","analysis":"使用Selenium对动态网页进行爬取通常会经历以下步骤：打开浏览器并访问页面、元素选取、元素交互、设置页面等待等。"},{"id":96738,"order":316,"type":"single_choice","question":"为了让实时检查更高效地开展，能采取的措施是（）。","options":[{"label":"A","text":"对数据集进行删减"},{"label":"B","text":"对数据储存进行升级"},{"label":"C","text":"对数据集进行分段标注"},{"label":"D","text":"对数据集进行转换"}],"answer":"C","analysis":"对数据集分段标注可提高实时检查效率。"},{"id":96731,"order":317,"type":"single_choice","question":"什么是实时检验的定义？（）","options":[{"label":"A","text":"对过程或系统进行离线数据分析"},{"label":"B","text":"不需要对过程或系统进行实时监控"},{"label":"C","text":"在特定时间点对过程或系统进行抽样测试"},{"label":"D","text":"对特定过程或系统进行现场检验和流动检验"}],"answer":"D","analysis":"实时检验是指对特定过程或系统进行现场检验和流动检验，实时检验可以实现对过程的实时控制和管理，确保过程的稳定性和质量可控性"},{"id":96263,"order":318,"type":"single_choice","question":"下列操作中，属于在 Word 中对段落格式进行设置的是（）。","options":[{"label":"A","text":"改变字体颜色"},{"label":"B","text":"调节字间距"},{"label":"C","text":"修改行距"},{"label":"D","text":"改变字体大小"}],"answer":"C","analysis":"修改行距是一种具体的段落格式设置操作"},{"id":96495,"order":319,"type":"single_choice","question":"下列哪项不是关于数据采集方法的优化建议（）。","options":[{"label":"A","text":"收集尽可能高质量的数据"},{"label":"B","text":"采用多种数据源"},{"label":"C","text":"减少数据质量检查的频率"},{"label":"D","text":"确保数据采集合法合规"}],"answer":"C","analysis":"频繁检查数据质量是数据采集优化中的一项重要工作，可以及时发现和纠正错误数据，提高数据采集的准确性和实时性。因此，减少数据质量检查的频率是不可取的。"},{"id":96875,"order":320,"type":"single_choice","question":"在 Python 里，Matplotlib 库的用途是什么？（）","options":[{"label":"A","text":"网络爬虫"},{"label":"B","text":"机器学习模型训练"},{"label":"C","text":"数据可视化"},{"label":"D","text":"数据处理"}],"answer":"C","analysis":"Matplotlib是目前非常流行的用于绘制数据图表的Python库，是Python的2D绘图库"},{"id":96254,"order":321,"type":"single_choice","question":"在下列文件系统中，能够支持单个文件最大容量的是（）。","options":[{"label":"A","text":"exFAT"},{"label":"B","text":"FAT32"},{"label":"C","text":"ext4"},{"label":"D","text":"NTFS"}],"answer":"A","analysis":"exFAT支持最大单文件16EB，优于NTFS、ext4、FAT32。"},{"id":96818,"order":322,"type":"single_choice","question":"在数据分析的步骤中，常用的可视化工具包含（）。","options":[{"label":"A","text":"Scikit-learn"},{"label":"B","text":"Matplotlib"},{"label":"C","text":"Pandas"},{"label":"D","text":"Numpy"}],"answer":"B","analysis":"Matplotlib是常用的数据可视化工具。"},{"id":96520,"order":323,"type":"single_choice","question":"下列哪项不属于 DBSCAN 密度聚类的缺点（）。","options":[{"label":"A","text":"处理大数据集时速度很快"},{"label":"B","text":"可能会将一些密集但不属于同一簇的点归为同一簇"},{"label":"C","text":"算法不稳定，结果容易受到数据初始点的影响"},{"label":"D","text":"对高维数据和稠密数据处理效果不佳"}],"answer":"A","analysis":"DBSCAN在处理高维数据和稠密数据时效果不佳，算法不稳定，结果容易受到数据初始点的影响，可能会将一些密集但不属于同一簇的点归为同一簇，这些都是DBSCAN的缺点"},{"id":96574,"order":324,"type":"single_choice","question":"AGNES 层次聚类所采用的聚合准则包括（）。","options":[{"label":"A","text":"AdaBoost、神经网络、线性回归、PCA"},{"label":"B","text":"支持向量机、朴素贝叶斯、随机森林、决策树"},{"label":"C","text":"K均值、高斯混合模型、DBSCAN、层次聚类"},{"label":"D","text":"最小距离法、最大距离法、均值距离法、重心距离法"}],"answer":"D","analysis":"AGNES聚合准则包括最小距离法、最大距离法、均值距离法、重心距离法。"},{"id":96787,"order":325,"type":"single_choice","question":"编制审核报告的目的是向（）进行情况汇报。","options":[{"label":"A","text":"社会公众"},{"label":"B","text":"利益相关方"},{"label":"C","text":"专业机构"},{"label":"D","text":"政府部门"}],"answer":"B","analysis":"审核报告是审核结果表述和形成的书面文件，其目的之一是为了向利益相关方提供报告。"},{"id":96911,"order":326,"type":"single_choice","question":"线性回归模型想要达成的目标是什么？（）","options":[{"label":"A","text":"最大化损失函数"},{"label":"B","text":"最小化训练样本数"},{"label":"C","text":"最大化回归系数"},{"label":"D","text":"最小化预测误差"}],"answer":"D","analysis":"线性回归的目的是通过模型来尽可能准确地预测实际值，即最小化预测误差"},{"id":96444,"order":327,"type":"single_choice","question":"哪种方法能够确保每个分组中的样本数量保持一致？（）","options":[{"label":"A","text":"直方图离散化"},{"label":"B","text":"聚类离散化"},{"label":"C","text":"等频离散化"},{"label":"D","text":"等宽离散化"}],"answer":"C","analysis":"等频离散化是将数据分成具有相同数量的分组，每个分组中的样本数量相等"},{"id":96683,"order":328,"type":"single_choice","question":"下列哪项不属于在考量语音标注质量标准时需要考虑的因素？（）","options":[{"label":"A","text":"良好的音质"},{"label":"B","text":"规范性"},{"label":"C","text":"一致性"},{"label":"D","text":"准确性"}],"answer":"A","analysis":"良好的音质表明语音质量，并非是语音标注质量标准的主要考虑因素"},{"id":96277,"order":329,"type":"single_choice","question":"在 Word 的同一页面中，既插入图片又插入表格，还能通过拖动让它们并排展示，该进行什么操作（）。","options":[{"label":"A","text":"先插入表格，然后在表格内插入图片。"},{"label":"B","text":"在Word中无法同时插入图片和表格。"},{"label":"C","text":"选择“插入”选项卡，然后选择“图片与表格”命令。"},{"label":"D","text":"分别插入图片和表格，然后通过拖动的方式将它们放在需要的位置。"}],"answer":"D","analysis":"在Word中，可以分别插入图片和表格，然后通过拖动它们将其放置在需要的位置，从而实现在同一页面上插入图片和表格并且通过拖动使其并排显示"},{"id":96575,"order":330,"type":"single_choice","question":"在 AGNES 层次聚类算法里，最初的初始状态对应的步骤是（）。","options":[{"label":"A","text":"组合相似度最高的样本"},{"label":"B","text":"将所有样本看作一个聚类"},{"label":"C","text":"随机将样本分成多个聚类"},{"label":"D","text":"将每个样本看作一个单独的聚类"}],"answer":"D","analysis":"在AGNES层次聚类算法最初的初始状态，每个样本被看作一个单独的聚类"},{"id":96829,"order":331,"type":"single_choice","question":"管理信息系统的文档目录里不包含（）。","options":[{"label":"A","text":"文档纸张大小"},{"label":"B","text":"存储地点"},{"label":"C","text":"文档名称"},{"label":"D","text":"文档编号"}],"answer":"A","analysis":"管理信息系统的文档目录中应包含文档编号、文档名称、格式或载体、份数、每份页数或件数、存储地点、存档时间、保管人等"},{"id":96804,"order":332,"type":"single_choice","question":"下列哪一项只能通过输入切片索引对 DataFrame 数据进行筛选？（）","options":[{"label":"A","text":"loc[]"},{"label":"B","text":"iloc[]"},{"label":"C","text":"merge()"},{"label":"D","text":"drop_duplicates()"}],"answer":"B","analysis":".loc[]可以根据行标签或列标签对DataFrame进行选取和筛选。.iloc[]方法基于整数位置的索引，只能使用整数位置或切片来选择行和列。Merge（）用于合并两个DataFrame对象。drop_duplicates（） 用于删除DataFrame中的重复行。"},{"id":96400,"order":333,"type":"single_choice","question":"数据预处理环节中，标准化（Standardization）和归一化（Normalization）二者之间存在怎样的差异？（）","options":[{"label":"A","text":"标准化和归一化的区别在于数据类型不同"},{"label":"B","text":"标准化将数据转化为均值为0，方差为1的分布，而归一化将数据转化为0-1之间的值"},{"label":"C","text":"标准化将数据转化为0-1之间的值，而归一化将数据转化为均值为0，方差为1的分布"},{"label":"D","text":"标准化将数据转化为均值为1，方差为1的分布，而归一化将数据转化为0-1之间的值"}],"answer":"B","analysis":"标准化和归一化都是数据预处理中的重要步骤，目的是让不同单位或量纲的数据具有可比性"},{"id":96873,"order":334,"type":"single_choice","question":"哪个库能够呈现动态的交互图表，并且在数据展示方面十分便捷？（）","options":[{"label":"A","text":"scikit-learn"},{"label":"B","text":"pyecharts"},{"label":"C","text":"pandas"},{"label":"D","text":"NumPy"}],"answer":"B","analysis":"pyecharts可以展示动态交互图，能够非常方便地展示数据"},{"id":96540,"order":335,"type":"single_choice","question":"DBSCAN 算法与 OPTICS 算法的主要差异体现在（）。","options":[{"label":"A","text":"DBSCAN的时间复杂度高于OPTICS"},{"label":"B","text":"DBSCAN需要预先设定聚类个数，而OPTICS不需要"},{"label":"C","text":"DBSCAN适用于数据密度相对均匀的数据集，而OPTICS适用于数据密度不均匀的数据集"},{"label":"D","text":"DBSCAN只能处理欧几里得距离，而OPTICS可以处理任意距离度量"}],"answer":"C","analysis":"DBSCAN和OPTICS算法的主要区别在于适用于不同密度的数据集"},{"id":96508,"order":336,"type":"single_choice","question":"Unicode 编码是对什么的延伸（）。","options":[{"label":"A","text":"ASCII编码"},{"label":"B","text":"芬兰编码"},{"label":"C","text":"英国编码"},{"label":"D","text":"日本编码"}],"answer":"A","analysis":"Unicode编码是ASCII编码的延伸，可以表示更多的字符和符号，包括各种语言的字母、数字、标点符号、符号等等"},{"id":96539,"order":337,"type":"single_choice","question":"MeanShift 算法和 DBSCAN 算法之间的主要差异体现在（）。","options":[{"label":"A","text":"MeanShift算法适用于数据密度相对均匀的数据集，而DBSCAN适用于数据密度不均匀的数据集"},{"label":"B","text":"MeanShift算法的时间复杂度高于DBSCAN"},{"label":"C","text":"MeanShift算法不需要预先设定聚类个数，而DBSCAN需要"},{"label":"D","text":"MeanShift算法可以处理任意距离度量，而DBSCAN只能处理欧几里得距离"}],"answer":"A","analysis":"MeanShift算法和DBSCAN算法的主要区别在于适用于不同密度的数据集"},{"id":96639,"order":338,"type":"single_choice","question":"WAV 作为一种音频文件格式，其完整名称是（）。","options":[{"label":"A","text":"Waveform Audio File Format"},{"label":"B","text":"Wide Area Voice File Format"},{"label":"C","text":"Windows Audio Version Format"},{"label":"D","text":"Web Audio Video Format"}],"answer":"A","analysis":"WAV格式全称为Waveform Audio File Format，是一种常见的音频文件格式之一，最初由微软公司在Windows平台上使用。"},{"id":96645,"order":339,"type":"single_choice","question":"在语音识别、音频信号处理等领域得到了广泛运用的是（）。","options":[{"label":"A","text":"精确度"},{"label":"B","text":"召回率"},{"label":"C","text":"F1值"},{"label":"D","text":"MFCC"}],"answer":"D","analysis":"梅尔频率借鉴了人耳对声音的感知方式,它与线性频率之间的转换是非线性的。MFCC是在梅尔频率上对信号的频谱进行离散余弦变换(DCT)得到的系数。MFCC在语音识别和音频信号处理等领域中被广泛应用。"},{"id":96293,"order":340,"type":"single_choice","question":"在 Excel 2013 及更新版本中，给图表添加数据标签的操作是（）。","options":[{"label":"A","text":"选中图表，在“插入”选项卡中点击“数据标签”"},{"label":"B","text":"在“页面布局”选项卡中选择“数据标签”"},{"label":"C","text":"选中图表，点击图表右侧的“+”图标勾选“数据标签”"},{"label":"D","text":"双击数据系列，在格式面板中勾选“数据标签”"}],"answer":"C","analysis":"在Excel中，要添加数据标签到图表上，可以通过多种方式。最常见的方式是点击图表右侧的‘+’图标，并勾选‘数据标签’。"},{"id":96664,"order":341,"type":"single_choice","question":"数据审核的重要意义体现在（）。","options":[{"label":"A","text":"确定数据的分布和关系"},{"label":"B","text":"提取重要特征和降低数据维度"},{"label":"C","text":"去除异常数据和缺失数据"},{"label":"D","text":"确保数据的准确性和完整性"}],"answer":"D","analysis":"数据检查的目的是确保数据的准确性和完整性和一致性，通过检查数据的格式、范围等来发现数据中的错误或问题"},{"id":96593,"order":342,"type":"single_choice","question":"求同求异并用法的核心逻辑步骤包括（）。","options":[{"label":"A","text":"仅通过反面场合共性排除干扰变量"},{"label":"B","text":"直接对比正反场合的唯一差异因素"},{"label":"C","text":"两次求同（正反场合）与一次求异（对比结果）"},{"label":"D","text":"先求异后求同，再结合共变分析"}],"answer":"C","analysis":"求同求异并用法的主要特点是两次求同，一次求异"},{"id":96378,"order":343,"type":"single_choice","question":"在HTTP状态码体系里，哪个状态码表示请求已被服务器成功处理并返回了响应（）。","options":[{"label":"A","text":"500"},{"label":"B","text":"400"},{"label":"C","text":"301"},{"label":"D","text":"200"}],"answer":"D","analysis":"状态码200表示请求成功处理并返回响应。"},{"id":96270,"order":344,"type":"single_choice","question":"在 Word 里，插入脚注和题注所具有的共同作用是（）。","options":[{"label":"A","text":"在文中加入更详细的解释和说明。"},{"label":"B","text":"索引文中的内容，方便读者查找。"},{"label":"C","text":"在文中引用其他文章和资料的信息。"},{"label":"D","text":"记录下文中的图片和表格的来源和版权信息。"}],"answer":"A","analysis":"脚注与题注均用于在文中添加详细解释说明，辅助阅读。"},{"id":96272,"order":345,"type":"single_choice","question":"在 Word 里，下列哪种方式不能进入页眉的编辑页面（）。","options":[{"label":"A","text":"双击页面顶部"},{"label":"B","text":"在“布局”选项卡中选择“页眉”命令"},{"label":"C","text":"在“插入”选项卡中选择“页眉”命令"},{"label":"D","text":"已有页眉的情况下，右键单击页面顶部，选择“编辑页眉”命令"}],"answer":"B","analysis":"“布局”选项卡中没有相应的页眉命令"},{"id":96631,"order":346,"type":"single_choice","question":"下面哪一项属于图像数据的归类方法？（）","options":[{"label":"A","text":"K-Means聚类"},{"label":"B","text":"神经网络"},{"label":"C","text":"决策树"},{"label":"D","text":"以上选项均正确"}],"answer":"D","analysis":"K-Means聚类是常用的图像数据归类方法，通过将数据分成预定数量的K个类别，将相似的数据分到同一个类别中。神经网络（如CNN）和决策树属于有监督分类方法，可基于标签数据训练模型完成图像分类。三者均属于图像数据归类方法"},{"id":96709,"order":347,"type":"single_choice","question":"在开展情感分析的文本标注工作时，错误的做法是（）。","options":[{"label":"A","text":"尽量使用自动化标注，以提高标注效率和减轻人为误差。"},{"label":"B","text":"进行准确性评估和一致性评估，确保标注数据的质量。"},{"label":"C","text":"制定详细的标注指南，确保标注者对情感类别的理解一致"},{"label":"D","text":"明确要标注的情感类别及其定义，以避免片面和武断的标注结果。"}],"answer":"A","analysis":"在进行情感分析的过程中，应明确要标注的情感类别及其定义，以避免片面和武断的标注结果"},{"id":96447,"order":348,"type":"single_choice","question":"在数据离散化的操作过程中，经常使用的离散化手段有哪些？（）","options":[{"label":"A","text":"以上都对"},{"label":"B","text":"聚类"},{"label":"C","text":"等频法"},{"label":"D","text":"等宽法"}],"answer":"A","analysis":"常用的离散化方法有等宽法、等频法和（一维）聚类"},{"id":96458,"order":349,"type":"single_choice","question":"数据集成中的数据匹配具体所指的是什么？（）","options":[{"label":"A","text":"将数据清洗和预处理"},{"label":"B","text":"将数据转换为可视化形式"},{"label":"C","text":"将数据按照一定规则进行分类和组织"},{"label":"D","text":"将两个或多个数据集中的相似数据进行匹配和合并"}],"answer":"D","analysis":"数据匹配指匹配合并多个数据集的相似数据。"},{"id":96271,"order":350,"type":"single_choice","question":"在 Word 中，能够通过什么方式插入页脚（）。","options":[{"label":"A","text":"在“布局”选项卡中选择“页脚”命令"},{"label":"B","text":"在“插入”选项卡中选择“页脚”命令"},{"label":"C","text":"右键单击页面顶部，选择“页码”命令"},{"label":"D","text":"右键单击页面底部，选择“页码”命令"}],"answer":"B","analysis":"在Word中插入页脚，需要先在“插入”选项卡中找到“页脚”命令，选择后再选择“底部页边距”或“页底端”位置，即可插入页脚"},{"id":96581,"order":351,"type":"single_choice","question":"在 Python 中，能够指定层次聚类所使用的距离度量方式的是（）。","options":[{"label":"A","text":"调用cophenet函数时指定metric参数"},{"label":"B","text":"调用fcluster函数时指定metric参数"},{"label":"C","text":"调用linkage函数时指定metric参数"},{"label":"D","text":"调用dendrogram函数时指定metric参数"}],"answer":"C","analysis":"在Python中，可以通过在调用linkage函数时指定metric参数来指定层次聚类的距离度量"},{"id":96677,"order":352,"type":"single_choice","question":"数据标注质量检测的重要意义体现在（）。","options":[{"label":"A","text":"无特定重要性"},{"label":"B","text":"提高标注速度和效率"},{"label":"C","text":"减少标注成本"},{"label":"D","text":"提高机器学习算法的准确性和可靠性"}],"answer":"D","analysis":"数据标注质在于提高机器学习算法的准确性和可靠性，从而提高模型的精确度和可靠性"},{"id":96763,"order":353,"type":"single_choice","question":"数据质量评估流程的首要步骤是什么？（）","options":[{"label":"A","text":"数据可视化"},{"label":"B","text":"数据清洗"},{"label":"C","text":"开展评估活动"},{"label":"D","text":"需求分析"}],"answer":"D","analysis":"数据质量评估流程的第一步是需求分析"},{"id":96842,"order":354,"type":"single_choice","question":"下列哪一项属于智能系统在零售领域的应用方式？","options":[{"label":"A","text":"智能农业监控"},{"label":"B","text":"智能物流配送"},{"label":"C","text":"智能医疗检测"},{"label":"D","text":"个性化推荐"}],"answer":"D","analysis":"个性化推荐是智能系统在零售领域的应用方式。"},{"id":96273,"order":355,"type":"single_choice","question":"在 Word 里，能让页码从特定页面开始计数的操作是（）。","options":[{"label":"A","text":"在“视图”选项卡中选择“导航窗格”，在“页码”中输入起始页码"},{"label":"B","text":"在“布局”选项卡中选择“页面设置”，在“起始页码”中输入起始页码"},{"label":"C","text":"在“插入”选项卡中依次选择“页码”→“设置页码格式”，在“页码格式”窗口中输入起始页码"},{"label":"D","text":"在“文件”选项卡中选择“打印设置”，然后启用“页码起始页”选项"}],"answer":"C","analysis":"在Word中设置页码从指定页开始，需要在“插入”选项卡中依次选择“页码”→“设置页码格式”，在“页码格式”窗口，输入起始页码即可"},{"id":96547,"order":356,"type":"single_choice","question":"K-Means 聚类属于哪一种类型的聚类方法（）。","options":[{"label":"A","text":"强化学习算法"},{"label":"B","text":"半监督学习算法"},{"label":"C","text":"无监督学习算法"},{"label":"D","text":"监督学习算法"}],"answer":"C","analysis":"K-Means聚类是一种无监督学习算法，它不需要目标变量或预测结果，而是通过将样本数据分组来识别数据中的模式"},{"id":96313,"order":357,"type":"single_choice","question":"依据《中华人民共和国劳动合同法》，劳动合同期限介于三个月到一年之间（不含一年）的，试用期不得超过（）。","options":[{"label":"A","text":"1周"},{"label":"B","text":"3个月"},{"label":"C","text":"2个月"},{"label":"D","text":"1个月"}],"answer":"D","analysis":"《中华人民共和国劳动合同法》第十九条规定，劳动合同期限三个月以上不满一年的，试用期不得超过一个月；劳动合同期限一年以上不满三年的，试用期不得超过二个月；三年以上固定期限和无固定期限的劳动合同，试用期不得超过六个月"},{"id":96597,"order":358,"type":"single_choice","question":"共变法适用于什么场景（）？","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"分析广告费用与销售额的因果关联（需排除市场竞争等干扰）"},{"label":"C","text":"评估药物剂量与患者症状缓解程度的定量关系"},{"label":"D","text":"推断教育政策对某地区生育率的影响（需控制经济、文化等变量）"}],"answer":"A","analysis":"共变法通过观察自变量与因变量的定量共变关系推测因果关系，其应用需满足以下条件：1.变量可控性；2.方向一致性；3.逻辑合理性"},{"id":96569,"order":359,"type":"single_choice","question":"在 DIANA 层次聚类中，类簇之间距离的计算是（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"计算两个类簇中所有数据点之间的距离的平均值"},{"label":"C","text":"计算两个类簇中所有数据点之间的距离的最小值"},{"label":"D","text":"计算两个类簇中所有数据点之间的距离的最大值"}],"answer":"A","analysis":"在DIANA层次聚类中，计算类簇之间的距离通常使用以下两种方式之一，最小距离法（Single Linkage）、最大距离法（Complete Linkage）、除了最小距离法和最大距离法，还有其他一些计算类簇之间距离的方法，比如平均距离法（Average Linkage）、中心距离法（Centroid Linkage）等"},{"id":96220,"order":360,"type":"single_choice","question":"计算机主存储器在技术类型上，主要是（）。","options":[{"label":"A","text":"BIOS和CMOS"},{"label":"B","text":"缓存和寄存器"},{"label":"C","text":"硬盘和U盘"},{"label":"D","text":"RAM和ROM"}],"answer":"D","analysis":"主存储器（内存）的主要技术类型是RAM（随机存取存储器）和ROM（只读存储器）"},{"id":96844,"order":361,"type":"single_choice","question":"目前，智能系统在医疗领域应用的主要案例有（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"智能诊断辅助"},{"label":"C","text":"医疗数据管理"},{"label":"D","text":"远程医疗"}],"answer":"A","analysis":"目前智能系统在医疗领域运用的主要案例有远程医疗、医疗数据管理、智能诊断辅助、智能健康监测等"},{"id":96331,"order":362,"type":"single_choice","question":"以下哪种行为构成了对著作权的侵犯（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"编造或者篡改他人作品"},{"label":"C","text":"未经权利人许可，以非营利为目的复制、发行作品"},{"label":"D","text":"未经权利人许可，以营利为目的复制、发行作品"}],"answer":"A","analysis":"根据《中华人民共和国著作权法》第五十二、五十三条规定，侵犯著作权的行为主要包括未经权利人许可的复制、发行、展示、表演、放映、广播、信息网络传播等行为，以及编造或篡改他人作品等"},{"id":96494,"order":363,"type":"single_choice","question":"在动态网页数据爬取中，元素选取方法 find_element () 里，参数 by 的取值可以是（）。","options":[{"label":"A","text":"By.ID"},{"label":"B","text":"By.NAMES"},{"label":"C","text":"By.TEXT"},{"label":"D","text":"By.CLASS"}],"answer":"A","analysis":"find_element()方法的参数by的取值有：By.ID、By.XPATH、By.CSS_SELECTOR等八种。B和C选项书写错误。"},{"id":96249,"order":364,"type":"single_choice","question":"哪一种设备既能充当输入设备，又能充当输出设备（）","options":[{"label":"A","text":"扬声器"},{"label":"B","text":"数码相机"},{"label":"C","text":"鼠标"},{"label":"D","text":"打印机"}],"answer":"B","analysis":"数码相机可以拍摄照片或视频输入到计算机里，也可以通过计算机输出照片或视频到其他设备上进行显示"},{"id":96860,"order":365,"type":"single_choice","question":"智能系统在物流领域的应用，可以通过哪些技术来实现？（）","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"射频识别技术"},{"label":"C","text":"传感器技术"},{"label":"D","text":"人工智能"}],"answer":"A","analysis":"智能系统在物流的应用可以通过人工智能、传感器技术、射频识别等技术实现"},{"id":96479,"order":366,"type":"single_choice","question":"什么是 Cookie 机制（）。","options":[{"label":"A","text":"一种密码存储方法"},{"label":"B","text":"一种用于保持用户状态的机制"},{"label":"C","text":"一种文件传输协议"},{"label":"D","text":"一种网页设计技术"}],"answer":"B","analysis":"Cookie机制是一种用于保持用户状态的机制，它可以将一些用户信息存储在用户的计算机上，在用户下次访问同一网站时，可以读取该信息并使用它来提供更好的用户体验"},{"id":96274,"order":367,"type":"single_choice","question":"在 Word 中，下列哪项操作能够清除页眉或页脚里的内容（）。","options":[{"label":"A","text":"在\"视图\"选项卡中选择\"普通视图\"，即可删除"},{"label":"B","text":"在\"页码格式\"设置中选择\"不使用页眉页脚\"，即可删除"},{"label":"C","text":"在\"布局\"选项卡中选择\"删除页眉页脚\"命令"},{"label":"D","text":"选择页面顶部（页眉）或底部（页脚），按Backspace或Delete键删除"}],"answer":"D","analysis":"选中页眉/页脚后按Backspace或Delete键可删除内容。"},{"id":96198,"order":368,"type":"single_choice","question":"在教学工作中，下列哪项举动违背了诚实公正的基本准则（）。","options":[{"label":"A","text":"积极回复学生关于课程疑问的邮件"},{"label":"B","text":"向学生推荐自己编写的教材，但未强制购买且教材内容与课程相关"},{"label":"C","text":"因某学生家长与自己是朋友，在考试中故意提高该学生的成绩"},{"label":"D","text":"按照评分标准批改学生作业，不因个人喜好随意增减分数"}],"answer":"C","analysis":"因私人关系篡改成绩违反诚实公正，损害公平。"},{"id":96210,"order":369,"type":"single_choice","question":"恪尽职守中 \"尊重他人\" 这一要求的具体内容是（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"不歧视、辱骂他人"},{"label":"C","text":"和他人礼貌地交往"},{"label":"D","text":"尊重他人的权益"}],"answer":"A","analysis":"尊重他人包括尊重权益、礼貌交往、不歧视辱骂。"},{"id":96359,"order":370,"type":"single_choice","question":"检测数据一致性的常用方法是（）。","options":[{"label":"A","text":"随机抽样"},{"label":"B","text":"反向检测"},{"label":"C","text":"前向检测"},{"label":"D","text":"对比数据之间的差异"}],"answer":"D","analysis":"通过对比数据间差异检测一致性。"},{"id":96286,"order":371,"type":"single_choice","question":"对于 Excel 里的 COUNTA 函数，它的作用是（）？","options":[{"label":"A","text":"统计空单元格数量"},{"label":"B","text":"统计包含任意值的单元格数量"},{"label":"C","text":"统计不包含数字的单元格数量"},{"label":"D","text":"统计包含数字的单元格数量" 道德的要求（）？","options":[{"label":"A","text":"滥用职权谋取私利"},{"label":"B","text":"欺诈客户获取高额佣金"},{"label":"C","text":"泄露他人的机密信息"},{"label":"D","text":"认真履行职责"}],"answer":"D","analysis":"认真履行职责是职业道德的一项基本要求，具体要求从业人员需要有敬业精神，认真履行职责，为社会作出积极贡献。"},{"id":96216,"order":399,"type":"single_choice","question":"下列哪一项属于追求卓越所产生的积极作用（）。","options":[{"label":"A","text":"个人利益最大化"},{"label":"B","text":"损害自身利益"},{"label":"C","text":"满足融资条件"},{"label":"D","text":"提供高质量的服务"}],"answer":"D","analysis":"通过遵守\"追求卓越\"的基本要求，从业人员可以不断提升自己的工作水平和专业素养，为组织提供高质量的服务。"},{"id":96651,"order":400,"type":"single_choice","question":"数据审核的定义是（）。","options":[{"label":"A","text":"对数据进行存储优化和清理"},{"label":"B","text":"对数据进行完整性和准确性检查"},{"label":"C","text":"对数据进行权限管理和访问控制"},{"label":"D","text":"对数据进行定期备份和恢复"}],"answer":"B","analysis":"数据审核是对数据的完整性、准确性、一致性、和合法性检查"},{"id":96674,"order":401,"type":"single_choice","question":"运用数据审核的方法，无法对数据的（）进行查验。","options":[{"label":"A","text":"一致性"},{"label":"B","text":"准确性"},{"label":"C","text":"完整性"},{"label":"D","text":"保密性"}],"answer":"D","analysis":"数据审核无法查验数据保密性。"},{"id":96662,"order":402,"type":"single_choice","question":"数据审核所运用的主要手段有（）。","options":[{"label":"A","text":"数据加密和解密"},{"label":"B","text":"逻辑检查和计算检查"},{"label":"C","text":"数据备份和恢复"},{"label":"D","text":"数据采集和数据预处理"}],"answer":"B","analysis":"数据审核主要手段包括逻辑检查和计算检查。"},{"id":96278,"order":403,"type":"single_choice","question":"下列哪项操作能够调整表格中单元格的大小（）。","options":[{"label":"A","text":"点击\"工具\"，选择\"单元格大小\"。"},{"label":"B","text":"点击\"样式\"，选择\"单元格大小\"。"},{"label":"C","text":"双击单元格，直接输入新的尺寸。"},{"label":"D","text":"选择单元格，然后拖动其边缘。"}],"answer":"D","analysis":"选中单元格后拖动边缘可调整其大小。"},{"id":96344,"order":404,"type":"single_choice","question":"制定数据质量标准评价标准，它的主要目的是（）。","options":[{"label":"A","text":"评估数据质量和可信度"},{"label":"B","text":"提高数据的存储效率"},{"label":"C","text":"加强数据的传输安全性"},{"label":"D","text":"降低数据处理的成本"}],"answer":"A","analysis":"数据质量标准评价标准的主要目的是评估数据的质量和可信度，以确定数据是否满足预期的要求和标准"},{"id":96850,"order":405,"type":"single_choice","question":"（）
