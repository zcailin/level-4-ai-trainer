特征内部分布情况进行分析，离散程度是一个重要的指标。方差是数据分布离散程度的指标之一，可以反映数据的波动情况。"},{"id":96253,"order":412,"type":"single_choice","question":"以下哪一种文件系统不适合在 Windows 操作系统中使用（）。","options":[{"label":"A","text":"exFAT"},{"label":"B","text":"FAT32"},{"label":"C","text":"HFS+"},{"label":"D","text":"NTFS"}],"answer":"C","analysis":"HFS+是苹果公司开发的一种文件系统，只能用于苹果电脑或iOS设备中"},{"id":96789,"order":413,"type":"single_choice","question":"对于存在违反法律法规、规章制度等重大问题的企业，审核报告中对这些问题应（）加以表述。","options":[{"label":"A","text":"只能报告内部，不可公开"},{"label":"B","text":"详细描述违规事项"},{"label":"C","text":"简单说明问题"},{"label":"D","text":"不予报告"}],"answer":"B","analysis":"审核报告需以客观的态度、中肯的语言和充分的证据表述审核结果，对涉及违反法律法规、规章制度等重大问题的企业，应当详细描述违规事项，并提出相应的批评和建议。"},{"id":96716,"order":414,"type":"single_choice","question":"当进行 3D 云标注时，下列哪一种操作能够让标注效率得到优化？（）","options":[{"label":"A","text":"将标注点分别命名"},{"label":"B","text":"将模型缩小至最小尺寸"},{"label":"C","text":"将标注点的颜色设置为红色"},{"label":"D","text":"制定标注规则"}],"answer":"D","analysis":"制定标注规则能够使标注结果一致性高，从而优化标注的效率"},{"id":96696,"order":415,"type":"single_choice","question":"在下面这些应用场景中，语音数据标注扮演重要角色的是（）。","options":[{"label":"A","text":"图像识别"},{"label":"B","text":"文本分类"},{"label":"C","text":"目标检测"},{"label":"D","text":"声纹识别"}],"answer":"D","analysis":"声纹识别，也叫作说话人识别，是通过声音特征来判断说话人身份的技术，属于生物识别技术的一种，在此场景中，语音数据标注起到重要作用"},{"id":96218,"order":416,"type":"single_choice","question":"追求卓越的基本要求里，“追求专业素养” 的意思是什么（）。","options":[{"label":"A","text":"追求浮夸和虚荣"},{"label":"B","text":"偏离现实，追求理想化的目标"},{"label":"C","text":"追求专业素养的不断提升"},{"label":"D","text":"追逐权力和地位"}],"answer":"C","analysis":"根据\"追求卓越\"基本要求，追求专业素养的含义是指从业人员应该追求专业素养的不断提升。积极参与相关领域的学习和培训，关注行业动态和最新发展，以保持自己的竞争优势和专业能力。"},{"id":96600,"order":417,"type":"single_choice","question":"剩余法适合用来处理下列（）情况。","options":[{"label":"A","text":"验证变量间的弱相关关系"},{"label":"B","text":"验证变量间的强相关关系"},{"label":"C","text":"分析自变量与因变量之间的线性关系"},{"label":"D","text":"已知复合现象的部分原因，需推断剩余现象的原因"}],"answer":"D","analysis":"剩余法的核心逻辑是排除已知原因后推断剩余现象的因果关系​（穆勒五法中的剩余法）"},{"id":96828,"order":418,"type":"single_choice","question":"文档书写规范中不包含下列哪项内容？（）","options":[{"label":"A","text":"文档存储地点"},{"label":"B","text":"符号的使用"},{"label":"C","text":"程序中注释行的使用"},{"label":"D","text":"图标的含义"}],"answer":"A","analysis":"管理信息系统的文档资料涉及文本、图形和表格等多种类型，无论是哪种类型的文档都应该遵循统一的书写规范，包括符号的使用、图标的含义、程序中注释行的使用、注明文档书写人及书写日期等"},{"id":96919,"order":419,"type":"single_choice","question":"岭回归属于一种（）方法。","options":[{"label":"A","text":"逻辑回归"},{"label":"B","text":"非线性回归"},{"label":"C","text":"线性回归"},{"label":"D","text":"最小二乘回归"}],"answer":"C","analysis":"岭回归属于线性回归，用于存在多重共线性(自变量高度相关)的数据"},{"id":96646,"order":420,"type":"single_choice","question":"以下属于梅尔倒谱系数存在的局限性的是（）。","options":[{"label":"A","text":"图像增强"},{"label":"B","text":"特征提取"},{"label":"C","text":"数据清洗"},{"label":"D","text":"丢失细节信息"}],"answer":"D","analysis":"梅尔倒谱系数也有一些局限性，例如可能会丢失某些细节信息，这可能会影响到模型的性能，因此在具体应用中需要综合考虑。"},{"id":96324,"order":421,"type":"single_choice","question":"按照《中华人民共和国民法典》，在民事主体里，哪一项属于特别法人（）。","options":[{"label":"A","text":"农村集体经济组织法人"},{"label":"B","text":"民办非企业单位"},{"label":"C","text":"个人独资企业"},{"label":"D","text":"普通合伙企业"}],"answer":"A","analysis":"根据《民法典》第九十六条，特别法人包括农村集体经济组织法人、城镇农村的合作经济组织法人、基层群众性自治组织法人等"},{"id":96946,"order":422,"type":"single_choice","question":"在智能系统优化建议的算法优化工作中，对泛化能力造成影响的主要问题是（）。","options":[{"label":"A","text":"节省计算资源"},{"label":"B","text":"解决数据偏移问题"},{"label":"C","text":"平衡模型的误差和方差"},{"label":"D","text":"减少过拟合和欠拟合"}],"answer":"D","analysis":"在智能系统的优化建议中，影响泛化能力的主要问题是如何减少过拟合和欠拟合。过拟合和欠拟合是机器学习中的两个常见问题，会对模型的准确性和效率产生很大影响。"},{"id":96848,"order":423,"type":"single_choice","question":"下列哪项属于智慧交通所发挥的作用？（）","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"优化交通资源管理"},{"label":"C","text":"提升交通安全"},{"label":"D","text":"提高交通效率"}],"answer":"A","analysis":"智慧交通的作用有提高交通效率、提升交通安全、优化交通资源管理、提升环境可持续性等等"},{"id":96289,"order":424,"type":"single_choice","question":"想在 Excel 中计算样本数据的标准差，可使用（）函数。","options":[{"label":"A","text":"STDEV"},{"label":"B","text":"COUNT"},{"label":"C","text":"SUM"},{"label":"D","text":"AVERAGE"}],"answer":"A","analysis":"STDEV函数用于计算一组数据的标准差，衡量数据的波动性或离散程度。"},{"id":96620,"order":425,"type":"single_choice","question":"在朴素贝叶斯算法里，针对文本分类模型，（）概率能够借助文本数据的出现频率来计算。","options":[{"label":"A","text":"同时概率"},{"label":"B","text":"条件概率"},{"label":"C","text":"后验概率"},{"label":"D","text":"先验概率"}],"answer":"B","analysis":"朴素贝叶斯算法中，采用条件概率来计算文本数据的分类概率，即计算文本数据在不同类别下出现的概率，并与各类别下该文本数据的先验概率相乘，得到该文本数据属于不同类别的后验概率，以此来进行分类"},{"id":96902,"order":426,"type":"single_choice","question":"机器学习按训练方式分为有监督学习、无监督学习和半监督学习，下列哪项与回归算法属于不同类别的学习算法？（）","options":[{"label":"A","text":"K-Means聚类"},{"label":"B","text":"决策树"},{"label":"C","text":"支持向量机"},{"label":"D","text":"朴素贝叶斯"}],"answer":"A","analysis":"K-Means聚类与回归算法属于不同学习类别（无监督vs有监督）。"},{"id":96475,"order":427,"type":"single_choice","question":"下列哪项属于反爬虫技术所采用的方式（）。","options":[{"label":"A","text":"垃圾邮件过滤"},{"label":"B","text":"SSL加密"},{"label":"C","text":"跨域请求"},{"label":"D","text":"IP限制"}],"answer":"D","analysis":"IP限制是一种常见的反爬虫技术"},{"id":96741,"order":428,"type":"single_choice","question":"全样检验存在什么缺点？（）","options":[{"label":"A","text":"成本高昂"},{"label":"B","text":"无法进行统计分析"},{"label":"C","text":"抽样时可能存在误差"},{"label":"D","text":"可能出现样品污染"}],"answer":"A","analysis":"全样检验的缺点是成本高昂，需要耗费大量的人力精力集中进行，对于人员不足或时间不够的情况，较难实行"},{"id":96229,"order":429,"type":"single_choice","question":"计算机表示数据所采用的方式是（）。","options":[{"label":"A","text":"十六进制"},{"label":"B","text":"八进制"},{"label":"C","text":"十进制"},{"label":"D","text":"二进制"}],"answer":"D","analysis":"计算机采用二进制的方式表示数据"},{"id":96821,"order":430,"type":"single_choice","question":"下列哪项不属于 ETL？（）","options":[{"label":"A","text":"数据装载"},{"label":"B","text":"数据转换"},{"label":"C","text":"数据抽取"},{"label":"D","text":"数据合并"}],"answer":"D","analysis":"ETL主要包括数据抽取、数据转换、数据装载3部分内容，具体如下"},{"id":96238,"order":431,"type":"single_choice","question":"微型计算机的特点中，不包含下列哪一项（）。","options":[{"label":"A","text":"适合进行日常办公等简单应用"},{"label":"B","text":"处理速度快，计算能力强"},{"label":"C","text":"使用广泛，成本低廉"},{"label":"D","text":"体积小，便于携带"}],"answer":"B","analysis":"微型计算机体积小、便携、成本低，但处理能力相对较弱。"},{"id":96565,"order":432,"type":"single_choice","question":"下列哪一项属于 DIANA 层次聚类法的优点之一（）。","options":[{"label":"A","text":"簇的个数不需要预先指定"},{"label":"B","text":"对初始聚类的选择敏感"},{"label":"C","text":"易于处理噪声和异常值"},{"label":"D","text":"计算复杂度较低，适用于数据量较大的情况"}],"answer":"A","analysis":"DIANA层次聚类法的优点包括：（1）易于解释和理解；（2）簇的个数不需要预先指定；（3）容易可视化；（4）不需要选择初始聚类中心点"},{"id":96698,"order":433,"type":"single_choice","question":"在下列应用场景里，语音数据标注能够助力模型性能提升的是（）。","options":[{"label":"A","text":"语音情感识别"},{"label":"B","text":"图像分类"},{"label":"C","text":"文本摘要"},{"label":"D","text":"机器翻译"}],"answer":"A","analysis":"语音数据标注在语音情感识别中提升模型性能。"},{"id":96553,"order":434,"type":"single_choice","question":"在 K-Means 聚类算法中，哪一项会对聚类结果产生直接影响。（）","options":[{"label":"A","text":"聚类算法的迭代次数"},{"label":"B","text":"样本的特征数量"},{"label":"C","text":"中心点的数量K"},{"label":"D","text":"样本数量"}],"answer":"C","analysis":"K-Means聚类算法的聚类结果受到许多因素的影响，其中最主要的因素是中心点的数量K"},{"id":96367,"order":435,"type":"single_choice","question":"在开展数据采集工作时，以下哪种情况不符合合法性要求（）。","options":[{"label":"A","text":"通过问卷调查的方式获取用户个人信息"},{"label":"B","text":"盗取他人的数据并用于商业用途"},{"label":"C","text":"从用户明确授权的渠道采集数据"},{"label":"D","text":"通过网络爬虫程序获取公开信息"}],"answer":"B","analysis":"盗取他人数据涉嫌侵犯他人隐私和知识产权，属于不合法的数据采集行为"},{"id":96247,"order":436,"type":"single_choice","question":"下面哪一项不属于计算机的输入设备（）","options":[{"label":"A","text":"电子邮件"},{"label":"B","text":"鼠标"},{"label":"C","text":"键盘"},{"label":"D","text":"摄像头"}],"answer":"A","analysis":"摄像头可以拍摄照片或视频，并输入到计算机；显示器可以显示计算机输出的信息；鼠标用来移动光标或选择操作，也是一种常见的输入设备"},{"id":96299,"order":437,"type":"single_choice","question":"在 PowerPoint 里，怎样给一个文字框添加动画效果？（）","options":[{"label":"A","text":"选中文字框，点击“动画”选项卡中的“添加动画”，选择一个动画效果"},{"label":"B","text":"右键文字框，选择“动画效果”，选择一个动画效果"},{"label":"C","text":"点击文字框，按下“Ctrl+Shift+A”，选择一个动画效果"},{"label":"D","text":"无法给文字框添加动画效果"}],"answer":"A","analysis":"在 PowerPoint 中，我们可以通过“动画”选项卡中的“添加动画”来给文字框、形状、图片等添加动画效果"},{"id":96524,"order":438,"type":"single_choice","question":"在 OPTICS 密度聚类中，核心距离的定义是（）。","options":[{"label":"A","text":"每个点与全局平均点之间的距离"},{"label":"B","text":"每个点成为核心对象所需的最小邻域半径"},{"label":"C","text":"每个点与最近簇中心点之间的距离"},{"label":"D","text":"每个点与某一簇中心点之间的距离"}],"answer":"B","analysis":"核心距离是点 p 的最小半径 ϵ′，在此半径内 p 的邻域包含至少 MinPts 个点"},{"id":96226,"order":439,"type":"single_choice","question":"集成电路计算机的问世带来了哪些（）变革。","options":[{"label":"A","text":"计算机体积更大，功耗更低，性能更强"},{"label":"B","text":"计算机体积更小，功耗更高，性能更弱"},{"label":"C","text":"计算机体积更大，功耗更高，性能更弱"},{"label":"D","text":"计算机体积更小，功耗更低，性能更强"}],"answer":"D","analysis":"集成电路使计算机体积更小、功耗更低、性能更强。"},{"id":96892,"order":440,"type":"single_choice","question":"Apriori 算法是关联规则分析中常用的方法，它的核心思想是什么？（）","options":[{"label":"A","text":"基于K均值算法聚类数据集"},{"label":"B","text":"基于梯度下降法迭代求解关联规则"},{"label":"C","text":"基于分治策略求解频繁项集"},{"label":"D","text":"基于滑动窗口统计支持阈值"}],"answer":"C","analysis":"Apriori算法是目前最为经典和常用的关联规则分析算法之一，其核心思想是通过连接产生候选项及其支持度，然后通过剪枝生成频繁项集，即基于分治策略求解频繁项集"},{"id":96708,"order":441,"type":"single_choice","question":"进行命名实体识别的文本标注时，应注意的是（）。","options":[{"label":"A","text":"尽量使用模式匹配和规则匹配等技术进行自动化标注，减少人为干预。"},{"label":"B","text":"只需标注实体的表面形式，无需关注其类型和属性。"},{"label":"C","text":"应将所有文本内容都标注为实体，以确保全面性。"},{"label":"D","text":"需要尽可能减少漏标现象，并保证标注结果的一致性和准确性。"}],"answer":"D","analysis":"命名实体识别的目的是识别文本中的实体，如人名、地名、机构名等，并将其标注出来"},{"id":96195,"order":442,"type":"single_choice","question":"身为教师，下列哪种做法符合诚实与公正的准则（）。","options":[{"label":"A","text":"偏袒某些学生，以获取个人利益。"},{"label":"B","text":"诚实守信，凭自己的专业能力进行教学。"},{"label":"C","text":"在学生面前不承认自己的错误，以保持形象。"},{"label":"D","text":"擅自更改课程内容，以提高学生满意度。"}],"answer":"B","analysis":"诚实与公正的准则是指在工作中展现正直与公正的行为，不偏袒、不歧视、不作弊、不利用职权谋取私利"},{"id":96679,"order":443,"type":"single_choice","question":"在对图像标注质量进行评价的标准里，不包含的指标是（）。","options":[{"label":"A","text":"可读性"},{"label":"B","text":"一致性"},{"label":"C","text":"完整性"},{"label":"D","text":"准确性"}],"answer":"A","analysis":"图像标注质量评价标准通常关注标注的准确性、完整性、一致性等方面"},{"id":96413,"order":444,"type":"single_choice","question":"在采集数据的过程中，导致缺失值出现的原因有哪些？（）","options":[{"label":"A","text":"有些信息暂时无法获取"},{"label":"B","text":"有些信息是被遗漏的"},{"label":"C","text":"字段不存在"},{"label":"D","text":"以上都对"}],"answer":"D","analysis":"数据的缺失主要包括记录的缺失和记录中某个字段信息的缺失。缺失值产生的原因主要有：有些信息暂时无法获取，或者获取信息的代价太大；有些信息是被遗漏的；字段不存在。"},{"id":96916,"order":445,"type":"single_choice","question":"下列哪项不能用于评估线性回归模型的预测准确度？（）","options":[{"label":"A","text":"平均绝对误差"},{"label":"B","text":"可解释方差"},{"label":"C","text":"Calinski-Harabasz指数"},{"label":"D","text":"R²"}],"answer":"C","analysis":"在线性回归模型中，平均绝对误差、均方误差和中值绝对误差越接近0，说明模型预测效果越好，而可解释方差、R方值越接近1，则模型预测效果越好"},{"id":96681,"order":446,"type":"single_choice","question":"在图像标注的质量评价标准中，所谓的完整性指的是（）。","options":[{"label":"A","text":"标注文本是否易于理解"},{"label":"B","text":"标注文本是否和图像语义一致"},{"label":"C","text":"标注文本是否描述图像的每一个细节"},{"label":"D","text":"标注文本是否涵盖图像的全部内容"}],"answer":"D","analysis":"标注应全面覆盖图像中的所有相关信息，不遗漏任何重要的细节"},{"id":96429,"order":447,"type":"single_choice","question":"在各类噪声处理方法当中，（）滤波器属于非线性滤波器的范畴。","options":[{"label":"A","text":"锐化滤波器"},{"label":"B","text":"中值滤波器"},{"label":"C","text":"均值滤波器"},{"label":"D","text":"高斯滤波器"}],"answer":"B","analysis":"中值滤波器是一种非线性滤波器，它能够有效地减小图像中的椒盐噪声"},{"id":96633,"order":448,"type":"single_choice","question":"在对图像数据进行归类时，卷积神经网络所起到的作用是什么？（）","options":[{"label":"A","text":"提取图像的特征"},{"label":"B","text":"聚类和分类"},{"label":"C","text":"提高准确率"},{"label":"D","text":"降低过拟合"}],"answer":"A","analysis":"卷积神经网络是一种能够有效提取图像特征的网络结构，对于图像数据的分类、识别、分割等有重要作用。"},{"id":96861,"order":449,"type":"single_choice","question":"智能系统在物流领域有哪些具体的应用方式？（）","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"仓储管理与自动化"},{"label":"C","text":"智能调度与路径规划"},{"label":"D","text":"物流数据分析与预测"}],"answer":"A","analysis":"在物流领域中，智能系统的运用方式包括物流数据分析与预测、智能调度与路径规划、仓储管理与自动化、客户服务与体验优化等"},{"id":96542,"order":450,"type":"single_choice","question":"下列哪一种密度聚类算法能够处理高维数据集（）。","options":[{"label":"A","text":"HDBSCAN"},{"label":"B","text":"OPTICS"},{"label":"C","text":"Mean Shift"},{"label":"D","text":"DBSCAN"}],"answer":"A","analysis":"HDBSCAN能处理高维数据，通过层次聚类构建多分辨率聚类树。"},{"id":96316,"order":451,"type":"single_choice","question":"国家层面中，（）负责统筹协调网络安全工作及相关监督管理工作。","options":[{"label":"A","text":"网络部门"},{"label":"B","text":"网信部门"},{"label":"C","text":"信息部门"},{"label":"D","text":"工信部门"}],"answer":"B","analysis":"《中华人民共和国网络安全法》第八条规定，国家网信部门负责统筹协调网络安全工作和相关监督管理工作"},{"id":96445,"order":452,"type":"single_choice","question":"在开展数据离散化工作时，需要注意哪些要点？（）","options":[{"label":"A","text":"模型的训练和评估"},{"label":"B","text":"数据的特征选择和降维处理"},{"label":"C","text":"离散化方法的随意选择"},{"label":"D","text":"数据的精度和分布情况"}],"answer":"D","analysis":"在进行数据离散化时，应该注意数据的精度和分布情况，保证离散化后的数据能够保持原有数据的特征，同时不会出现数据偏移或集中在某个区间的情况"},{"id":96517,"order":453,"type":"single_choice","question":"DBSCAN 层次聚类算法中，把核心对象周围所有的样本点归入同一个聚类簇，属于第（）步。","options":[{"label":"A","text":"四"},{"label":"B","text":"一"},{"label":"C","text":"三"},{"label":"D","text":"二"}],"answer":"C","analysis":"DBSCAN层次聚类算法的实现步骤中，第三步是将核心对象周围的所有样本点加入到同一个聚类簇中"},{"id":96377,"order":454,"type":"single_choice","question":"在HTTP的各类请求方法中，用于向服务器发送数据的方法是（）。","options":[{"label":"A","text":"DELETE"},{"label":"B","text":"HEAD"},{"label":"C","text":"POST"},{"label":"D","text":"GET"}],"answer":"C","analysis":"HTTP请求方法中，GET用于从服务器获取资源，POST用于向服务器提交数据，HEAD用于获取资源的头部信息，DELETE用于删除资源"},{"id":96196,"order":455,"type":"single_choice","question":"在日常工作里，诚实公正这一准则的基本要求包括（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"保护客户的权益"},{"label":"C","text":"遵循诚实和公正原则的指导"},{"label":"D","text":"不虚假陈述或隐瞒事实"}],"answer":"A","analysis":"在工作中，诚实与公正的核心要求是不虚假陈述或隐瞒事实、以诚实与公正为指引、保护客户的权益，因此ABC选项均符合要求"},{"id":96361,"order":456,"type":"single_choice","question":"数据一致性检测所涵盖的主要方法有（）。","options":[{"label":"A","text":"数据加密和解密"},{"label":"B","text":"数据对比和校验"},{"label":"C","text":"数据清洗和整理"},{"label":"D","text":"数据备份和存储"}],"answer":"B","analysis":"数据一致性检测方法主要包括对数据进行对比和校验，通过比对数据的不同副本或版本，判断数据是否一致"},{"id":96587,"order":457,"type":"single_choice","question":"（）是求异法的正确逻辑步骤。","options":[{"label":"A","text":"确定现象出现的正例场合和不出现的反例场合 → 比较两场合的所有条件 → 识别唯一差异因素 → 推断该差异为现象原因"},{"label":"B","text":"观察现象变化 → 测量变量间的共变关系 → 建立统计模型 → 推导因果结论"},{"label":"C","text":"比较正反场合 → 归纳所有共同条件 → 排除无关变量 → 确定唯一差异因素"},{"label":"D","text":"确定现象出现的场合 → 提出可能的原因假设 → 设计对照实验验证 → 分析数据确认因果"}],"answer":"A","analysis":"求异法的逻辑步骤按照正确的顺序是：明确现象存在（正例）与不存在（反例）的场合 - 系统比较两场合的所有条件 - 锁定唯一差异因素 - 推断差异因素为现象原因"},{"id":96904,"order":458,"type":"single_choice","question":"在数值型回归预测（非分类任务）中，用（）指标来评估模型性能。","options":[{"label":"A","text":"均方误差"},{"label":"B","text":"F1值"},{"label":"C","text":"召回率"},{"label":"D","text":"准确率"}],"answer":"A","analysis":"均方误差有非常好的几何意义，它对应了常用的欧几里得距离或简称欧氏距离"},{"id":96541,"order":459,"type":"single_choice","question":"HDBSCAN 和 DBSCAN 这两种算法的主要差异体现在（）。","options":[{"label":"A","text":"HDBSCAN不需要预先设定聚类个数，而DBSCAN需要"},{"label":"B","text":"HDBSCAN的时间复杂度高于DBSCAN"},{"label":"C","text":"HDBSCAN可以处理密度不均匀的数据集，而DBSCAN只能处理密度相对均匀的数据集"},{"label":"D","text":"HDBSCAN可以处理数据集中的噪声点，而DBSCAN不能"}],"answer":"C","analysis":"HDBSCAN通过层次聚类自动适应密度变化，擅长处理密度不均匀数据；DBSCAN依赖全局密度参数eps，适用于密度均匀场景"},{"id":96483,"order":460,"type":"single_choice","question":"会话性 Cookie 在客户端存储数据所采用的方式是（）。","options":[{"label":"A","text":"缓存存储"},{"label":"B","text":"数据库存储"},{"label":"C","text":"内存存储"},{"label":"D","text":"文件存储"}],"answer":"C","analysis":"会话性Cookie是通过在客户端浏览器上存储一小段文本数据实现的，数据存在客户端的内存中"},{"id":96808,"order":461,"type":"single_choice","question":"数据整理必须保证（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"规范"},{"label":"C","text":"准确"},{"label":"D","text":"数据格式干净"}],"answer":"A","analysis":"数据整理是确保数据格式干净、准确、规范并可用于数据分析的过程"},{"id":96940,"order":462,"type":"single_choice","question":"在算法问题分解中，递归法是将一个大问题拆分成多个可重复的子问题来解决，那么下列哪种情况不适合采用递归法？（）","options":[{"label":"A","text":"子问题规模相对较小"},{"label":"B","text":"子问题之间互不干扰"},{"label":"C","text":"子问题的规模逐渐缩小"},{"label":"D","text":"子问题的数量较多"}],"answer":"D","analysis":"递归法的优点是通用性强，能够解决各种问题。但是如果子问题的数量较多，可能导致调用栈溢出，造成程序异常终止。"},{"id":96571,"order":463,"type":"single_choice","question":"AGNES 层次聚类指的是（）。","options":[{"label":"A","text":"一种降维算法"},{"label":"B","text":"一种回归算法"},{"label":"C","text":"一种聚类算法"},{"label":"D","text":"一种分类算法"}],"answer":"C","analysis":"AGNES（AgglomerativeNesting）层次聚类是一种自下而上的聚类算法，通过把最相似的样本进行合并，逐层向上构建聚类结构"},{"id":96795,"order":464,"type":"single_choice","question":"下列哪一项不在数据筛选的流程之中？（）","options":[{"label":"A","text":"数据收集"},{"label":"B","text":"数据预处理"},{"label":"C","text":"数据存储"},{"label":"D","text":"数据报告"}],"answer":"C","analysis":"数据筛选的流程通常包括以下几个步骤：数据收集、数据预处理、数据筛选、数据分析和数据报告。"},{"id":96721,"order":465,"type":"single_choice","question":"下列哪一项不属于文本数据标注的难点？（）","options":[{"label":"A","text":"标注者的专业能力"},{"label":"B","text":"标注过程的效率和速度"},{"label":"C","text":"数据隐私性和合法性"},{"label":"D","text":"标注任务的主观性"}],"answer":"B","analysis":"标注过程的效率和速度并不是文本数据标注的主要难点，其他选项都涉及到了标注的困难之处"},{"id":96265,"order":466,"type":"single_choice","question":"在 Word 2019 中，能通过什么方式将一个段落的字体颜色设为红色（）。","options":[{"label":"A","text":"选择“段落”选项卡，选择“更多颜色”，选择红色"},{"label":"B","text":"选择“段落”选项卡，选择“字体颜色”，选择红色"},{"label":"C","text":"选择“开始”选项卡的“字体颜色”，选择红色"},{"label":"D","text":"选择“字体”选项卡，选择“红色”"}],"answer":"C","analysis":"在Word中，可以选择“开始”选项卡的“字体颜色”，选择红色来将一个段落中的字体颜色设置为红色"},{"id":96448,"order":467,"type":"single_choice","question":"现有数据集合[2,4,7,8,10]，若对其进行等频离散化并划分为3个区间，最终得到的离散化结果是什么？（）","options":[{"label":"A","text":"[2,5),[5,8),[8,10)"},{"label":"B","text":"[2,7],[7,8),[8,10]"},{"label":"C","text":"[2,4),[4,8),[8,10]"},{"label":"D","text":"[2,4),[4,7),[7,10]"}],"answer":"C","analysis":"等频分桶的原则是将数据分为k个桶，每个桶内的数据个数大致相等"},{"id":96416,"order":468,"type":"single_choice","question":"在异常值检测工作里，（）方法一般不适用于连续性数据的异常值查找。","options":[{"label":"A","text":"离群点检测算法"},{"label":"B","text":"相关度分析"},{"label":"C","text":"基于聚类的异常值检测"},{"label":"D","text":"卡方检验"}],"answer":"D","analysis":"卡方检验属于自变量和因变量都是离散型的，且只能检测两个变量之间是否有关系的检验方法，不适用于连续型数据的异常值检测。离群点检测算法、相关度分析和基于聚类的异常值检测都适用于连续型数据。"},{"id":96261,"order":469,"type":"single_choice","question":"设备管理是操作系统的主要功能之一，下列哪一项不在设备管理的主要功能范围内（）。","options":[{"label":"A","text":"虚拟设备"},{"label":"B","text":"设备驱动"},{"label":"C","text":"缓冲区管理"},{"label":"D","text":"地址映射"}],"answer":"D","analysis":"操作系统的主要功能之一是设备管理，其主要功能有缓冲区管理、设备分配、设备驱动和虚拟设备等功能"},{"id":96181,"order":470,"type":"single_choice","question":"在职业道德规范中，要求从业者具备的素养之一为（）？","options":[{"label":"A","text":"忠诚、诚信"},{"label":"B","text":"自私自利"},{"label":"C","text":"不诚实"},{"label":"D","text":"利己主义"}],"answer":"A","analysis":"职业道德要求从业者表现出忠诚与诚信的品质，即对职业和职业责任的忠诚，以及真实、诚实、守信的行为准则"},{"id":96611,"order":471,"type":"single_choice","question":"下面哪一项能准确阐释文本数据的定义？（）","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"文本数据是指以人类语言或符号为载体传递的、有一定结构和意义的数据"},{"label":"C","text":"文本数据是指通过语音来记录的数据以及通过语音来传输的数据"},{"label":"D","text":"文本数据是指指用数值表示的各像素的灰度值的集合"}],"answer":"B","analysis":"文本数据是指以人类语言或符号为载体传递的、有一定结构和意义的数据"},{"id":96474,"order":472,"type":"single_choice","question":"在数据处理环节，下列哪项方式可以增强数据处理的可靠性（）。","options":[{"label":"A","text":"提高数据的质量和准确性"},{"label":"B","text":"增加数据的数量"},{"label":"C","text":"并行处理数据"},{"label":"D","text":"减少数据的存储空间"}],"answer":"A","analysis":"提高数据质量与准确性可增强数据处理可靠性。"},{"id":96291,"order":473,"type":"single_choice","question":"Excel 里，插入图表的功能按钮在哪个（）选项卡上？","options":[{"label":"A","text":"数据"},{"label":"B","text":"插入"},{"label":"C","text":"页面布局"},{"label":"D","text":"公式"}],"answer":"B","analysis":"在Excel中，插入图表的功能位于\"插入\"选项卡下的\"图表\"组。"},{"id":96724,"order":474,"type":"single_choice","question":"在图像数据标注工作里，标注结果存在主观性会造成什么后果？（）","options":[{"label":"A","text":"标注结果的冗余"},{"label":"B","text":"标注结果的遗漏"},{"label":"C","text":"标注结果的不准确性"},{"label":"D","text":"标注结果的不一致性"}],"answer":"D","analysis":"标注结果的主观性可能导致不同标注人员对同一图像进行标注时产生不一致的结果"},{"id":96326,"order":475,"type":"single_choice","question":"下面哪种行为属于侵权行为（）。","options":[{"label":"A","text":"对他人财产的合法使用"},{"label":"B","text":"合法拍卖行为"},{"label":"C","text":"对他人人身自由的侵害"},{"label":"D","text":"合法债权行为"}],"answer":"C","analysis":"侵害他人人身自由属于侵权行为。"},{"id":96758,"order":476,"type":"single_choice","question":"数据标注规则中，\"标注\" 这一概念具体是指（）。","options":[{"label":"A","text":"将数据转化为可视化形式的过程"},{"label":"B","text":"通过算法对数据进行处理和分析的过程"},{"label": B","analysis":"在sklearn的linear_model模块中，可以使用Ridge类构建岭回归模型"},{"id":96427,"order":503,"type":"single_choice","question":"在图像处理领域，噪声是普遍存在的问题，以下（）选项并非处理噪声的方法。","options":[{"label":"A","text":"均值滤波"},{"label":"B","text":"边缘检测"},{"label":"C","text":"高斯滤波"},{"label":"D","text":"中值滤波"}],"answer":"B","analysis":"边缘检测不是噪声处理的方法，它是一种图像特征提取的方法"},{"id":96626,"order":504,"type":"single_choice","question":"有一种数据格式是图像传感器直接输出的原始格式，并且在计算机视觉的基础处理中被广泛运用，这种格式是（）。","options":[{"label":"A","text":"RGB颜色模型"},{"label":"B","text":"CMYK颜色模型"},{"label":"C","text":"HSL颜色模型"},{"label":"D","text":"HSV颜色模型"}],"answer":"A","analysis":"RGB颜色模型是由红、绿、蓝三种颜色分量组合而成的颜色模型，它广泛应用于计算机图像处理和计算机视觉中。CMYK颜色模型主要用于印刷行业，而HSL和HSV颜色模型则更适合人类感觉和交互设计。因此，选项A是最适合用于图像处理和计算机视觉中的颜色模型。"},{"id":96603,"order":505,"type":"single_choice","question":"数据分类的主要意图是（）。","options":[{"label":"A","text":"限制数据传输量"},{"label":"B","text":"方便数据管理与使用"},{"label":"C","text":"提高数据隐私性"},{"label":"D","text":"降低数据冗余"}],"answer":"B","analysis":"数据分类旨在方便数据管理与使用。"},{"id":96926,"order":506,"type":"single_choice","question":"分类预测里提到的 ROC 曲线指的是（）。","options":[{"label":"A","text":"显示召回率和准确率之间的关系"},{"label":"B","text":"显示真正例率与假正例率之间的关系"},{"label":"C","text":"显示模型的总体准确率"},{"label":"D","text":"显示不同算法在相同数据集上的拟合精度"}],"answer":"B","analysis":"ROC曲线显示真正例率与假正例率之间的关系。"},{"id":96689,"order":507,"type":"single_choice","question":"文本标注质量标准中的一致性，具体是指（）。","options":[{"label":"A","text":"标注过程的透明度"},{"label":"B","text":"不同标注人员之间的标注一致性"},{"label":"C","text":"标注人员的专业水平"},{"label":"D","text":"标注结果的准确性"}],"answer":"B","analysis":"一致性指的是不同标注人员在面对同一段文本时所做的标注结果之间的一致性"},{"id":96570,"order":508,"type":"single_choice","question":"DIANA 层次聚类算法实现步骤的第三步是（）。","options":[{"label":"A","text":"判断是否满足停止条件，如果满足则输出最终的聚类结果，否则返回第二步"},{"label":"B","text":"将簇分裂成子簇"},{"label":"C","text":"将子簇加入到当前的簇集合中"},{"label":"D","text":"计算所有样本点之间的距离"}],"answer":"B","analysis":"DIANA第三步是将簇分裂成子簇。"},{"id":96385,"order":509,"type":"single_choice","question":"以下（）表达式能够选取所有带有\"value\"属性的input元素。","options":[{"label":"A","text":"//input/@value"},{"label":"B","text":"//input[@attribute(value)]"},{"label":"C","text":"//input[value]"},{"label":"D","text":"//input[@value]"}],"answer":"D","analysis":"Xpath中使用@符号表示选取元素的属性，所以//input[@value]可以选取所有包含\"value\"属性的input元素"},{"id":96736,"order":510,"type":"single_choice","question":"实时检验的主要内容中不包含哪一项？（）","options":[{"label":"A","text":"标注的方法"},{"label":"B","text":"标注的准确度"},{"label":"C","text":"标注的熟练度"},{"label":"D","text":"标注的总数量"}],"answer":"D","analysis":"实时检验的主要内容包括标注员的标注方法、熟练度、 准确度，不包括标注的总数量"},{"id":96625,"order":511,"type":"single_choice","question":"在图像数据里，所谓的颜色深度指的是（）。","options":[{"label":"A","text":"图像中的颜色数量"},{"label":"B","text":"颜色的亮度"},{"label":"C","text":"颜色在图像中的位置"},{"label":"D","text":"颜色的取值范围"}],"answer":"D","analysis":"颜色深度指的是每个像素可以使用的颜色值的数量。颜色深度越高，每个像素可以使用的颜色值就越多。例如，一张8位颜色深度的图片每个像素可以使用256个颜色值，而24位颜色深度的图片每个像素可以使用约1670万个颜色值。因此，选项D描述了颜色深度的正确含义。"},{"id":96937,"order":512,"type":"single_choice","question":"数据拆解技术被广泛应用的领域包括（）","options":[{"label":"A","text":"金融行业"},{"label":"B","text":"制造业"},{"label":"C","text":"医疗保健行业"},{"label":"D","text":"以上选项均正确"}],"answer":"D","analysis":"数据拆解是一种通用的数据处理技术，可以应用于各种领域。在金融行业、制造业和医疗保健行业等领域，数据拆解都可以发挥重要作用，帮助分析人员更好地理解和分析数据。"},{"id":96743,"order":513,"type":"single_choice","question":"在质量控制工作中，多重抽样检验辅助实时检验的核心目的是什么？（）","options":[{"label":"A","text":"合理分配质检员的工作重心"},{"label":"B","text":"降低生产成本"},{"label":"C","text":"提高生产效率"},{"label":"D","text":"确定产品的质量等级"}],"answer":"A","analysis":"多重抽样检验方法辅助实时检验，多应用在数据标注任务需要采用实时检验方法但质检员与标注员比例失衡，标注员过多的情况"},{"id":96457,"order":514,"type":"single_choice","question":"数据集成中的数据迁移具体指的是什么？（）","options":[{"label":"A","text":"将数据清洗和预处理"},{"label":"B","text":"将数据拆分成多个子集"},{"label":"C","text":"将数据转换为其他形式或格式"},{"label":"D","text":"将数据从一个存储系统迁移到另一个存储系统"}],"answer":"D","analysis":"数据迁移是指将数据从一个存储系统迁移到另一个存储系统，以便进行数据集成和统一管理"},{"id":96208,"order":515,"type":"single_choice","question":"下列哪项行为符合恪尽职守的基本原则（）。​","options":[{"label":"A","text":"隐瞒重要工作信息"},{"label":"B","text":"对工作尽职尽责"},{"label":"C","text":"对客户提苛刻要求"},{"label":"D","text":"泄露公司的资料"}],"answer":"B","analysis":"职业守则中的\"恪尽职守\"基本要求指的是从业人员在履行职责和工作任务时应该尽职尽责，恪守岗位职责和道德准则"},{"id":96834,"order":516,"type":"single_choice","question":"下面哪种系统部署方法具备高度的可移植性与扩展性，还能简化部署流程、降低维护开支？（）","options":[{"label":"A","text":"局域网部署"},{"label":"B","text":"无服务器架构"},{"label":"C","text":"容器化部署"},{"label":"D","text":"传统服务器部署"}],"answer":"C","analysis":"容器化部署具有高可移植性、扩展性，简化部署并降低维护成本。"},{"id":96891,"order":517,"type":"single_choice","question":"关联规则分析指的是什么？（）","options":[{"label":"A","text":"分析数据集中的分类变量"},{"label":"B","text":"分析数据集中的异常值"},{"label":"C","text":"分析数据中的缺失值"},{"label":"D","text":"分析同个数据集中不同变量的关联关系"}],"answer":"D","analysis":"关联规则分析是数据挖据中最活跃的研究方法之一，目的是在一个数据集中找出各项之间的关联关系，而这种关系并没有在数据中直接表示出来"},{"id":96212,"order":518,"type":"single_choice","question":"以下哪一项不在勤勉好学的基本要求范畴内（）。","options":[{"label":"A","text":"保持高度的责任心和工作效率"},{"label":"B","text":"具备积极探索和创新的精神"},{"label":"C","text":"追求高薪高职，以此为奋斗目标"},{"label":"D","text":"虚心接受他人的建议和批评"}],"answer":"C","analysis":"勤勉好学的基本要求包括保持高度的责任心和工作效率、具备积极探索和创新的精神、虚心接受他人的建议和批评。不包括追求高薪高职，以此为奋斗目标。"},{"id":96207,"order":519,"type":"single_choice","question":"恪尽职守这一准则的基本要求体现在（）。​","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"保守秘密"},{"label":"C","text":"高效执行"},{"label":"D","text":"忠诚和责任"}],"answer":"A","analysis":"职业守则中的\"恪尽职守\"基本要求指的是从业人员在履行职责和工作任务时应该尽职尽责，恪守岗位职责和道德准则"},{"id":96240,"order":520,"type":"single_choice","question":"在计算机硬件系统里，主板扮演着（）的角色。","options":[{"label":"A","text":"运算器"},{"label":"B","text":"控制设备"},{"label":"C","text":"输入输出设备"},{"label":"D","text":"存储设备"}],"answer":"B","analysis":"主板是计算机的运作核心，包括中央处理器、北桥、南桥等多个芯片，主要起到控制和协调计算机各种硬件设备的作用"},{"id":96251,"order":521,"type":"single_choice","question":"从系统层面来讲，文件系统的主要作用是（）","options":[{"label":"A","text":"对计算机软件的安装和运行进行控制"},{"label":"B","text":"对计算机网络中的通信协议进行管理"},{"label":"C","text":"对计算机的硬件资源进行分配和调度"},{"label":"D","text":"负责文件的存储并对存入的文件进行保护、检索，负责对文件存储器存储空间的组织和分配"}],"answer":"D","analysis":"从系统角度看，文件系统的功能是负责文件的存储并对存入的文件进行保护、检索，负责对文件存储器存储空间的组织和分配等，具体包括：构造文件结构，提供存取文件的方法，辅存空间管理，提供文件共享功能，文件保护，提供一组文件操作命令等"},{"id":96415,"order":522,"type":"single_choice","question":"在进行异常值检测时，通常采用哪些方法来检测异常值？（）","options":[{"label":"A","text":"箱线图"},{"label":"B","text":"直方图"},{"label":"C","text":"散点图"},{"label":"D","text":"饼图"}],"answer":"A","analysis":"箱线图是一种常用的检测异常值的方法。通过箱线图，我们可以看到数据的分布情况以及是否存在异常值。"},{"id":96564,"order":523,"type":"single_choice","question":"在 DIANA 层次聚类法里，簇的直径被界定为（）。","options":[{"label":"A","text":"簇内所有数据点到簇质心的距离的平均值"},{"label":"B","text":"簇内所有数据点到簇质心的距离的最大值"},{"label":"C","text":"簇内任意两个数据点之间的距离的平均值"},{"label":"D","text":"簇内任意两个数据点之间的距离的最大值"}],"answer":"D","analysis":"簇的直径定义为簇内任意两个数据点之间的距离的最大值，表示簇内数据点之间的最大距离"},{"id":96798,"order":524,"type":"single_choice","question":"下列哪一项不属于数据筛选的类型？（）","options":[{"label":"A","text":"基于属性的筛选"},{"label":"B","text":"基于关系的筛选"},{"label":"C","text":"基于维度的筛选"},{"label":"D","text":"基于规则的筛选"}],"answer":"C","analysis":"数据筛选可以分为以下几类：基于属性的筛选，根据数据的某个或多个属性来筛选数据，如年龄、性别、收入等。基于关系的筛选，根据数据之间的关系来筛选数据，如相邻、相连接、相关联等。基于规则的筛选，根据一定的规则来筛选数据，如正则表达式、模式匹配等。"},{"id":96877,"order":525,"type":"single_choice","question":"在 pyplot 中，使用 pie 函数可以绘制什么图表？（）","options":[{"label":"A","text":"散点图"},{"label":"B","text":"饼图"},{"label":"C","text":"折线图"},{"label":"D","text":"柱状图"}],"answer":"B","analysis":"pie函数用于绘制饼状图，它主要用于展示数据占比的情况，通常适用于有限种类的数据"},{"id":96634,"order":526,"type":"single_choice","question":"对图像数据归类结果进行评估所采用的指标是什么？（）","options":[{"label":"A","text":"F1-Score"},{"label":"B","text":"ROC曲线"},{"label":"C","text":"准确率"},{"label":"D","text":"回归误差"}],"answer":"C","analysis":"数据归类的评估指标主要包括准确率、精确率、召回率等，其中准确率是最基本的评估指标。"},{"id":96722,"order":527,"type":"single_choice","question":"由于数据标注行业缺乏统一的行业标准，使得文本数据标注面临的困难是（）。","options":[{"label":"A","text":"标注任务的可扩展性"},{"label":"B","text":"标注任务的不完整性"},{"label":"C","text":"标注者的标准化和一致性"},{"label":"D","text":"数据采集和清理的难度"}],"answer":"C","analysis":"缺乏统一标准导致文本数据标注的标准化和一致性困难。"},{"id":96596,"order":528,"type":"single_choice","question":"共变法的运用条件是（）。","options":[{"label":"A","text":"实验组和控制组的被解释变量的分布相同"},{"label":"B","text":"能够建立相关变量与被解释变量之间的函数关系"},{"label":"C","text":"可观测被解释变量和影响变量之间的关系"},{"label":"D","text":"能够通过控制影响因素消除对因果关系的估计造成影响的影响因素"}],"answer":"D","analysis":"共变法的运用条件是能够通过控制影响因素消除对因果关系的估计造成影响的影响因素"},{"id":96730,"order":529,"type":"single_choice","question":"在语音数据标注里，属于语调标注带来的难点是（）。","options":[{"label":"A","text":"音素划分"},{"label":"B","text":"语音中的语调变化"},{"label":"C","text":"多语言"},{"label":"D","text":"声音质量"}],"answer":"B","analysis":"语音语调变化是语调标注的主要难点。"},{"id":96505,"order":530,"type":"single_choice","question":"在 XML 格式中，通常用什么元素来定义文档的根元素（）。","options":[{"label":"A","text":"<root>"},{"label":"B","text":"<html>"},{"label":"C","text":"<head>"},{"label":"D","text":"<body>"}],"answer":"A","analysis":"XML（Extensible Markup Language）是一种标记语言，用于定义文档结构和数据"},{"id":96349,"order":531,"type":"single_choice","question":"域完整性能够起到（）的保证作用","options":[{"label":"A","text":"数据准确无误"},{"label":"B","text":"受非空约束的数据都必须有值"},{"label":"C","text":"数据可以被修改"},{"label":"D","text":"新插入的数据无重复"}],"answer":"B","analysis":"域完整性通过字段约束（如非空、数据类型、取值范围）限制了某些属性中出现的值"},{"id":96355,"order":532,"type":"single_choice","question":"在对数据质量进行把控的流程里，哪一项不是必不可少的环节？（）","options":[{"label":"A","text":"数据审核"},{"label":"B","text":"数据可视化"},{"label":"C","text":"数据清洗"},{"label":"D","text":"数据采集"}],"answer":"B","analysis":"数据可视化并不是数据质量把控流程中必须的环节，主要是为了更好地展示数据结果"},{"id":96280,"order":533,"type":"single_choice","question":"在 Word 中做邮件合并时，要插入合并域，应该使用（）功能？","options":[{"label":"A","text":"页面布局"},{"label":"B","text":"插入合并域"},{"label":"C","text":"规则"},{"label":"D","text":"文本框"}],"answer":"B","analysis":"在 Word 进行邮件合并时，需要使用 \"插入合并域\" 功能来添加动态数据字段，如姓名、地址等"},{"id":96906,"order":534,"type":"single_choice","question":"在回归预测中，下列哪项无法解决模型训练过程中的过拟合问题？（）","options":[{"label":"A","text":"正则化"},{"label":"B","text":"增加模型复杂度"},{"label":"C","text":"减少样本特征"},{"label":"D","text":"增加样本量"}],"answer":"B","analysis":"增加模型复杂度无法解决过拟合，反而可能加剧过拟合。"},{"id":96941,"order":535,"type":"single_choice","question":"下列哪项算法不属于分治法的范畴？（）","options":[{"label":"A","text":"快排"},{"label":"B","text":"归并排序"},{"label":"C","text":"堆排序"},{"label":"D","text":"插入排序"}],"answer":"D","analysis":"分治法是将一个大问题分解为若干个小问题，将小问题分别解决，然后把小问题的解合并成大问题的解。快排、归并排序和堆排序都是分治法的经典算法，而插入排序不属于分治法。"},{"id":96252,"order":536,"type":"single_choice","question":"U 盘、SD 卡等传统可移动存储设备通常采用的文件系统是（）。","options":[{"label":"A","text":"ext4"},{"label":"B","text":"HFS+"},{"label":"C","text":"FAT32"},{"label":"D","text":"NTFS"}],"answer":"C","analysis":"FAT32是传统可移动存储设备（如U盘、小容量SD卡）的常用文件系统，因其兼容性强（支持多系统读写），但存在单个文件最大4GB的限制相对于其他文件系统，FAT32具有简单、兼容性好的特点，但在文件大小和簇大小等方面有一定限制"},{"id":96393,"order":537,"type":"single_choice","question":"借助数据处理手段，能够（）以更直观的方式呈现数据的特征与趋势。","options":[{"label":"A","text":"数据可视化"},{"label":"B","text":"提高数据的质量和准确性"},{"label":"C","text":"压缩数据"},{"label":"D","text":"增加数据的数量"}],"answer":"A","analysis":"数据可视化是提高数据的可读性的方法之一，通过可视化数据，可以更直观地展示数据的特征和趋势"},{"id":96360,"order":538,"type":"single_choice","question":"当对数据库开展数据一致性检测工作时，（）方法能够识别出数据里的重复记录。","options":[{"label":"A","text":"默认约束"},{"label":"B","text":"外键约束"},{"label":"C","text":"主键约束"},{"label":"D","text":"唯一性约束"}],"answer":"D","analysis":"唯一性约束可以强制一个列或一组列的值在表中是唯一的"},{"id":96663,"order":539,"type":"single_choice","question":"下列哪一项不属于数据审核的流程（）？","options":[{"label":"A","text":"合规性审核"},{"label":"B","text":"一致性核验"},{"label":"C","text":"数据加密审核"},{"label":"D","text":"完整性检查"}],"answer":"C","analysis":"数据审核的基本方法包括数据检查、数据验证和数据核对等步骤，以确保数据的准确性和完整性"},{"id":96660,"order":540,"type":"single_choice","question":"数据审核旨在（）。","options":[{"label":"A","text":"增加数据的复杂性"},{"label":"B","text":"保证数据的完整性和准确性"},{"label":"C","text":"保证数据的可恢复性"},{"label":"D","text":"提高数据的存储容量"}],"answer":"B","analysis":"数据审核的目的是确保数据的完整性和准确性，通过完整性和准确性检查，发现和纠正各种数据问题，提高数据的质量和可信度，为后续模型训练提供高质量数据"},{"id":96849,"order":541,"type":"single_choice","question":"下列哪项属于智慧交通的实际案例？（）","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"共享出行平台"},{"label":"C","text":"智能公共交通系统"},{"label":"D","text":"智能交通信号灯"}],"answer":"A","analysis":"智能交通信号灯、智能公共交通系统、共享出行平台、智能停车系统属于智慧交通的案例"},{"id":96922,"order":542,"type":"single_choice","question":"岭回归的回归优化函数中，有一个偏置项被加入，它是（），加入后能起到降低标准误差的作用。","options":[{"label":"A","text":"绝对值偏差——L1正则项"},{"label":"B","text":"平方偏差——L1正则项"},{"label":"C","text":"绝对值偏差——L2正则项"},{"label":"D","text":"平方偏差——L2正则项"}],"answer":"D","analysis":"岭回归加入L2正则项（平方偏差）降低标准误差。"},{"id":96827,"order":543,"type":"single_choice","question":"（）通常作为配置管理的一部分，在配置管理工具中进行管理。","options":[{"label":"A","text":"文档目录"},{"label":"B","text":"文档编号"},{"label":"C","text":"文档格式"},{"label":"D","text":"项目文档"}],"answer":"D","analysis":"项目文档一般作为配置管理的一部分，放在配置管理工具中进行管理，"},{"id":96943,"order":544,"type":"single_choice","question":"在单节点智能系统里，有一个核心因素会直接对算力产生影响，这个因素是（）。","options":[{"label":"A","text":"硬件架构"},{"label":"B","text":"算法优化"},{"label":"C","text":"网络带宽"},{"label":"D","text":"软件框架"}],"answer":"A","analysis":"硬件架构决定物理算力上限，算法优化决定实际利用率，网络带宽影响分布式算力调度效率；在单节点场景下，硬件架构是算力的核心。"},{"id":96866,"order":545,"type":"single_choice","question":"不属于智能安防系统的组成部分的是（）。","options":[{"label":"A","text":"监控摄像头"},{"label":"B","text":"入侵报警系统"},{"label":"C","text":"水电系统"},{"label":"D","text":"智能控制中心"}],"answer":"C","analysis":"智能安防系统通常由监控摄像头、入侵报警系统、门禁系统、报警设备和智能控制中心等组成，用于实现视频监控、数据存储与管理等功能。水电系统不属于智能安防系统的组成部分，它是基础设施的一部分。"},{"id":96556,"order":546,"type":"single_choice","question":"在 K-Means 聚类的实现过程中，要是质心选择不合适，可能会出现什么样的情况（）。","options":[{"label":"A","text":"聚类结果不受影响"},{"label":"B","text":"聚类速度变快"},{"label":"C","text":"聚类结果越来越好"},{"label":"D","text":"聚类结果不稳定"}],"answer":"D","analysis":"质心的选择会影响聚类的结果，如果质心的选择不当，可能会出现聚类结果不稳定的情况"},{"id":96405,"order":547,"type":"single_choice","question":"均值滤波作为常用的去噪（平滑）方法，以下哪项描述最符合其原理？（）","options":[{"label":"A","text":"对图像中的每个像素点的像素值进行统计分析，根据统计结果进行去噪处理"},{"label":"B","text":"使用高斯函数对图像进行卷积，通过对周围像素的加权平均得到去噪后的图像"},{"label":"C","text":"通过选择像素值在一定范围内的像素点进行排序，并取中间值作为去噪后的像素值"},{"label":"D","text":"将图像中每个像素点的值与其相邻像素点的值进行算术平均，得到去噪后的图像"}],"answer":"D","analysis":"均值滤波是一种线性滤波器，它将图像中每个像素点的值与其相邻像素点的值进行算术平均，从而平滑图像并减少噪声"},{"id":96567,"order":548,"type":"single_choice","question":"在 DIANA 层次聚类中，初始状态下所有数据点被归为一类，而在每次迭代过程中都会执行（）操作。","options":[{"label":"A","text":"选择包含最少数据点的类簇进行合并"},{"label":"B","text":"随机删除一个类簇"},{"label":"C","text":"选择当前簇中与其他点平均相异度最大的点进行分裂"},{"label":"D","text":"随机选取两个类簇合并"}],"answer":"C","analysis":"DIANA层次聚类是一种自顶向下的聚类方法，每次迭代都是选择当前簇中与其他点平均相异度最大的点进行分裂"},{"id":96867,"order":549,"type":"single_choice","question":"开展数据可视化工作的目的是什么？（）","options":[{"label":"A","text":"减少数据的误差"},{"label":"B","text":"缩短数据分析的时间"},{"label":"C","text":"直观展现隐藏于数据中的规律"},{"label":"D","text":"增加数据的存储量"}],"answer":"C","analysis":"数据可视化通过图表直观地展示数据间的量级关系，其目的是将抽象信息转换为具体的图形，将隐藏于数据中的规律直观地展现出来"},{"id":96536,"order":550,"type":"single_choice","question":"下列哪一项属于 DENCLUE 密度聚类的操作步骤？（）","options":[{"label":"A","text":"利用k-均值算法确定簇的中心"},{"label":"B","text":"随机选择数据点作为中心点"},{"label":"C","text":"根据密度计算每个点的局部密度"},{"label":"D","text":"计算数据点的距离矩阵"}],"answer":"C","analysis":"DENCLUE密度聚类的算法步骤包括：1.计算局部密度2.计算密度吸引力3.确定聚类中心4.执行聚类"},{"id":96538,"order":551,"type":"single_choice","question":"实现 DENCLUE 密度聚类算法的第一步是（）。","options":[{"label":"A","text":"合并密度路径相连的密度吸引子"},{"label":"B","text":"将数据点分配到最近的密度吸引子"},{"label":"C","text":"计算数据点的核密度估计"},{"label":"D","text":"通过梯度上升法确定密度吸引子"}],"answer":"C","analysis":"DENCLUE第一步是计算数据点的核密度估计。"},{"id":96288,"order":552,"type":"single_choice","question":"Excel 中，哪一项功能适合用来呈现数据的频率分布状况？（）","options":[{"label":"A","text":"条形图"},{"label":"B","text":"散点图"},{"label":"C","text":"折线图"},{"label":"D","text":"直方图"}],"answer":"D","analysis":"直方图可用于展示数据的频率分布情况。"},{"id":96767,"order":553,"type":"single_choice","question":"在数据分析过程中，数据质检的重要性体现在（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"增强数据治理能力"},{"label":"C","text":"提升数据分析效果"},{"label":"D","text":"提高决策准确性"}],"answer":"A","analysis":"数据质检的重要性主要体现在能够提高决策准确性、提升数据分析效果、增强数据治理能力，因此以上选项均正确"},{"id":96854,"order":554,"type":"single_choice","question":"智能系统在教育领域的应用，能够促进哪些方面的发展？（）","options":[{"label":"A","text":"学生的升学率"},{"label":"B","text":"医疗效率的提高"},{"label":"C","text":"教师的休闲娱乐发展"},{"label":"D","text":"学生个性化教育"}],"answer":"D","analysis":"智能系统促进学生个性化教育发展。"},{"id":96675,"order":555,"type":"single_choice","question":"开展数据标注质量检测，其目的在于（）。","options":[{"label":"A","text":"增加数据标注的数量"},{"label":"B","text":"降低数据标注的成本"},{"label":"C","text":"确保数据标注的准确性"},{"label":"D","text":"提高数据标注的效率"}],"answer":"C","analysis":"数据标注质量检测的主要目的是确保数据标注的准确性，保证所标注的数据符合数据标准，从而避免模型由于标注数据不准确而导致的问题"},{"id":96932,"order":556,"type":"single_choice","question":"（）图是专门用于分析数据分布情况的。","options":[{"label":"A","text":"直方图"},{"label":"B","text":"数据表"},{"label":"C","text":"折线图"},{"label":"D","text":"散点图"}],"answer":"A","analysis":"直方图是一种常用的描述数据分布情况的工具，通过将数据划分成若干个区间，统计每个区间数据的个数或比例，来反映数据的分布情况。"},{"id":96719,"order":557,"type":"single_choice","question":"标注者在对文本数据进行标注时，面临的难点有哪些？（）","options":[{"label":"A","text":"数据清洗困难"},{"label":"B","text":"缺乏合适的标注工具"},{"label":"C","text":"数据存储和处理的技术问题"},{"label":"D","text":"语言的多样性"}],"answer":"D","analysis":"语言的多样性使得标注者在理解和解释文本时面临困难"},{"id":96765,"order":558,"type":"single_choice","question":"数据质量评估的准备阶段，不包含以下哪方面的内容？（）","options":[{"label":"A","text":"确定质量评估准则"},{"label":"B","text":"选取质量维度及评价指标"},{"label":"C","text":"确定评估对象及范围"},{"label":"D","text":"进行数据清洗"}],"answer":"D","analysis":"在数据质量评价中的评估准备阶段，需要制定评估的计划，评估计划包括需求分析、确定评估对象及范围、选取质量维度及评价指标、确定质量评估准则等四个方面的内容"},{"id":96729,"order":559,"type":"single_choice","question":"下列哪项不属于语音数据标注中常见的异常现象？（）","options":[{"label":"A","text":"喷麦"},{"label":"B","text":"吞音"},{"label":"C","text":"切音"},{"label":"D","text":"高音"}],"answer":"D","analysis":"语音数据标注常见的异常现象包括切音、吞音、喷麦、丢帧、重音、空旷音、混响等等，不包括高音"},{"id":96589,"order":560,"type":"single_choice","question":"求异法所遵循的核心原则是什么？（）","options":[{"label":"A","text":"提出多角度的假设并进行验证"},{"label":"B","text":"通过对照实验确定唯一差异因素"},{"label":"C","text":"归纳所有场合的共同条件"},{"label":"D","text":"分析变量间的统计相关性"}],"answer":"B","analysis":"求异法的核心原则是通过对照实验确定唯一差异因素"},{"id":96882,"order":561,"type":"single_choice","question":"下列哪个函数可用于绘制热力图？（）","options":[{"label":"A","text":"scatterplot"},{"label":"B","text":"lineplot"},{"label":"C","text":"heatmap"},{"label":"D","text":"barplot"}],"answer":"C","analysis":"heatmap()函数用于绘制热力图。"},{"id":96193,"order":562,"type":"single_choice","question":"下面哪种行为是不符合职业道德要求的（）？","options":[{"label":"A","text":"在公司公开场合发表政治言论"},{"label":"B","text":"对所服务的组织机构不忠诚"},{"label":"C","text":"在工作中保持高度的责任心和敬业精神"},{"label":"D","text":"对客户保持诚实守信的态度"}],"answer":"B","analysis":"对所服务机构不忠诚违背职业道德，应忠诚尽责。"},{"id":96693,"order":563,"type":"single_choice","question":"以下哪项不适合用于文本数据标注？（）","options":[{"label":"A","text":"结构化标注"},{"label":"B","text":"聚类标注"},{"label":"C","text":"分类标注"},{"label":"D","text":"序列标注"}],"answer":"B","analysis":"序列标注、分类标注、结构化标注都适用于文本数据标注，在不同的应用场景下有不同的体现方式"},{"id":96306,"order":564,"type":"single_choice","question":"要在 SmartArt 图表里新增一个框架，正确的操作方式是什么？（）","options":[{"label":"A","text":"点击SmartArt图表中要添加新框架的位置，然后在\"SmartArt设计\"选项卡中选择增加形状"},{"label":"B","text":"右键单击SmartArt图表，选择重设形状"},{"label":"C","text":"拖动现有框架，形成新框架"},{"label":"D","text":"在SmartArt图表中不能添加新框架"}],"answer":"A","analysis":"在SmartArt图表中添加新的框架时，可以单击SmartArt图表中要添加新框架的位置，然后在\"SmartArt 设计\"选项卡中选择增加形状。"},{"id":96886,"order":565,"type":"single_choice","question":"在 pyecharts 中，能够绘制漏斗图的类是（）。","options":[{"label":"A","text":"Funnel"},{"label":"B","text":"HeatMap"},{"label":"C","text":"Scatter3D"},{"label":"D","text":"Boxplot"}],"answer":"A","analysis":"Funnel类用于绘制漏斗图。"},{"id":96803,"order":566,"type":"single_choice","question":"以下哪个库可用于基于正则表达式对文本数据进行筛选？（）","options":[{"label":"A","text":"csv"},{"label":"B","text":"os"},{"label":"C","text":"datetime"},{"label":"D","text":"re"}],"answer":"D","analysis":"re模块是通过正则表达式+文本数据筛选， re适用于文本模式匹配 ，csv本身不提供直接筛选方法 datatime可辅助时间筛选，os为与操作作系统相关。"},{"id":96490,"order":567,"type":"single_choice","question":"在静态网页数据爬取过程中，可通过（）来完成网页解析。","options":[{"label":"A","text":"pandas库"},{"label":"B","text":"BeautifulSoup库"},{"label":"C","text":"requests库"},{"label":"D","text":"urllib库"}],"answer":"B","analysis":"BeautifulSoup库用于解析静态网页结构。"},{"id":96637,"order":568,"type":"single_choice","question":"在图像数据归类中，对图像进行预处理有什么作用？（）","options":[{"label":"A","text":"去除图像的噪声"},{"label":"B","text":"提取图像的特征"},{"label":"C","text":"压缩图像数据大小"},{"label":"D","text":"归一化图像的尺度"}],"answer":"D","analysis":"图像预处理在图像数据归类中的作用是对图像进行归一化处理，使得图像在尺度上具有一致性。归一化图像的尺度可以消除不同图像之间的尺度差异，确保不同图像的特征具有可比性。"},{"id":96936,"order":569,"type":"single_choice","question":"在数据拆解的过程中，（）核心因素会直接影响拆解结果的准确性。","options":[{"label":"A","text":"数据清洗的优先级"},{"label":"B","text":"拆解方法的选择"},{"label":"C","text":"数据的复杂性"},{"label":"D","text":"使用随机数据生成器"}],"answer":"B","analysis":"拆解方法的选择是决定数据拆解结果准确性的核心因素。不同的数据问题需要不同的拆解方法，错误的拆解方法会导致不准确的结果。"},{"id":96935,"order":570,"type":"single_choice","question":"“数据拆解”在数据分析里 指的是什么？（）","options":[{"label":"A","text":"按业务逻辑拆分数据表"},{"label":"B","text":"将数据处理成图表形式"},{"label":"C","text":"将数据转化为信息"},{"label":"D","text":"将数据分解为更小的部分"}],"answer":"D","analysis":"数据拆解是将复杂的数据分解成更小、更具体、更易于处理的部分的过程。通过数据拆解，可以更好地理解数据的含义，并进行更精确的数据分析。"},{"id":96619,"order":571,"type":"single_choice","question":"在基于监督学习的文本分类中，若要依据一定规则对文本数据进行分组，可采用的（）方法是合适的。","options":[{"label":"A","text":"朴素贝叶斯"},{"label":"B","text":"聚类"},{"label":"C","text":"决策树"},{"label":"D","text":"相似度计算"}],"answer":"C","analysis":"决策树是一种监督学习算法，通过构建树形规则对文本进行分类"},{"id":96446,"order":572,"type":"single_choice","question":"数据离散化的主要功效体现在（）。","options":[{"label":"A","text":"提高数据的处理和分析效率"},{"label":"B","text":"增强数据的可读性和理解性"},{"label":"C","text":"保障数据的质量和准确性"},{"label":"D","text":"减少数据的维度和复杂度"}],"answer":"A","analysis":"数据离散化可提高数据处理与分析效率。"},{"id":96269,"order":573,"type":"single_choice","question":"在 Word 中，插入题注的正确操作步骤是（）。","options":[{"label":"A","text":"在“设计”选项卡中选择“题注”。"},{"label":"B","text":"在“页面布局”选项卡中选择“题注”。"},{"label":"C","text":"在“参考文献”选项卡中选择“题注”。"},{"label":"D","text":"在“引用”选项卡中选择“题注”。"}],"answer":"D","analysis":"在Word中插入题注的方法是在“引用”选项卡中选择“插入题注”"},{"id":96488,"order":574,"type":"single_choice","question":"爬取静态网页数据时，首先要做的是（）。","options":[{"label":"A","text":"解析响应数据"},{"label":"B","text":"分析网页结构"},{"label":"C","text":"创建请求"},{"label":"D","text":"提取URL列表"}],"answer":"B","analysis":"静态网页数据爬取首先需要分析网页结构，对目标网站的结构有一个全面的了解"},{"id":96792,"order":575,"type":"single_choice","question":"数据筛选的目的在于提高后续（）的效果。","options":[{"label":"A","text":"数据分析"},{"label":"B","text":"数据采集"},{"label":"C","text":"数据存储"},{"label":"D","text":"数据清洗"}],"answer":"A","analysis":"数据筛选的目的是为了优化数据结构，去除无关数据，提取有用信息，以便进提升后续数据分析的效果。"},{"id":96189,"order":576,"type":"single_choice","question":"职业道德具备行为指导性，这一特性的含义是指（）？","options":[{"label":"A","text":"强制规范职业行为"},{"label":"B","text":"提供行为准则和规范"},{"label":"C","text":"约束个人生活行为"},{"label":"D","text":"限制职业选择自由"}],"answer":"B","analysis":"职业道德的行为指导性指的是其为从业人员提供行为准则和规范，引导其在职业活动中合理行事，遵循道德要求。"},{"id":96858,"order":577,"type":"single_choice","question":"智能系统在家庭居住领域中，可能引发的核心问题是哪一项？（）","options":[{"label":"A","text":"用户对智能功能的操作习惯难以适应"},{"label":"B","text":"智能家居产品价格高昂，普及率受限"},{"label":"C","text":"安全漏洞可能导致用户财产损失或人身安全威胁"},{"label":"D","text":"设备运行效率低下导致能源浪费"}],"answer":"C","analysis":"智能家居核心问题是安全漏洞可能导致财产损失或人身安全威胁。"},{"id":96740,"order":578,"type":"single_choice","question":"全样检验具有什么优点？（）","options":[{"label":"A","text":"能够让抽样误差减小"},{"label":"B","text":"可以对数据集做到无遗漏检验"},{"label":"C","text":"便于进行统计分析"},{"label":"D","text":"可以通过样本估计总体的结果"}],"answer":"B","analysis":"全样检验能够对数据集做到无遗漏检验，避免了抽样误差，但是全样检验的缺点是成本高昂，费时间"},{"id":96656,"order":579,"type":"single_choice","question":"数据审核所经历的流程包含（）。","options":[{"label":"A","text":"数据建模、数据可视化、数据发布"},{"label":"B","text":"数据准备、数据审查、意见反馈、数据报告"},{"label":"C","text":"数据预处理、数据分析、数据可视化"},{"label":"D","text":"数据清洗、数据挖掘、数据存储"}],"answer":"B","analysis":"数据审核的核心流程为：数据准备，整理待审核数据集；数据审查：检查规范性、完整性、逻辑性；意见反馈，将问题反馈至责任方修正；数据报告，汇总审核结论并提交"},{"id":96309,"order":580,"type":"single_choice","question":"根据《中华人民共和国劳动法》，用人单位应当为劳动者缴纳的社会保险费包含哪些保险？（）","options":[{"label":"A","text":"养老保险、医疗保险、工伤保险、生育保险"},{"label":"B","text":"养老保险、医疗保险、失业保险、生育保险、汽车保险"},{"label":"C","text":"养老保险、医疗保险、失业保险、工伤保险、出生保险"},{"label":"D","text":"养老保险、医疗保险、工伤保险、失业保险、生育保险"}],"answer":"D","analy "type":"single_choice","question":"在回归模型里，下列哪项指标不能用于评估模型效果？（）","options":[{"label":"A","text":"标准差"},{"label":"B","text":"RMSE值"},{"label":"C","text":"MSE值"},{"label":"D","text":"R方值"}],"answer":"A","analysis":"R方值表示模型解释的变异程度占总变异程度的比例，越接近1表示模型拟合效果越好"},{"id":96363,"order":588,"type":"single_choice","question":"关于使用爬虫时的注意事项，以下哪种说法是正确的（）。","options":[{"label":"A","text":"爬虫抓取的数据可以自由分享和使用"},{"label":"B","text":"使用爬虫抓取网站数据前，需要获取网站所有者的许可"},{"label":"C","text":"在爬取敏感信息时不需要考虑用户的隐私权"},{"label":"D","text":"爬取数据不需要考虑网站的版权问题"}],"answer":"B","analysis":"在使用爬虫进行数据抓取时，必须遵守相关法律法规，比如《中华人民共和国网络安全法》等"},{"id":96370,"order":589,"type":"single_choice","question":"在数据采集活动里，以下哪种做法是合法的（）。","options":[{"label":"A","text":"收集国家机密"},{"label":"B","text":"收集商业机密"},{"label":"C","text":"收集个人信息"},{"label":"D","text":"收集公开信息"}],"answer":"D","analysis":"收集公开信息是合法的数据采集行为。"},{"id":96227,"order":590,"type":"single_choice","question":"计算机的主要特点指的是（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"计算精度高"},{"label":"C","text":"存储容量大"},{"label":"D","text":"计算速度快"}],"answer":"A","analysis":"计算机的主要特点有计算速度快、存储容量大、计算精度高等"},{"id":96786,"order":591,"type":"single_choice","question":"系统化的逻辑检查在程序的（）阶段开展。","options":[{"label":"A","text":"设计阶段"},{"label":"B","text":"编码阶段"},{"label":"C","text":"测试阶段"},{"label":"D","text":"维护阶段"}],"answer":"C","analysis":"逻辑检查是在测试阶段进行的，目的是发现程序中的逻辑错误，避免在程序上线后出现问题。"},{"id":96487,"order":592,"type":"single_choice","question":"在爬取静态网页数据的过程中，对网页结构进行分析的主要用意是（）。","options":[{"label":"A","text":"构建爬虫程序的逻辑"},{"label":"B","text":"分析网页的结构和元素"},{"label":"C","text":"提取网页中的数据"},{"label":"D","text":"获取网页的URL"}],"answer":"B","analysis":"在静态网页数据的爬取过程中，分析网页结构的主要目的是分析网页的结构和元素"},{"id":96684,"order":593,"type":"single_choice","question":"语音标注中的规范性指的是（）。","options":[{"label":"A","text":"标注是否符合标注规则"},{"label":"B","text":"标注是否简明扼要"},{"label":"C","text":"标注是否准确无误"},{"label":"D","text":"标注是否能够被复核验证"}],"answer":"A","analysis":"语音标注中的规范性是指在语音数据标注过程中需遵循的一系列标准和要求，以确保标注结果的一致性、准确性，规范语音标注能够提高语音标注的效率"}, ？","options":[{"label":"A","text":"labelCloud主要用于语音数据的标注"},{"label":"B","text":"labelCloud是一款轻量级的3D点云标注工具，支持多种标注模式和文件格式"},{"label":"C","text":"labelCloud不支持多文件格式"},{"label":"D","text":"labelCloud是一款用于2D图像标注的工具"}],"answer":"B","analysis":"labelCloud是轻量级3D点云标注工具，支持多种标注模式和文件格式。"},{"id":96235,"order":621,"type":"single_choice","question":"按照处理数据的方式来划分，计算机可分为（）。","options":[{"label":"A","text":"单指令流单数据流计算机、多指令流单数据流计算机和向量计算机"},{"label":"B","text":"微型计算机、小型计算机和大型计算机"},{"label":"C","text":"通用计算机、专用计算机和超级计算机"},{"label":"D","text":"电子数字计算机、电子模拟计算机和混合计算机"}],"answer":"D","analysis":"计算机按处理数据方式可分为电子数字计算机、电子模拟计算机、混合计算机"},{"id":96881,"order":622,"type":"single_choice","question":"在 seaborn 库中，哪个函数可以用来设置调色板？（）","options":[{"label":"A","text":"set_title"},{"label":"B","text":"set_palette"},{"label":"C","text":"set_style"},{"label":"D","text":"set"}],"answer":"B","analysis":"sns.set_palette()函数可以用于设置调色板，为所有图设置默认颜色周期"},{"id":96825,"order":623,"type":"single_choice","question":"下列哪项属于变更管理需遵循的原则？（）","options":[{"label":"A","text":"变更管理过程规范化"},{"label":"B","text":"变更回滚"},{"label":"C","text":"暂停变更执行"},{"label":"D","text":"优先级排序"}],"answer":"A","analysis":"变更管理的原则是项目基准化、变更管理过程规范化"},{"id":96608,"order":624,"type":"single_choice","question":"下列哪一项属于数据分类需遵循的基本原则？（）","options":[{"label":"A","text":"将数据按照时间顺序进行分类"},{"label":"B","text":"将数据按照数据的结构进行分类"},{"label":"C","text":"将数据按照数字大小进行分类"},{"label":"D","text":"将数据按照字母顺序进行分类"}],"answer":"B","analysis":"数据按照结构化特征进行分类的要素包括数据结构是否规则、数据长度是否规范、数据类型是否固定等，可以分为结构化数据（零售、财务等）、非结构化数据（图像、音频等）和半结构化数据（系统日志、邮件等）"},{"id":96489,"order":625,"type":"single_choice","question":"在静态网页数据爬取过程中，下列（）方法能够模拟真实的浏览器请求，从而降低被网站识别为爬虫的概率。","options":[{"label":"A","text":"处理验证码"},{"label":"B","text":"使用代理IP"},{"label":"C","text":"设置请求头信息"},{"label":"D","text":"使用随机延时"}],"answer":"C","analysis":"在静态网页数据的爬取过程中，通过设置请求头信息，可以模拟真实的浏览器请求"},{"id":96899,"order":626,"type":"single_choice","question":"什么是回归预测？（）","options":[{"label":"A","text":"对于未知数据，直接给出未来数据的预测结果。"},{"label":"B","text":"对于已知数据，直接给出未来数据的预测结果；"},{"label":"C","text":"对于未知数据，通过建立数学模型来预测未来数据；"},{"label":"D","text":"对于已知数据，通过建立数学模型来预测未来数据；"}],"answer":"C","analysis":"在回归模型中，自变量(特征)与因变量(目标)具有相关关系，自变量的值是已知的，因变量是要预测的"},{"id":96653,"order":627,"type":"single_choice","question":"数据审核在人工智能数据标注的流程里的作用是（）。","options":[{"label":"A","text":"提高数据分析和挖掘能力"},{"label":"B","text":"提高数据隐私和安全性"},{"label":"C","text":"提高数据存储和访问效率"},{"label":"D","text":"提高数据完整性和可靠性"}],"answer":"D","analysis":"数据审核的核心作用是通过校验数据准确性、一致性及逻辑合理性，提高数据的完整性和可靠性，从而支持后续分析或模型训练"},{"id":96761,"order":628,"type":"single_choice","question":"预防数据质量问题的措施是（）。","options":[{"label":"A","text":"数据存储和备份策略"},{"label":"B","text":"规范化数据操作流程"},{"label":"C","text":"数据加密和安全访问控制"},{"label":"D","text":"数据备份和恢复"}],"answer":"B","analysis":"预防数据质量问题的措施之一是规范化数据操作流程，确保数据的准确性和完整性"},{"id":96632,"order":629,"type":"single_choice","question":"下列哪一项机器学习算法不能应用于图像数据归类？（）","options":[{"label":"A","text":"决策树"},{"label":"B","text":"卷积神经网络"},{"label":"C","text":"K-Means聚类"},{"label":"D","text":"K-中心点聚类"}],"answer":"B","analysis":"决策树、K-Means聚类和K-中心点聚类都属于机器学习算法，卷积神经网络属于深度学习算法"},{"id":96232,"order":630,"type":"single_choice","question":"下列哪一项属于计算机在搭建和维护网络基础设施过程中使用的主要工具（）。","options":[{"label":"A","text":"网络管理软件"},{"label":"B","text":"数据库管理系统"},{"label":"C","text":"互联网"},{"label":"D","text":"电子邮件"}],"answer":"A","analysis":"网络管理软件是计算机应用中用于创建和维护网络基础设施的主要工具"},{"id":96794,"order":631,"type":"single_choice","question":"在数据筛选时，将异常数据剔除的目的在于（）。","options":[{"label":"A","text":"减少数据的噪声和异常值对结果的影响"},{"label":"B","text":"提高数据的连续性和一致性"},{"label":"C","text":"增加数据的容量和多样性"},{"label":"D","text":"所有选项都正确"}],"answer":"A","analysis":"去除异常数据的目的是减少数据的噪声和异常值对结果的影响，确保数据的准确性和可靠性。"},{"id":96665,"order":632,"type":"single_choice","question":"进行数据转化，主要目的是（）。","options":[{"label":"A","text":"提取数据的重要特征"},{"label":"B","text":"去除数据中的缺失值"},{"label":"C","text":"去除数据中的重复值"},{"label":"D","text":"将原始数据转换为更易于处理和分析的形式"}],"answer":"D","analysis":"数据转化的主要目的是将数据从一种形式转化为另一种形式，例如将数据从文本格式转化为数值格式，以便进行后续的数据分析和建模"},{"id":96616,"order":633,"type":"single_choice","question":"文本数据归类的过程包含哪些步骤？（）","options":[{"label":"A","text":"数据处理、特征选择、模型训练、模型评估、模型应用"},{"label":"B","text":"数据抽取、文本分类、模型训练、模型评估、模型应用"},{"label":"C","text":"文本预处理、特征提取、模型训练、模型评估、模型应用"},{"label":"D","text":"文本获取、文本预处理、模型训练、模型评估、模型应用"}],"answer":"C","analysis":"文本数据归类的过程一般包括文本预处理、特征提取、模型训练、模型评估、模型应用等步骤"},{"id":96884,"order":634,"type":"single_choice","question":"pyecharts 能够生成的图表类型有（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"仪表盘、雷达图、词云图等"},{"label":"C","text":"散点图、漏斗图、热力图等"},{"label":"D","text":"关系图、箱线图、柱状图等"}],"answer":"A","analysis":"pyecharts支持生成多种类型的图表，包括如柱形图、箱线图、漏斗图、仪表盘、关系图、热力图、雷达图、桑基图、散点图、词云图等"},{"id":96356,"order":635,"type":"single_choice","question":"在数据清洗这一环节中，下列项不属于数据清洗的方法的是（）。","options":[{"label":"A","text":"数据加密"},{"label":"B","text":"数据去重"},{"label":"C","text":"数据标准化"},{"label":"D","text":"缺失值填充"}],"answer":"A","analysis":"数据加密并不属于数据清洗方法，其主要目的是为了保护数据安全性"},{"id":96764,"order":636,"type":"single_choice","question":"在进行数据质量评估时，数据乱码属于哪一类错误？（）","options":[{"label":"A","text":"可读"},{"label":"B","text":"准确"},{"label":"C","text":"一致"},{"label":"D","text":"完整"}],"answer":"B","analysis":"准确性是指数据记录的信息存在异常或错误"},{"id":96598,"order":637,"type":"single_choice","question":"下列关于共变法的说法，错误的是（）。","options":[{"label":"A","text":"共变法要求被解释变量和影响变量之间仅存在线性关系"},{"label":"B","text":"共变法要求先行因素中仅有一个变量发生程度上的变化"},{"label":"C","text":"共变法可通过随机分配实验组和对照组来验证因果关系"},{"label":"D","text":"共变法的核心逻辑是控制其他变量不变，观察两个现象的量化共变关系"}],"answer":"A","analysis":"共变法不要求变量间必须是线性关系。"},{"id":96438,"order":638,"type":"single_choice","question":"采用Z - score标准化方法，数据会被转换到怎样的状态？（）","options":[{"label":"A","text":"负数"},{"label":"B","text":"0到1之间的数值"},{"label":"C","text":"二值化"},{"label":"D","text":"均值为0、标准差为1的分布"}],"answer":"D","analysis":"Z-score标准化使数据呈均值为0、标准差为1的分布。"},{"id":96799,"order":639,"type":"single_choice","question":"在 Python 里，能够实现数据筛选的函数是（）。","options":[{"label":"A","text":"filter"},{"label":"B","text":"map"},{"label":"C","text":"reduce"},{"label":"D","text":"sort"}],"answer":"A","analysis":"filter函数可以根据指定条件筛选数据，而map、reduce和sort函数都不是为数据筛选而设计的。"},{"id":96819,"order":640,"type":"single_choice","question":"数据清洗是数据整理技术的一部分，下列哪项不属于数据清洗的操作？（）","options":[{"label":"A","text":"无效值处理"},{"label":"B","text":"数据采集"},{"label":"C","text":"检查数据一致性"},{"label":"D","text":"缺失值填补"}],"answer":"B","analysis":"数据清洗就是检査数据一致性，处理无效值和缺失值等操作"},{"id":96527,"order":641,"type":"single_choice","question":"下列关于 OPTICS 密度聚类算法具体操作流程的描述，正确的选项是（）。","options":[{"label":"A","text":"利用点的密度直达距离的树，称为OPTICS树"},{"label":"B","text":"根据点的邻域密度和距离信息计算每个点的可达距离（reachabilitydistance）"},{"label":"C","text":"选定一个距离阈值eps，找出与每个点距离小于eps的领域"},{"label":"D","text":"对数据进行标准化处理，使得不同特征之间具有相同的重要性"}],"answer":"C","analysis":"题考查了OPTICS算法的基本流程，选项A是错误的，因为OPTICS算法不需要对数据进行标准化处理"},{"id":96548,"order":642,"type":"single_choice","question":"K-Means 聚类所要达成的目标是什么（）。","options":[{"label":"A","text":"最小化同一组内成员的相似性并最大化不同组间成员的相似性"},{"label":"B","text":"最小化同一组内成员的相似性以及不同组间成员的相似性"},{"label":"C","text":"最大化同一组内成员的相似性以及不同组间成员的相似性"},{"label":"D","text":"最大化同一组内成员的相似性并最小化不同组间成员的相似性"}],"answer":"D","analysis":"K-Means聚类的目标是最大化同一组内成员的相似性，并最小化不同组间成员的相似性"},{"id":96221,"order":643,"type":"single_choice","question":"计算机系统是由哪两大部分共同构成的（）。","options":[{"label":"A","text":"硬件系统和软件系统"},{"label":"B","text":"系统软件和应用软件"},{"label":"C","text":"中央处理器（CPU）与外围设备"},{"label":"D","text":"输入设备和输出设备"}],"answer":"A","analysis":"计算机系统的核心结构由硬件系统和软件系统共同构成：硬件系统：包括物理设备（如CPU、内存、硬盘、输入输出设备等），负责执行具体指令和存储数据；软件系统：包括程序、数据和指令（如操作系统、应用程序），控制硬件运行并实现用户需求"},{"id":96237,"order":644,"type":"single_choice","question":"超级计算机通常被应用于哪些（）领域。","options":[{"label":"A","text":"网络通信"},{"label":"B","text":"计算机辅助设计"},{"label":"C","text":"科学计算"},{"label":"D","text":"实时控制"}],"answer":"C","analysis":"超级计算机指处理速度极快、计算能力极强的计算机，一般应用于科学计算、天气预报、工程仿真等领域"},{"id":96907,"order":645,"type":"single_choice","question":"最小二乘回归是最为常见的（），它的优势在于计算简便、容易理解，不足之处是对异常值极为敏感。","options":[{"label":"A","text":"随机森林回归"},{"label":"B","text":"决策树回归"},{"label":"C","text":"多项式回归"},{"label":"D","text":"线性回归"}],"answer":"D","analysis":"最小二乘回归是最普通的线性回归，它的目的是获得最佳的拟合直线(回归线)，在因变量和一个或多个自变量之间建立一种关系，通过最小化每个数据点到线的垂直偏差平方和来计算最佳拟合线"},{"id":96853,"order":646,"type":"single_choice","question":"当智能系统应用于教育领域时，需要着重注意（）。","options":[{"label":"A","text":"保证学生的升学率"},{"label":"B","text":"弱化人为管理"},{"label":"C","text":"学术诚信"},{"label":"D","text":"保护学生隐私和数据安全"}],"answer":"D","analysis":"智能系统需要处理大量的学生数据，需要保护学生的隐私和数据安全"},{"id":96533,"order":647,"type":"single_choice","question":"下列哪一项是 DENCLUE 密度聚类算法的优势体现？（）","options":[{"label":"A","text":"只能处理数值型数据"},{"label":"B","text":"对数据分布形态没有要求"},{"label":"C","text":"需要事先指定聚类中心点"},{"label":"D","text":"需要事先确定聚类个数"}],"answer":"B","analysis":"DENCLUE密度聚类算法不需要事先确定聚类个数或指定聚类中心点，并且对数据分布形态没有要求，能够有效地处理复杂的非线性数据"},{"id":96362,"order":648,"type":"single_choice","question":"以下选项中，不属于数据校验范畴的是（）。","options":[{"label":"A","text":"异常值检验"},{"label":"B","text":"数据库归档"},{"label":"C","text":"缺失值检验"},{"label":"D","text":"一致性检验"}],"answer":"B","analysis":"常见的数据校验类型分为一致性校验、缺失值校验、异常值校验"},{"id":96498,"order":649,"type":"single_choice","question":"在进行数据采集时，下列哪项做法能够降低数据采集出现错误的概率（）。","options":[{"label":"A","text":"增加采集人员数量"},{"label":"B","text":"提高采集设备的精度"},{"label":"C","text":"增加采集时间"},{"label":"D","text":"减少数据采集频率"}],"answer":"B","analysis":"提高采集设备的精度可以减少数据采集错误，精确的设备能够更准确地采集数据。"},{"id":96771,"order":650,"type":"single_choice","question":"数据质量控制，指的是什么？（）","options":[{"label":"A","text":"确保数据处理的效率最大化"},{"label":"B","text":"确保数据的存储性能"},{"label":"C","text":"确保数据准确性、完整性、一致性和可靠性"},{"label":"D","text":"确保数据的安全性和隐私性"}],"answer":"C","analysis":"数据质量控制是指通过一系列的方法和流程来确保数据的质量、准确性、一致性和可靠性"},{"id":96640,"order":651,"type":"single_choice","question":"在当下，（）可以说是应用最广泛的音频压缩格式。","options":[{"label":"A","text":"WAV"},{"label":"B","text":"MP3"},{"label":"C","text":"MP4"},{"label":"D","text":"WMA"}],"answer":"B","analysis":"MP3(MPEG Layer 3)格式:是一种有损失的压缩格式，它舍弃了音频数据中人类几乎听不到的声音，因此文件很小，但音质表现比WAV差，也由于文件小的缘故，相当适合网络传输，因此MP3可以说是目前最普遍的音频压缩格式。"},{"id":96348,"order":652,"type":"single_choice","question":"下列哪一项不在数据完整性的分类范畴之内（）？","options":[{"label":"A","text":"可恢复完整性"},{"label":"B","text":"用户定义完整性"},{"label":"C","text":"参照完整性"},{"label":"D","text":"实体完整性"}],"answer":"A","analysis":"数据完整性的分类有实体完整性、域完整性、参照完整性、用户定义完整性四类"},{"id":96630,"order":653,"type":"single_choice","question":"结合图像数据的不同应用场景，（）的功能是对图像中特定对象的类别进行识别并明确其所在位置。","options":[{"label":"A","text":"对象分类"},{"label":"B","text":"情感分类"},{"label":"C","text":"场景分类"},{"label":"D","text":"目标检测"}],"answer":"D","analysis":"目标检测（Object Detection）的核心任务是在图像中定位特定对象的位置（如边界框）并识别其类别（如“猫”“车辆”）。其应用场景包括自动驾驶中的障碍物识别、医学图像中的异常组织定位等。与单纯分类不同，目标检测需同时完成定位与分类，是计算机视觉中的高级任务"},{"id":96418,"order":654,"type":"single_choice","question":"在异常值检测的众多方法中，以下哪一项不属于基于聚类分析的异常值检测手段？（）","options":[{"label":"A","text":"DBSCAN"},{"label":"B","text":"K-Means"},{"label":"C","text":"LOF"},{"label":"D","text":"One-ClassSVM"}],"answer":"D","analysis":"基于聚类的异常值检测方法有DBSCAN、LOF和k-means等，而One-ClassSVM基于的支持向量机是一种分类算法。"},{"id":96779,"order":655,"type":"single_choice","question":"下列哪一项属于国际上通用的数据质量管理体系标准？（）","options":[{"label":"A","text":"ISO 9001"},{"label":"B","text":"ISO 14001"},{"label":"C","text":"ISO 27001"},{"label":"D","text":"ISO 8000"}],"answer":"D","analysis":"ISO 8000是国际上用于数据质量管理的标准，它为组织提供了数据质量管理的框架和指南，帮助组织确保数据的准确性、完整性和一致性。"},{"id":96551,"order":656,"type":"single_choice","question":"在 K-Means 聚类的基本流程中，下列哪一个（）步骤是不正确的。","options":[{"label":"A","text":"重新计算中心点坐标"},{"label":"B","text":"将最近的中心点分配给每个点"},{"label":"C","text":"计算每个点到每个中心点的距离"},{"label":"D","text":"随机初始化边界值"}],"answer":"D","analysis":"K-Means聚类的基本过程包括初始化中心点、计算每个点到每个中心点的距离、将最近的中心点分配给每个点、重新计算中心点坐标"},{"id":96606,"order":657,"type":"single_choice","question":"机器学习里，开展数据分类是为了实现（）的目标？","options":[{"label":"A","text":"预测未知数据的类别标签以支持决策"},{"label":"B","text":"生成可视化图表辅助数据探索"},{"label":"C","text":"提取高维度数据的核心特征"},{"label":"D","text":"清洗噪声数据和填补缺失值"}],"answer":"A","analysis":"在机器学习中，分类任务属于监督学习范畴，其核心目的是基于已知标签的训练数据构建模型，预测未知数据的类别​（例如判断邮件是否为垃圾邮件、识别图像中的物体类别），从而为后续决策提供依据"},{"id":96432,"order":658,"type":"single_choice","question":"当面对一个特征值中存在极端离群值的数据集时，下列（）方法不适合用于处理该数据集。","options":[{"label":"A","text":"异常值处理"},{"label":"B","text":"离散化"},{"label":"C","text":"标准化"},{"label":"D","text":"最小最大归一化"}],"answer":"D","analysis":"最大最小归一化对离群值比较敏感，因为它是使用最大值和最小值进行变换的"},{"id":96287,"order":659,"type":"single_choice","question":"在 Excel 里，能用来算出数据平均值的函数是（）。","options":[{"label":"A","text":"COUNT"},{"label":"B","text":"SUM"},{"label":"C","text":"AVERAGE"},{"label":"D","text":"MAX"}],"answer":"C","analysis":"AVERAGE函数可用于计算数据的平均值。例如：=AVERAGE(A1:A10)会返回 A1 到 A10 单元格的平均值"},{"id":96523,"order":660,"type":"single_choice","question":"OPTICS 密度聚类的目的是什么（）。","options":[{"label":"A","text":"减少数据的噪声"},{"label":"B","text":"降低数据的维度"},{"label":"C","text":"获取数据的分布特征"},{"label":"D","text":"将数据分为若干类别"}],"answer":"C","analysis":"OPTICS密度聚类的目的是获取数据集的分布特征，具体来说，它可以将数据集中的密集区域识别为聚类，而稀疏区域则可以被认为是噪声或者异常值"},{"id":96401,"order":661,"type":"single_choice","question":"什么是K折交叉验证？（）","options":[{"label":"A","text":"将数据集随机分为K等份，每次使用其中1份作为验证集，剩余的K-1份作为训练集，重复K次"},{"label":"B","text":"随机选取K个数据样本，其中1份作为验证集，剩余的K-1份作为训练集，重复K次"},{"label":"C","text":"将数据集划分为K等份，每次使用其中K-1份作为训练集，剩余1份作为验证集，重复K次"},{"label":"D","text":"分层选取K个数据样本，其中1份作为验证集，剩余的K-1份作为训练集，重复K次"}],"answer":"A","analysis":"K折交叉验证将数据集随机分为K等份，每次使用其中1份作为验证集，剩余的K-1份作为训练集，重复K次，最终得到K个模型的性能评价结果"},{"id":96893,"order":662,"type":"single_choice","question":"下列哪个应用场景最适合运用关联规则分析？（）","options":[{"label":"A","text":"分析医疗数据中不同病症之间的关系"},{"label":"B","text":"分析股市交易数据中不同股票之间的关系"},{"label":"C","text":"分析某超市中不同商品之间的销售关系"},{"label":"D","text":"分析人口普查数据中的受教育程度与职业的关系"}],"answer":"C","analysis":"关联规则分析也称为购物篮分析，最早是为了发现超市销售数据库中不同的商品之间的关联关系，其目的是在一个数据集中找出各项之间的关联关系"},{"id":96887,"order":663,"type":"single_choice","question":"开展数据质量分析，其主要目的是什么？（）","options":[{"label":"A","text":"提高数据的存储效率"},{"label":"B","text":"评估数据的可用性"},{"label":"C","text":"确保数据的机密性"},{"label":"D","text":"降低数据的处理成本"}],"answer":"B","analysis":"数据质量分析的主要目的是评估数据的可用性，检查原始数据中是否存在不符合要求以及不能直接进行相应分析的脏数据，确保数据符合预期标准，能够支持可靠的数据分析和决策"},{"id":96419,"order":664,"type":"single_choice","question":"pandas库中的fillna方法，其默认的填充操作是（）。","options":[{"label":"A","text":"不填充，需用户显式定义策略"},{"label":"B","text":"填充为均值"},{"label":"C","text":"填充为后一个值"},{"label":"D","text":"填充为前一个值"}],"answer":"A","analysis":"fillna() 方法 无默认填充值，必须通过参数（如 value、method）显式指定填充策略"},{"id":96930,"order":665,"type":"single_choice","question":"在分类预测方法中，属于有监督学习范畴的算法是（）。","options":[{"label":"A","text":"KNN"},{"label":"B","text":"PCA"},{"label":"C","text":"DBSCAN"},{"label":"D","text":"K-means"}],"answer":"A","analysis":"KNN算法是一种有监督学习算法，其可以用于分类和回归问题"},{"id":96773,"order":666,"type":"single_choice","question":"数据质量控制中的 “及时性” 具体是指（）。","options":[{"label":"A","text":"数据的格式符合数据定义和业务定义的要求"},{"label":"B","text":"及时记录和传递相关数据，满足业务对信息获取的时间要求"},{"label":"C","text":"遵循统一的数据标准记录和传递数据"},{"label":"D","text":"真实、准确地记录原始数据，无虚假数据及信息"}],"answer":"B","analysis":"数据的及时性指及时记录和传递相关数据，满足业务对信息获取的时间要求"},{"id":96920,"order":667,"type":"single_choice","question":"sklearn 的 linear_model 模块提供了 Ridge 类，用于构建岭回归模型，该类中的 alpha 参数的作用是设置（）。","options":[{"label":"A","text":"随机种子数量"},{"label":"B","text":"最大迭代次数"},{"label":"C","text":"优化算法类型"},{"label":"D","text":"正则化的强度"}],"answer":"D","analysis":"在Ridge类中的alpha参数用于设置正则化的强度，其值越大，正则化项的占比越大，默认为1.0"},{"id":96686,"order":668,"type":"single_choice","question":"在语音标注工作里，以下哪项并非衡量标注质量的重要准则？（）","options":[{"label":"A","text":"语音语速"},{"label":"B","text":"语音舒适度"},{"label":"C","text":"发音清晰度"},{"label":"D","text":"语音逻辑性"}],"answer":"B","analysis":"语音舒适度不是语音标注质量的重要准则。"},{"id":96622,"order":669,"type":"single_choice","question":"在文本分类中，（）方法特别适合处理高维的 TF-IDF 特征，而且能借助核函数高效解决非线性分类问题。","options":[{"label":"A","text":"逻辑回归"},{"label":"B","text":"决策树"},{"label":"C","text":"支持向量机"},{"label":"D","text":"朴素贝叶斯"}],"answer":"C","analysis":"支持向量机适合处理高维TF-IDF特征，借助核函数解决非线性分类。"},{"id":96908,"order":670,"type":"single_choice","question":"有一种算法实际上属于分类算法，其分类方式是设定一个分类阈值，将预测结果超过该阈值的样本划分为正类，反之则归为反类，这种算法是（）。","options":[{"label":"A","text":"正则化回归"},{"label":"B","text":"多项式回归"},{"label":"C","text":"逻辑回归"},{"label":"D","text":"线性回归"}],"answer":"C","analysis":"逻辑回归实际上是用线性回归模型的预测结果去逼近样本标记的对数几率，其实际上是一种分类算法，具体的分类方法为：设定一个分类阈值，把预测结果大于分类阈值的样本归为正类，反之归为反类"},{"id":96929,"order":671,"type":"single_choice","question":"分类预测方法中的 K 近邻算法，其核心机制是（）。","options":[{"label":"A","text":"需要手动选择特征"},{"label":"B","text":"需要计算样本间的距离"},{"label":"C","text":"是一种无监督学习算法"},{"label":"D","text":"不能用于文本分类"}],"answer":"B","analysis":"最近邻算法需要计算样本间的距离，根据距离选择最近的k个样本进行分类预测"},{"id":96250,"order":672,"type":"single_choice","question":"可以作为计算机输入设备和输出设备的是（）","options":[{"label":"A","text":"键盘"},{"label":"B","text":"耳机"},{"label":"C","text":"触摸屏"},{"label":"D","text":"打印机"}],"answer":"C","analysis":"触摸屏兼具输入（触控）与输出（显示）功能。"},{"id":96863,"order":673,"type":"single_choice","question":"智能系统在安防领域的应用，并非建立在（）技术之上。","options":[{"label":"A","text":"人工智能技术"},{"label":"B","text":"大数据技术"},{"label":"C","text":"传感器技术"},{"label":"D","text":"手机应用技术"}],"answer":"D","analysis":"智能系统在安防领域的运用是建立在人工智能、大数据、传感器等技术上。"},{"id":96659,"order":674,"type":"single_choice","question":"下列哪一项并不是数据审核的意义的是（）。","options":[{"label":"A","text":"确保数据的一致性"},{"label":"B","text":"确保数据的完整性和准确性"},{"label":"C","text":"确保数据的合规性"},{"label":"D","text":"保证数据的可恢复性"}],"answer":"D","analysis":"数据审核是指对数据进行检查和验证，以确保数据的完整性、准确性、一致性、合规性"},{"id":96813,"order":675,"type":"single_choice","question":"在数据整理过程中，能将数据集按照指定条件切分成若干组的方法是（）。","options":[{"label":"A","text":"Group-by"},{"label":"B","text":"Stack"},{"label":"C","text":"Pivot-table"},{"label":"D","text":"Melt"}],"answer":"A","analysis":"使用group-by方法可以将数据集按照指定的条件切分成若干个组，然后对每个组进行统计分析"},{"id":96814,"order":676,"type":"single_choice","question":"在数据整理过程中，可用于识别重复值的方法是（）。","options":[{"label":"A","text":"Melt"},{"label":"B","text":"Unstack"},{"label":"C","text":"df.duplicated()"},{"label":"D","text":"Add"}],"answer":"C","analysis":"使用df.duplicated()识别重复值。"},{"id":96748,"order":677,"type":"single_choice","question":"在多轮抽样检验中，若发现同一名标注员有两轮抽样检验的标注都不合格，这时需要采取的措施是（）。","options":[{"label":"A","text":"只需改正不合格的标注数据"},{"label":"B","text":"重新进行全样检验"},{"label":"C","text":"重新进行抽样检查"},{"label":"D","text":"删除不合格的标注数据"}],"answer":"B","analysis":"在多轮的抽样检验中，如果发现同一标注员存在有两轮抽样检验不合格的标注，则认定此标注员标注的数据集为不合格，需要重新进行全样检验，该标注员对检验完不合格的数据标注进行返工，改正标注"},{"id":96586,"order":678,"type":"single_choice","question":"求同法和求异法同属科学归纳法的基本方法，二者之间的区别是什么？（）","options":[{"label":"A","text":"求同法强调数据收集，求异法强调数据处理"},{"label":"B","text":"求同法强调定量分析，求异法强调定性分析"},{"label":"C","text":"求同法强调逻辑推理，求异法强调试错方法"},{"label":"D","text":"求同法强调寻找问题中的共性，求异法强调寻找问题中的差异"}],"answer":"D","analysis":"求同法寻找共性，求异法寻找差异。"},{"id":96358,"order":679,"type":"single_choice","question":"在数据质量把控流程中，（）对于保障数据在动态业务决策中的有效性更为关键？","options":[{"label":"A","text":"数据时效性"},{"label":"B","text":"数据一致性"},{"label":"C","text":"数据完整性"},{"label":"D","text":"数据准确性"}],"answer":"A","analysis":"动态业务中数据时效性对决策有效性更关键。"},{"id":96219,"order":680,"type":"single_choice","question":"计算机进行数据处理和运算时，其组成部分包含（）。","options":[{"label":"A","text":"打印机"},{"label":"B","text":"CPU"},{"label":"C","text":"鼠标"},{"label":"D","text":"显示器"}],"answer":"B","analysis":"显示器是计算机的输出设备，用来显示计算机处理的图像和文字等信息"},{"id":96519,"order":681,"type":"single_choice","question":"下列不属于DBSCAN 密度聚类的优点的是（）。","options":[{"label":"A","text":"执行速度非常快"},{"label":"B","text":"对噪声点不敏感"},{"label":"C","text":"可以识别任意形状的簇"},{"label":"D","text":"不需要指定聚类个数"}],"answer":"A","analysis":"DBSCAN优点包括无需指定聚类数、识别任意形状簇、对噪声不敏感，但执行速度不快。"},{"id":96402,"order":682,"type":"single_choice","question":"在数据处理的流程里，对数据中的错误和不一致情况进行处理属于哪个环节？（）","options":[{"label":"A","text":"数据可视化"},{"label":"B","text":"数据分析"},{"label":"C","text":"数据清洗"},{"label":"D","text":"数据采集"}],"answer":"C","analysis":"数据清洗是用于处理数据中的错误和不一致性的步骤，通过清洗数据，可以提高数据的质量和准确性"},{"id":96184,"order":683,"type":"single_choice","question":"职业道德具有推动行业发展的功能，其最直观的体现是（）？","options":[{"label":"A","text":"提供职业培训和晋升机会"},{"label":"B","text":"支持个人利益追求"},{"label":"C","text":"从业人员有责任心"},{"label":"D","text":"允许通过虚假宣传吸引客户"}],"answer":"C","analysis":"行业、企业的发展有赖于高的经济效益，而高的经济效益源于高的员工素质。员工素质 t":"增加一倍"},{"label":"D","text":"增加两倍"}],"answer":"C","analysis":"第一轮发现不合格时，第二轮检验数据量增加一倍。"},{"id":96312,"order":697,"type":"single_choice","question":"按照《中华人民共和国劳动合同法》，在（）情形下，不违反该法规定。","options":[{"label":"A","text":"依据法规解雇不能胜任工作，经过培训或者调整工作岗位仍不能胜任工作的员工"},{"label":"B","text":"用人单位不支付员工的工资"},{"label":"C","text":"用人单位安排员工加班，但没有支付相应的加班工资"},{"label":"D","text":"用人单位将员工工资降低，但没有得到员工同意"}],"answer":"A","analysis":"《中华人民共和国劳动合同法》第四十条规定，有下列情形之一的，用人单位提前三十日以书面形式通知劳动者本人或者额外支付劳动者一个月工资后，可以解除劳动合同：（一）劳动者患病或者非因工负伤，在规定的医疗期满后不能从事原工作，也不能从事由用人单位另行安排的工作的；（二）劳动者不能胜任工作，经过培训或者调整工作岗位，仍不能胜任工作的；（三）劳动合同订立时所依据的客观情况发生重大变化，致使劳动合同无法履行，经用人单位与劳动者协商，未能就变更劳动合同内容达成协议的"},{"id":96424,"order":698,"type":"single_choice","question":"在Excel软件操作中，若要对一列数据执行去重操作，应首先进行（）操作。","options":[{"label":"A","text":"任意选择一个单元格"},{"label":"B","text":"选择该列的整个范围"},{"label":"C","text":"该列中的最后一个单元格"},{"label":"D","text":"该列中的第一个单元格"}],"answer":"B","analysis":"在Excel中，如果想要对一列数据进行去重操作，需要选择该列的整个范围，因为REMOVE DUPLICATES功能只能作用于选中的整个数据范围"},{"id":96852,"order":699,"type":"single_choice","question":"下列哪项属于智慧校园的相关实际案例？（）","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"智慧教室技术"},{"label":"C","text":"智能门禁系统"},{"label":"D","text":"校园安防系统"}],"answer":"A","analysis":"智慧校园的相关案例包括校园安防系统、智能门禁系统、智慧教室技术"},{"id":96648,"order":700,"type":"single_choice","question":"聚类和分类在算法选择上的主要差异体现在（）。","options":[{"label":"A","text":"聚类算法属于无监督学习，而分类算法属于有监督学习"},{"label":"B","text":"聚类算法需预先定义类别，分类算法自动发现类别"},{"label":"C","text":"聚类和分类的算法选择没有固定的区别"},{"label":"D","text":"聚类和分类的算法选择完全相同"}],"answer":"A","analysis":"聚类（无监督）与分类（有监督）的本质区别在于是否需要标签数据，算法选择直接受此影响。聚类无需预先定义类别（自动发现），而分类必须依赖预定义的类别标签。两者算法选择有明显差异（无监督 vs. 有监督），例如聚类不涉及损失函数优化，而分类需通过损失函数（如交叉熵）调整模型参数。"},{"id":96549,"order":701,"type":"single_choice","question":"在 K-Means 聚类里，有哪些方法可以用来选择初始点（）。","options":[{"label":"A","text":"随机选择、K-Means++"},{"label":"B","text":"均匀分布、随机选择、K-Means++"},{"label":"C","text":"K-Means++、均匀分布"},{"label":"D","text":"随机选择、均匀分布"}],"answer":"A","analysis":"在K-Means聚类中，选择初始点的方法一般有两种方法：随机选择、K-Means++"},{"id":96375,"order":702,"type":"single_choice","question":"HTTP属于（）。","options":[{"label":"A","text":"数据链路层协议"},{"label":"B","text":"网络层协议"},{"label":"C","text":"传输层协议"},{"label":"D","text":"应用层协议"}],"answer":"D","analysis":"HTTP是应用层协议，它的作用是在客户端和服务器之间传输数据"},{"id":96800,"order":703,"type":"single_choice","question":"下列哪段代码可以筛选出列表中大于 10 的元素？（）","options":[{"label":"A","text":"[x for x in list if x > 10]"},{"label":"B","text":"[x in list if x > 10]"},{"label":"C","text":"[for x in list if x > 10]"},{"label":"D","text":"[x for list if x > 10]"}],"answer":"A","analysis":"列表推导式可以方便简洁地对列表进行筛选、变换等操作。语法为：[expression for item in list if condition]，其中“expression”表示对item进行的操作，如保留原样或变换，可以是任意表达式，“list”表示原始列表，“condition”表示用于筛选item的条件。"},{"id":96425,"order":704,"type":"single_choice","question":"在SQL语言里，去除重复值所使用的关键字是什么？（）","options":[{"label":"A","text":"SORT BY"},{"label":"B","text":"GROUP BY"},{"label":"C","text":"DISTINCT"},{"label":"D","text":"UNIQUE"}],"answer":"C","analysis":"在SQL中，去除重复值的关键字是DISTINCT"},{"id":96592,"order":705,"type":"single_choice","question":"某气象站观察到这样一种情况：4 次强降雨来临前，当地云层里都检测到气溶胶浓度异常上升；而在 3 次预报有降雨但实际未降雨的案例中，云层的气溶胶浓度都处于正常水平。研究者由此认为，气溶胶浓度异常是引发强降雨的关键条件。这一推理所遵循的逻辑方法是（）。","options":[{"label":"A","text":"剩余法"},{"label":"B","text":"求同求异并用法"},{"label":"C","text":"求异法"},{"label":"D","text":"共变法"}],"answer":"B","analysis":"符合求同求异并用法的判定条件：正面场合求同：所有强降雨发生前（现象出现）均存在气溶胶浓度异常的共性；反面场合求同：所有未降雨案例（现象未出现）均不存在气溶胶浓度异常的共性"},{"id":96506,"order":706,"type":"single_choice","question":"在 JSON 格式中，用什么字符来表示一个对象的开始与结束（）。","options":[{"label":"A","text":": 和 ,"},{"label":"B","text":"和"},{"label":"C","text":"[ 和 ]"},{"label":"D","text":"{ 和 }"}],"answer":"D","analysis":"JSON对象用花括号{}表示开始与结束。"},{"id":96343,"order":707,"type":"single_choice","question":"对数据质量标准进行评价，其主要的评价标准包含（）。","options":[{"label":"A","text":"数据的加密和解密算法"},{"label":"B","text":"数据的备份和恢复能力"},{"label":"C","text":"数据的存储效率和传输速度"},{"label":"D","text":"数据的完整性和准确性"}],"answer":"D","analysis":"数据质量标准评价标准主要关注数据的完整性和准确性，即数据是否完整、准确、一致等"},{"id":96442,"order":708,"type":"single_choice","question":"在以下情况中，哪种情况可以不对数据进行标准化处理？（）","options":[{"label":"A","text":"数据集中没有异常值"},{"label":"B","text":"数据集很大"},{"label":"C","text":"数据集很小"},{"label":"D","text":"数据已经处于相同的尺度下"}],"answer":"D","analysis":"如果数据已经处于相同的尺度下，就不需要进行数据标准化"},{"id":96628,"order":709,"type":"single_choice","question":"在图像数据的各类归类方式里，哪一种常用于解决单目相机的深度相关问题？（）","options":[{"label":"A","text":"RGB-D图像"},{"label":"B","text":"灰度图像"},{"label":"C","text":"彩色图像"},{"label":"D","text":"二值化图像"}],"answer":"A","analysis":"RGB-D图像是指同时获取了颜色和深度信息的图像。通过计算距离信息可以得到场景的空间结构和物体的深度信息。在解决单目相机深度问题中应用广泛。参考资料：https://baike.baidu.com/item/RGB-D%E5%9B%BE%E5%83%8F"},{"id":96217,"order":710,"type":"single_choice","question":"在追求卓越的基本要求中，“持续改进” 具体体现在哪些方面（）。","options":[{"label":"A","text":"提升个人社会地位"},{"label":"B","text":"改进工作方法和流程"},{"label":"C","text":"扩大个人权力范围"},{"label":"D","text":"增加个人经济收益"}],"answer":"B","analysis":"根据\"追求卓越\"基本要求，持续改进体现在从业人员持续改进自己的工作方法和流程，寻找更好的解决方案。不断反思和总结经验，主动寻求反馈意见，并将其应用于工作中，以提升工作效率和质量。"},{"id":96816,"order":711,"type":"single_choice","question":"数据清洗在数据整理的步骤中的作用是（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"去除不一致的数据"},{"label":"C","text":"去除缺失值"},{"label":"D","text":"去除重复数据"}],"answer":"A","analysis":"数据清洗指的是将不一致、异常、缺失、重复的数据去掉"},{"id":96369,"order":712,"type":"single_choice","question":"数据采集过程中，强调需获得合法授权，其具体含义是（）。","options":[{"label":"A","text":"采集数据用途合法"},{"label":"B","text":"注意处理敏感信息"},{"label":"C","text":"必须获得相关主体的明确、合法、知情的同意"},{"label":"D","text":"遵守隐私保护的原则"}],"answer":"C","analysis":"合法授权核心在于必须获得相关主体的明确、合法、知情的同意​"},{"id":96856,"order":713,"type":"single_choice","question":"属于智能系统应用于家居领域的优点的是（）。","options":[{"label":"A","text":"无法与其他设备进行联动"},{"label":"B","text":"不易操作"},{"label":"C","text":"增加家居装修费用"},{"label":"D","text":"提高生活舒适度"}],"answer":"D","analysis":"智能系统在家居领域的优点包括提高生活舒适度、提高安全性、节省能源等"},{"id":96455,"order":714,"type":"single_choice","question":"在数据集成方法里，ETL所代表的含义是什么？（）","options":[{"label":"A","text":"数据监控和报警"},{"label":"B","text":"数据抽取、转换和加载"},{"label":"C","text":"数据质量检测"},{"label":"D","text":"拓扑一致性检测"}],"answer":"B","analysis":"ETL是数据仓库中经典的数据集成方法，包括数据抽取（Extract）、转换（Transform）和加载（Load）三个过程，是将异构的数据从不同来源进行同构化的重要手段"},{"id":96449,"order":715,"type":"single_choice","question":"对于连续性的数据，在何种情形下采用等宽离散化比等频离散化更为合适？（）","options":[{"label":"A","text":"数据的分布呈现长尾分布或重尾分布的情况"},{"label":"B","text":"数据的分布呈现正态分布或近似正态分布的情况"},{"label":"C","text":"数据的分布比较集中，存在一定的异常值"},{"label":"D","text":"数据的分布比较平均，每个区间内的数据值差别不大"}],"answer":"D","analysis":"等宽离散化的原则是将数据平均划分为k个桶，每个桶内的数据范围相等"},{"id":96346,"order":716,"type":"single_choice","question":"要开展数据质量标准评价，可通过哪些方法来判断数据是否符合预期的质量标准（）。","options":[{"label":"A","text":"数据加密和解密"},{"label":"B","text":"数据清洗和整理"},{"label":"C","text":"数据验证和校验"},{"label":"D","text":"数据备份和存储"}],"answer":"C","analysis":"通过数据验证和校验判断数据是否符合质量标准。"},{"id":96896,"order":717,"type":"single_choice","question":"过滤式选择是常用的特征选择方法，下列哪项不属于该方法中常用于度量信息量的方式？（）","options":[{"label":"A","text":"L1正则化"},{"label":"B","text":"互信息"},{"label":"C","text":"卡方检验"},{"label":"D","text":"相关系数"}],"answer":"A","analysis":"过滤式选择中常用度量信息量的方法有相关系数、卡方检验、互信息等，而L1正则化是一种嵌入式特征选择方法，并不属于过滤式选择中常用的度量信息量的方法"},{"id":96243,"order":718,"type":"single_choice","question":"运算器作为计算机的核心部件，它的功能是（）。","options":[{"label":"A","text":"连接计算机和外部设备"},{"label":"B","text":"用于执行各种算术和逻辑运算"},{"label":"C","text":"控制计算机的运行"},{"label":"D","text":"存储数据"}],"answer":"B","analysis":"运算器是计算机的核心部件，主要作用是进行算术和逻辑运算，能够对数据进行计算和处理"},{"id":96568,"order":719,"type":"single_choice","question":"实现DIANA 层次聚类算法的第二步是（）。","options":[{"label":"A","text":"从当前的簇集合中选择一个直径最大的簇"},{"label":"B","text":"将簇分裂成子簇"},{"label":"C","text":"计算类簇之间的距离"},{"label":"D","text":"计算所有样本点之间的距离"}],"answer":"A","analysis":"DIANA层次聚类算法的实现步骤中，第二步是需选择当前簇集合中直径最大的簇进行分裂，选项A是正确的。在DIANA算法中，需要计算当前所有簇的直径，选择直径最大的簇进行分裂，得到更小的子簇。"},{"id":96342,"order":720,"type":"single_choice","question":"在 Python 编程语言中，能用于存储一组包含多种类型的有序元素的数据类型是（）。","options":[{"label":"A","text":"list"},{"label":"B","text":"str"},{"label":"C","text":"float"},{"label":"D","text":"int"}],"answer":"A","analysis":"list可存储多种类型的有序元素。"},{"id":96942,"order":721,"type":"single_choice","question":"哪种情况不适合采用动态规划法来解决？（）","options":[{"label":"A","text":"子问题之间有重叠"},{"label":"B","text":"子问题的最优解可以通过子问题的最优解得到"},{"label":"C","text":"子问题的规模较大"},{"label":"D","text":"子问题之间互不干扰"}],"answer":"D","analysis":"动态规划法适用于子问题之间有重叠的情况，可以通过利用子问题的最优解得到总问题的最优解。对于没有重叠的子问题，使用动态规划法无法提高效率，还可能浪费空间。"},{"id":96526,"order":722,"type":"single_choice","question":"在 OPTICS 密度聚类算法的执行过程中，一个点的核心距离（core-distance）被界定为（）。","options":[{"label":"A","text":"使该点成为核心点所需的最小邻域半径（即该半径内至少包含MinPts个邻居）"},{"label":"B","text":"该点到最近邻点的距离"},{"label":"C","text":"该点与所有邻居点距离的平均值"},{"label":"D","text":"该点与其所属簇中心点的欧氏距离"}],"answer":"A","analysis":"核心距离是使点成为核心点的最小邻域半径。"},{"id":96912,"order":723,"type":"single_choice","question":"线性回归里的权重向量 w 代表着什么含义？（）","options":[{"label":"A","text":"目标变量的值"},{"label":"B","text":"每个样本点的权重"},{"label":"C","text":"每个特征在预测结果中的作用大小"},{"label":"D","text":"直线的截距和斜率"}],"answer":"C","analysis":"权重向量w表示每个特征在预测结果中的作用大小。"},{"id":96403,"order":724,"type":"single_choice","question":"在图像处理领域，哪种滤波方法适用于去除椒盐噪声？（）","options":[{"label":"A","text":"双边滤波"},{"label":"B","text":"高斯滤波"},{"label":"C","text":"中值滤波"},{"label":"D","text":"均值滤波"}],"answer":"C","analysis":"中值滤波适用于去除椒盐噪声，因为它通过选择像素值在一定范围内的像素点进行排序，并取中间值作为去噪后的像素值"},{"id":96918,"order":725,"type":"single_choice","question":"sklearn 的 linear_model 模块提供了 LinearRegression 类，用于构建最小二乘回归模型，该类中用于表示是否复制样本特征集的参数是（）。","options":[{"label":"A","text":"n_jobs"},{"label":"B","text":"copy_X"},{"label":"C","text":"normalize"},{"label":"D","text":"fit_intercept"}],"answer":"B","analysis":"copy_X参数表示是否复制样本特征集。"},{"id":96627,"order":726,"type":"single_choice","question":"在图像数据的各类归类类型中，通过特征提取得到的图像类型一般用于（）。","options":[{"label":"A","text":"解决单目相机的深度问题"},{"label":"B","text":"增强图像细节和纹理"},{"label":"C","text":"简化图像处理和分析"},{"label":"D","text":"图像搜索和识别"}],"answer":"D","analysis":"特征提取图像是指根据图像的特征属性提取出对图像分类、搜索、识别等有用的信息。应用广泛，例如人脸识别、车牌识别、手写数字识别等。"},{"id":96685,"order":727,"type":"single_choice","question":"下列哪一步骤不属于语音数据的加工环节？（）","options":[{"label":"A","text":"语音数据的标注"},{"label":"B","text":"语音数据的预处理"},{"label":"C","text":"语音数据的采集"},{"label":"D","text":"语音音质的提高"}],"answer":"D","analysis":"语音数据的加工处理包括语音数据的采集、语音数据的预处理和语音数据的标注，不包括语音音质的提高"},{"id":96320,"order":728,"type":"single_choice","question":"网络著作权所有人可以不加以阻止的行为是（）。","options":[{"label":"A","text":"未经著作权人许可，以展览、摄制视听作品的方法使用作品"},{"label":"B","text":"通过科技手段破解该作品的加密保护措施，并将其公开传播"},{"label":"C","text":"免费表演已经发表的作品"},{"label":"D","text":"在其他网站上复制、传播该作品"}],"answer":"C","analysis":"《中华人民共和国著作权法》第二十四条（九）规定，免费表演已经发表的作品，该表演未向公众收取费用，也未向表演者支付报酬，且不以营利为目的，该情况下使用作品，可以不经著作权人许可，不向其支付报酬，但应当指明作者姓名或者名称、作品名称，并且不得影响该作品的正常使用，也不得不合理地损害著作权人的合法权益"},{"id":96769,"order":729,"type":"single_choice","question":"开展数据质检，其目的是什么？（）","options":[{"label":"A","text":"提高数据的存储效率"},{"label":"B","text":"保护数据的安全性和隐私性"},{"label":"C","text":"提高数据处理的效率"},{"label":"D","text":"确保数据的准确性、完整性、一致性和及时性"}],"answer":"D","analysis":"数据质量检测的目的是确保数据的准确性、完整性、一致性和及时性，为后续的数据分析、数据挖掘和决策支持提供可靠的基础"},{"id":96658,"order":730,"type":"single_choice","question":"对于一个数据处理系统，（）不属于数据审核需要考量的范畴。","options":[{"label":"A","text":"数据的存储容量"},{"label":"B","text":"安全性检查"},{"label":"C","text":"数据合规性检查"},{"label":"D","text":"数据质量评估"}],"answer":"A","analysis":"数据存储容量不属于数据审核范畴。"},{"id":96336,"order":731,"type":"single_choice","question":"依据《中华人民共和国个人信息保护法》，在哪些行为中，经过个人同意后可以收集个人信息（）。","options":[{"label":"A","text":"与个人信息主体签订合同或者履行其他法律义务所必需的个人信息"},{"label":"B","text":"为维护国家安全、公共安全等公共利益所必需的个人信息"},{"label":"C","text":"经过个人信息主体同意的其他用途"},{"label":"D","text":"以上选项均正确"}],"answer":"D","analysis":"根据《中华人民共和国个人信息保护法》第十三条规定，符合下列情形之一的，个人信息处理者方可处理个人信息：（一）取得个人的同意；（二）为订立、履行个人作为一方当事人的合同所必需，或者按照依法制定的劳动规章制度和依法签订的集体合同实施人力资源管理所必需；（三）为履行法定职责或者法定义务所必需；（四）为应对突发公共卫生事件，或者紧急情况下为保护自然人的生命健康和财产安全所必需；（五）为公共利益实施新闻报道、舆论监督等行为，在合理的范围内处理个人信息；（六）依照本法规定在合理的范围内处理个人自行公开或者其他已经合法公开的个人信息；（七）法律、行政法规规定的其他情形。依照本法其他有关规定，处理个人信息应当取得个人同意，但是有前款第二项至第七项规定情形的，不需取得个人同意。"},{"id":96365,"order":732,"type":"single_choice","question":"以下关于爬虫程序的说法，哪一项是错误的（）。","options":[{"label":"A","text":"爬虫程序需要妥善处理异常情况"},{"label":"B","text":"爬虫程序可以使用多线程技术提高抓取效率"},{"label":"C","text":"爬虫程序需要处理网站反爬虫机制"},{"label":"D","text":"爬虫程序可以随意修改网站的内容"}],"answer":"D","analysis":"爬虫程序只能获取网站的内容，但不能修改其内容"},{"id":96678,"order":733,"type":"single_choice","question":"实施数据标注质量检测，能够保障（）。","options":[{"label":"A","text":"数据采集和清洗的过程"},{"label":"B","text":"标注规则和标注格式的制定"},{"label":"C","text":"标注结果的准确性和一致性"},{"label":"D","text":"标注员的工作效率"}],"answer":"C","analysis":"数据标注质量检测保障标注结果的准确性和一致性。"},{"id":96588,"order":734,"type":"single_choice","question":"在求异法中，“比较现象存在与不存在的场合” 这一步骤，主要是为了达到什么目的？（）","options":[{"label":"A","text":"实施对照实验并验证假设"},{"label":"B","text":"测量变量间的共变关系"},{"label":"C","text":"归纳所有场合中的共同特征"},{"label":"D","text":"确定现象与条件的唯一差异因素"}],"answer":"D","analysis":"求异法的核心逻辑是通过比较正例（现象存在）与反例（现象不存在）的场合，​锁定唯一差异因素作为原因"},{"id":96188,"order":735,"type":"single_choice","question":"职业道德的历史继承性，其意思是指（）？","options":[{"label":"A","text":"在长期实践过程中形成的"},{"label":"B","text":"受到社会广泛认可"},{"label":"C","text":"普遍适用于个人行为"},{"label":"D","text":"适用于所有职业"}],"answer":"A","analysis":"职业道德的历史传承是指人类社会在长期实践过程中形成的，会被被继承和传承下来"},{"id":96895,"order":736,"type":"single_choice","question":"特征工程最终要达成的目标是什么？（）","options":[{"label":"A","text":"增加模型的复杂度"},{"label":"B","text":"精简数据集"},{"label":"C","text":"优化模型预测结果"},{"label":"D","text":"提高模型训练速度"}],"answer":"C","analysis":"特征工程是指通过对原始数据进行处理和转换，以获取更有价值、更具代表性和更易处理的特征，使得特征能在机器学习算法上发挥更好的作用的过程，最终优化模型的预测结果"},{"id":96559,"order":737,"type":"single_choice","question":"在 Python 中，能够正确导入 KMeans 模块的代码是（）。","options":[{"label":"A","text":"from sklearn.neural_network import KMeans"},{"label":"B","text":"from sklearn.tree import KMeans"},{"label":"C","text":"from sklearn.linear_model import KMeans"},{"label":"D","text":"from sklearn.cluster import KMeans"}],"answer":"D","analysis":"在Python中，可以通过from sklearn.cluster import KMeans来导入sklearn中的KMeans模块"},{"id":96310,"order":738,"type":"single_choice","que
