<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>人工智能四级-题库练习(离线版)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6fa; min-height: 100vh; padding-bottom: 60px; }
        .top-bar { position: fixed; top: 0; left: 0; right: 0; height: 44px; background: #fff; display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 600; color: #333; z-index: 100; border-bottom: 1px solid #eee; }
        .main-content { padding-top: 44px; }
        .question-section { background: #fff; padding: 20px 16px; margin-bottom: 10px; }
        .question-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
        .q-type { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 12px; }
        .q-type.judge { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .q-number { color: #999; font-size: 14px; }
        .q-title { font-size: 17px; line-height: 1.7; color: #333; font-weight: 500; }
        .options-section { background: #fff; padding: 10px 16px 20px; }
        .option-item { display: flex; align-items: flex-start; padding: 16px; margin-bottom: 12px; background: #f8f9fc; border-radius: 12px; border: 2px solid transparent; cursor: pointer; transition: all 0.15s ease; position: relative; }
        .option-item:active { transform: scale(0.98); }
        .option-item.correct { background: #ecfdf5; border-color: #10b981; }
        .option-item.wrong { background: #fef2f2; border-color: #ef4444; }
        .option-item.disabled { pointer-events: none; }
        .option-letter { width: 28px; height: 28px; border-radius: 50%; background: #e5e7eb; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #6b7280; margin-right: 14px; flex-shrink: 0; }
        .option-item.correct .option-letter { background: #10b981; color: #fff; }
        .option-item.wrong .option-letter { background: #ef4444; color: #fff; }
        .option-content { flex: 1; font-size: 16px; line-height: 1.6; color: #374151; padding-top: 2px; }
        .option-icon { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); font-size: 22px; }
        .answer-card { background: #fff; margin: 10px 0; padding: 16px; display: none; }
        .answer-card.show { display: block; animation: slideUp 0.3s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .answer-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
        .answer-label { font-size: 14px; color: #6b7280; }
        .answer-value { font-size: 18px; font-weight: 700; color: #10b981; }
        .wrong-tip { display: flex; align-items: center; gap: 6px; padding: 12px; background: #fef3c7; border-radius: 8px; font-size: 14px; color: #d97706; margin-top: 12px; }
        .nav-section { display: flex; padding: 16px; gap: 12px; background: #fff; margin-top: 10px; }
        .nav-btn { flex: 1; height: 48px; border: none; border-radius: 24px; font-size: 16px; font-weight: 500; cursor: pointer; transition: all 0.15s ease; }
        .nav-btn:active { transform: scale(0.96); }
        .nav-btn.prev { background: #f3f4f6; color: #6b7280; }
        .nav-btn.next { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .nav-btn:disabled { opacity: 0.4; pointer-events: none; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 60px; background: #fff; display: flex; border-top: 1px solid #eee; z-index: 100; }
        .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; color: #9ca3af; transition: color 0.15s ease; }
        .tab-item.active { color: #667eea; }
        .tab-icon { font-size: 22px; margin-bottom: 2px; }
        .tab-label { font-size: 11px; }
        .tab-badge { position: absolute; top: 6px; right: 50%; transform: translateX(18px); min-width: 18px; height: 18px; background: #ef4444; color: #fff; font-size: 11px; font-weight: 600; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
        .tab-badge:empty { display: none; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 200; display: none; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal-box { background: #fff; width: 90%; max-width: 380px; max-height: 75vh; border-radius: 16px; overflow: hidden; }
        .modal-head { padding: 16px 20px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; display: flex; align-items: center; justify-content: space-between; }
        .modal-title { font-size: 17px; font-weight: 600; }
        .modal-close { font-size: 26px; cursor: pointer; line-height: 1; }
        .modal-body { padding: 16px; max-height: 55vh; overflow-y: auto; }
        .filter-row { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .filter-btn { padding: 8px 16px; border: none; border-radius: 20px; font-size: 13px; cursor: pointer; background: #f3f4f6; color: #6b7280; transition: all 0.15s ease; }
        .filter-btn.active { background: #667eea; color: #fff; }
        .grid-box { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .grid-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; background: #f3f4f6; color: #6b7280; transition: all 0.15s ease; }
        .grid-cell:active { transform: scale(0.9); }
        .grid-cell.done { background: #dbeafe; color: #3b82f6; }
        .grid-cell.right { background: #d1fae5; color: #059669; }
        .grid-cell.wrong { background: #fee2e2; color: #dc2626; }
        .grid-cell.star { background: #fef3c7; color: #d97706; }
        .grid-cell.now { background: #667eea; color: #fff; }
        .stats-page { padding: 44px 12px 70px; display: none; }
        .stats-page.show { display: block; }
        .stats-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; }
        .stats-head { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 12px; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .stat-box { background: #f8f9fc; border-radius: 10px; padding: 16px; text-align: center; }
        .stat-num { font-size: 28px; font-weight: 700; color: #667eea; }
        .stat-num.green { color: #10b981; }
        .stat-num.red { color: #ef4444; }
        .stat-txt { font-size: 12px; color: #9ca3af; margin-top: 4px; }
        .type-switch { display: flex; padding: 8px; gap: 8px; background: #fff; margin-bottom: 10px; }
        .type-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; background: #f3f4f6; color: #6b7280; }
        .type-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .empty-box { text-align: center; padding: 40px 20px; color: #9ca3af; }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
    </style>
</head>
<body>
    <div class="top-bar"><span>题库练习 (离线版)</span></div>
    <div class="main-content" id="mainContent">
        <div class="type-switch">
            <button class="type-btn active" onclick="changeType('all')">全部(1000)</button>
            <button class="type-btn" onclick="changeType('single_choice')">单选(768)</button>
            <button class="type-btn" onclick="changeType('judge')">判断(232)</button>
        </div>
        <div class="question-section" id="questionSection"></div>
        <div class="options-section" id="optionsSection"></div>
        <div class="answer-card" id="answerCard"></div>
        <div class="nav-section">
            <button class="nav-btn prev" onclick="goPrev()">上一题</button>
            <button class="nav-btn next" onclick="goNext()">下一题</button>
        </div>
    </div>
    <div class="stats-page" id="statsPage">
        <div class="stats-card">
            <div class="stats-head">答题统计</div>
            <div class="stats-grid">
                <div class="stat-box"><div class="stat-num" id="sAnswered">0</div><div class="stat-txt">已答题</div></div>
                <div class="stat-box"><div class="stat-num green" id="sCorrect">0</div><div class="stat-txt">正确</div></div>
                <div class="stat-box"><div class="stat-num red" id="sWrong">0</div><div class="stat-txt">错误</div></div>
                <div class="stat-box"><div class="stat-num" id="sRate">0%</div><div class="stat-txt">正确率</div></div>
            </div>
        </div>
        <div class="stats-card"><div class="stats-head">错题本 <span id="wrongNum"></span></div><div id="wrongGrid"></div></div>
        <div class="stats-card"><div class="stats-head">收藏夹 <span id="favNum"></span></div><div id="favGrid"></div></div>
    </div>
    <div class="bottom-bar">
        <div class="tab-item active" onclick="showMain()"><span class="tab-icon">📝</span><span class="tab-label">答题</span></div>
        <div class="tab-item" onclick="showWrongList()"><span class="tab-icon">❌</span><span class="tab-label">错题</span><span class="tab-badge" id="wrongBadge"></span></div>
        <div class="tab-item" onclick="showFavList()"><span class="tab-icon">⭐</span><span class="tab-label">收藏</span><span class="tab-badge" id="favBadge"></span></div>
        <div class="tab-item" onclick="showStats()"><span class="tab-icon">📊</span><span class="tab-label">统计</span></div>
        <div class="tab-item" onclick="showGridModal()"><span class="tab-icon">📋</span><span class="tab-label">题号</span></div>
    </div>
    <div class="modal-overlay" id="gridModal">
        <div class="modal-box">
            <div class="modal-head"><span class="modal-title">题目导航</span><span class="modal-close" onclick="closeGridModal()">×</span></div>
            <div class="modal-body">
                <div class="filter-row">
                    <button class="filter-btn active" onclick="filterQ('all')">全部</button>
                    <button class="filter-btn" onclick="filterQ('done')">已答</button>
                    <button class="filter-btn" onclick="filterQ('undone')">未答</button>
                    <button class="filter-btn" onclick="filterQ('wrong')">错题</button>
                    <button class="filter-btn" onclick="filterQ('star')">收藏</button>
                </div>
                <div class="grid-box" id="gridBox"></div>
            </div>
        </div>
    </div>
    <script>
        const list = [{"id":96562,"order":1,"type":"single_choice","question":"在 Python 中运用 K-Means 算法开展聚类分析时，需要调用哪个库（）。","options":[{"label":"A","text":"Matplotlib"},{"label":"B","text":"Scikit-learn"},{"label":"C","text":"Pandas"},{"label":"D","text":"NumPy"}],"answer":"B"},{"id":96236,"order":2,"type":"single_choice","question":"下列哪一项属于小型计算机的范畴（）。","options":[{"label":"A","text":"IBMAS/400"},{"label":"B","text":"普通家用电脑"},{"label":"C","text":"掌上电脑"},{"label":"D","text":"服务器"}],"answer":"A"},{"id":96923,"order":3,"type":"single_choice","question":"在分类预测任务里，混淆矩阵的主要功能是（）。","options":[{"label":"A","text":"表示样本特征之间相关程度的矩阵"},{"label":"B","text":"评估分类模型效果的矩阵"},{"label":"C","text":"表示样本之间相似度的矩阵"},{"label":"D","text":"表示不同类别之间的相关程度的矩阵"}],"answer":"B"},{"id":96680,"order":4,"type":"single_choice","question":"以下哪项属于图像标注质量标准中的指标之一？（）","options":[{"label":"A","text":"标注成本"},{"label":"B","text":"标注主观性"},{"label":"C","text":"标注准确性"},{"label":"D","text":"标注速度"}],"answer":"C"},{"id":96437,"order":5,"type":"single_choice","question":"运用最小 - 最大标准化方法，会将数据转换为何种形式？（）","options":[{"label":"A","text":"负数"},{"label":"B","text":"0到1之间的数值"},{"label":"C","text":"二值化"},{"label":"D","text":"正态分布"}],"answer":"B"},{"id":96480,"order":6,"type":"single_choice","question":"在 Cookie 机制中，Cookie 是由哪个主体生成的（）。","options":[{"label":"A","text":"数据库"},{"label":"B","text":"客户端浏览器"},{"label":"C","text":"客户机"},{"label":"D","text":"服务器"}],"answer":"D"},{"id":96406,"order":7,"type":"single_choice","question":"中值滤波是常用的去噪（平滑）方法，以下哪项描述最能体现中值滤波的原理？（）","options":[{"label":"A","text":"对图像中的每个像素点的像素值进行统计分析，根据统计结果进行去噪处理"},{"label":"B","text":"使用高斯函数对图像进行卷积，通过对周围像素的加权平均得到去噪后的图像"},{"label":"C","text":"通过选择像素值在一定范围内的像素点进行排序，并取中间值作为去噪后的像素值"},{"label":"D","text":"将图像中每个像素点的值与其相邻像素点的值进行加权平均，得到去噪后的图像"}],"answer":"C"},{"id":96607,"order":8,"type":"single_choice","question":"以下哪一项不属于数据分类要遵循的基本原则？（）","options":[{"label":"A","text":"按照数据大小进行分类"},{"label":"B","text":"按照数据来源进行分类"},{"label":"C","text":"按照数据类型进行分类"},{"label":"D","tex ice","question":"若要在请求里添加HTTP请求头信息，需运用（）方法中的headers参数来达成。","options":[{"label":"A","text":"requests.headers()"},{"label":"B","text":"requests.add_header()"},{"label":"C","text":"requests.get()"},{"label":"D","text":"requests.data()"}],"answer":"C"},{"id":96321,"order":18,"type":"single_choice","question":"依据《中华人民共和国专利法》，下列哪一项不在专利保护的范畴内？","options":[{"label":"A","text":"商业秘密"},{"label":"B","text":"外观设计"},{"label":"C","text":"实用新型"},{"label":"D","text":"发明"}],"answer":"A"},{"id":96292,"order":19,"type":"single_choice","question":"在 Excel 中，哪种图表最适用于对比不同类别之间的数值大小？（）","options":[{"label":"A","text":"饼图"},{"label":"B","text":"条形图"},{"label":"C","text":"散点图"},{"label":"D","text":"折线图"}],"answer":"B"},{"id":96843,"order":20,"type":"single_choice","question":"智能系统在医疗领域应用的目的是（）。","options":[{"label":"A","text":"限制病人看病的渠道"},{"label":"B","text":"增加医疗资源消耗"},{"label":"C","text":"增加医疗成本"},{"label":"D","text":"提高医疗效率"}],"answer":"D"},{"id":96205,"order":21,"type":"single_choice","question":"遵章守法对于个人而言，所起到的作用是（）。​","options":[{"label":"A","text":"扩大个人权力范围"},{"label":"B","text":"增加个人经济收益"},{"label":"C","text":"建立良好的社会形象"},{"label":"D","text":"提升个人社会地位"}],"answer":"C"},{"id":96870,"order":22,"type":"single_choice","question":"可视化分析中不常用的软件或工具是（）。","options":[{"label":"A","text":"Python"},{"label":"B","text":"Photoshop"},{"label":"C","text":"Excel"},{"label":"D","text":"Tableau"}],"answer":"B"},{"id":96275,"order":23,"type":"single_choice","question":"在 Word 中，执行哪项操作可以添入一张图片（）。","options":[{"label":"A","text":"点击“工具”选项卡，选择“插入图片”，然后从计算机中选择图片文件。"},{"label":"B","text":"点击“格式”选项卡，选择“插入图片”，然后从计算机中选择图片文件。"},{"label":"C","text":"点击“编辑”选项卡，选择“插入图片”，然后从计算机中选择图片文件。"},{"label":"D","text":"点击“插入” 选项卡，选择“图片”，点击“此设备”，然后从计算机中选择图片文件。"}],"answer":"D"},{"id":96839,"order":24,"type":"single_choice","question":"智能系统在零售业当中，可能起到的作用是（）。","options":[{"label":"A","text":"增加人力成本"},{"label":"B","text":"个性化推荐"},{"label":"C","text":"规避金融风险"},{"label":"D","text":"降低企业管理效率"}],"answer":"B"},{"id":96421,"order":25,"typ                     }
                    const icon = ans && o.label === q.answer ? '✓' : (ans && o.label === ans && ans !== q.answer ? '✗' : '');
                    optHtml += '<div class="' + cls + '" onclick="choose(' + q.id + ',\'' + o.label + '\',\'' + q.answer + '\')">';
                    optHtml += '<span class="option-letter">' + o.label + '</span>';
                    optHtml += '<span class="option-content">' + o.text + '</span>';
                    if (icon) optHtml += '<span class="option-icon">' + icon + '</span>';
                    optHtml += '</div>';
                });
            } else {
                ['正确', '错误'].forEach(function(v) {
                    let cls = 'option-item';
                    if (ans) {
                        cls += ' disabled';
                        if (v === ans) cls += ans === q.answer ? ' correct' : ' wrong';
                        else if (v === q.answer) cls += ' correct';
                    }
                    const icon = ans && v === q.answer ? '✓' : (ans && v === ans && ans !== q.answer ? '✗' : '');
                    optHtml += '<div class="' + cls + '" onclick="choose(' + q.id + ',\'' + v + '\',\'' + q.answer + '\')">';
                    optHtml += '<span class="option-letter">' + (v === '正确' ? '✓' : '✗') + '</span>';
                    optHtml += '<span class="option-content">' + v + '</span>';
                    if (icon) optHtml += '<span class="option-icon">' + icon + '</span>';
                    optHtml += '</div>';
                });
            }
            document.getElementById('optionsSection').innerHTML = optHtml;
            
            const ansCard = document.getElementById('answerCard');
            if (ans) {
                let ansHtml = '<div class="answer-header"><span class="answer-label">正确答案：</span><span class="answer-value">' + q.answer + '</span></div>';
                if (ans !== q.answer) ansHtml += '<div class="wrong-tip"><span>💡</span> 已自动加入错题本</div>';
                ansCard.innerHTML = ansHtml;
                ansCard.className = 'answer-card show';
            } else {
                ansCard.className = 'answer-card';
            }
            
            document.querySelector('.nav-btn.prev').disabled = idx === 0;
            document.querySelector('.nav-btn.next').disabled = idx === arr.length - 1;
            bindSwipe();
        }
        
        function choose(id, val, correct) {
            if (answers[id]) return;
            answers[id] = val;
            if (val !== correct) wrongs.add(id);
            save();
            render();
            updateBadge();
        }
        
        function toggleStar(id) {
            if (stars.has(id)) stars.delete(id); else stars.add(id);
            save();
            render();
            updateBadge();
        }
        
        function goPrev() { if (idx > 0) { idx--; render(); } }
        function goNext() { const arr = getList(); if (idx < arr.length - 1) { idx++; render(); } }
        
        function changeType(t) {
            type = t; mode = 'all'; idx = 0;
            document.querySelectorAll('.type-btn').forEach(function(b) { b.classList.remove('active'); });
            event.target.classList.add('active');
            render();
        }
        
        function bindSwipe() {
            const el = document.querySelector('.question-section');
            if (!el) return;
            el.ontouchstart = function(e) { startX = e.touches[0].clientX; };
            el.ontouchend = function(e) { 
                const diff = e.changedTouches[0].clientX - startX; 
                if (Math.abs(diff) > 60) diff > 0 ? goPrev() : goNext(); 
            };
        }
        
        function updateBadge() {
            document.getElementById('wrongBadge').textContent = wrongs.size || '';
            document.getElementById('favBadge').textContent = stars.size || '';
        }
        
        function showMain() {
            mode = 'all'; idx = 0;
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('statsPage').classList.remove('show');
            document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
            document.querySelector('.tab-item').classList.add('active');
            render();
        }
        
        function showWrongList() {
            mode = 'wrong'; idx = 0;
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('statsPage').classList.remove('show');
            document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.tab-item')[1].classList.add('active');
            render();
        }
        
        function showFavList() {
            mode = 'star'; idx = 0;
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('statsPage').classList.remove('show');
            document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.tab-item')[2].classList.add('active');
            render();
        }
        
        function showStats() {
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('statsPage').classList.add('show');
            document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.tab-item')[3].classList.add('active');
            updateStats();
        }
        
        function updateStats() {
            const done = Object.keys(answers).length;
            let right = 0, wrong = 0;
            list.forEach(function(q) { if (answers[q.id]) { answers[q.id] === q.answer ? right++ : wrong++; } });
            document.getElementById('sAnswered').textContent = done;
            document.getElementById('sCorrect').textContent = right;
            document.getElementById('sWrong').textContent = wrong;
            document.getElementById('sRate').textContent = done ? (right / done * 100).toFixed(1) + '%' : '0%';
            document.getElementById('wrongNum').textContent = wrongs.size ? '(' + wrongs.size + ')' : '';
            document.getElementById('favNum').textContent = stars.size ? '(' + stars.size + ')' : '';
            renderGridList('wrongGrid', wrongs);
            renderGridList('favGrid', stars);
        }
        
        function renderGridList(id, set) {
            const arr = list.filter(function(q) { return set.has(q.id); });
            const box = document.getElementById(id);
            if (!arr.length) { box.innerHTML = '<div class="empty-box"><div class="empty-icon">🎉</div><div>暂无</div></div>'; return; }
            let html = '<div class="grid-box">';
            arr.forEach(function(q) { 
                const isRight = answers[q.id] === q.answer; 
                html += '<div class="grid-cell ' + (isRight ? 'right' : 'wrong') + '" onclick="jumpTo(' + q.id + ')">' + q.order + '</div>'; 
            });
            html += '</div>';
            box.innerHTML = html;
        }
        
        function showGridModal() { renderGrid(); document.getElementById('gridModal').classList.add('show'); }
        function closeGridModal() { document.getElementById('gridModal').classList.remove('show'); }
        
        function renderGrid() {
            let arr = list;
            if (filter === 'done') arr = list.filter(function(q) { return answers[q.id]; });
            else if (filter === 'undone') arr = list.filter(function(q) { return !answers[q.id]; });
            else if (filter === 'wrong') arr = list.filter(function(q) { return wrongs.has(q.id); });
            else if (filter === 'star') arr = list.filter(function(q) { return stars.has(q.id); });
            const curr = getList()[idx];
            let html = '';
            arr.forEach(function(q) {
                let cls = 'grid-cell';
                const isRight = answers[q.id] && answers[q.id] === q.answer;
                const isWrong = answers[q.id] && answers[q.id] !== q.answer;
                if (curr && q.id === curr.id) cls += ' now';
                else if (isWrong) cls += ' wrong';
                else if (isRight) cls += ' right';
                else if (stars.has(q.id)) cls += ' star';
                else if (answers[q.id]) cls += ' done';
                html += '<div class="' + cls + '" onclick="jumpTo(' + q.id + ')">' + q.order + '</div>';
            });
            document.getElementById('gridBox').innerHTML = html;
        }
        
        function filterQ(f) {
            filter = f;
            document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
            event.target.classList.add('active');
            renderGrid();
        }
        
        function jumpTo(id) {
            mode = 'all';
            const arr = getList();
            const i = arr.findIndex(function(q) { return q.id === id; });
            if (i !== -1) { idx = i; closeGridModal(); showMain(); }
        }
        
        load();
        render();
        updateBadge();
    </script>
</body>
</html>
