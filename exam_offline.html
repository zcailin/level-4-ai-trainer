,"text":"数据可视化"},{"label":"D","text":"数据处理"}],"answer":"C","analysis":"Matplotlib是目前非常流行的用于绘制数据图表的Python库，是Python的2D绘图库"},{"id":102973,"order":293,"type":"single_choice","question":"实时检验存在什么缺点？（）","options":[{"label":"A","text":"无法及时发现解决问题"},{"label":"B","text":"对人员的配备及管理要求较高"},{"label":"C","text":"导致标注任务的不流畅性"},{"label":"D","text":"增加标注过程中重复错误的重复出现。"}],"answer":"B","analysis":"实时检验对人员的配备及管理要求较高，一般需要1名质检员进行实时检验，5~10名标注员进行标注"},{"id":102974,"order":294,"type":"single_choice","question":"在 Python 中，可对层次聚类模块的聚类结果进行可视化分析，或者用来表示数据间相似性关系的是（）。","options":[{"label":"A","text":"使用histogram函数"},{"label":"B","text":"使用plot函数"},{"label":"C","text":"使用scatter函数"},{"label":"D","text":"使用dendrogram函数"}],"answer":"D","analysis":"使用dendrogram函数可视化层次聚类结果。"},{"id":102975,"order":295,"type":"single_choice","question":"在 Word 中进行邮件合并操作时，需要用到哪个选项卡（）。","options":[{"label":"A","text":"导出"},{"label":"B","text":"视图"},{"label":"C","text":"首页"},{"label":"D","text":"邮件"}],"answer":"D","analysis":"邮件合并是一种使用微软Word软件进行的批量邮件发送技术，而在Word中，可以通过“邮件”选项卡中的“开始邮件合并”选项来进行相关操作"},{"id":102976,"order":296,"type":"single_choice","question":"数据标注规则中，\"标注\" 这一概念具体是指（）。","options":[{"label":"A","text":"将数据转化为可视化形式的过程"},{"label":"B","text":"通过算法对数据进行处理和分析的过程"},{"label":"C","text":"为数据添加标签或注释的过程"},{"label":"D","text":"将数据进行聚类的过程"}],"answer":"C","analysis":"标注是为数据添加标签或注释的过程。"},{"id":102977,"order":297,"type":"single_choice","question":"下列哪一种密度聚类算法能够处理高维数据集（）。","options":[{"label":"A","text":"HDBSCAN"},{"label":"B","text":"OPTICS"},{"label":"C","text":"Mean Shift"},{"label":"D","text":"DBSCAN"}],"answer":"A","analysis":"HDBSCAN能处理高维数据，通过层次聚类构建多分辨率聚类树。"},{"id":102978,"order":298,"type":"single_choice","question":"下列关于 OPTICS 密度聚类算法具体操作流程的描述，正确的选项是（）。","options":[{"label":"A","text":"利用点的密度直达距离的树，称为OPTICS树"},{"label":"B","text":"根据点的邻域密度和距离信息计算每个点的可达距离（reachabilitydistance）"},{"label":"C","text":"选定一个距离阈值eps，找出与每个点距离小于eps的领域"},{"label":"D","text":"对数据进行标准化处理，使得不同特征之间具有相同的重要性"}],"answer":"C","analysis":"题考查了OPTICS算法的基本流程，选项A是错误的，因为OPTICS算法不需要对数据进行标准化处理"},{"id":102979,"order":299,"type":"single_choice","question":"数据整理的主要目的是什么？（）","options":[{"label":"A","text":"仅通过数据挖掘技术发现数据中的模式"},{"label":"B","text":"仅通过数理统计方法优化数据结构"},{"label":"C","text":"增加数据量以支持更复杂的分析"},{"label":"D","text":"将\"脏数据\"转化为满足数据质量要求的数据"}],"answer":"D","analysis":"数据整理主要目的是将脏数据转化为满足质量要求的数据。"},{"id":102980,"order":300,"type":"single_choice","question":"在 DBSCAN 密度聚类算法的实现步骤里，属于第二步的是（）。","options":[{"label":"A","text":"将核心对象周围的所有样本点加入到同一个聚类簇中"},{"label":"B","text":"随机选择一个样本点"},{"label":"C","text":"将核心对象周围的所有样本点标记为噪声点"},{"label":"D","text":"从未访问的样本点中选择一个作为核心对象"}],"answer":"D","analysis":"DBSCAN第二步是选择未访问样本点作为核心对象。"},{"id":102981,"order":301,"type":"single_choice","question":"以下选项中，（）是借助Requests库发起POST请求最为直接的办法。","options":[{"label":"A","text":"requests.request('POST', 'http://www.example.com')"},{"label":"B","text":"requests.headers('http://www.example.com', headers={'user-agent': 'Mozilla/5.0'})"},{"label":"C","text":"requests.post('http://www.example.com', data={'key': 'value'})"},{"label":"D","text":"requests.get('http://www.example.com')"}],"answer":"C","analysis":"requests.post()是发送POST请求最直接的方法。"},{"id":102982,"order":302,"type":"single_choice","question":"Unicode 编码是对什么的延伸（）。","options":[{"label":"A","text":"ASCII编码"},{"label":"B","text":"芬兰编码"},{"label":"C","text":"英国编码"},{"label":"D","text":"日本编码"}],"answer":"A","analysis":"Unicode编码是ASCII编码的延伸，可以表示更多的字符和符号，包括各种语言的字母、数字、标点符号、符号等等"},{"id":102983,"order":303,"type":"single_choice","question":"数据审核的重要意义体现在哪些方面？（）","options":[{"label":"A","text":"数据的处理效率"},{"label":"B","text":"数据的安全性"},{"label":"C","text":"数据的可读性"},{"label":"D","text":"数据的准确性"}],"answer":"D","analysis":"数据审核确保数据准确性与完整性，支持正确分析。"},{"id":102984,"order":304,"type":"single_choice","question":"在数据筛选时，将异常数据剔除的目的在于（）。","options":[{"label":"A","text":"减少数据的噪声和异常值对结果的影响"},{"label":"B","text":"提高数据的连续性和一致性"},{"label":"C","text":"增加数据的容量和多样性"},{"label":"D","text":"所有选项都正确"}],"answer":"A","analysis":"去除异常数据的目的是减少数据的噪声和异常值对结果的影响，确保数据的准确性和可靠性。"},{"id":102985,"order":305,"type":"single_choice","question":"数和数据之间的不同之处在于什么（）。","options":[{"label":"A","text":"数是定量，数据可以是定量或定性的"},{"label":"B","text":"数是计算机程序中的变量，数据是程序执行时的输入或输出"},{"label":"C","text":"数是有限无穷，数据是无限无穷"},{"label":"D","text":"数是抽象概念，数据是具体实例"}],"answer":"A","analysis":"数和数据都是描述事物的量，在计算机应用中，数和数据都是重要的概念"},{"id":102986,"order":306,"type":"single_choice","question":"对于连续性的数据，在何种情形下采用等宽离散化比等频离散化更为合适？（）","options":[{"label":"A","text":"数据的分布呈现长尾分布或重尾分布的情况"},{"label":"B","text":"数据的分布呈现正态分布或近似正态分布的情况"},{"label":"C","text":"数据的分布比较集中，存在一定的异常值"},{"label":"D","text":"数据的分布比较平均，每个区间内的数据值差别不大"}],"answer":"D","analysis":"等宽离散化的原则是将数据平均划分为k个桶，每个桶内的数据范围相等"},{"id":102987,"order":307,"type":"single_choice","question":"下列哪项不属于数据可视化的方法？（）","options":[{"label":"A","text":"逻辑回归"},{"label":"B","text":"箱线图"},{"label":"C","text":"饼图"},{"label":"D","text":"折线图"}],"answer":"A","analysis":"可视化通常以直观的图形呈现数据，让用户所见即所得"},{"id":102988,"order":308,"type":"single_choice","question":"当采用爬虫抓取数据时，以下哪种表述是错误的（）。","options":[{"label":"A","text":"爬虫程序需要处理抓取到的数据"},{"label":"B","text":"爬虫程序需要考虑网站的反爬虫机制"},{"label":"C","text":"爬虫程序需要遵守相关法律法规"},{"label":"D","text":"爬虫程序可以自由获取所有网站的数据"}],"answer":"D","analysis":"爬虫不能自由获取所有网站数据，需遵守法规与许可。"},{"id":102989,"order":309,"type":"single_choice","question":"在Python环境下，针对异常值，可采取（）的处理举措。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"对异常值进行变换"},{"label":"C","text":"用相邻的值填充异常值"},{"label":"D","text":"替换异常值"}],"answer":"A","analysis":"对于异常值，我们可以根据具体情况采取不同的策略：替换异常值（A），视为缺失值用相邻的值填充异常值（例如使用前一个值或后一个值，选项B），或对异常值进行变换（例如对数变换、Box-Cox变换等，选项C）用于降低异常值的影响"},{"id":102990,"order":310,"type":"single_choice","question":"在文本标注的过程中，需要注意的事项是（）。","options":[{"label":"A","text":"提高标注的速度"},{"label":"B","text":"增加标注的维度"},{"label":"C","text":"确认标注的规则"},{"label":"D","text":"增加标注的数量"}],"answer":"C","analysis":"在文本标注过程中，需要明确标注的规则，以确保文本的一致性和规范性"},{"id":102991,"order":311,"type":"single_choice","question":"（）通常作为配置管理的一部分，在配置管理工具中进行管理。","options":[{"label":"A","text":"文档目录"},{"label":"B","text":"文档编号"},{"label":"C","text":"文档格式"},{"label":"D","text":"项目文档"}],"answer":"D","analysis":"项目文档一般作为配置管理的一部分，放在配置管理工具中进行管理，"},{"id":102992,"order":312,"type":"single_choice","question":"参照完整性要求（）。","options":[{"label":"A","text":"数据可以被修改"},{"label":"B","text":"新插入的数据无重复"},{"label":"C","text":"所有数据都必须有值"},{"label":"D","text":"外键的值必须与被引用表的主键相一致"}],"answer":"D","analysis":"参照完整性要求外键值与被引用表主键一致。"},{"id":102993,"order":313,"type":"single_choice","question":"在 PowerPoint 的母版视图中，怎样正确地统一修改所有幻灯片的页脚？（）","options":[{"label":"A","text":"在幻灯片母版中添加页脚"},{"label":"B","text":"在讲义母版中添加页脚"},{"label":"C","text":"在备注母版中添加页脚"},{"label":"D","text":"在普通视图中添加页脚"}],"answer":"A","analysis":"在幻灯片母版中添加页脚，可以同时应用到所有幻灯片中。"},{"id":102994,"order":314,"type":"single_choice","question":"DIANA 层次聚类法是一种将数据点逐步拆分为更小集群的聚类方法，其中 “DIANA” 所指的是（）。","options":[{"label":"A","text":"簇的类别数目"},{"label":"B","text":"数据的相似性度量"},{"label":"C","text":"分裂分析方法"},{"label":"D","text":"数据的缺失值"}],"answer":"C","analysis":"DIANA是DivisiveAnalysisClustering，即分裂分析法，是一种自顶向下策略的聚类方法，其过程是将所有数据点看作一个簇，然后依次将其递归划分成更小的簇，最后形成层次结构"},{"id":102995,"order":315,"type":"single_choice","question":"文件系统的权限控制所不涉及的内容是（）。","options":[{"label":"A","text":"文件大小"},{"label":"B","text":"文件权限"},{"label":"C","text":"文件组"},{"label":"D","text":"文件所有者"}],"answer":"A","analysis":"权限控制涉及所有者、组和权限，不包括文件大小。"},{"id":102996,"order":316,"type":"single_choice","question":"下列哪一项属于计算机在搭建和维护网络基础设施过程中使用的主要工具（）。","options":[{"label":"A","text":"网络管理软件"},{"label":"B","text":"数据库管理系统"},{"label":"C","text":"互联网"},{"label":"D","text":"电子邮件"}],"answer":"A","analysis":"网络管理软件是计算机应用中用于创建和维护网络基础设施的主要工具"},{"id":102997,"order":317,"type":"single_choice","question":"（）是求异法的正确逻辑步骤。","options":[{"label":"A","text":"确定现象出现的正例场合和不出现的反例场合 → 比较两场合的所有条件 → 识别唯一差异因素 → 推断该差异为现象原因"},{"label":"B","text":"观察现象变化 → 测量变量间的共变关系 → 建立统计模型 → 推导因果结论"},{"label":"C","text":"比较正反场合 → 归纳所有共同条件 → 排除无关变量 → 确定唯一差异因素"},{"label":"D","text":"确定现象出现的场合 → 提出可能的原因假设 → 设计对照实验验证 → 分析数据确认因果"}],"answer":"A","analysis":"求异法的逻辑步骤按照正确的顺序是：明确现象存在（正例）与不存在（反例）的场合 - 系统比较两场合的所有条件 - 锁定唯一差异因素 - 推断差异因素为现象原因"},{"id":102998,"order":318,"type":"single_choice","question":"下列对于特征选择的说法正确的是（）。","options":[{"label":"A","text":"特征选择只能用于线性模型"},{"label":"B","text":"特征选择对模型的泛化能力没有影响"},{"label":"C","text":"所有特征都应当参与模型训练"},{"label":"D","text":"特征选择可以减少数据集的维度"}],"answer":"D","analysis":"特征选择的目标是寻找到最优的特征子集，其能够将不相关或者冗余的特征从原本的特征集合中剔除出去，从而有效地缩小特征集合的规模，即减少数据集的维度，同时特征选择也能提高模型的训练速度和泛化能力"},{"id":102999,"order":319,"type":"single_choice","question":"在统计学与数据分析领域，剩余法的定义是（）。","options":[{"label":"A","text":"一种大数据开发方法"},{"label":"B","text":"一种数据分析方法"},{"label":"C","text":"一种数据预处理方法"},{"label":"D","text":"一种数据清洗方法"}],"answer":"B","analysis":"剩余法在统计学和数据分析中，指通过分析因变量与自变量之间的残差（观测值与模型预测值的差异）来评估模型拟合度或预测变量关系的方法"},{"id":103000,"order":320,"type":"judge","question":"存储器是用于存储数据和指令的设备，下列属于主存储器的是（）。","options":[],"answer":"","analysis":"主存储器指的是计算机中存放程序和数据的暂时性存储设备，如内存、高速缓存等"},{"id":103001,"order":321,"type":"judge","question":"回归算法属于无监督学习算法。","options":[],"answer":"错误","analysis":"有监督学习算法有线性回归、逻辑回归、k近邻分类、决策树、支持向量机、朴素贝叶斯和人工神经网络等。"},{"id":103002,"order":322,"type":"judge","question":"存储器有随机存取存储器（RAM）和只读存储器（ROM）两类。RAM 既可以读取数据也能写入数据，而传统的 ROM（比如掩模 ROM）则只能进行读取操作。","options":[],"answer":"正确","analysis":"存储器分为随机存取存储器（RAM）和只读存储器（ROM）两种，但随机存取存储器既可读又可写，只读存储器只能读取，不能写入。这是因为只读存储器中的信息是由生产厂家事先写入的，用户不能修改，因此只能读取，而随机存取存储器中的信息可以由用户进行读取和写入操作。传统只读存储器（如掩模ROM）的信息由生产厂家写入，用户无法修改；但现代ROM（如EPROM、EEPROM、闪存）支持通过特殊方式擦除和重新写入数据。"},{"id":103003,"order":323,"type":"judge","question":"均值滤波在有效去除高斯噪声的同时，不丢失图像的细节，降低噪声信号的影响。","options":[],"answer":"错误","analysis":"均值滤波是常用的一种滤波器，可以通过在图像中取平均值来消除一定程度的噪声信号。但是对于高斯噪声，均值滤波并不是最有效的方法，因为高斯噪声的分布是中心对称的，使用均值滤波会导致图像的边缘和细节部分模糊。更好的方法是使用高斯滤波器来降低高斯噪声的影响。"},{"id":103004,"order":324,"type":"judge","question":"文件系统是一种软件系统，它的作用是管理存储设备上的逻辑空间，其中包含了文件和文件夹的组织结构以及存储方式。","options":[],"answer":"正确","analysis":"文件系统负责管理存储设备分区内的逻辑空间，定义文件组织结构（如目录树、命名规则），控制数据存储与访问方式（如NTFS的MFT、ext4的extents），但物理分区由独立工具管理。"},{"id":103005,"order":325,"type":"judge","question":"在计算机的硬件构成里，运算器、控制器与存储器共同构成了负责中央处理和存储工作的核心部分","options":[],"answer":"正确","analysis":"运算器、控制器和存储器是计算机硬件系统中中央处理与存储的核心单元，其中运算器负责执行算术运算（如加减乘除）和逻辑运算（如与、或、非），控制器负责从存储器中读取指令、译码并生成控制信号，协调各部件的工作流程，而存储器用于存储程序和数据，包括主存（如RAM）和辅存（如硬盘）。输入设备（如键盘）和输出设备（如显示器）属于外围设备，虽然为计算机交互所必需，但在硬件架构中通常归类为I/O子系统，而非中央处理核心。"},{"id":103006,"order":326,"type":"judge","question":"依据《中华人民共和国劳动法》，劳动者因患病或非因工负伤，医疗期满后既不能从事原工作，也无法从事用人单位另行安排的工作，这种情况下用人单位可解除劳动合同。","options":[],"answer":"正确","analysis":"根据《中华人民共和国劳动法》第二十六条规定，有下列情形之一的，用人单位可以解除劳动合同，但是应当提前三十日以书面形式通知劳动者本人：（一）劳动者患病或者非因工负伤，医疗期满后，不能从事原工作也不能从事由用人单位另行安排的工作的；（二）劳动者不能胜任工作，经过培训或者调整工作岗位，仍不能胜任工作的；（三）劳动合同订立时所依据的客观情况发生重大变化，致使原劳动合同无法履行，经当事人协商不能就变更劳动合同达成协议的。"},{"id":103007,"order":327,"type":"judge","question":"处于职业活动中，应忠于雇主或客户的利益，全力维护他们的合法权益。","options":[],"answer":"正确","analysis":"职业守则中的诚实公正基本要求从业人员应该忠诚于雇主或客户的利益，并保护他们的权益。不得利用职务之便谋取个人私利，也不得损害他人的权益。"},{"id":103008,"order":328,"type":"judge","question":"依据《中华人民共和国个人信息保护法》，当个人信息出现或可能出现泄露、篡改、丢失情况时，个人信息处理者应当立刻采取补救措施，并告知负责个人信息保护的部门及当事人。","options":[],"answer":"正确","analysis":"根据《中华人民共和国个人信息保护法》第五十七条规定，发生或者可能发生个人信息泄露、篡改、丢失的，个人信息处理者应当立即采取补救措施，并通知履行个人信息保护职责的部门和个人。通知应当包括下列事项：（一）发生或者可能发生个人信息泄露、篡改、丢失的信息种类、原因和可能造成的危害；（二）个人信息处理者采取的补救措施和个人可以采取的减轻危害的措施；（三）个人信息处理者的联系方式。"},{"id":103009,"order":329,"type":"judge","question":"只有在大数据场景下，可视化分析才适用。","options":[],"answer":"错误","analysis":"数据可视化的目的是将抽象信息转换为具体的图形，将隐藏于数据中的规律直观地展现出来。虽然可视化分析可以在大数据场景下发挥更好的作用，但它同样适用于小数据的情况。任何数据都可以可视化呈现，包括文本、图片、音频等。"},{"id":103010,"order":330,"type":"judge","question":"在 PowerPoint 里，动画效果仅能在对象进入或离开页面时设置，不能在对象运动过程中实现。","options":[],"answer":"错误","analysis":"PowerPoint中提供了多种动画效果，包括动画路径、分段动画等多种方式，可以在对象运动时进行动画效果设置。"},{"id":103011,"order":331,"type":"judge","question":"审核报告的内容仅需列出被审核单位的全部缺点和问题即可。","options":[],"answer":"错误","analysis":"审核报告不仅要指出被审核单位的缺点和问题，还应该注重发现其优点和潜力，对被审核单位提出建议和推荐。"},{"id":103012,"order":332,"type":"judge","question":"在 DIANA 层次聚类的实现步骤中，可采用的停止准则包括最大距离、平均距离、最小距离等方式。","options":[],"answer":"正确","analysis":"在DIANA层次聚类的实现步骤中，停止准则可以采用的方式包括最大距离、平均距离、最小距离等。一般情况下，这些距离的计算都是基于欧几里得距离或曼哈顿距离等常见的距离度量方法。当满足停止准则之一时，算法结束，聚类树也就形成了。"},{"id":103013,"order":333,"type":"judge","question":"在 Matplotlib 的 pyplot 模块中，借助 rc 参数能够修改自定义图形的默认属性，像样式、坐标与网络属性、文本、字体等。","options":[],"answer":"正确","analysis":"pyplot模块使用rc配置文件自定义图形的各种默认属性,又称为rc配置或rc参数。通过修改rc参数可以修改自定义图形默认的属性,包括窗体大小、每英寸的点数、线条宽度颜色、样式、坐标轴、坐标与网络属性、文本、字体等。"},{"id":103014,"order":334,"type":"judge","question":"常见的数据整理技术可划分为数据分级处理、数据降维处理和数据存储优化这三类。","options":[],"answer":"正确","analysis":"常见的数据整理技术可以分为数据分级处理、数据降维处理和数据存储优化三类。"},{"id":103015,"order":335,"type":"judge","question":"图像标注只需对清晰的目标进行标注，对于模糊、不确定的部分可以不予理会。","options":[],"answer":"错误","analysis":"图像标注要求尽可能地标注出图像中的所有信息，包括明显的和模糊的、不确定的部分。尤其在一些应用场景中，这些模糊的、不确定的信息对于算法的准确性和稳定性至关重要。"},{"id":103016,"order":336,"type":"judge","question":"若一个网页可以根据用户的操作即刻更新内容，那么该网页必然是动态网页。","options":[],"answer":"错误","analysis":"虽然动态网页一般都能实时更新内容，但并不是所有实时更新内容的网页都是动态网页。比如一些使用AJAX等技术请求后端数据的工具类网站也可能实现了实时更新内容的效果，但它们的页面是静态的。"},{"id":103017,"order":337,"type":"judge","question":"等频离散化作为常用的数据离散化方式之一，需要人为设定区间个数。","options":[],"answer":"错误","analysis":"等频离散化是将相同数量的记录放进每个区间，等频法比较简单，易于操作，但需要人为地规定区间个数。"},{"id":103018,"order":338,"type":"judge","question":"《中华人民共和国个人信息保护法》允许在未获授权的情况下，对个人信息进行公开处理。","options":[],"answer":"错误","analysis":"根据《中华人民共和国个人信息保护法》第二十五条规定，个人信息处理者不得公开其处理的个人信息，取得个人单独同意的除外。"},{"id":103019,"order":339,"type":"judge","question":"若想更完善地对信息系统文档实施管理，建立与之对应的文档管理制度是应采取的举措。","options":[],"answer":"正确","analysis":"为了更好地进行信息系统文档的管理，应该建立相应的文档管理制度。文档的管理制度需根据组织实体的具体情况而定，主要包括建立文档的相关规范、文档借阅记录的登记制度、文档使用权限控制规则等。"},{"id":103020,"order":340,"type":"judge","question":"数据标准化意味着消除数据在量纲以及取值范围上的差异，并依据一定比例把数据缩放到特定区间","options":[],"answer":"正确","analysis":"数据标准化是指消除数据量纲和取值范围差异，将数据按比例缩放到特定区间，以便于进行数据比较和分析。标准化后的数据可以消除不同量级之间的影响，使得数据更具有可比性。"},{"id":103021,"order":341,"type":"judge","question":"职业道德的一个特征是发展性，也就是随着社会的进步和职业环境的改变，职业道德也会持续地发生变化以适应新的需求。","options":[],"answer":"正确","analysis":"发展性是职业道德的重要特征之一，随着社会的发展和职业环境的变化，职业道德也会不断演化和适应新的要求。"},{"id":103022,"order":342,"type":"judge","question":"在数据质量分析里，数据的缺失主要分为记录的缺失和记录中某一字段信息的缺失。","options":[],"answer":"正确","analysis":"在数据质量分析中，数据的缺少主要包括记录的缺失和记录中某个字段信息的缺失，两者都会造成分析结果不准确。"},{"id":103023,"order":343,"type":"judge","question":"数据完整性只需借助主键和外键约束就能彻底实现，不需要依靠其他规则。","options":[],"answer":"错误","analysis":"数据完整性需通过多种约束与规则协同实现，包括但不限于：主键、外键、CHECK 约束、非空约束、触发器、存储过程，忽略任一维度的约束均可能导致数据质量问题。"},{"id":103024,"order":344,"type":"judge","question":"求异法在科学研究中是用于验证假设的最终目的，而非用于确定因果关系的归纳方法。","options":[],"answer":"错误","analysis":"差异法是科学研究的工具性方法，而非最终目的。科学研究的目的是揭示规律或解决问题，而差异法是实现这一目的的手段。"},{"id":103025,"order":345,"type":"judge","question":"数据整理是对数据库进行精简，剔除重复记录，并将剩余部分转换为标准可接受格式的过程。","options":[],"answer":"正确","analysis":"数据整理(数据清洗)是将数据库精简以除去重复记录，并使剩余部分转换成标准可接收格式的过程。数据整理从数据的准确性、完整性、一致性、唯一性、适时性、有效性几个方面来处理数据的丢失值、越界值、不一致代码、重复数据等问题。"},{"id":103026,"order":346,"type":"judge","question":"异常值指的是数据集中与其他观测值存在显著差异的数据点","options":[],"answer":"正确","analysis":"异常值也称为离群值(outlier)，是指数据集中与其他观测值存在较大差异的数据点。它们可能是数据采集过程中的误差、数据录入错误或者是数据的异常波动所导致的。异常值的存在会影响数据分析和建模，因此需要采用合适的方法进行检测和处理。"},{"id":103027,"order":347,"type":"judge","question":"DIANA 层次聚类与 AGNES 层次聚类的主要差异在于所使用的距离度量方式不同。","options":[],"answer":"正确","analysis":"AGNES全称为Agglomerative Nesting（聚合层次聚类），也是一种自底向上的聚类方法。与DIANA不同的是，AGNES在聚类过程中，使用的是单链接（single-linkage）或完全链接（complete-linkage）的距离度量方式。而DIANA则是使用的样本间欧氏距离进行聚类拆分。"},{"id":103028,"order":348,"type":"judge","question":"作为一种数据挖掘技术，关联规则分析的目的是找出数据集中项集之间的关联关系。","options":[],"answer":"正确","analysis":"关联规则分析是一种经典的数据挖掘技术，主要用于数据矩阵中项集之间关联关系的挖掘。其核心思想是发现事物之间的关系，并以此为基础进行预测和决策。"},{"id":103029,"order":349,"type":"judge","question":"Pandas库中的drop_duplicates()方法可用于删除DataFrame对象里的重复行。","options":[],"answer":"正确","analysis":"Pandas库中的drop_duplicates()方法可以用于删除DataFrame对象中的重复行。该方法可以指定删除哪些列中的重复值，以及保留哪个重复值。"},{"id":103030,"order":350,"type":"judge","question":"在运用Xpath解析网页内容时，选择器里的“/”意味着从当前节点选取其直接子节点。","options":[],"answer":"正确","analysis":"在Xpath中，“/”代表从当前节点选取直接子节点。"},{"id":103031,"order":351,"type":"judge","question":"基于像素的聚类算法属于有监督学习方法，能够解决图像分类问题。","options":[],"answer":"错误","analysis":"基于像素的聚类算法是一种无监督学习方法，通过分析像素间的相似性（如颜色、亮度）对图像数据进行分组。虽然聚类结果可能辅助后续任务（如图像分割），但其本身不依赖标签，因此不属于有监督学习。"},{"id":103032,"order":352,"type":"judge","question":"数据拆解的方法只能按照时间、地域、维度等方式来进行拆解。","options":[],"answer":"错误","analysis":"数据拆解的方法包括按照时间、地域、维度等多种方式进行。除了这些基本的拆解方式外，还可以根据数据的特点和需求，采用其他的拆解方式，如按照产品、客户、渠道等进行拆解。"},{"id":103033,"order":353,"type":"judge","question":"多重抽样检验辅助全样检验的流程是，在全样检验完成后对标注数据进行轮番抽样，以此减少全样检验中的疏漏。","options":[],"answer":"正确","analysis":"多重抽样检验辅助全样检验的流程是在全样检验完成后对标注数据进行轮番抽样，减少全样检验中的疏漏，增加数据标注的准确率。"},{"id":103034,"order":354,"type":"judge","question":"多重抽样检验是可以单独进行的。","options":[],"answer":"错误","analysis":"多重抽样检验只能用于辅助其他检验方法，如果单独实施，就会出现疏漏，影响整个数据集的标注质量结果。"},{"id":103035,"order":355,"type":"judge","question":"数据可视化指的是把数据转换成便于理解和分析的图形、图表等形式进行展示的过程。","options":[],"answer":"正确","analysis":"数据可视化是研究利用图形展现数据中隐含的信息并发掘其中规律的学科。数据可视化通过图表直观地展示数据间的量级关系，其目的是将抽象信息转换为具体的图形，将隐藏于数据中的规律直观地展现出来。"},{"id":103036,"order":356,"type":"judge","question":"数据拆解就是把那些复杂的数据或者问题拆分成若干个更小的组成部分。","options":[],"answer":"正确","analysis":"数据拆解是将复杂的数据或问题分解成更小的组成部分的过程，以便更好地理解、分析和解决它们。通过将问题分解成小的子问题，可以更容易地处理和解决复杂的任务。"},{"id":103037,"order":357,"type":"judge","question":"数据质量标准评价标准中，包含对数据的完整性、准确性、一致性等方面的要求。","options":[],"answer":"正确","analysis":"数据质量标准评价标准通常包括以下方面的要求：完整性、准确性、一致性、时效性、有效性、唯一性等，以确保所涉及的数据能够被有效地使用和分析。"},{"id":103038,"order":358,"type":"judge","question":"在 Word 里，插入脚注和题注的作用是相同的，都是为了对文中的重点内容进行标注。","options":[],"answer":"错误","analysis":"Word中的脚注用于在文档底部添加注释或参考资料，而题注则是为图片、表格等插图添加注释或标记。两者作用不同，应根据需要选择使用。"},{"id":103039,"order":359,"type":"judge","question":"职业道德的唯一作用就是对从业人员的行为加以规范，避免他们在职业活动里出现不合适的举动或是触犯法律的行为。","options":[],"answer":"错误","analysis":"职业道德确实可以规范职业人员的行为，防止不当行为和违法行为的发生。但职业道德还可以促进职业人员的专业发展和提高其声誉，维护行业的声誉和形象，提高行业的信誉和公信力。"},{"id":103040,"order":360,"type":"judge","question":"在 PowerPoint 中，可以为幻灯片设置自动切换的时间，但没办法为每张幻灯片分别设定切换时间，。","options":[],"answer":"错误","analysis":"PowerPoint提供了多种幻灯片切换效果，并且在“切换时间”选项中可以针对每张幻灯片单独设置切换时间。"},{"id":103041,"order":361,"type":"judge","question":"在进行 3D 云标注时，不允许采用手动操作的方式来完成标注。","options":[],"answer":"错误","analysis":"在3D云标注的过程中，允许使用手动操作方式进行标注，如据标注任务的要求，手动为点云中的每个点或点集打上相应的标签和类别，如物体类别、位置、朝向、大小等。"},{"id":103042,"order":362,"type":"judge","question":"工作人员应严格遵照保密条例，对工作中涉及的机密信息进行妥善保存，严禁将相关信息向外泄露。","options":[],"answer":"正确","analysis":"职业守则中的\"恪尽职守\"基本要求包括保守秘密，即从业人员应该严格遵守保密规定，对工作中的机密信息予以妥善保管，并不得泄露相关信息。具备保密意识，确保客户和组织的利益不受损害。"},{"id":103043,"order":363,"type":"judge","question":"语句覆盖属于逻辑覆盖法所包含的方法之一。","options":[],"answer":"正确","analysis":"语句覆盖是逻辑覆盖标准中的一种，它属于软件测试领域内白盒测试的一种测试覆盖率标准。"},{"id":103044,"order":364,"type":"judge","question":"K-Means 聚类算法的优化目标是让所有样本点到其所属聚类中心的距离总和最小。","options":[],"answer":"正确","analysis":"K-Means聚类算法的优化目标是最小化所有样本点到其所属聚类中心的距离之和，即最小化聚类内部的方差。"},{"id":103045,"order":365,"type":"judge","question":"经验审核法属于数据质量检查的方式之一，其作用是对数据作出逻辑性与常识性的判定。","options":[],"answer":"正确","analysis":"经验审核法是针对报表中指标间逻辑关系仅靠计算机程序审核无法确认、量化，或有些审核虽设定数量界限，但界限较宽不好判定的情况，需要增加人工经验审核的方法。例如，在分析销售数据时，需要结合业务经验和实际情况，对数据进行逻辑性和常识性的判断，以发现异常或不符合实际情况的数据。"},{"id":103046,"order":366,"type":"judge","question":"通常情况下，Cookie 机制不允许进行跨域访问。","options":[],"answer":"正确","analysis":"Cookie机制是基于同源策略的，因此默认情况下只能在同一个域名的不同页面之间传递数据，不能跨域访问。"},{"id":103047,"order":367,"type":"judge","question":"于数据质量管控流程而言，数据挖掘的任务是从海量的原始数据中挖掘出具有价值的信息，进而为后续的业务决策提供有力依据。","options":[],"answer":"错误","analysis":"数据挖掘属于数据应用的范畴，不属于数据质量把控。数据质量把控主要有采集、清洗、验证等流程"},{"id":103048,"order":368,"type":"judge","question":"在 Word 里，可以通过调整缩进尺寸和行距来对段落格式进行设置。","options":[],"answer":"正确","analysis":"Word中提供了缩进和行距的选项，可以通过调整来设置段落格式。"},{"id":103049,"order":369,"type":"judge","question":"数据标注规则里的一致性，是指标注人员对同一项数据进行标注时，得到的结果应当保持一致。","options":[],"answer":"正确","analysis":"数据标注规则中的一致性，指的是标注人员对同一项数据标注的结果应该一致，以保证标注的结果能够保证数据的质量和可用性。"},{"id":103050,"order":370,"type":"judge","question":"聚类与分类的不同之处在于，聚类是基于距离的方法，而分类则是基于特征向量的方法。","options":[],"answer":"错误","analysis":"聚类和分类的核心区别在于学习方式。聚类是无监督学习，无需预定义类别，通过数据本身的相似性（如距离）划分簇；而分类是监督学习，需基于带标签的数据训练模型，以预测新样本的类别。两者均可能使用特征向量和距离计算，但分类依赖标签信息，聚类则完全依赖数据分布。"},{"id":103051,"order":371,"type":"judge","question":"运用机器学习处理图像数据的方式，可分为有监督和无监督两类。","options":[],"answer":"正确","analysis":"有监督和无监督是机器学习中常见的两种学习方式。在图像数据的归类中，有监督学习指的是已有标记的数据，机器通过学习标记数据进行分类；而无监督学习则是数据没有标记，机器通过自主学习进行分类。"},{"id":103052,"order":372,"type":"judge","question":"数据审核的主要目的是避免数据丢失和系统崩溃。","options":[],"answer":"错误","analysis":"数据审核的目的是检查数据的完整性、准确性、一致性、和合法性。通过完整性和准确性检查，发现和纠正各种数据问题，提高数据的质量和可信度，为后续模型训练提供高质量数据。"},{"id":103053,"order":373,"type":"judge","question":"在噪声数据检测过程中，运用“三西格玛原则”属于常见的异常数据检测方法。","options":[],"answer":"正确","analysis":"在噪声数据检测中，使用“三西格玛原则”是可以有效检测出异常数据的方法。"},{"id":103054,"order":374,"type":"judge","question":"编制审核报告应遵循客观、真实、公正、准确的原则。","options":[],"answer":"正确","analysis":"审核报告是一份非常重要的文件，应该采取客观、事实、公正、准确的口吻，避免出现主观臆断、误导、歧义等情况，从而保证报告的可信度和可靠性。"},{"id":103055,"order":375,"type":"judge","question":"验证码、IP 封禁以及请求限制都属于反爬虫技术的范畴。","options":[],"answer":"正确","analysis":"常见的反爬虫技术包括验证码、IP封禁和请求限制。验证码用于验证用户的身份，要求用户输入验证码才能进行访问。IP封禁是指根据IP地址进行封禁，限制某些IP地址的访问。请求限制则是对请求频率、请求次数等进行限制，防止过于频繁的请求。"},{"id":103056,"order":376,"type":"judge","question":"动态网页的数据可以通过逆向分析法来获取。","options":[],"answer":"","analysis":"动态网页中数据的获取不同于静态网页，需要通过逆向分析的思路，借助浏览器中的开发者模式，定位目标数据所在的资源，并确定目标数据所在的URL。"},{"id":103057,"order":377,"type":"judge","question":"线性回归会把目标变量和自变量之间的关系构建成一个线性方程，它的目的是找到一组最优系数，让预测值与真实值之间的误差达到最小。","options":[],"answer":"正确","analysis":"线性模型的目的学得一个通过属性的线性组合来进行预测的函数，线性回归的目的是学得一个通过线性模型来尽可能准确地预测实际值。"},{"id":103058,"order":378,"type":"judge","question":"数据质量控制仅需在数据输入时进行，一旦数据录入系统，便无需再进行质量控制。","options":[],"answer":"错误","analysis":"数据质量控制应该是一个持续的过程，不仅仅是在数据输入时进行，而且在数据使用、储存和传输的过程中也需要进行质量控制，以确保数据的质量。"},{"id":103059,"order":379,"type":"judge","question":"文本数据归类就是按照某种规则将文本数据划分成不同的组，并给每组标注相应的类别标签。","options":[],"answer":"正确","analysis":"文本数据归类是指将文本数据根据其内容、主题或其他特征进行分类，将相似的文本归入同一类别，并赋予相应的类别标签。文本数据归类可以利用机器学习、自然语言处理等技术，通过学习样本数据的特征和模式，进行自动分类。"},{"id":103060,"order":380,"type":"judge","question":"在 DBSCAN 算法中，核心点是指处于半径为 ε 的范围内、被其他点包围的点。","options":[],"answer":"错误","analysis":"核心点是指在半径为ε内至少有MinPts个点的点。这里的MinPts是指一个点的邻域中至少包含MinPts个点，包括该点本身。而ε则是一个半径参数，表示一个点的邻域范围。因此，核心点是被半径为ε内至少包含MinPts个点的其他点所包围的点。"},{"id":103061,"order":381,"type":"judge","question":"为了降低标准误差，岭回归会在回归估计中加入一个 L1 正则项的绝对值偏差。","options":[],"answer":"错误","analysis":"岭回归中使用的是L2正则项（平方偏差），Lasso回归使用的才是L1正则项（绝对值偏差）。"},{"id":103062,"order":382,"type":"judge","question":"朴素贝叶斯是分类预测方法中一种基于概率的方法。","options":[],"answer":"正确","analysis":"朴素贝叶斯是一种基于概率的分类预测方法，它基于贝叶斯定理和特征之间的条件独立性假设，通过计算给定特征条件下各类别的后验概率来进行分类预测。朴素贝叶斯分类器在文本分类、垃圾邮件过滤等领域广泛应用。"},{"id":103063,"order":383,"type":"judge","question":"依据约束实现的途径，数据完整性约束可以分为静态约束与动态约束。","options":[],"answer":"正确","analysis":"实现完整性约束的方法依类别不同而不同。完整性约束可以分为两大类：静态约束和动态约束。"},{"id":103064,"order":384,"type":"judge","question":"采用自动化数据采集方法有助于提高采集效率，但如果缺少数据验证和容错机制，就无法确保数据的准确性与完整性。","options":[],"answer":"正确","analysis":"自动化数据采集方法既能提高效率，也能通过技术手段保障数据质量，但其数据准确性和完整性依赖于技术设计和流程控制。"},{"id":103065,"order":385,"type":"judge","question":"在 PowerPoint 中，只要拥有文件的编辑权限，用户就可以直接修改母版视图中的样式。","options":[],"answer":"正确","analysis":"在 PowerPoint 中，母版视图的更改与文件的访问权限和编辑权限相关。"},{"id":103066,"order":386,"type":"judge","question":"计算机的主要应用范围涵盖了生产制造、金融服务、教育教学、医疗卫生、休闲娱乐等诸多领域。","options":[],"answer":"正确","analysis":"计算机是现代科技的重要产物，已经渗透到社会各个领域。生产领域应用于自动化生产线、机器人等，金融领域应用于网络银行、电子支付等，教育领域应用于多媒体教学、在线学习等，医疗领域应用于病历管理、医学影像等，娱乐领域应用于电子游戏、在线视频等。"},{"id":103067,"order":387,"type":"judge","question":"数据审核仅需针对数据的格式和结构进行检查与审查，无需考虑其内容的正确性和合法性。","options":[],"answer":"错误","analysis":"数据审核不仅要考虑数据的格式和结构，还要评估数据的内容是否正确、合法和符合需求。在数据审核过程中，需要深入了解数据的含义，是否与其它数据相一致、数据之间的关系是否合理等问题，保证数据的质量和可靠性，以便有效地支持后续的数据分析和应用。"},{"id":103068,"order":388,"type":"judge","question":"在 Word 中添加页眉和页脚时，所有部分的页眉页脚必须保持一致，没办法给不同部分设置不一样的。","options":[],"answer":"错误","analysis":"Word实际上是支持对不同部分设置不同的页眉和页脚的。要实现这一点，可以通过“分节符”来划分文档的不同部分。每个节都可以有自己独立的页眉和页脚设置。具体方法是在需要更改页眉或页脚的地方插入一个“分节符”，然后取消“与前一个节相同”的链接，之后就可以在新的节中单独设置页眉和页脚了。这样，不同部分的页眉和页脚就可以不同了。"},{"id":103069,"order":389,"type":"judge","question":"线性回归和逻辑回归都属于回归预测所使用的相关算法。","options":[],"answer":"错误","analysis":"逻辑回归实际上是用线性回归模型的预测结果去逼近样本标记的对数几率，其实际上是一种分类算法，具体的分类方法为：设定一个分类阈值，把预测结果大于分类阈值的样本归为正类，反之归为反类。"},{"id":103070,"order":390,"type":"judge","question":"在 Word 中插入的图片，只能选用软件自带的剪贴板图片格式，不能使用其他格式的图片。","options":[],"answer":"错误","analysis":"Word支持多种图片格式，包括JPEG、PNG、BMP等，只要是常用的图片格式都可以插入到Word中。"},{"id":103071,"order":391,"type":"judge","question":"DBSCAN 密度聚类需要事先确定簇的数量。","options":[],"answer":"错误","analysis":"DBSCAN密度聚类不需要预先指定簇的个数，是其优点之一。"},{"id":103072,"order":392,"type":"judge","question":"坚持不断学习是勤勉好学的基本要求之一。","options":[],"answer":"正确","analysis":"职业守则中的\"勤勉好学\"基本要求指的是从业人员应该具备积极主动、刻苦努力和不断学习的态度。它包括积极主动、刻苦努力、持续学习、探索创新和保持谦虚几个方面。"},{"id":103073,"order":393,"type":"judge","question":"20 世纪 40 年代，世界上第一台电子计算机诞生，这台计算机名为 ENIAC。","options":[],"answer":"正确","analysis":"ENIAC是世界上第一台电子计算机，于1945年面世。它占地面积约167平方米，重达30多吨，能执行5000次加法运算每秒钟。ENIAC的诞生，标志着电子计算机时代的正式开始。"},{"id":103074,"order":394,"type":"judge","question":"利用 R 语言无法实现数据规范化、填充缺失数据、将数字类型数据转换为分类类型数据、处理离群数据、删除变量等操作。","options":[],"answer":"错误","analysis":"R语言提供了数据整理方法，包括数据规范化、填充缺失数据、把数字类型数据转换为分类类型数据、处理离群数据、删除变量、观测数据有缺失值的变量等。"},{"id":103075,"order":395,"type":"judge","question":"所谓语音标注质量标准，就是用于评估语音数据标注质量的依据，其中包含了准确性、一致性、规范性等诸多维度。","options":[],"answer":"正确","analysis":"语音标注质量标准是一个评估语音标注质量的标准体系，其中包括准确性、一致性、完整性、规范性等多个方面。这些标准旨在确保标注工作的质量。"},{"id":103076,"order":396,"type":"judge","question":"数据质量问题只需通过简单的数据清洗就能解决。","options":[],"answer":"错误","analysis":"虽然数据清洗可以解决一部分数据质量问题，但并不是所有问题都可以简单地通过数据清洗来解决。有些问题需要更深入的探究和解决方案。"},{"id":103077,"order":397,"type":"judge","question":"变更控制流程化就是指建立或选用符合项目需求的变更管理流程，所有变更都必须依照该流程进行管控。","options":[],"answer":"正确","analysis":"变更控制流程化是指建立或选用符合项目需要的变更管理流程，所有变更都必须遵循这个控制流程进行控制。流程化的作用在于将变更的原因、专业能力、资源运用方案、决策权、干系人的共识、信息流转等元素有效综合起来，按科学的顺序进行。"},{"id":103078,"order":398,"type":"judge","question":"逻辑覆盖法是白盒测试中最常采用的测试方法。","options":[],"answer":"正确","analysis":"逻辑覆盖法是白盒测试最常用的测试方法，它包括语句覆盖、判定覆盖、条件覆盖、判定-条件覆盖、条件组合覆盖5种。"},{"id":103079,"order":399,"type":"judge","question":"对数据进行离散化处理后，会出现数据信息丢失的情况。","options":[],"answer":"正确","analysis":"数据离散化过程中，将原本连续的数据转化为有限个离散的取值，会导致部分信息的丢失，例如，将年龄分为“儿童”、“青年”、“中年”和“老年”等四个离散的取值，就无法体现年龄的具体变化。因此，在进行数据离散化时，需要根据具体的研究目的和应用场景，权衡精度和信息量的关系。"},{"id":103080,"order":400,"type":"single_choice","question":"打印机和扬声器都属于计算机的输出设备","options":[],"answer":"","analysis":"打印机被用于打印文档或图像等信息，扬声器被用于输出声音等信息。它们都是计算机的输出设备。"}];
        let list = originalList;
        let currentBank = 1;
        let idx = 0, type = 'all', mode = 'all', filter = 'all';
        let answers = {}, wrongs = new Set(), stars = new Set();
        let startX = 0;
        let searchResults = [];
        let isSearchMode = false;
        
        const isWeixin = /MicroMessenger/i.test(navigator.userAgent);
        
        function setStorage(key, value) {
            try {
                if (isWeixin) {
                    document.cookie = key + '=' + encodeURIComponent(JSON.stringify(value)) + ';path=/;max-age=31536000';
                } else {
                    localStorage.setItem(key, JSON.stringify(value));
                }
            } catch(e) {}
        }
        
        function getStorage(key) {
            try {
                if (isWeixin) {
                    const match = document.cookie.match(new RegExp(key + '=([^;]+)'));
                    return match ? JSON.parse(decodeURIComponent(match[1])) : null;
                } else {
                    const item = localStorage.getItem(key);
                    return item ? JSON.parse(item) : null;
                }
            } catch(e) { return null; }
        }
        
        function removeStorage(key) {
            try {
                if (isWeixin) {
                    document.cookie = key + '=;path=/;max-age=0';
                } else {
                    localStorage.removeItem(key);
                }
            } catch(e) {}
        }
        
        function switchBank(bank) {
            currentBank = bank;
            list = (bank === 1) ? originalList : newList;
            type = 'all'; mode = 'all';
            load();
            document.getElementById('bank1Tab').classList.toggle('active', bank === 1);
            document.getElementById('bank2Tab').classList.toggle('active', bank === 2);
            document.getElementById('examTab').classList.toggle('active', bank === 3);
            render();
            updateBadge();
        }
        
        function load() {
            try {
                answers = {};
                wrongs = new Set();
                stars = new Set();
                idx = 0;
                
                const a = getStorage('qa' + currentBank);
                const w = getStorage('qw' + currentBank);
                const s = getStorage('qs' + currentBank);
                const pos = getStorage('qpos' + currentBank);
                const marked = getStorage('qmarked');
                if (a) answers = a;
                if (w) wrongs = new Set(w);
                if (s) stars = new Set(s);
                if (pos) {
                    idx = pos.idx || 0;
                    type = pos.type || 'all';
                    mode = pos.mode || 'all';
                }
                if (!marked) {
                    markImportantQuestions();
                    setStorage('qmarked', true);
                }
            } catch(e) {}
        }
        
        function markImportantQuestions() {
            const keywords = [
                'K-Means', '决策树', '神经网络', 'CNN', 'RNN', 'LSTM',
                '激活函数', '损失函数', '优化器', '梯度下降',
                '混淆矩阵', '准确率', '召回率', 'F1', 'ROC', 'AUC',
                '过拟合', '欠拟合', '正则化', 'Dropout',
                '数据清洗', '数据标注', '特征工程', '归一化', '标准化',
                'NumPy', 'Pandas', 'Scikit-learn', 'TensorFlow', 'PyTorch',
                '图像处理', '目标检测', '图像分割', 'OCR',
                '自然语言处理', '词向量', 'Word2Vec', 'BERT',
                '模型部署', '模型评估', '交叉验证',
                'Python', '机器学习', '深度学习', '人工智能',
                '监督学习', '无监督学习', '强化学习',
                '卷积', '池化', '全连接', '反向传播',
                '数据增强', '迁移学习', '预训练模型'
            ];
            
            list.forEach(function(q) {
                const text = q.question + ' ' + (q.analysis || '');
                for (let i = 0; i < keywords.length; i++) {
                    if (text.indexOf(keywords[i]) !== -1) {
                        stars.add(q.id);
                        break;
                    }
                }
            });
            
            save();
        }
        
        function resetMarking() {
            if (confirm('确定要重新标记重点题目吗？这将清除所有收藏标记并重新智能标记。')) {
                stars.clear();
                markImportantQuestions();
                updateBadge();
                updateStats();
                alert('重点题目已重新标记完成！');
            }
        }
        
        function save() {
            try {
                setStorage('qa' + currentBank, answers);
                setStorage('qw' + currentBank, [...wrongs]);
                setStorage('qs' + currentBank, [...stars]);
                savePosition();
            } catch(e) {}
        }
        
        function savePosition() {
            try {
                setStorage('qpos' + currentBank, { idx: idx, type: type, mode: mode });
            } catch(e) {}
        }
        
        function getList() {
            let arr = list;
            if (type !== 'all') arr = arr.filter(q => q.type === type);
            if (mode === 'wrong') arr = arr.filter(q => wrongs.has(q.id));
            if (mode === 'star') arr = arr.filter(q => stars.has(q.id));
            return arr;
        }
        
        function render() {
            const arr = getList();
            if (!arr.length) {
                document.getElementById('questionSection').innerHTML = '<div class="empty-box"><div class="empty-icon">📭</div><div>暂无题目</div></div>';
                document.getElementById('optionsSection').innerHTML = '';
                document.getElementById('answerCard').className = 'answer-card';
                document.getElementById('analysisSection').className = 'analysis-section';
                return;
            }
            const q = arr[idx] || arr[0];
            if (!arr[idx]) { idx = 0; render(); return; }
            savePosition();
            const ans = answers[q.id];
            const isStar = stars.has(q.id);
            const isExamMode = (currentBank === 3);
            const hasAnswered = !!ans;
            
            let metaHtml = '<div class="question-meta">';
            metaHtml += '<span class="q-type' + (q.type === 'judge' ? ' judge' : '') + '">' + (q.type === 'single_choice' ? '单选' : '判断') + '</span>';
            metaHtml += '<span class="q-number">' + q.order + ' / ' + arr.length + '</span>';
            if (isExamMode) {
                metaHtml += '<span class="exam-badge">考试模式</span>';
            }
            metaHtml += '<span style="margin-left:auto;cursor:pointer;font-size:20px" onclick="toggleStar(' + q.id + ')">' + (isStar ? '⭐' : '☆') + '</span>';
            metaHtml += '</div>';
            metaHtml += '<div class="q-title">' + q.question + '</div>';
            document.getElementById('questionSection').innerHTML = metaHtml;
            
            let optHtml = '';
            const correctAnswer = q.answer || 'A';
            if (q.type === 'single_choice') {
                q.options.forEach(function(o) {
                    let cls = 'option-item';
                    let icon = '';
                    if (isExamMode) {
                        if (hasAnswered) {
                            if (o.label === correctAnswer) {
                                cls += ' correct';
                                icon = '✓';
                            } else if (o.label === ans && ans !== correctAnswer) {
                                cls += ' wrong';
                                icon = '✗';
                            }
                        }
                    } else {
                        if (o.label === correctAnswer) cls += ' correct';
                        icon = o.label === correctAnswer ? '✓' : '';
                    }
                    optHtml += '<div class="' + cls + '" onclick="choose(' + q.id + ',\'' + o.label + '\',\'' + correctAnswer + '\')">';
                    optHtml += '<span class="option-letter">' + o.label + '</span>';
                    optHtml += '<span class="option-content">' + o.text + '</span>';
                    if (icon) optHtml += '<span class="option-icon">' + icon + '</span>';
                    optHtml += '</div>';
                });
            } else {
                const judgeAnswer = q.answer || '正确';
                ['正确', '错误'].forEach(function(v) {
                    let cls = 'option-item';
                    let icon = '';
                    if (isExamMode) {
                        if (hasAnswered) {
                            if (v === judgeAnswer) {
                                cls += ' correct';
                                icon = '✓';
                            } else if (v === ans && ans !== judgeAnswer) {
                                cls += ' wrong';
                                icon = '✗';
                            }
                        }
                    } else {
                        if (v === judgeAnswer) cls += ' correct';
                        icon = v === judgeAnswer ? '✓' : '';
                    }
                    optHtml += '<div class="' + cls + '" onclick="choose(' + q.id + ',\'' + v + '\',\'' + judgeAnswer + '\')">';
                    optHtml += '<span class="option-letter">' + (v === '正确' ? '✓' : '✗') + '</span>';
                    optHtml += '<span class="option-content">' + v + '</span>';
                    if (icon) optHtml += '<span class="option-icon">' + icon + '</span>';
                    optHtml += '</div>';
                });
            }
            document.getElementById('optionsSection').innerHTML = optHtml;
            
            const ansCard = document.getElementById('answerCard');
            const analysisSection = document.getElementById('analysisSection');
            
            let ansHtml = '<div class="nav-section"><button class="nav-btn prev" onclick="goPrev()">上一题</button><button class="nav-btn next" onclick="goNext()">下一题</button></div>';
            if (ans && ans !== q.answer) ansHtml += '<div class="wrong-tip"><span>💡</span> 已自动加入错题本</div>';
            ansCard.innerHTML = ansHtml;
            ansCard.className = 'answer-card show';
            
            if (q.analysis && (!isExamMode || hasAnswered)) {
                analysisSection.innerHTML = '<div class="analysis-title">题目解析</div><div class="analysis-content">' + q.analysis + '</div>';
                analysisSection.className = 'analysis-section show';
            } else {
                analysisSection.className = 'analysis-section';
            }
            
            document.querySelector('.nav-btn.prev').disabled = idx === 0;
            document.querySelector('.nav-btn.next').disabled = idx === arr.length - 1;
            bindSwipe();
        }
        
        function choose(id, val, correct) {
            if (answers[id]) return;
            answers[id] = val;
            if (val !== correct) wrongs.add(id);
            save();
            render();
            updateBadge();
        }
        
        function toggleStar(id) {
            if (stars.has(id)) stars.delete(id); else stars.add(id);
            save();
            render();
            updateBadge();
        }
        
        function goPrev() { if (idx > 0) { idx--; render(); } }
        function goNext() { const arr = getList(); if (idx < arr.length - 1) { idx++; render(); } }
        
        function bindSwipe() {
            let isSwiping = false;
            let swipeStartY = 0;
            
            document.body.ontouchstart = function(e) {
                startX = e.touches[0].clientX;
                swipeStartY = e.touches[0].clientY;
                isSwiping = true;
            };
            
            document.body.ontouchend = function(e) {
                if (!isSwiping) return;
                isSwiping = false;
                
                const endX = e.changedTouches[0].clientX;
                const endY = e.changedTouches[0].clientY;
                const diffX = endX - startX;
                const diffY = endY - swipeStartY;
                
                if (Math.abs(diffX) > 80 && Math.abs(diffX) > Math.abs(diffY)) {
                    if (diffX > 0) {
                        goPrev();
                    } else {
                        goNext();
                    }
                }
            };
        }
        
        function updateBadge() {
            document.getElementById('wrongBadge').textContent = wrongs.size || '';
            document.getElementById('favBadge').textContent = stars.size || '';
        }
        
        function showMain() {
            mode = 'all'; idx = 0;
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('statsPage').classList.remove('show');
            document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
            document.getElementById('bank1Tab').classList.toggle('active', currentBank === 1);
            document.getElementById('bank2Tab').classList.toggle('active', currentBank === 2);
            render();
        }
        
        function showWrongList() {
            mode = 'wrong'; idx = 0;
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('statsPage').classList.remove('show');
            document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.tab-item')[2].classList.add('active');
            render();
        }
        
        function showFavList() {
            mode = 'star'; idx = 0;
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('statsPage').classList.remove('show');
            document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.tab-item')[3].classList.add('active');
            render();
        }
        
        function showStats() {
            document.getElementById('mainContent').classList.add('hidden');
            document.getElementById('statsPage').classList.add('show');
            document.querySelectorAll('.tab-item').forEach(function(t) { t.classList.remove('active'); });
            document.querySelectorAll('.tab-item')[4].classList.add('active');
            updateStats();
        }
        
        function updateStats() {
            const done = Object.keys(answers).length;
            let right = 0, wrong = 0;
            list.forEach(function(q) { if (answers[q.id]) { answers[q.id] === q.answer ? right++ : wrong++; } });
            document.getElementById('sAnswered').textContent = done;
            document.getElementById('sCorrect').textContent = right;
            document.getElementById('sWrong').textContent = wrong;
            document.getElementById('sRate').textContent = done ? (right / done * 100).toFixed(1) + '%' : '0%';
            document.getElementById('wrongNum').textContent = wrongs.size ? '(' + wrongs.size + ')' : '';
            document.getElementById('favNum').textContent = stars.size ? '(' + stars.size + ')' : '';
            renderGridList('wrongGrid', wrongs);
            renderGridList('favGrid', stars);
        }
        
        function renderGridList(id, set) {
            const arr = list.filter(function(q) { return set.has(q.id); });
            const box = document.getElementById(id);
            if (!arr.length) { box.innerHTML = '<div class="empty-box"><div class="empty-icon">🎉</div><div>暂无</div></div>'; return; }
            let html = '<div class="grid-box">';
            arr.forEach(function(q) { 
                const isRight = answers[q.id] === q.answer; 
                html += '<div class="grid-cell ' + (isRight ? 'right' : 'wrong') + '" onclick="jumpTo(' + q.id + ')">' + q.order + '</div>'; 
            });
            html += '</div>';
            box.innerHTML = html;
        }
        
        function showGridModal() { renderGrid(); document.getElementById('gridModal').classList.add('show'); }
        function closeGridModal() { document.getElementById('gridModal').classList.remove('show'); }
        
        function renderGrid() {
            let arr = list;
            if (filter === 'done') arr = list.filter(function(q) { return answers[q.id]; });
            else if (filter === 'undone') arr = list.filter(function(q) { return !answers[q.id]; });
            else if (filter === 'wrong') arr = list.filter(function(q) { return wrongs.has(q.id); });
            else if (filter === 'star') arr = list.filter(function(q) { return stars.has(q.id); });
            const curr = getList()[idx];
            let html = '';
            arr.forEach(function(q) {
                let cls = 'grid-cell';
                const isRight = answers[q.id] && answers[q.id] === q.answer;
                const isWrong = answers[q.id] && answers[q.id] !== q.answer;
                if (curr && q.id === curr.id) cls += ' now';
                else if (isWrong) cls += ' wrong';
                else if (isRight) cls += ' right';
                else if (stars.has(q.id)) cls += ' star';
                else if (answers[q.id]) cls += ' done';
                html += '<div class="' + cls + '" onclick="jumpTo(' + q.id + ')">' + q.order + '</div>';
            });
            document.getElementById('gridBox').innerHTML = html;
        }
        
        function filterQ(f) {
            filter = f;
            document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
            event.target.classList.add('active');
            renderGrid();
        }
        
        function jumpTo(id) {
            mode = 'all';
            type = 'all';
            const i = list.findIndex(function(q) { return q.id === id; });
            if (i !== -1) {
                idx = i;
                closeGridModal();
                render();
            }
        }
        
        function toggleSearch() {
            const searchBar = document.getElementById('searchBar');
            const searchResults = document.getElementById('searchResults');
            const mainContent = document.getElementById('mainContent');
            if (searchBar.classList.contains('show')) {
                searchBar.classList.remove('show');
                searchResults.style.display = 'none';
                mainContent.style.display = 'block';
                document.getElementById('searchInput').value = '';
            } else {
                searchBar.classList.add('show');
                document.getElementById('searchInput').focus();
            }
        }
        
        function clearSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            isSearchMode = false;
        }
        
        function doSearch(keyword) {
            keyword = keyword.trim().toLowerCase();
            if (!keyword) {
                document.getElementById('searchResults').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                isSearchMode = false;
                return;
            }
            
            isSearchMode = true;
            const results = [];
            
            list.forEach(function(q) {
                const questionText = q.question.toLowerCase();
                const optionsText = q.options ? q.options.map(function(o) { return o.text; }).join(' ').toLowerCase() : '';
                const analysisText = q.analysis ? q.analysis.toLowerCase() : '';
                const allText = questionText + ' ' + optionsText + ' ' + analysisText;
                
                if (allText.indexOf(keyword) !== -1) {
                    const score = calculateScore(keyword, questionText, optionsText, analysisText);
                    results.push({ question: q, score: score });
                }
            });
            
            results.sort(function(a, b) { return b.score - a.score; });
            searchResults = results;
            
            const resultsBox = document.getElementById('searchResults');
            const mainContent = document.getElementById('mainContent');
            
            if (results.length === 0) {
                resultsBox.innerHTML = '<div class="empty-box"><div class="empty-icon">🔍</div><div>未找到相关题目</div></div>';
            } else {
                let html = '<div class="search-count">找到 ' + results.length + ' 道相关题目</div>';
                results.slice(0, 50).forEach(function(item) {
                    const q = item.question;
                    const highlighted = highlightKeyword(q.question, keyword);
                    html += '<div class="search-item" onclick="jumpToSearch(' + q.id + ')">';
                    html += '<div class="search-item-title">' + highlighted + '</div>';
                    html += '<div class="search-item-meta">第 ' + q.order + ' 题 · ' + (q.type === 'single_choice' ? '单选' : '判断') + '</div>';
                    html += '</div>';
                });
                if (results.length > 50) {
                    html += '<div class="search-count">仅显示前50条结果</div>';
                }
                resultsBox.innerHTML = html;
            }
            
            resultsBox.style.display = 'block';
            mainContent.style.display = 'none';
        }
        
        function calculateScore(keyword, question, options, analysis) {
            let score = 0;
            if (question.indexOf(keyword) !== -1) score += 100;
            if (options.indexOf(keyword) !== -1) score += 50;
            if (analysis.indexOf(keyword) !== -1) score += 30;
            const questionCount = (question.match(new RegExp(keyword, 'g')) || []).length;
            score += questionCount * 10;
            return score;
        }
        
        function highlightKeyword(text, keyword) {
            const regex = new RegExp('(' + keyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
            return text.replace(regex, '<mark>$1</mark>');
        }
        
        function jumpToSearch(id) {
            const i = list.findIndex(function(q) { return q.id === id; });
            if (i !== -1) {
                mode = 'all';
                type = 'all';
                idx = i;
                clearSearch();
                toggleSearch();
                render();
            }
        }
        
        load();
        render();
        updateBadge();
    </script>
</body>
</html>
