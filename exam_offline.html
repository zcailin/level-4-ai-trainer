stion":"依据《中华人民共和国劳动法》，劳动者出现哪些情形时，用人单位有权解除劳动合同？（）","options":[{"label":"A","text":"在孕期内"},{"label":"B","text":"在工作期间犯错次数超过10次"},{"label":"C","text":"在试用期间被证明不符合录用条件的"},{"label":"D","text":"在职期间患病"}],"answer":"C","analysis":"试用期不符合录用条件，用人单位可解除劳动合同。"},{"id":96857,"order":739,"type":"single_choice","question":"下列哪一项不属于智能系统在家庭居住领域的应用范畴？（）","options":[{"label":"A","text":"智能病例诊断"},{"label":"B","text":"智能音响娱乐系统"},{"label":"C","text":"智能照明控制"},{"label":"D","text":"智能家庭安全系统"}],"answer":"A","analysis":"智能病例诊断属于智能医疗领域的内容"},{"id":96938,"order":740,"type":"single_choice","question":"数据拆解的主要目的是（）","options":[{"label":"A","text":"简化数据分析过程"},{"label":"B","text":"提高数据分析精度"},{"label":"C","text":"可视化数据"},{"label":"D","text":"提升数据复杂度"}],"answer":"B","analysis":"数据拆解的主要目的是可以通过将数据分解成更小、更具体、更易于处理的部分来提高数据分析的精度。数据拆解不仅可以让分析人员更容易理解数据，还可以帮助他们更准确地预测数据趋势，并做出更好的决策。"},{"id":96512,"order":741,"type":"single_choice","question":"DBSCAN 算法的优点中，不包括下列哪一项（）。","options":[{"label":"A","text":"对噪声鲁棒"},{"label":"B","text":"算法简单易懂"},{"label":"C","text":"对数据分布的形状和大小没有要求"},{"label":"D","text":"对离群点不敏感"}],"answer":"B","analysis":"DBSCAN算法对离群点不敏感，可以处理不同形状和大小的数据分布，能分辨噪音，在低维空间中表现良好，但在高维数据中因距离计算失效而效果下降"},{"id":96201,"order":742,"type":"single_choice","question":"下面哪种行为没有违背严谨求是的基本准则（）。​","options":[{"label":"A","text":"依据先前的经验和想法，一味地肯定某种观点"},{"label":"B","text":"忽略关键数据，进行结论推断"},{"label":"C","text":"根据自己的主观猜测作出结论"},{"label":"D","text":"根据实际数据进行分析和判断"}],"answer":"D","analysis":"根据严谨求实的基本准则，从业人员应当寻找、利用合适数据和信息，以提供有力的依据和支持他们的决策或结论"},{"id":96898,"order":743,"type":"single_choice","question":"下列哪项不属于特征变换的方法？（）","options":[{"label":"A","text":"字典学习"},{"label":"B","text":"特征离散化"},{"label":"C","text":"独热编码"},{"label":"D","text":"特征缩放"}],"answer":"A","analysis":"字典学习不属于特征变换方法。"},{"id":96797,"order":744,"type":"single_choice","question":"在数据筛选的流程里，依靠（）来删掉重复的数据。（）","options":[{"label":"A","text":"数据收集"},{"label":"B","text":"数据清洗"},{"label":"C","text":"数据探索"},{"label":"D","text":"数据可视化"}],"answer":"B","analysis":"数据清洗是数据筛选流程中的一个重要步骤，其中包括去除重复数据、处理缺失值等操作。"},{"id":96737,"order":745,"type":"single_choice","question":"在实时检验时发现了不合格的数据，可采取的措施有什么？（）","options":[{"label":"A","text":"忽略少量有误的数据"},{"label":"B","text":"立即让标注员返工"},{"label":"C","text":"全部数据重新检验"},{"label":"D","text":"丢弃全部不合格数据"}],"answer":"B","analysis":"在实时检验过程中，如果发现不合格数据，则可以立即让标注员进行返工，改正标注"},{"id":96182,"order":746,"type":"single_choice","question":"作为职业道德的关键准则，“保守机密” 的含义是（）？","options":[{"label":"A","text":"保护个人隐私"},{"label":"B","text":"拒绝分享知识"},{"label":"C","text":"遵守公司规章制度"},{"label":"D","text":"不泄露重要信息"}],"answer":"D","analysis":"保守机密要求不泄露重要信息，保护商业机密与个人隐私。"},{"id":96411,"order":747,"type":"single_choice","question":"在开展数据分析工作时，缺失值具体所指的是什么？（）","options":[{"label":"A","text":"指数据集中存在的重复的值"},{"label":"B","text":"指代表某个特定值的代码或符号"},{"label":"C","text":"指数据集中缺少了某些变量或变量值"},{"label":"D","text":"指数据集中每个变量都有对应的值"}],"answer":"C","analysis":"缺失值指数据集中缺少了某些变量或变量值，这可能是因为数据收集的缺陷，比如用户跳过了某些问题，或者是数据处理的错误，比如数据被意外删除。"},{"id":96317,"order":748,"type":"single_choice","question":"根据《中华人民共和国网络安全法》，个人信息采集者获取个人信息时若未征得被采集人的同意，可能会受到（）的处罚。","options":[{"label":"A","text":"行政拘留"},{"label":"B","text":"处以罚金"},{"label":"C","text":"降低其安全等级"},{"label":"D","text":"罚款并限制其业务活动"}],"answer":"D","analysis":"《中华人民共和国网络安全法》第四十一条规定，网络运营者收集、使用个人信息，应当遵循合法、正当、必要的原则，公开收集、使用规则，明示收集、使用信息的目的、方式和范围，并经被收集者同意"},{"id":96623,"order":749,"type":"single_choice","question":"下列哪一项能够对图像数据做出准确的定义（）。","options":[{"label":"A","text":"一组表达图像的数字"},{"label":"B","text":"一组描述色彩和亮度的数字"},{"label":"C","text":"一组描述物体形状和大小的数字"},{"label":"D","text":"一组描述图像场景的数字"}],"answer":"B","analysis":"图像数据是一组数字，这些数字用来描述图像的灰度、颜色和亮度等信息。因此，选项B描述最准确。"},{"id":96314,"order":750,"type":"single_choice","question":"根据《中华人民共和国劳动合同法》，劳动合同的内容中，（）是可以不包含的。","options":[{"label":"A","text":"劳动合同期限"},{"label":"B","text":"工作地点"},{"label":"C","text":"劳动报酬"},{"label":"D","text":"住房条件"}],"answer":"D","analysis":"住房条件不是劳动合同必备条款。"},{"id":96910,"order":751,"type":"single_choice","question":"在回归预测算法中，通过给回归估计增加一个平方偏差（也就是 L2 正则项），以此来减小标准误差，该算法是（）。","options":[{"label":"A","text":"线性回归"},{"label":"B","text":"弹性网络回归"},{"label":"C","text":"Lasso回归"},{"label":"D","text":"岭回归"}],"answer":"D","analysis":"岭回归通过L2正则项减小标准误差。"},{"id":96642,"order":752,"type":"single_choice","question":"音频文件格式MP3 的全称是（）。","options":[{"label":"A","text":"MPEG Layer 3"},{"label":"B","text":"Waveform Audio File Format"},{"label":"C","text":"Full Lossless Audio Conversion"},{"label":"D","text":"Fine Lossless Audio Clarity"}],"answer":"A","analysis":"MP3(MPEG Layer 3)格式:是一种有损失的压缩格式，它舍弃了音频数据中人类几乎听不到的声音，因此文件很小，但音质表现比WAV差，也由于文件小的缘故，相当适合网络传输，因此MP3可以说是目前最普遍的音频压缩格式。"},{"id":96245,"order":753,"type":"single_choice","question":"存储器是用于存储数据和指令的设备，下列属于主存储器的是（）。","options":[{"label":"A","text":"光驱"},{"label":"B","text":"内存"},{"label":"C","text":"U盘"},{"label":"D","text":"硬盘"}],"answer":"B","analysis":"主存储器指的是计算机中存放程序和数据的暂时性存储设备，如内存、高速缓存等"},{"id":96629,"order":754,"type":"single_choice","question":"以下哪一种图像数据的归类方式通常被用来简化图像的处理与分析工作？（）","options":[{"label":"A","text":"灰度图像"},{"label":"B","text":"RGB图像"},{"label":"C","text":"二值化图像"},{"label":"D","text":"黑白图像"}],"answer":"C","analysis":"二值化图像是指将图像像素值只取0和1两个值的图像。去除了图像中的大量细节信息，简化了图像处理和分析计算。应用广泛，例如图像二值化、字符识别、条形码识别等。参考资料：https://zh.wikipedia.org/wiki/%E4%BA%8C%E5%80%BC%E5%8C%96"},{"id":96777,"order":755,"type":"single_choice","question":"数据质量验证与校验的主要方法中，不包含（）。","options":[{"label":"A","text":"检查数据的储存性能"},{"label":"B","text":"检查数据的完整性"},{"label":"C","text":"检查数据的唯一标识"},{"label":"D","text":"验证数据的格式"}],"answer":"A","analysis":"数据质量验证和校验的主要方法包括完整性检查、格式验证、范围检查、一致性检查和唯一性验证"},{"id":96897,"order":756,"type":"single_choice","question":"下列对于特征选择的说法正确的是（）。","options":[{"label":"A","text":"特征选择只能用于线性模型"},{"label":"B","text":"特征选择对模型的泛化能力没有影响"},{"label":"C","text":"所有特征都应当参与模型训练"},{"label":"D","text":"特征选择可以减少数据集的维度"}],"answer":"D","analysis":"特征选择的目标是寻找到最优的特征子集，其能够将不相关或者冗余的特征从原本的特征集合中剔除出去，从而有效地缩小特征集合的规模，即减少数据集的维度，同时特征选择也能提高模型的训练速度和泛化能力"},{"id":96179,"order":757,"type":"single_choice","question":"在职业道德的基本内涵相关表述中，哪一项不正确（）？","options":[{"label":"A","text":"职业道德要求职业人员尊重职业道德规范和行业准则"},{"label":"B","text":"职业道德要求职业人员牟取个人利益"},{"label":"C","text":"职业道德要求职业人员遵守法律法规"},{"label":"D","text":"诚实守信是职业道德的基本要求"}],"answer":"B","analysis":"职业道德规定从业人员不得因个人利益而违反社会公序良俗和职业道德规范，所以选项C错误"},{"id":96518,"order":758,"type":"single_choice","question":"在 DBSCAN 密度聚类算法的实现步骤里，属于第二步的是（）。","options":[{"label":"A","text":"将核心对象周围的所有样本点加入到同一个聚类簇中"},{"label":"B","text":"随机选择一个样本点"},{"label":"C","text":"将核心对象周围的所有样本点标记为噪声点"},{"label":"D","text":"从未访问的样本点中选择一个作为核心对象"}],"answer":"D","analysis":"DBSCAN第二步是选择未访问样本点作为核心对象。"},{"id":96747,"order":759,"type":"single_choice","question":"多重抽样检验辅助全样检验，其作用体现在（）。","options":[{"label":"A","text":"减少全样检验中的疏漏"},{"label":"B","text":"降低全样检验的成本"},{"label":"C","text":"缩短全样检验的时间"},{"label":"D","text":"提高数据的运转效率"}],"answer":"A","analysis":"多重抽样检验方法辅助全样检验，是在全样检验完成后的一种补充检验方法，主要作用是减少全样检验中的疏漏，增加数据标注的准确率"},{"id":96796,"order":760,"type":"single_choice","question":"数据筛选是为了方便后续对数据开展（）。","options":[{"label":"A","text":"数据清洗"},{"label":"B","text":"数据预处理"},{"label":"C","text":"数据清理"},{"label":"D","text":"数据分析"}],"answer":"D","analysis":"数据筛选的主要目标是从大量数据中选择出满足一定条件的数据，以便进行后续的数据分析和处理。"},{"id":96319,"order":761,"type":"single_choice","question":"对于商标注册，下列说法不正确的是（）。","options":[{"label":"A","text":"仅有本商品的通用名称可作为商标注册"},{"label":"B","text":"商标注册申请人若有不服可以自收到通知之日起十五日内向商标评审委员会申请复审"},{"label":"C","text":"商标注册所得权利的保护期限为10年"},{"label":"D","text":"注册商标的专用权，以核准注册的商标和核定使用的商品为限。"}],"answer":"A","analysis":"《中华人民共和国商标法》第十一条规定，下列标志不得作为商标注册：（一）仅有本商品的通用名称、图形、型号的；（二）仅直接表示商品的质量、主要原料、功能、用途、重量、数量及其他特点的；（三）其他缺乏显著特征的"},{"id":96820,"order":762,"type":"single_choice","question":"对于文本数据的预处理，下列哪项不是常见操作？（）","options":[{"label":"A","text":"算法选择"},{"label":"B","text":"去额外空格"},{"label":"C","text":"停用词处理"},{"label":"D","text":"分词"}],"answer":"A","analysis":"算法选择是在预处理之后，对于特定的任务选择不同的算法"},{"id":96855,"order":763,"type":"single_choice","question":"智能系统在家庭居住领域的主要应用场景包括（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"智能家居互联"},{"label":"C","text":"智能家居安全"},{"label":"D","text":"智能家居控制"}],"answer":"A","analysis":"智能系统在家居领域的主要运用包括智能家居控制、智能家居安全、智能家居互联、智能健康管理等等"},{"id":96732,"order":764,"type":"single_choice","question":"实时检验具有什么优点？（）","options":[{"label":"A","text":"不需要专门的检验人员"},{"label":"B","text":"无法掌握任务进度"},{"label":"C","text":"能够忽略问题细节"},{"label":"D","text":"能够及时发现问题"}],"answer":"D","analysis":"实时检验能够及时发现问题，避免问题扩大和损失的产生，能够实时掌握数据标注的任务进度，对人员的配备及管理要求较高"},{"id":96934,"order":765,"type":"single_choice","question":"（）分布能够直接描述大量独立随机变量之和。","options":[{"label":"A","text":"正态分布"},{"label":"B","text":"泊松分布"},{"label":"C","text":"二项分布"},{"label":"D","text":"中心极限定理"}],"answer":"D","analysis":"中心极限定理指出，大量相互独立的随机变量的和的分布近似于正态分布。因此，可以使用中心极限定理来描述多个随机变量的和的分布情况。"},{"id":96379,"order":766,"type":"single_choice","question":"以下选项中，（）是借助Requests库发起POST请求最为直接的办法。","options":[{"label":"A","text":"requests.request('POST', 'http://www.example.com')"},{"label":"B","text":"requests.headers('http://www.example.com', headers={'user-agent': 'Mozilla/5.0'})"},{"label":"C","text":"requests.post('http://www.example.com', data={'key': 'value'})"},{"label":"D","text":"requests.get('http://www.example.com')"}],"answer":"C","analysis":"requests.post()是发送POST请求最直接的方法。"},{"id":96452,"order":767,"type":"single_choice","question":"数据集成直接发挥的作用体现在（）。","options":[{"label":"A","text":"扩展数据的应用范围"},{"label":"B","text":"提高数据的存储效率"},{"label":"C","text":"提高数据的安全性"},{"label":"D","text":"提高数据的质量"}],"answer":"A","analysis":"数据集成可以将不同数据源的数据整合起来，从而扩展数据的应用范围"},{"id":96756,"order":768,"type":"single_choice","question":"数据标注所涉及的步骤中，不包含下列哪一项？（）","options":[{"label":"A","text":"质量控制"},{"label":"B","text":"制定标注规范"},{"label":"C","text":"数据存储升级"},{"label":"D","text":"数据准备"}],"answer":"C","analysis":"数据标注的步骤包括数据准备、制定标注规范、招募与培训标注员、标注执行、质量控制、数据整理与验证"},{"id":97161,"order":769,"type":"judge","question":"数据分类的基本原则是按照数据的相似性来分组。","options":[],"answer":"正确","analysis":"数据分类的基本原则是将数据按照某种相似性或关联性进行划分和归纳，以达到对数据的更好理解和利用。这些相似性或关联性可能是基于某些共性特征（如属性、值等）或某些关系（如相似、相关等）。"},{"id":97310,"order":770,"type":"judge","question":"在进行回归预测时，采用特征选择的方式能够有效防止模型训练过程中出现过拟合问题。","options":[],"answer":"正确","analysis":"特征选择的目标是寻找到最优的特征子集，其能够将不相关或者冗余的特征从原本的特征集合中剔除出去，从而有效地缩小特征集合的规模，进一步减少模型的运行时间，同时提高模型的精确度和增强有效性。另外，特征选择也可以避免过拟合等问题。"},{"id":97265,"order":771,"type":"judge","question":"数据整理涵盖数据清洗、数据转换、归类编码及数字编码等环节，不过在数据清洗阶段，无需进行检查数据一致性、处理无效值与缺失值等操作。","options":[],"answer":"错误","analysis":"数据整理包括数据的清洗、数据转换、归类编码和数字编码等过程，其中数据清洗占据最重要的位置，就是检査数据一致性，处理无效值和缺失值等操作。"},{"id":97306,"order":772,"type":"judge","question":"等宽法和等频法都属于特征选择中常用的方法。","options":[],"answer":"错误","analysis":"等宽法和等频法均属于特征离散化的常用方法，特征离散化属于特征变换的方法，并不是特征选择方法。"},{"id":97300,"order":773,"type":"judge","question":"pyecharts 只能制作静态图表，没办法创建交互式图表。","options":[],"answer":"错误","analysis":"pyecharts可以创建交互式图表，支持多种交互方式，例如鼠标悬停、点击等。"},{"id":97271,"order":774,"type":"judge","question":"管理信息系统文档的规范化管理，其主要表现涉及文档书写的规范要求、图表编号的规则设定、文档目录的编写标准以及文档管理的制度规范等多个层面。","options":[],"answer":"正确","analysis":"管理信息系统文档的规范化管理主要体现在文档书写规范、图表编号规则、文档目录编写标准和文档管理制度等几个方面"},{"id":97084,"order":775,"type":"judge","question":"数据集成的目的在于对数据进行分散和拆分，让数据管理维护更为便捷。","options":[],"answer":"错误","analysis":"数据集成可以将分散的数据整合起来，形成完整的数据集，从而更好地满足数据分析和应用的需求。数据集成可以消除数据冗余、提高数据可用性和可靠性，同时也可以降低数据管理和维护的成本和工作量。"},{"id":97124,"order":776,"type":"judge","question":"DENCLUE 聚类算法运用的是基于网格的方法。","options":[],"answer":"错误","analysis":"DENCLUE聚类算法采用的是基于密度的方法，先通过选择核心点来定位簇，接着通过计算局部密度来确定簇的大小和形状。这是一种非常强大的聚类方法，能够在高维数据集上处理噪声和异常值，并且不需要预设簇的个数。"},{"id":96951,"order":777,"type":"judge","question":"职业道德的自律性，主要是依靠外界的监督以及强制性的措施来维持的。","options":[],"answer":"错误","analysis":"职业道德的自律性是指“职业人员应主动自觉地遵守职业道德准则，形成自我约束和自我规范的行为准则”。这一特征强调职业人员的内在自觉性和自我约束，而非依赖外部监督或强制措施。"},{"id":96981,"order":778,"type":"judge","question":"鼠标和键盘都属于计算机的输出设备","options":[],"answer":"错误","analysis":"鼠标和键盘都是计算机的输入设备，用于输入数据和指令到计算机中。"},{"id":97087,"order":779,"type":"judge","question":"数据规约就是把数据集中多余的或者没必要的数据进行删除或转换，以此提升数据挖掘的效率和准确性。","options":[],"answer":"正确","analysis":"数据规约是数据挖掘的重要步骤之一，能够使数据更加紧凑有用，减少冗余信息和不必要的细节，从而加快数据挖掘的速度。"},{"id":97213,"order":780,"type":"judge","question":"在语音标注时，对于那些不确定的部分，可以随意填写内容或者进行猜测。","options":[],"answer":"错误","analysis":"在语音标注过程中，对于不确定的部分，不应随意填写或猜测。准确的语音标注需要依据准确的听觉判断和相关知识进行，对于无法确定的部分，应标注为不确定或留空，而不是随意填写或猜测。保持准确性和一致性对于语音标注的质量至关重要。"},{"id":96979,"order":781,"type":"judge","question":"在计算机内部，控制器的职责是协调指令的执行以及计算机主要部件的运作。","options":[],"answer":"正确","analysis":"运算器、控制器、存储器、输入设备和输出设备是计算机的五大核心部件。其中，控制器的作用是协调指令执行过程（如指令译码、时序控制）并管理CPU内部及各部件间的协作，而非直接控制输入输出操作。输入输出功能由独立的I/O子系统或专用控制器实现"},{"id":97081,"order":782,"type":"judge","question":"等宽离散化就是按照相等的宽度间隔对数据进行划分，从而更利于开展数据分析和处理工作。","options":[],"answer":"正确","analysis":"数据离散化是指将连续型数据转化为离散型数据的过程，常用于数据挖掘、统计学、机器学习等领域。"},{"id":97314,"order":783,"type":"judge","question":"最小二乘回归是最常见的线性回归，它的优势是计算简单、容易理解，不足之处是对异常值极为敏感。","options":[],"answer":"正确","analysis":"最小二乘回归是最普通的线性回归，它的目的是获得最佳的拟合直线(回归线)，在因变量和一个或多个自变量之间建立一种关系，通过最小化每个数据点到线的垂直偏差平方和来计算最佳拟合线。其优点是计算简单、易于理解，缺点是对异常值非常敏感。"},{"id":97202,"order":784,"type":"judge","question":"完整性是衡量文本标注质量的标准之一，它指的是标注结果是否包含了文本里的全部信息。","options":[],"answer":"正确","analysis":"完整性是衡量文本标注质量的重要标准之一。它关注标注结果是否包含了文本中的所有重要信息，是否对文本中的各个方面进行了充分的标注。完整性高表示标注结果较为全面，包含了文本中的重要特征和内容。"},{"id":97206,"order":785,"type":"judge","question":"语音数据标注在情感分析与语音情感识别中并不重要。","options":[],"answer":"错误","analysis":"语音数据标注在情感分析和语音情感识别中非常重要。情感分析和语音情感识别旨在从语音数据中识别和理解说话者的情感状态，通过对语音数据进行标注，可以获得与情感相关的标签或情感表达，从而训练情感分析模型或语音情感识别模型。"},{"id":97088,"order":786,"type":"judge","question":"数据规约能够用于特征选择，却不能应用于特征提取。","options":[],"answer":"错误","analysis":"数据规约可以通过删除不相关的特征、转换特征、合并相似特征等方法来进行特征选择和特征提取，从而提高模型的精度和可解释性。"},{"id":97204,"order":787,"type":"judge","question":"在文本标注的应用类型里，并不包含数据清洗和场景识别。","options":[],"answer":"错误","analysis":"标注完成的文本数据可以用于自然语言处理模型的训练。其应用类型主要有数据清洗、语义识别、实体识别、场景识别、情绪识别、应答识别等。"},{"id":97141,"order":788,"type":"judge","question":"DIANA 层次聚类在实现时采用自上而下的拆分策略，即从所有样本构成一个初始聚类开始，逐步将相似度较低的样本拆分成新的聚类，直到所有样本都成为单独的一类或达到指定的聚类数量。","options":[],"answer":"正确","analysis":"DIANA层次聚类是一种基于距离的聚类方法，采用的是自上而下的聚合策略，即从每个样本作为一个初始聚类开始，逐步将相似度较低的样本拆分出新的聚类，直到所有样本都被聚为一类或指定的聚类数目已达到。"},{"id":97315,"order":789,"type":"judge","question":"在用线性回归模型对测试集数据进行预测后，可通过绘制预测值和真实值的折线图，来直观地观察模型效果。","options":[],"answer":"正确","analysis":"通过绘制预测值和真实值的折线图，可较为直观地观察模型效果。"},{"id":97259,"order":790,"type":"judge","question":"当使用 Python 的 pandas 库进行数据筛选时，借助 query () 函数能够完成复杂的条件筛选。","options":[],"answer":"正确","analysis":"pandas库中的query()函数可以用于复杂的条件筛选，将条件作为字符串传入函数中。"},{"id":96954,"order":791,"type":"judge","question":"为了不断增强自身的知识储备与能力水平，从业人员应当坚持学习和钻研，密切关注行业动态与最新资讯。","options":[],"answer":"正确","analysis":"职业道德要求从业人员应该持续学习和研究，跟进行业发展和最新信息，以不断提升自己的知识和能力。"},{"id":97244,"order":792,"type":"judge","question":"数据质量控制仅需在数据输入时进行，一旦数据录入系统，便无需再进行质量控制。","options":[],"answer":"错误","analysis":"数据质量控制应该是一个持续的过程，不仅仅是在数据输入时进行，而且在数据使用、储存和传输的过程中也需要进行质量控制，以确保数据的质量。"},{"id":97019,"order":793,"type":"judge","question":"《中华人民共和国民法典》规定，八周岁以下的未成年人是限制民事行为能力人，他们能够独立进行纯获利益的民事法律行为，或者实施与自身年龄、智力相匹配的民事法律行为。","options":[],"answer":"错误","analysis":"根据《中华人民共和国民法典》第十九条规定，八周岁以上的未成年人为限制民事行为能力人，实施民事法律行为由其法定代理人代理或者经其法定代理人同意、追认；但是，可以独立实施纯获利益的民事法律行为或者与其年龄、智力相适应的民事法律行为。"},{"id":97283,"order":794,"type":"judge","question":"智慧校园是将先进的信息技术及互联网等技术引入教育领域，以此提高学校管理、教学以及学生服务等方面的效率与质量。","options":[],"answer":"正确","analysis":"智慧校园是将先进的信息技术和互联网等技术应用于教育领域，以改善学校管理、教学和学生服务等方面的效率和质量。"},{"id":97068,"order":795,"type":"judge","question":"在缺失值处理方式里，删除法是更有利于保留数据信息，防止引入噪声或误差的方法","options":[],"answer":"错误","analysis":"删除法是一种处理缺失值的方法，它直接删除含有缺失值的样本或变量，从而减少缺失值对分析结果的影响。但是，使用删除法可能会损失数据信息，尤其是当缺失值比例较高时，可能导致样本量急剧减少、样本偏差增大等问题。因此，在具体应用中，需要根据实际情况选择合适的缺失值处理方法。"},{"id":97032,"order":796,"type":"judge","question":"依据约束实现的途径，数据完整性约束可以分为静态约束与动态约束。","options":[],"answer":"正确","analysis":"实现完整性约束的方法依类别不同而不同。完整性约束可以分为两大类：静态约束和动态约束。"},{"id":97145,"order":797,"type":"judge","question":"在 AGNES 层次聚类的实现步骤中，一开始每个数据点都被看作是一个独立的簇。","options":[],"answer":"正确","analysis":"AGNES层次聚类是一种自下而上的算法，初始时每个数据点都被视为一个单独的簇，然后每一步将最近的两个簇合并成一个新的簇，直到达到所需的簇的数量为止。"},{"id":97107,"order":798,"type":"judge","question":"数和数据所指的是同一个概念。","options":[],"answer":"错误","analysis":"数是指用来计算和衡量数量的概念，而数据是指用数字、文字、符号等方式记录的信息。数和数据虽然都与数字有关，但概念和用途上有所不同。"},{"id":97176,"order":799,"type":"judge","question":"对图像数据进行预处理时，不包括对图像大小的缩放。","options":[],"answer":"错误","analysis":"图像数据预处理通常包括将所有的图像调整为相同的大小，这有助于进行特征的提取和模型的训练。因此，图像大小的缩放是图像数据预处理的一个重要步骤。"},{"id":97098,"order":800,"type":"judge","question":"Cookie 机制是将数据存放在客户端。","options":[],"answer":"正确","analysis":"Cookie机制是将数据存储在客户端，通过设置响应头部的Set-Cookie字段，将信息保存在客户端的浏览器中。"},{"id":97111,"order":801,"type":"judge","question":"在计算机中，浮点数通常是使用 BCD 码来进行编码的。","options":[],"answer":"错误","analysis":"在计算机中，浮点数通常采用IEEE 754标准进行编码，而不是BCD码。"},{"id":97287,"order":802,"type":"judge","question":"智慧物流是指依靠集成智能化技术，让物流系统具备模仿人类智能的能力，拥有思维、学习、感知、推理判断及解决问题等能力，从而自行处理物流过程中出现的各类难题。","options":[],"answer":"正确","analysis":"根据中国物联网校企联盟对智慧物流的定义，智慧物流指的是借助集成智能化技术，让物流系统模仿人的智能，具备思维、学习、感知、推理判断、解决问题等能力，以对物流过程中出现的各种难题进行自行解决。"},{"id":96962,"order":803,"type":"judge","question":"工作人员应严格遵照保密条例，对工作中涉及的机密信息进行妥善保存，严禁将相关信息向外泄露。","options":[],"answer":"正确","analysis":"职业守则中的\"恪尽职守\"基本要求包括保守秘密，即从业人员应该严格遵守保密规定，对工作中的机密信息予以妥善保管，并不得泄露相关信息。具备保密意识，确保客户和组织的利益不受损害。"},{"id":97263,"order":804,"type":"judge","question":"R 语言提供了多种数据整理方法，包括数据规范化、填充缺失数据、将数字类型数据转换为分类类型数据、处理离群数据、删除变量、处理观测数据中有缺失值的变量等。","options":[],"answer":"正确","analysis":"R语言提供了数据整理方法，包括数据规范化、填充缺失数据、把数字类型数据转换为分类类型数据、处理离群数据、删除变量、观测数据有缺失值的变量等。"},{"id":97327,"order":805,"type":"judge","question":"数据拆解的方法只能按照时间、地域、维度等方式来进行拆解。","options":[],"answer":"错误","analysis":"数据拆解的方法包括按照时间、地域、维度等多种方式进行。除了这些基本的拆解方式外，还可以根据数据的特点和需求，采用其他的拆解方式，如按照产品、客户、渠道等进行拆解。"},{"id":97219,"order":806,"type":"judge","question":"图像数据标注的难点源于标注工作存在主观性。","options":[],"answer":"正确","analysis":"图像数据标注难点往往是因为标注的主观性导致的，比如对于同一张图片，不同的标注员可能标注的内容有所不同，这将会导致了标注数据的不一致性。"},{"id":97043,"order":807,"type":"judge","question":"静态网页的内容是无法更改的，而动态网页能够依据用户的操作实时更新页面内容。","options":[],"answer":"错误","analysis":"静态网页是存储在服务器上的固定HTML文件，内容不可动态生成，但可通过客户端技术（如JavaScript）实现局部交互效果。动态网页依赖服务器端脚本（如PHP、ASP）与数据库交互，实时生成个性化内容。两者的核心区别在于内容生成方式，而非是否支持用户操作触发的刷新。"},{"id":97297,"order":808,"type":"judge","question":"Seaborn 库包含 5 种预设主题，其中默认主题是 whitegrid。","options":[],"answer":"错误","analysis":"seaborn图形的默认主题为darkgrid。"},{"id":96952,"order":809,"type":"judge","question":"职业道德的一个特征是发展性，也就是随着社会的进步和职业环境的改变，职业道德也会持续地发生变化以适应新的需求。","options":[],"answer":"正确","analysis":"发展性是职业道德的重要特征之一，随着社会的发展和职业环境的变化，职业道德也会不断演化和适应新的要求。"},{"id":96995,"order":810,"type":"judge","question":"在 Word 中，只有 “插入” 选项卡才有插入表格和图片的功能。","options":[],"answer":"错误","analysis":"插入表格和图片的功能可以在Word的“插入”选项卡中找到，还可通过快捷键、拖拽插入图片。"},{"id":96957,"order":811,"type":"judge","question":"严谨求是的基本要求之一是精准地阐述自身的看法与见解。（）​","options":[],"answer":"正确","analysis":"根据严谨求是的基本要求，从业人员应该准确地表达自己的观点和意见，避免不准确和模棱两可的陈述。"},{"id":97181,"order":812,"type":"judge","question":"聚类和分类的不同点在于，聚类是无监督学习方法，而分类是有监督学习方法。","options":[],"answer":"正确","analysis":"聚类是一种无监督学习方法，其目的是将数据集中相似的数据聚集在一起，不需要预先定义分类标准；而分类是一种有监督学习方法，其目的是根据已知的分类标准将数据集中的数据按照预先定义好的分类标准进行分类。"},{"id":96960,"order":813,"type":"judge","question":"遵章守法的基本要求是遵守法律法规及相关规定，不实施违法行为。（）​","options":[],"answer":"正确","analysis":"遵章守法的基本要求是遵守法律法规和相关规定，不从事违法犯罪活动。"},{"id":96948,"order":814,"type":"judge","question":"职业道德的基本内涵是永恒不变的，不会因时代变迁和社会环境改变而有所调整。","options":[],"answer":"错误","analysis":"职业道德的基本内涵是相对固定的，但是随着时代和社会环境的变化，职业道德的内涵也会有所调整和变化。"},{"id":97189,"order":815,"type":"judge","question":"数据审核的方法仅包含人工审核和软件审核。","options":[],"answer":"错误","analysis":"数据审核的方法有很多种，其中比较常见的包括人工审核、软件审核、指标分析、规范性审核等等。"},{"id":97097,"order":816,"type":"judge","question":"通常情况下，Cookie 机制不允许进行跨域访问。","options":[],"answer":"正确","analysis":"Cookie机制是基于同源策略的，因此默认情况下只能在同一个域名的不同页面之间传递数据，不能跨域访问。"},{"id":97224,"order":817,"type":"judge","question":"实时检验的优势之一是能够有效减少标注过程中错误的重复出现。","options":[],"answer":"正确","analysis":"实时检验的优点有：能够及时发现问题并解决问题、能够有效减少标注过程中错误的重复出现、能够保证整体标注任务的流畅性、能够实时掌握数据标注的任务进度。"},{"id":97010,"order":818,"type":"judge","question":"SmartArt 图形在 PowerPoint 中不能进行编辑和修改，必须先在其他编辑软件里编辑好，再把结果导入 PowerPoint。","options":[],"answer":"错误","analysis":"SmartArt是可直接在PowerPoint中编辑和修改的。用户可以通过双击SmartArt图形来打开“SmartArt 工具”选项卡，在此标签页中进行修改和调整。用户还可以通过右键单击SmartArt图形，选择“SmartArt图形”选项来进一步调整和设置。"},{"id":97235,"order":819,"type":"judge","question":"数据标注规则里的一致性，是指标注人员对同一项数据进行标注时，得到的结果应当保持一致。","options":[],"answer":"正确","analysis":"数据标注规则中的一致性，指的是标注人员对同一项数据标注的结果应该一致，以保证标注的结果能够保证数据的质量和可用性。"},{"id":97249,"order":820,"type":"judge","question":"逻辑覆盖法是白盒测试中最常采用的测试方法。","options":[],"answer":"正确","analysis":"逻辑覆盖法是白盒测试最常用的测试方法，它包括语句覆盖、判定覆盖、条件覆盖、判定-条件覆盖、条件组合覆盖5种。"},{"id":97262,"order":821,"type":"judge","question":"数据整理是处理数据中的丢失值、越界值、不一致代码、重复数据等问题，以此保障数据的准确性、完整性、一致性、唯一性、适时性和有效性。","options":[],"answer":"正确","analysis":"数据整理(数据清洗)是将数据库精简以除去重复记录，并使剩余部分转换成标准可接收格式的过程。数据整理从数据的准确性、完整性、一致性、唯一性、适时性、有效性几个方面来处理数据的丢失值、越界值、不一致代码、重复数据等问题。"},{"id":97313,"order":822,"type":"judge","question":"线性回归会把目标变量和自变量之间的关系构建成一个线性方程，它的目的是找到一组最优系数，让预测值与真实值之间的误差达到最小。","options":[],"answer":"正确","analysis":"线性模型的目的学得一个通过属性的线性组合来进行预测的函数，线性回归的目的是学得一个通过线性模型来尽可能准确地预测实际值。"},{"id":97320,"order":823,"type":"judge","question":"分类预测在自然语言处理、图像识别以及金融风控等领域都有应用。","options":[],"answer":"正确","analysis":"分类预测是一种通用的机器学习方法，可以应用于多个领域。例如，自然语言处理中可以通过分类预测对文本进行情感分析或者垃圾邮件过滤；图像识别中可以通过分类预测实现物体识别；而在金融风控中，分类预测可以用于确定客户的信用等级或者检测欺诈行为等。"},{"id":97171,"order":824,"type":"judge","question":"运用机器学习处理图像数据的方式，可分为有监督和无监督两类。","options":[],"answer":"正确","analysis":"有监督和无监督是机器学习中常见的两种学习方式。在图像数据的归类中，有监督学习指的是已有标记的数据，机器通过学习标记数据进行分类；而无监督学习则是数据没有标记，机器通过自主学习进行分类。"},{"id":97129,"order":825,"type":"judge","question":"密度聚类算法不会采用欧几里得距离来度量数据点之间的相似程度。","options":[],"answer":"错误","analysis":"密度聚类算法使用的是基于密度的聚类方法，其核心思想是找到具有高密度的数据区域并将其划分为一类。衡量数据点之间的距离时，密度聚类算法通常使用欧几里得距离，但也可选择其他距离函数。密度可达性基于邻域定义，而非独立于传统距离函数。密度聚类算法（如DBSCAN）的核心是通过定义邻域（由距离阈值 eps 和最小点数 minPts）来识别高密度区域。邻域的计算依赖于距离度量，而欧几里得距离是默认且最常用的度量方式。"},{"id":97312,"order":826,"type":"judge","question":"支持向量回归算法属于线性回归算法的一种。","options":[],"answer":"错误","analysis":"支持向量机（分类算法）的基本模型是定义在特征空间中的间隔最大的线性分类器，包括核函数，这使得它成为实质上的非线性分类器。而支持向量回归算法使用支持向量机的思想来构建回归模型，是一种非线性的回归算法。"},{"id":97104,"order":827,"type":"judge","question":"动态网页的数据可以通过逆向分析法来获取。","options":[],"answer":"正确","analysis":"动态网页中数据的获取不同于静态网页，需要通过逆向分析的思路，借助浏览器中的开发者模式，定位目标数据所在的资源，并确定目标数据所在的URL。"},{"id":97065,"order":828,"type":"judge","question":"在缺失值检测环节，若想判断数据集中是否存在缺失数据，可以使用Pandas里的isnull()或isna()函数。","options":[],"answer":"正确","analysis":"Pandas 中的函数 isnull() 或 isna()可以检测数据集中是否存在任何缺失数据"},{"id":96985,"order":829,"type":"judge","question":"文件系统是一种软件系统，它的作用是管理存储设备上的逻辑空间，其中包含了文件和文件夹的组织结构以及存储方式。","options":[],"answer":"正确","analysis":"文件系统负责管理存储设备分区内的逻辑空间，定义文件组织结构（如目录树、命名规则），控制数据存储与访问方式（如NTFS的MFT、ext4的extents），但物理分区由独立工具管理。"},{"id":97209,"order":830,"type":"judge","question":"图像标注时，标注者需依照图像的原始状态进行标注，不能随意增加或删减内容。","options":[],"answer":"正确","analysis":"图像标注是指对图像中的对象、区域、属性、关系等进行标注和注释。标注者在标注过程中应该遵循图像的本来面貌进行标注，不能任意添加或删除内容，以保证标注结果准确可靠。"},{"id":97155,"order":831,"type":"judge","question":"共变法的含义是：当某一因素出现不同程度的变化时，被研究的现象也随之发生相应程度的改变，那么该因素就有可能是导致这一现象的原因。","options":[],"answer":"正确","analysis":"共变法的核心是通过变量间的定量共变关系提出因果假设。其定义不要求“其他因素保持不变”，但实际应用中需通过实验设计（如随机化）或统计控制（如多元回归）排除混杂因素干扰，以增强因果推断的可靠性。"},{"id":97123,"order":832,"type":"judge","question":"DENCLUE 属于层次聚类算法的一种。","options":[],"answer":"错误","analysis":"DENCLUE是一种基于密度的聚类算法，其不同于层次聚类和划分聚类。DENCLUE使用基于密度的聚类算法，从而能够在高维数据集中对噪声和异常值做出更好的处理。"},{"id":97298,"order":833,"type":"judge","question":"在 Seaborn 库中，sns.scatterplot () 函数能够创建散点图。","options":[],"answer":"正确","analysis":"sns.scatterplot()是Seaborn库中的一个函数，用于创建散点图。它可以通过调整参数来显示变量之间的相关性、聚类和异常值等信息。"},{"id":97226,"order":834,"type":"judge","question":"在实时检验过程中，可以对标注员的标注方法进行检验。","options":[],"answer":"正确","analysis":"在实时检验中，可以检验标注员的标注方法、熟练度、 准确度。"},{"id":97119,"order":835,"type":"judge","question":"OPTICS 属于一种基于核心对象的密度聚类算法。","options":[],"answer":"正确","analysis":"OPTICS（Ordering Points To Identify the Clustering Structure）算法是一种基于核心对象的密度聚类算法。通过按照对象的密度排序来确定聚类结构，相邻的高密度对象通过形成一条链条来连接，链条上的对象可以被聚合成一个聚类。该算法不需要提前指定聚类数量。"},{"id":97304,"order":836,"type":"judge","question":"在关联规则分析里，支持度和置信度都是用于评价关联规则的指标，不过二者的计算方式存在差异。","options":[],"answer":"正确","analysis":"支持度和置信度是评价关联规则重要的指标，通过计算频繁项集中每个项集出现的次数，来计算支持度；通过计算同时包含前项和后项的事务数与前项发生的事务数的比值，来计算置信度。两者所使用的计算方法不同。"},{"id":97253,"order":837,"type":"judge","question":"数据筛选的目的是让数据集变得更大。","options":[],"answer":"错误","analysis":"数据筛选的目的是为了从原始数据集中筛选出有价值的数据，以便更好地分析和应用数据。"},{"id":97057,"order":838,"type":"judge","question":"在数据处理流程中，数据清洗指的是把数据里无用、重复、冗余、错误等无效信息进行删除或者修正的操作。","options":[],"answer":"正确","analysis":"清洗数据是数据预处理的重要步骤，可以帮助提高数据质量，减少错误分析和无效数据分析的影响。"},{"id":97273,"order":839,"type":"judge","question":"挑选部署环境时，要考量硬件配置、网络带宽、存储空间等因素，比如针对高并发访问的系统，应选用负载均衡器来分散请求压力。","options":[],"answer":"正确","analysis":"选择部署环境时，硬件配置、网络带宽、存储空间等因素都会直接影响系统的运行效率和扩展性。对于高并发访问的系统，负载均衡器可以将流量分发到多个服务器上，避免单点故障，提高系统的可用性和性能。"},{"id":97282,"order":840,"type":"judge","question":"应用智能系统能够完全替代交通管理者的工作，进而降低人力成本。","options":[],"answer":"错误","analysis":"尽管智能系统可以帮助交通管理者更有效地管理交通系统，但这并不意味着它可以完全替代交通管理者的工作。交通管理者仍需要对交通管理工作进行监督和调整，确保智能系统的正确运行，同时还需要对各种问题作出决策。智能系统在交通领域的运用可以减少人力成本，但并不能完全替代交通管理者的工作。"},{"id":97095,"order":841,"type":"judge","question":"反爬虫作为一种技术手段，其作用是阻止爬虫程序对网站实施恶意抓取行为。","options":[],"answer":"正确","analysis":"反爬虫是指通过一系列的技术手段和策略，防止爬虫程序对网站进行恶意抓取或扰乱正常访问。常见的反爬虫技术包括验证码、IP封禁、请求限制等，旨在保护网站数据的安全和稳定。"},{"id":97192,"order":842,"type":"judge","question":"在对数据标注流程进行审核时，只需对标注结果的正确与否进行核查，而无需关注标注人员的业务能力和诚信状况。","options":[],"answer":"错误","analysis":"数据标注流程审核中，标注结果的正确性是一个必要的条件，但不是唯一的条件。此外，还需要考虑标注人员的能力和诚信问题。比如，一个标注人员可能会在标注结果中掺入错误信息或故意标注错误，从而影响数据的准确性。因此，在审核标注数据时，还需要对标注人员进行评估和考核。"},{"id":97090,"order":843,"type":"judge","question":"属性规约和数值归约都属于数据规约的方法。","options":[],"answer":"正确","analysis":"数据规约的方法包括属性规约和数值归约等。"},{"id":97258,"order":844,"type":"judge","question":"Python 能够借助内置函数进行数据筛选。","options":[],"answer":"正确","analysis":"Python中可以使用内置函数如filter()、listcomprehension实现数据筛选。"},{"id":96987,"order":845,"type":"judge","question":"文件管理是操作系统的主要功能之一。","options":[],"answer":"正确","analysis":"操作系统应具有处理器管理、存储管理、设备管理和文件管理等方面的功能"},{"id":97058,"order":846,"type":"judge","question":"数据处理所涉及的操作包含数据清洗以及数据转换等。","options":[],"answer":"正确","analysis":"数据处理通常包括数据清洗和数据转换。数据清洗是指检查数据中的错误、重复或不完整的部分，并进行修正或删除。数据转换是将数据从一种格式转换为另一种格式，以便于后续处理。"},{"id":97114,"order":847,"type":"judge","question":"在 DBSCAN 算法中，核心点是指处于半径为 ε 的范围内、被其他点包围的点。","options":[],"answer":"错误","analysis":"核心点是指在半径为ε内至少有MinPts个点的点。这里的MinPts是指一个点的邻域中至少包含MinPts个点，包括该点本身。而ε则是一个半径参数，表示一个点的邻域范围。因此，核心点是被半径为ε内至少包含MinPts个点的其他点所包围的点。"},{"id":96949,"order":848,"type":"judge","question":"职业道德的作用在于约束职业行为，提升从业者的职业素养。","options":[],"answer":"正确","analysis":"职业道德是指在职业活动中遵守的基本原则和行为准则，它的功能是规范职业行为，提高职业素养。职业道德可以帮助职业人员树立正确的职业观念，正确处理职业关系，提高职业能力和素质，维护职业声誉和社会形象，促进职业发展。"},{"id":97157,"order":849,"type":"judge","question":"剩余法的做法是，排除掉已知的因果关系后，把复合现象中剩余的部分归因为尚未查明的因素。","options":[],"answer":"正确","analysis":"根据剩余法的定义，其核心逻辑是：若复合现象（如a、b、c、d）由复合原因（如A、B、C、D）引起，且已知B→b、C→c、D→d成立，则剩余现象a可归因于原因A"},{"id":97203,"order":850,"type":"judge","question":"文本数据标注的应用场景有自然语言处理、机器翻译、语音识别等领域。","options":[],"answer":"正确","analysis":"文本数据标注是指为机器学习和人工智能模型提供标准或者统一的数据集。这种处理方法在自然语言处理、机器翻译、语音识别以及语音合成等方面都有广泛的应用。"},{"id":96997,"order":851,"type":"judge","question":"用 Word 进行邮件合并时，电子邮件的正文里可以添加邮件主题。","options":[],"answer":"错误","analysis":"在Word邮件合并中，​邮件主题不能直接在电子邮件的正文中添加，而是需要通过邮件合并功能专用的主题设置界面完成。"},{"id":97284,"order":852,"type":"judge","question":"智慧校园各个环节的最终宗旨是为用户提供更优质的服务。","options":[],"answer":"正确","analysis":"智慧校园强调“以服务为核心，以管理为支撑”的理念，智能感知、资源组织、信息交换、管理逻辑与科学决策等。智慧校园环节的最终目的是向用户提供更好的服务。"},{"id":97299,"order":853,"type":"judge","question":"pyecharts 是一个 Python 数据可视化库。","options":[],"answer":"正确","analysis":"pyecharts是一个Python数据可视化库，可以使用它创建交互式图表和可视化数据。"},{"id":97319,"order":854,"type":"judge","question":"分类预测的定义是：运用机器学习算法，依据已有的标注数据对样本展开学习，进而预测样本所属的类别。","options":[],"answer":"正确","analysis":"分类预测是机器学习中的一种重要任务，其目的是利用带有已知类别标签的数据训练模型，从而预测新数据点所属的类别。"},{"id":97086,"order":855,"type":"judge","question":"ETL（Extract - Transform - Load）属于数据集成方法，其中Extract阶段的主要任务是从源系统中抽取数据。","options":[],"answer":"正确","analysis":"ETL是一种数据集成方法，其中Extract阶段仅负责从源系统抽取数据；Transform阶段对数据进行清洗、转换和整合；Load阶段将处理后的数据加载到数据仓库中。"},{"id":97021,"order":856,"type":"judge","question":"《计算机软件保护条例》指出，未经软件著作权人许可，为个人学习、研究或者私下交流而使用该软件的，不算侵权行为，可予以免责。","options":[],"answer":"正确","analysis":"根据《计算机软件保护条例》第十七条规定，为了学习和研究软件内含的设计思想和原理，通过安装、显示、传输或者存储软件等方式使用软件的，可以不经软件著作权人许可，不向其支付报酬。"},{"id":97140,"order":857,"type":"judge","question":"DIANA 层次聚类与 AGNES 层次聚类的主要差异在于所使用的距离度量方式不同。","options":[],"answer":"正确","analysis":"AGNES全称为Agglomerative Nesting（聚合层次聚类），也是一种自底向上的聚类方法。与DIANA不同的是，AGNES在聚类过程中，使用的是单链接（single-linkage）或完全链接（complete-linkage）的距离度量方式。而DIANA则是使用的样本间欧氏距离进行聚类拆分。"},{"id":97007,"order":858,"type":"judge","question":"在 PowerPoint 里，动画效果仅能在对象进入或离开页面时设置，不能在对象运动过程中实现。","options":[],"answer":"错误","analysis":"PowerPoint中提供了多种动画效果，包括动画路径、分段动画等多种方式，可以在对象运动时进行动画效果设置。"},{"id":97027,"order":859,"type":"judge","question":"浮点型作为一种常见的数据类型，其用途是表示带有小数部分的数值。","options":[],"answer":"正确","analysis":"浮点型是常见的数据类型之一，用于表示带有小数部分的数值。浮点型数据在计算机中以近似表示实数，适用于科学计算等对数值范围要求较高但允许一定误差的场景，需注意精度限制。"},{"id":97135,"order":860,"type":"judge","question":"K-Means 聚类算法属于有监督学习算法的一种。","options":[],"answer":"错误","analysis":"K-Means聚类算法是一种无监督学习算法，不需要提前知道数据的标签。"},{"id":96969,"order":861,"type":"judge","question":"人类历史上第一台计算机是 1837 年由查尔斯・巴贝奇发明的，它被命名为分析机。","options":[],"answer":"错误","analysis":"查尔斯·巴贝奇于1837年设计出的是“分析机”，是机械装置，包含现代计算机的理论雏形（如可编程性），但未实际建成。而且，不少专家认为，严格意义上的现代计算机是在20世纪40年代诞生的，比巴贝奇机晚了100多年。"},{"id":97197,"order":862,"type":"judge","question":"在图像标注的质量标准中，仅标注的准确性这一项可作为衡量标准。","options":[],"answer":"错误","analysis":"除了准确性，图像标注质量还包括标注的完整性、一致性、标注者的专业性等因素。准确性只是其中一个方面，其他方面同样也需要被考虑。"},{"id":97278,"order":863,"type":"judge","question":"AI 技术在零售业难以广泛普及，主要障碍在于高昂的技术成本和设备费用。（ ）","options":[],"answer":"正确","analysis":"尽管AI技术在零售业中展现了巨大的潜力，但高昂的技术成本和设备费用是普及的主要障碍。"},{"id":97149,"order":864,"type":"judge","question":"对不同场合中的共同因素加以分析，进而总结出共性规律并归纳出因果联系，这属于求同法的基本内容。","options":[],"answer":"正确","analysis":"求同法（契合法）的核心是“异中求同”，即在不同现象或场合中寻找唯一共同因素，并以此作为因果关系的依据。"},{"id":97317,"order":865,"type":"judge","question":"Ridge 对象的 score 方法所返回的结果为 R 值。","options":[],"answer":"错误","analysis":"Ridge对象中的score方法返回的是R²值，用于评价回归效果。"},{"id":97136,"order":866,"type":"judge","question":"K-Means 聚类算法的优化目标是让所有样本点到其所属聚类中心的距离总和最小。","options":[],"answer":"正确","analysis":"K-Means聚类算法的优化目标是最小化所有样本点到其所属聚类中心的距离之和，即最小化聚类内部的方差。"},{"id":97247,"order":867,"type":"judge","question":"ISO 8000 作为一种数据质量管理体系标准，其目的是规范数据的格式、内容与质量，从而提高企业数据的准确性和可靠性。","options":[],"answer":"正确","analysis":"ISO 8000是一种数据质量管理体系标准，旨在规范数据的格式、内容和质量，以提高企业数据的准确性和可靠性。"},{"id":97073,"order":868,"type":"judge","question":"在数据变换的方法体系里，标准化和归一化是同一个概念。","options":[],"answer":"错误","analysis":"标准化与归一化都是数据变换的方法，但其计算方式有所不同。标准化是将数据转换为均值为0、标准差为1的正态分布，计算方式为（原始值-均值）/标准差。而归一化则是将数据线性映射到固定区间（如[0,1]或[-1,1]）"},{"id":97288,"order":869,"type":"judge","question":"物流行业并非技术密集型和人才密集型行业，智慧物流的实现不需要经验丰富的物流运营人才和专业的 IT 人才支持，人才短缺或从业人员素质的高低不会对智慧物流的建设与发展造成影响。","options":[],"answer":"错误","analysis":"物流行业是一个技术密集型与人才密集型行业，智慧物流的实现离不开经验丰富的物流运营人才与专业的IT人才的支撑。因此，人才缺乏或从业人员素质不高都会使智慧物流建设与发展受到不良影响。"},{"id":97179,"order":870,"type":"judge","question":"梅尔频率倒谱系数能应用于语音识别、音频分类、音乐识别等场景，原因是它们可以捕捉音频信号的频率特征。","options":[],"answer":"正确","analysis":"梅尔频率倒谱系数可以用于语音识别、音频分类、音乐识别等应用中，因为它们能够捕捉到音频信号的频率特征。在机器学习和深度学习领域中，梅尔频率倒谱系数通常被用作语音识别和音频分类模型的输入特征。"},{"id":97083,"order":871,"type":"judge","question":"数据集成是将来自多个不同数据源的数据整合汇聚的过程。","options":[],"answer":"正确","analysis":"数据集成是指将来自多个数据源的数据集成到一起，旨在提供更全面和准确的数据，以便进行业务分析和决策。数据源可以包括不同的数据库、数据仓库、文件系统或者API接口。"},{"id":97015,"order":872,"type":"judge","question":"《中华人民共和国网络安全法》明确禁止任何个人和组织以窃取或其他非法手段获取个人信息，也禁止非法出售或向他人非法提供个人信息。","options":[],"answer":"正确","analysis":"《中华人民共和国网络安全法》第四十四条规定，任何个人和组织不得窃取或者以其他非法方式获取个人信息，不得非法出售或者非法向他人提供个人信息。"},{"id":97195,"order":873,"type":"judge","question":"数据标注质量检测旨在保证数据标注的正确性与一致性。","options":[],"answer":"正确","analysis":"数据标注质量检测是通过对标注数据进行检测，从而确保标注数据的正确性和一致性。这可以提高机器学习模型的精确性和可靠性，进而提高模型的性能。"},{"id":97067,"order":874,"type":"judge","question":"在数据处理过程中，缺失值和异常值的处理方式是相同的","options":[],"answer":"错误","analysis":"缺失值和异常值都是数据处理中的常见问题，但是处理方法不同。缺失值可以通过删除、替换、插补等方式进行处理，而异常值可以使用平均值修正等方法也可以视作缺失值进行处理。"},{"id":97049,"order":875,"type":"judge","question":"在运用Xpath解析网页内容时，选择器里的“/”意味着从当前节点选取其直接子节点。","options":[],"answer":"正确","analysis":"在Xpath中，“/”代表从当前节点选取直接子节点。"},{"id":97063,"order":876,"type":"judge","question":"数据集中某一变量里出现的空值或者未知数据，属于缺失值的范畴。","options":[],"answer":"正确","analysis":"缺失值指的是数据集中某一变量中出现的空值或未知的数据，这可能是由于数据采集过程中的错误、数据录入错误或者是数据的合并和转换所导致的。缺失值会对数据分析和建模带来很大的影响，因此需要采用合适的方法进行处理。"},{"id":97101,"order":877,"type":"judge","question":"爬取静态网页数据时，可以运用 urllib3 库或者 Requests 库来实现 HTTP 请求。","options":[],"answer":"正确","analysis":"HTTP请求过程包括生成请求、请求头处理、超时设置、请求重试、查看状态码等，urllib3库或Requests库可以实现这些内容。"},{"id":97096,"order":878,"type":"judge","question":"验证码、IP 封禁以及请求限制都属于反爬虫技术的范畴。","options":[],"answer":"正确","analysis":"常见的反爬虫技术包括验证码、IP封禁和请求限制。验证码用于验证用户的身份，要求用户输入验证码才能进行访问。IP封禁是指根据IP地址进行封禁，限制某些IP地址的访问。请求限制则是对请求频率、请求次数等进行限制，防止过于频繁的请求。"},{"id":97077,"order":879,"type":"judge","question":"小数定标标准化属于数据标准化的一种方式。","options":[],"answer":"正确","analysis":"小数定标标准化是通过移动属性值的小数位数，将属性值映射到[-1,1]区间内，移动的小数位数取决于属性值绝对值的最大值。"},{"id":97028,"order":880,"type":"judge","question":"数组是常见的数据类型之一，它的作用是存储多个相同类型的数据。","options":[],"answer":"错误","analysis":"数组并不是一个数据类型，而是一种数据结构，用于存储多个相同类型的数据元素。数组可以包含整数、浮点数、字符串等各种数据类型的元素。"},{"id":96973,"order":881,"type":"judge","question":"计算机的主要应用范围涵盖了生产制造、金融服务、教育教学、医疗卫生、休闲娱乐等诸多领域。","options":[],"answer":"正确","analysis":"计算机是现代科技的重要产物，已经渗透到社会各个领域。生产领域应用于自动化生产线、机器人等，金融领域应用于网络银行、电子支付等，教育领域应用于多媒体教学、在线学习等，医疗领域应用于病历管理、医学影像等，娱乐领域应用于电子游戏、在线视频等。"},{"id":97292,"order":882,"type":"judge","question":"只有在大数据场景下，可视化分析才适用。","options":[],"answer":"错误","analysis":"数据可视化的目的是将抽象信息转换为具体的图形，将隐藏于数据中的规律直观地展现出来。虽然可视化分析可以在大数据场景下发挥更好的作用，但它同样适用于小数据的情况。任何数据都可以可视化呈现，包括文本、图片、音频等。"},{"id":96965,"order":883,"type":"judge","question":"追求卓越的基本要求仅包含持续改进和创造创新这两个方面。","options":[],"answer":"错误","analysis":"追求卓越的基本要求包括高标准要求、持续改进、创造创新、追求专业素养、发挥潜力几个方面。"},{"id":97186,"order":884,"type":"judge","question":"数据审核的主要目的是避免数据丢失和系统崩溃。","options":[],"answer":"错误","analysis":"数据审核的目的是检查数据的完整性、准确性、一致性、和合法性。通过完整性和准确性检查，发现和纠正各种数据问题，提高数据的质量和可信度，为后续模型训练提供高质量数据。"},{"id":97257,"order":885,"type":"judge","question":"在 Python 中，filter () 函数可用于数据筛选，它能依据条件从列表中筛选出符合要求的元素。","options":[],"answer":"正确","analysis":"Python中的filter()函数可用于数据筛选，能够根据指定的条件筛选出可迭代对象（如列表）中符合条件的元素。"},{"id":97121,"order":886,"type":"judge","question":"核心距离计算、可达距离计算、生成可达性图以及聚类簇判定，这些都包含在 OPTICS 密度聚类的算法步骤中。","options":[],"answer":"正确","analysis":"OPTICS密度聚类包括核心距离计算，可达距离计算，生成可达性图和聚类簇判定这4个主要步骤。"},{"id":96988,"order":887,"type":"judge","question":"操作系统的结构包含单体结构、混合内核结构和微内核结构这几种。","options":[],"answer":"正确","analysis":"操作系统的结构包括单体结构、内核结构和微内核结构等。其中，单体结构是指所有操作系统的模块都被编译为一个可执行文件，内核结构是指操作系统的核心代码作为一个单独的模块存在于内存中，而微内核结构则是将操作系统的核心代码尽可能地精简，只有最基本的服务，其他服务则由用户态进程提供。"},{"id":97329,"order":888,"type":"judge","question":"智能系统的优化建议包含了算法参数调整、特征选择以及模型改进等内容。","options":[],"answer":"正确","analysis":"智能系统的优化建议一般包括模型调整、特征选择、算法调参等多个方面。这些优化建议的目的是提高智能系统的预测精度和效率，同时降低计算成本和系统复杂度。"},{"id":97160,"order":889,"type":"judge","question":"数据分类的用意是简化和压缩数据，让数据分析及处理更迅速。","options":[],"answer":"错误","analysis":"数据分类的目的不是为了将数据进行简化和压缩，而是为了将数据按照某种规则或标准进行归类，以便更好地组织和管理数据。"},{"id":97078,"order":890,"type":"judge","question":"最大最小值标准化（MinMax Scaling）可以处理包含离群值的数据集。","options":[],"answer":"错误","analysis":"最大最小值标准化是一种简单且常用的标准化方法，其思想是将原始数据映射到[0,1]的区间中。然而，由于最大最小值易受到异常值的影响，所以不适用于具有离群值的数据集。在这种情况下，可以使用基于中位数和四分位距离的标准化方法，如Robust Scaling。"},{"id":97011,"order":891,"type":"judge","question":"依据《中华人民共和国劳动法》，劳动者因患病或非因工负伤，医疗期满后既不能从事原工作，也无法从事用人单位另行安排的工作，这种情况下用人单位可解除劳动合同。","options":[],"answer":"正确","analysis":"根据《中华人民共和国劳动法》第二十六条规定，有下列情形之一的，用人单位可以解除劳动合同，但是应当提前三十日以书面形式通知劳动者本人：（一）劳动者患病或者非因工负伤，医疗期满后，不能从事原工作也不能从事由用人单位另行安排的工作的；（二）劳动者不能胜任工作，经过培训或者调整工作岗位，仍不能胜任工作的；（三）劳动合同订立时所依据的客观情况发生重大变化，致使原劳动合同无法履行，经当事人协商不能就变更劳动合同达成协议的。"},{"id":97056,"order":892,"type":"judge","question":"在开展数据处理工作时，若发现存在与实际情况不符的异常数据，可以直接将其剔除而不做任何修正处理","options":[],"answer":"错误","analysis":"异常数据出现的原因可能是数据采集过程中的误差，也可能是数据本身的问题。需要结合异常值的影响程度和数据的分布情况选择删除、替代或转换异常值。"},{"id":97005,"order":893,"type":"judge","question":"在 PowerPoint 中，点击 “视图” 选项卡后选择 “幻灯片母版”，进入母版视图模式就能对标题、正文、页脚的元素格式和样式进行设置。","options":[],"answer":"正确","analysis":"母版视图中允许用户修改整个演示文稿的标题、正文、背景、字体、页脚的元素样式等 ，确保所有幻灯片的格式统一。"},{"id":96994,"order":894,"type":"judge","question":"为了让文档看起来更具视觉吸引力，在页眉或页脚里添加图形或者文字是可行的。","options":[],"answer":"正确","analysis":"在Word中，可以将文件标题或机构名称等信息添加到页眉或页脚中，同时也可以在中间或两侧添加图形或文字，以增强文档的视觉效果。可以使用Word内置的功能或自定义的内容来实现。"},{"id":97044,"order":895,"type":"judge","question":"若一个网页可以根据用户的操作即刻更新内容，那么该网页必然是动态网页。","options":[],"answer":"错误","analysis":"虽然动态网页一般都能实时更新内容，但并不是所有实时更新内容的网页都是动态网页。比如一些使用AJAX等技术请求后端数据的工具类网站也可能实现了实时更新内容的效果，但它们的页面是静态的。"},{"id":96950,"order":896,"type":"judge","question":"职业道德的唯一作用就是对从业人员的行为加以规范，避免他们在职业活动里出现不合适的举动或是触犯法律的行为。","options":[],"answer":"错误","analysis":"职业道德确实可以规范职业人员的行为，防止不当行为和违法行为的发生。但职业道德还可以促进职业人员的专业发展和提高其声誉，维护行业的声誉和形象，提高行业的信誉和公信力。"},{"id":97094,"order":897,"type":"judge","question":"开展数据处理优化工作时，可采取减少网络传输次数、采用本地计算的方式。","options":[],"answer":"正确","analysis":"减少网络传输次数，使用本地计算可以大幅减少数据传输的耗时，提高运行速度。"},{"id":97130,"order":898,"type":"judge","question":"当在 Python 中执行密度聚类时，轮廓系数（Silhouette Coefficient）方法可用于对聚类效果进行评估。","options":[],"answer":"正确","analysis":"轮廓系数是用于评估聚类效果的一种指标，常用于密度聚类等非凸形状聚类算法。该指标综合考虑了聚类内部的紧密性和不同聚类间的分离度，并将其转化为一个在区间 [-1, 1][−1,1] 内的值。轮廓系数越接近于1，表示样本点聚类效果越好；越接近于-1，则表示样本点分配到错误的聚类中；接近于0，则表示样本点处于两个聚类的边界位置。"},{"id":97048,"order":899,"type":"judge","question":"当运用Requests库发送HTTP POST请求时，参数是通过在URL里传递的。","options":[],"answer":"错误","analysis":"HTTP POST请求中的参数应该在请求正文中传递，可以使用Requests库中的data参数或json参数。"},{"id":97212,"order":900,"type":"judge","question":"进行文本标注的过程中，在开始标注之前，需要先制定好文本标注的规则。","options":[],"answer":"正确","analysis":"在正式进行文本标注前需要制定文本标注规则，如单标签标注、多标签标注、内嵌式标注、分离式标注等。对于大型项目，应编写标注说明手册，以缩小不同数据标注员的标注差异。"},{"id":96978,"order":901,"type":"judge","question":"存储器有随机存取存储器（RAM）和只读存储器（ROM）两类。RAM 既可以读取数据也能写入数据，而传统的 ROM（比如掩模 ROM）则只能进行读取操作。","options":[],"answer":"正确","analysis":"存储器分为随机存取存储器（RAM）和只读存储器（ROM）两种，但随机存取存储器既可读又可写，只读存储器只能读取，不能写入。这是因为只读存储器中的信息是由生产厂家事先写入的，用户不能修改，因此只能读取，而随机存取存储器中的信息可以由用户进行读取和写入操作。传统只读存储器（如掩模ROM）的信息由生产厂家写入，用户无法修改；但现代ROM（如EPROM、EEPROM、闪存）支持通过特殊方式擦除和重新写入数据。"},{"id":97207,"order":902,"type":"judge","question":"图像数据标注的应用场景仅局限于医疗领域和工业生产领域。","options":[],"answer":"错误","analysis":"图像数据标注的应用场景非常广泛，除了医疗领域和工业生产领域，还包括计算机视觉、智能家居、自动驾驶等领域。在计算机视觉领域，图像标注可以用于图像分类、目标检测、语义分割等任务；在智能家居领域，图像标注可以用于人脸识别、物品识别等任务；在自动驾驶领域，图像标注可以用于行人检测、车辆识别等任务。"},{"id":97002,"order":903,"type":"judge","question":"在 Excel 中，借助 VLOOKUP 函数，能按照需求在表格或特定区域中沿列查找信息。","options":[],"answer":"正确","analysis":"VLOOKUP函数是Excel中用于查找并返回匹配值的函数，它可以按照指定的查找值在表格的第一列（查找列）中查找，并返回该值所在行的指定列中的数据。"},{"id":97250,"order":904,"type":"judge","question":"语句覆盖属于逻辑覆盖法所包含的方法之一。","options":[],"answer":"正确","analysis":"语句覆盖是逻辑覆盖标准中的一种，它属于软件测试领域内白盒测试的一种测试覆盖率标准。"},{"id":97223,"order":905,"type":"judge","question":"所谓实时检验，是指在某个系统中对数据进行动态的监测、分析与报告。","options":[],"answer":"正确","analysis":"实时检验是指在一个系统中对数据进行动态轮询、监测、分析和报告。一个数据标注任务会分配给若干小组完成，质检员会对自己所在小组的标注员的标注方法、熟练度、准确度进行现场实时检验，当标注员操作过程中出现问题，质检员可以及时发现、及时解决。"},{"id":97234,"order":906,"type":"judge","question":"抽样检验的主要缺点是，若样本选择存在偏差或抽样方式不合适，会导致结果不准确。","options":[],"answer":"正确","analysis":"抽样检验依赖于样本数据，只有样本数据具有代表性、抽样方法合理、样本数量充足时，才能提高抽样检验的准确性。但如果样本选择存在偏差或者抽样方式不当，就会导致结果的不准确性。"},{"id":97014,"order":907,"type":"judge","question":"若用人单位未按劳动合同约定支付工资，劳动者有权解除合同。","options":[],"answer":"正确","analysis":"根据《中华人民共和国劳动合同法》第三十八条规定，用人单位有下列情形之一的，劳动者可以解除劳动合同：（一）未按照劳动合同约定提供劳动保护或者劳动条件的；（二）未及时足额支付劳动报酬的；（三）未依法为劳动者缴纳社会保险费的；（四）用人单位的规章制度违反法律、法规的规定，损害劳动者权益的；（五）因本法第二十六条第一款规定的情形致使劳动合同无效的；（六）法律、行政法规规定劳动者可以解除劳动合同的其他情形。因此， 如果用人单位未按照劳动合同的约定支付工资，劳动者可以解除合同。"},{"id":97082,"order":908,"type":"judge","question":"等频离散化作为常用的数据离散化方式之一，需要人为设定区间个数。","options":[],"answer":"正确","analysis":"等频离散化是将相同数量的记录放进每个区间，等频法比较简单，易于操作，但需要人为地规定区间个数。"},{"id":97309,"order":909,"type":"judge","question":"回归预测的实现步骤必须包含数据清洗、特征提取、模型训练、模型评估、数据可视化等环节。","options":[],"answer":"错误","analysis":"回归预测属于机器学习的内容，在机器学习中，数据清洗、特征提取、模型训练和模型评估是必不可少的，而数据可视化虽然有助于理解数据的特征和关系，但并不是必须的。"},{"id":97238,"order":910,"type":"judge","question":"数据质量出现问题，其根本原因在于数据源不可靠。","options":[],"answer":"错误","analysis":"数据质量问题的根本原因并不是数据源不可靠，而是数据在采集、处理、传输和存储过程中存在各种问题，例如数据重复、缺失、不一致、格式不正确等等。"},{"id":97183,"order":911,"type":"judge","question":"数据审核就是对数据开展全面、系统的检查与审查，以保证数据具备正确性、完整性、一致性和安全性。","options":[],"answer":"正确","analysis":"数据审核是数据管理中非常重要的一环，其目的是确保数据的正确性、完整性、一致性和安全性。它包括对数据进行逻辑检查、数值计算、比较核查、进一步解释和补充，避免数据中存在的错误、遗漏和歧义等问题，最终提高数据的质量和可靠性。"},{"id":97156,"order":912,"type":"judge","question":"共变法仅能应用于存在单一原因与单一结果的场景。","options":[],"answer":"正确","analysis":"在应用共变法时，只能有一个先行情况变化，其他先行情况是不能发生变化的。如果同时有两个或两个以上的先行情况发生变化，运用共变法就可能得出错误结论，此时就不能使用共变法。"},{"id":97072,"order":913,"type":"judge","question":"均值滤波在有效去除高斯噪声的同时，不丢失图像的细节，降低噪声信号的影响。","options":[],"answer":"错误","analysis":"均值滤波是常用的一种滤波器，可以通过在图像中取平均值来消除一定程度的噪声信号。但是对于高斯噪声，均值滤波并不是最有效的方法，因为高斯噪声的分布是中心对称的，使用均值滤波会导致图像的边缘和细节部分模糊。更好的方法是使用高斯滤波器来降低高斯噪声的影响。"},{"id":97025,"order":914,"type":"judge","question":"《中华人民共和国个人信息保护法》允许在未获授权的情况下，对个人信息进行公开处理。","options":[],"answer":"错误","analysis":"根据《中华人民共和国个人信息保护法》第二十五条规定，个人信息处理者不得公开其处理的个人信息，取得个人单独同意的除外。"},{"id":97330,"order":915,"type":"judge","question":"在智能系统的优化建议里，算法调参是最为重要的部分，这是由于它决定了模型的拟合程度。","options":[],"answer":"错误","analysis":"算法调参虽然是智能系统优化建议的一部分，但它并不决定模型的拟合程度。模型拟合程度主要取决于模型的结构和特征选择的好坏。算法调参的目的是优化模型的参数以提高模型的性能。"},{"id":97013,"order":916,"type":"judge","question":"《中华人民共和国劳动合同法》规定，用人单位可以随意解除一份劳动合同。","options":[],"answer":"错误","analysis":"用人单位不能随意解雇一份劳动合同，根据《中华人民共和国劳动合同法》第三十九条规定，劳动者有下列情形之一的，用人单位可以解除劳动合同：（一）在试用期间被证明不符合录用条件的；（二）严重违反用人单位的规章制度的；（三）严重失职，营私舞弊，给用人单位造成重大损害的；（四）劳动者同时与其他用人单位建立劳动关系，对完成本单位的工作任务造成严重影响，或者经用人单位提出，拒不改正的；（五）因本法第二十六条第一款第一项规定的情形致使劳动合同无效的；（六）被依法追究刑事责任的。因此，用人单位不能随意解除一份劳动合同。"},{"id":97022,"order":917,"type":"judge","question":"按照《计算机软件保护条例》，未经软件著作权人许可，对软件进行发行或者以盈利为目的复制的，属于侵权行为，会被依法追究责任。","options":[],"answer":"正确","analysis":"《计算机软件保护条例》第二十四条规定，未经软件著作权人许可，有下列侵权行为的，应当根据情况，承担停止侵害、消除影响、赔礼道歉、赔偿损失等民事责任;同时损害社会公共利益的，由著作权行政管理部门责令停止侵权行为，没收违法所得，没收、销毁侵权复制品，可以并处罚款;情节严重的，著作权行政管理部门并可以没收主要用于制作侵权复制品的材料、工具、设备等;触犯刑律的，依照刑法关于侵犯著作权罪、销售侵权复制品罪的规定，依法追究刑事责任：(一)复制或者部分复制著作权人的软件的;(二)向公众发行、出租、通过信息网络传播著作权人的软件的;(三)故意避开或者破坏著作权人为保护其软件著作权而采取的技术措施的;(四)故意删除或者改变软件权利管理电子信息的;(五)转让或者许可他人行使著作权人的软件著作权的。"},{"id":97117,"order":918,"type":"judge","question":"DBSCAN 密度聚类需要事先确定簇的数量。","options":[],"answer":"错误","analysis":"DBSCAN密度聚类不需要预先指定簇的个数，是其优点之一。"},{"id":97054,"order":919,"type":"judge","question":"数据处理能够让数据变得更加清晰且具备结构化特征。","options":[],"answer":"正确","analysis":"数据处理可以使非结构化或者同时又很凌乱的数据整理成结构化、清晰的形式。"},{"id":97112,"order":920,"type":"judge","question":"ASCII 码只用于表示中文字符。","options":[],"answer":"错误","analysis":"ASCII码是一种用于表示英文字母、数字、符号等基本字符的编码方式，不能直接表示汉字等复杂字符。"},{"id":97229,"order":921,"type":"judge","question":"借助多重抽样检验来辅助实时检验，能够帮助降低检验过程中的误判率。","options":[],"answer":"正确","analysis":"多重抽样检验方法可以辅助实时检验，以提高数据标注质量检验的准确性，避免大规模生产出现的统计误差，并帮助降低误判率。"},{"id":97200,"order":922,"type":"judge","question":"进行语音标注的质量检查时，检验人员必须做到眼耳配合，随时留意语音数据发音的时间轴和标注区域的音标是否一致。","options":[],"answer":"正确","analysis":"在语音标注的质量检验过程中，质检员需要做到眼睛耳并用，通过听取语音数据，确认发音内容是否与标注的音标一致，需核对语音波形或时间轴上的标注区域，确保音标的起始和结束时间与实际发音完全对齐。"},{"id":96990,"order":923,"type":"judge","question":"对文字格式进行设置时，只能挑选字体、字号和颜色，不能对文字进行加粗、倾斜等操作。","options":[],"answer":"错误","analysis":"在Word中，设置文字格式不仅可以选择字体字号和颜色，还可以对文字进行加粗、倾斜、下划线、删除线等设置。"},{"id":97038,"order":924,"type":"judge","question":"数据一致性检测方法只能借助手工测试的方式来完成。","options":[],"answer":"错误","analysis":"除了手工测试，还可以使用自动化测试工具来实现数据一致性检测，例如使用Selenium进行Web应用程序的自动化测试，使用JUnit进行单元测试等。"},{"id":96975,"order":925,"type":"judge","question":"依据运算速度的快慢，计算机可分为超级计算机和个人计算机。","options":[],"answer":"错误","analysis":"计算机按规模即存储容量、运算速度等可分为七大类:巨型机、大型机、中型机、小型机、微型机、工作站和服务器。"},{"id":97184,"order":926,"type":"judge","question":"数据审核仅需针对数据的格式和结构进行检查与审查，无需考虑其内容的正确性和合法性。","options":[],"answer":"错误","analysis":"数据审核不仅要考虑数据的格式和结构，还要评估数据的内容是否正确、合法和符合需求。在数据审核过程中，需要深入了解数据的含义，是否与其它数据相一致、数据之间的关系是否合理等问题，保证数据的质量和可靠性，以便有效地支持后续的数据分析和应用。"},{"id":97328,"order":927,"type":"judge","question":"数据拆解仅适用于结构化数据，对于非结构化数据则无法开展拆解工作。","options":[],"answer":"错误","analysis":"虽然数据拆解在结构化数据中应用比较广泛，但是对于非结构化数据也可以采用一定的方法进行拆解，例如将文本数据按照关键词进行分类和拆解。"},{"id":97198,"order":928,"type":"judge","question":"在图像标注的质量标准中，标注的时间效率并不关键，只需保证准确性就行。","options":[],"answer":"错误","analysis":"除了准确性之外，标注的时间效率也是需要考虑的因素。标注的时间效率的高低不仅关系到标注者的能力，同时也与任务的实际需求、进度要求等有关。"},{"id":97059,"order":929,"type":"judge","question":"存在三种噪声数据检测方法，分别是差错检测法、重复数据检测法以及异常数据检测法。","options":[],"answer":"错误","analysis":"噪声数据检测方法有可视化、统计检验、机器学习算法。"},{"id":97322,"order":930,"type":"judge","question":"朴素贝叶斯是分类预测方法中一种基于概率的方法。","options":[],"answer":"正确","analysis":"朴素贝叶斯是一种基于概率的分类预测方法，它基于贝叶斯定理和特征之间的条件独立性假设，通过计算给定特征条件下各类别的后验概率来进行分类预测。朴素贝叶斯分类器在文本分类、垃圾邮件过滤等领域广泛应用。"},{"id":97116,"order":931,"type":"judge","question":"DBSCAN 算法的第四步是在噪声点的邻域中寻找核心点，并将其添加到噪声点所在的簇中。","options":[],"answer":"错误","analysis":"DBSCAN算法的第四步是重复执行步骤二和步骤三，直到每个簇的密度达到所需的阈值。在这个过程中，可以将噪声点排除在外，不需要在噪声点的邻域内寻找核心点。"},{"id":97326,"order":932,"type":"judge","question":"数据拆解仅适用于处理结构化数据，对非结构化数据不起作用。","options":[],"answer":"错误","analysis":"数据拆解不仅适用于处理结构化数据，也适用于处理非结构化数据，例如文本、图像、声音等。通过将非结构化数据拆解成更小的组成部分，可以更好地理解、分析和处理它们。"},{"id":97252,"order":933,"type":"judge","question":"编制审核报告应遵循客观、真实、公正、准确的原则。","options":[],"answer":"正确","analysis":"审核报告是一份非常重要的文件，应该采取客观、事实、公正、准确的口吻，避免出现主观臆断、误导、歧义等情况，从而保证报告的可信度和可靠性。"},{"id":97269,"order":934,"type":"judge","question":"变更控制流程化就是指建立或选用符合项目需求的变更管理流程，所有变更都必须依照该流程进行管控。","options":[],"answer":"正确","analysis":"变更控制流程化是指建立或选用符合项目需要的变更管理流程，所有变更都必须遵循这个控制流程进行控制。流程化的作用在于将变更的原因、专业能力、资源运用方案、决策权、干系人的共识、信息流转等元素有效综合起来，按科学的顺序进行。"},{"id":97285,"order":935,"type":"judge","question":"智能家居系统的核心目标是提高家居生活的品质。","options":[],"answer":"正确","analysis":"智能家居强调系统自动运行、用户习惯学习等功能，其目标是提供更便捷、舒适和安全的家居环境，其核心目标是提升家居生活质量。"},{"id":97110,"order":936,"type":"judge","question":"在 XML 文件中，标签能够包含属性和文本，但不能包含其他标签。","options":[],"answer":"错误","analysis":"在XML文件中，标签可以包含属性和文本，也可以包含其他标签，形成嵌套结构，从而实现复杂的数据表示。"},{"id":97029,"order":937,"type":"judge","question":"数据质量标准评价标准中，包含对数据的完整性、准确性、一致性等方面的要求。","options":[],"answer":"正确","analysis":"数据质量标准评价标准通常包括以下方面的要求：完整性、准确性、一致性、时效性、有效性、唯一性等，以确保所涉及的数据能够被有效地使用和分析。"},{"id":97272,"order":938,"type":"judge","question":"若想更完善地对信息系统文档实施管理，建立与之对应的文档管理制度是应采取的举措。","options":[],"answer":"正确","analysis":"为了更好地进行信息系统文档的管理，应该建立相应的文档管理制度。文档的管理制度需根据组织实体的具体情况而定，主要包括建立文档的相关规范、文档借阅记录的登记制度、文档使用权限控制规则等。"},{"id":97215,"order":939,"type":"judge","question":"语义分割标注要求把点云中的每个点都划分到不同类别，比如 “行人” 或者 “车辆”。","options":[],"answer":"正确","analysis":"语义分割是一种像素级别的标注方法，用于将点云中每个点分配到不同的类别中。在点云中，每个点都可以分配到不同的语义标签，例如车、行人、建筑等。语义分割标注通常用于场景分析、地图制作和自主驾驶等应用领域。"},{"id":97128,"order":940,"type":"judge","question":"DBSCAN 和 OPTICS 同属基于密度的聚类算法，但 DBSCAN 需要预先指定聚类数量，OPTICS 却可以自动确定聚类数量。","options":[],"answer":"错误","analysis":"DBSCAN不需要预先指定聚类数量，而OPTICS可以自动确定聚类数量。"},{"id":97303,"order":941,"type":"judge","question":"作为一种数据挖掘技术，关联规则分析的目的是找出数据集中项集之间的关联关系。","options":[],"answer":"正确","analysis":"关联规则分析是一种经典的数据挖掘技术，主要用于数据矩阵中项集之间关联关系的挖掘。其核心思想是发现事物之间的关系，并以此为基础进行预测和决策。"},{"id":97254,"order":942,"type":"judge","question":"进行数据筛选时，需要把无用的数据删掉。","options":[],"answer":"正确","analysis":"数据筛选需要去除无用的数据，从而提高数据质量和有效性。"},{"id":97070,"order":943,"type":"judge","question":"Python中的collections库里的Counter对象能够用于查找列表中的重复元素。","options":[],"answer":"正确","analysis":"Python中的collections库中的Counter对象可以用于查找列表中的重复元素。Counter对象可以对一个列表进行计数，得到每个元素出现的次数，然后可以使用most_common()方法查找出现次数最多的元素。"},{"id":97066,"order":944,"type":"judge","question":"在异常值检测方法体系内，基于距离的检测方式可通过对比某个数据点与周边数据点的相对距离来识别异常值。","options":[],"answer":"正确","analysis":"异常检测常借助聚类或距离计算进行，如将远离所有簇中心的样本作为异常点，或将密度极低处的样本作为异常点。"},{"id":97108,"order":945,"type":"judge","question":"在统计学里，数和数据的含义相同，可以相互替代使用。","options":[],"answer":"错误","analysis":"数和数据在统计学中具有不同的含义。数通常指具体的数值，是用来表示和计量数量的抽象概念。数据则是对观测、测量或收集的信息的描述和组织，可以包含多个数值或其他类型的信息。数据在统计学中更广泛地用于表示和分析现实世界中的事实、观测或统计结果。"},{"id":97051,"order":946,"type":"judge","question":"在Python环境下，能够通过Selenium的相关方法获取网页中元素的属性值。","options":[],"answer":"正确","analysis":"Selenium可以获取元素的HTML属性、DOM属性及CSS属性。"},{"id":97037,"order":947,"type":"judge","question":"依据数据校验的不同方式，可将其划分为全量数据校验以及增量数据校验。","options":[],"answer":"正确","analysis":"全量校验涉及对数据库中所有数据的一次性检查；增量校验基于数据变更事件，仅校验新变更的数据，但它无法覆盖历史数据的一致性校验。"},{"id":97220,"order":948,"type":"judge","question":"图像数据标注的难点有可能是标注人员的专业水平导致的。","options":[],"answer":"正确","analysis":"图像数据标注难点可能来源于标注员的专业水平，由于图像标注任务中可能涉及不同的专业背景领域，因此对标注员的专业水平提出了要求。"},{"id":97146,"order":949,"type":"judge","question":"AGNES 层次聚类在实现步骤中，每次合并簇的方法仅有单链式合并这一种。","options":[],"answer":"错误","analysis":"AGNES层次聚类的实现步骤中，每次合并簇的方法有单链式合并、完全链式合并、平均链式合并等多种，选择合适的合并方法是需要根据具体问题和需求来评估的，不是一成不变的。"},{"id":96967,"order":950,"type":"judge","question":"在计算机的基本概念里，硬件指的是计算机中的软件部分。","options":[],"answer":"错误","analysis":"硬件是指计算机中可以触摸和看见的部分，如主机、显示器、键盘等等。而软件是存储在硬件中的程序、数据和文档，以逻辑形式存在，用于控制硬件运行。"},{"id":97064,"order":951,"type":"judge","question":"异常值指的是数据集中与其他观测值存在显著差异的数据点","options":[],"answer":"正确","analysis":"异常值也称为离群值(outlier)，是指数据集中与其他观测值存在较大差异的数据点。它们可能是数据采集过程中的误差、数据录入错误或者是数据的异常波动所导致的。异常值的存在会影响数据分析和建模，因此需要采用合适的方法进行检测和处理。"},{"id":97106,"order":952,"type":"judge","question":"采集前的数据分析和预处理并非数据采集方法优化建议里的核心内容。","options":[],"answer":"错误","analysis":"数据采集方法优化建议的核心内容包括采集前的数据分析与预处理、采集过程中的异常处理方法、数据采集后的清洗和处理工作等方面。"},{"id":97035,"order":953,"type":"judge","question":"在数据质量管理的流程里，数据清洗的核心作用在于去除数据中的各类干扰成分，以此增强数据的可信度。","options":[],"answer":"正确","analysis":"数据清洗是数据质量把控流程中至关重要的一步，主要目的是消除数据的噪声和干扰因素，提高数据的可靠性和准确性，进而保证后续分析或建模的科学性和正确性。"},{"id":97296,"order":954,"type":"judge","question":"scatter、plot、bar 等都属于 Matplotlib 库常用的绘图函数。","options":[],"answer":"正确","analysis":"Matplotlib库包含多种绘图函数，如scatter可以绘制散点图，plot可以画出折线图，bar可以绘制柱形图等。"},{"id":96959,"order":955,"type":"judge","question":"遵章守法的基本要求包含必须服从上级的命令和领导的安排。（）​","options":[],"answer":"错误","analysis":"职业守则中的\"遵章守法\"基本要求指的是从业人员应该遵守法律法规和相关规定，但是也不能因为上级命令和领导安排而违反法律法规。"},{"id":97182,"order":956,"type":"judge","question":"聚类与分类的不同之处在于，聚类是基于距离的方法，而分类则是基于特征向量的方法。","options":[],"answer":"错误","analysis":"聚类和分类的核心区别在于学习方式。聚类是无监督学习，无需预定义类别，通过数据本身的相似性（如距离）划分簇；而分类是监督学习，需基于带标签的数据训练模型，以预测新样本的类别。两者均可能使用特征向量和距离计算，但分类依赖标签信息，聚类则完全依赖数据分布。"},{"id":96996,"order":957,"type":"judge","question":"在 Word 中插入的图片，只能选用软件自带的剪贴板图片格式，不能使用其他格式的图片。","options":[],"answer":"错误","analysis":"Word支持多种图片格式，包括JPEG、PNG、BMP等，只要是常用的图片格式都可以插入到Word中。"},{"id":96998,"order":958,"type":"judge","question":"使用 Word 进行邮件合并时，能从 Excel 表格中获取收件人的相关信息。","options":[],"answer":"正确","analysis":"在使用Word进行邮件合并时，可以选择从Excel表格、Access数据库或本地Outlook地址簿中获取收件人信息，以便将合并后的邮件发送给多个收件人。"},{"id":96958,"order":959,"type":"judge","question":"若要做到严谨求是，研究人员无需坚持学习钻研、紧跟行业发展和最新信息。（）​","options":[],"answer":"错误","analysis":"根据严谨求是的基本要求，从业人员应该持续学习和研究，跟进行业发展和最新信息，以不断提升自己的知识和能力。"},{"id":97260,"order":960,"type":"judge","question":"在利用 Python 的 numpy 库进行数据筛选的过程中，where () 函数可以用于开展条件筛选工作。","options":[],"answer":"正确","analysis":"numpy.where 函数用于根据条件选择元素，返回符合条件的元素或它们的索引。适用于替换数组中的值、筛选数据、条件赋值等操作。"},{"id":97231,"order":961,"type":"judge","question":"多重抽样检验辅助全样检验的流程是，在全样检验完成后对标注数据进行轮番抽样，以此减少全样检验中的疏漏。","options":[],"answer":"正确","analysis":"多重抽样检验辅助全样检验的流程是在全样检验完成后对标注数据进行轮番抽样，减少全样检验中的疏漏，增加数据标注的准确率。"},{"id":97006,"order":962,"type":"judge","question":"在 PowerPoint 中，只要拥有文件的编辑权限，用户就可以直接修改母版视图中的样式。","options":[],"answer":"正确","analysis":"在 PowerPoint 中，母版视图的更改与文件的访问权限和编辑权限相关。"},{"id":97091,"order":963,"type":"judge","question":"所谓特征构造，就是从原始数据中构建出新特征的处理流程。","options":[],"answer":"正确","analysis":"特征构造（Feature Construction），也称为特征工程（Feature Engineering），是机器学习和数据分析中的核心步骤，指通过数学变换、领域知识或数据间的关联性，从原始数据中生成新的、更具信息量的特征变量，以提升模型的预测能力、可解释性或泛化性能。"},{"id":97166,"order":964,"type":"judge","question":"文本数据归类的流程包含特征提取、模型训练和预测这三个主要环节。","options":[],"answer":"正确","analysis":"文本数据归类的过程通常包括特征提取、模型训练和预测三个主要步骤。特征提取阶段涉及将文本数据转化为机器学习算法可处理的特征表示形式。模型训练阶段利用带有标注的训练数据来构建分类模型。预测阶段则是使用训练好的模型对新的未标注文本进行分类预测。"},{"id":97177,"order":965,"type":"judge","question":"MP3 属于无损音频格式。","options":[],"answer":"错误","analysis":"MP3是一种有损音频格式，它通过去除人耳听不到的高频信号及压缩音频数据来减小文件大小，进而适用于网络传输和存储。但是，这个过程会造成一定程度的信息损失，因此MP3不能完全保留原始音频的所有信息。"},{"id":97225,"order":966,"type":"judge","question":"标注人员的熟练度属于实时检验的检查内容。","options":[],"answer":"正确","analysis":"在数据标注中，标注的熟练度、准确度、标注方法均属于实时检验的检查内容。"},{"id":97102,"order":967,"type":"judge","question":"爬取静态网页数据时，需要利用 HTTP 协议进行通信。","options":[],"answer":"正确","analysis":"HTTP协议是应用层协议，常用于浏览器与服务器之间的通信，由请求和响应组成。在静态网页数据爬取中，可以发送HTTP请求获取网页的HTML代码，得到响应后可以解析HTML提取数据。"},{"id":97251,"order":968,"type":"judge","question":"审核报告的内容仅需列出被审核单位的全部缺点和问题即可。","options":[],"answer":"错误","analysis":"审核报告不仅要指出被审核单位的缺点和问题，还应该注重发现其优点和潜力，对被审核单位提出建议和推荐。"},{"id":97060,"order":969,"type":"judge","question":"在噪声数据检测过程中，运用“三西格玛原则”属于常见的异常数据检测方法。","options":[],"answer":"正确","analysis":"在噪声数据检测中，使用“三西格玛原则”是可以有效检测出异常数据的方法。"},{"id":96966,"order":970,"type":"judge","question":"追求卓越的基本要求是指从业人员应当努力提升自身专业素养，为客户、企业和社会创造更显著的价值。","options":[],"answer":"正确","analysis":"根据\"追求卓越\"基本要求，追求专业素养要求从业人员应该追求专业素养的不断提升。积极参与相关领域的学习和培训，关注行业动态和最新发展，保持自己的竞争优势和专业能力，从而为客户、企业和社会创造更大的价值。"},{"id":97255,"order":971,"type":"judge","question":"数据筛选的流程包含数据收集、数据预处理、数据筛选、数据分析和数据报告。","options":[],"answer":"正确","analysis":"数据筛选的流程通常包括以下几个步骤：数据收集、数据预处理、数据筛选、数据分析和数据报告。"},{"id":97210,"order":972,"type":"judge","question":"图像标注只需对清晰的目标进行标注，对于模糊、不确定的部分可以不予理会。","options":[],"answer":"错误","analysis":"图像标注要求尽可能地标注出图像中的所有信息，包括明显的和模糊的、不确定的部分。尤其在一些应用场景中，这些模糊的、不确定的信息对于算法的准确性和稳定性至关重要。"},{"id":97268,"order":973,"type":"judge","question":"数据转换是把从数据源获取到的数据，依据业务方面的需求，转变为目标端所要求的数据形态，同时对存在错误、不符合规范以及不一致的数据（通常称为“脏”数据）开展清洗与加工工作。","options":[],"answer":"正确","analysis":"ETL主要包括数据抽取、数据转换、数据装载3部分内容，具体如下。(1)数据抽取:从数据源端的系统中，抽取目标端系统需要的数据。(2)数据转换:将从数据源端获取的数据按照业务需求，转换成目标端要求的数据形式，并对错误、不规范、不一致的数据(俗称“脏”数据)进行清洗和加工。(3)数据装载:将转换后的数据装载到指定数据库或文件中。"},{"id":97158,"order":974,"type":"judge","question":"剩余法仅能用于研究由多种情况同时作用而产生的复杂现象的原因。","options":[],"answer":"正确","analysis":"剩余法只用于研究复杂现象的原因，即用来研究由几个情况同时起作用而发生的复杂现象的原因。运用剩余法来判明被研究现象的原因，必须首先知道某一复杂现象的一部分现象的原因。因此，剩余法不能是探求现象间因果联系一开始就采用的方法，它必须以其他方法所求得的部分因果联系作为前提条件。"},{"id":96974,"order":975,"type":"judge","question":"计算机的主要应用仅仅是提升了工作、学习和娱乐的效率，对人类社会的发展并没有起到多大作用。","options":[],"answer":"错误","analysis":"计算机的应用改变了人们的生活方式和工作方式，推动了信息化、智能化、网络化的进程，促进了经济和社会的发展。计算机应用带来了很多便利和服务，比如智能交通、智能家居、电子商务等，提升了效率和竞争力。同时，计算机应用也推进了科学技术的发展，例如数字化制造、人工智能、大数据等，有力地支持了科技创新和社会进步。"},{"id":97302,"order":976,"type":"judge","question":"数据质量分析是数据分析流程的最后一步，只有通过了数据质量分析，才能开展后续的数据挖掘和建模工作。","options":[],"answer":"错误","analysis":"数据质量分析是数据挖掘中数据准备过程的重要一环，是数据预处理的前提，也是数据挖掘和建模的基础，并不是数据分析过程中最后一步。"},{"id":97164,"order":977,"type":"judge","question":"文本数据只能以非结构化的形式呈现，没办法进行分析和处理。","options":[],"answer":"错误","analysis":"文本数据可呈现为结构化（如数据库字段）、半结构化（如JSON/XML）或非结构化（如自由文本）。即使是非结构化文本（如社交媒体评论），也可通过NLP技术（实体识别、主题建模）进行分析。题干错误地将文本数据限定为“非结构化且无法处理”，忽视了其多样化的形式及成熟的分析方法。"},{"id":97053,"order":978,"type":"judge","question":"数据处理的主要目的是尽可能多地收集各类数据。","options":[],"answer":"错误","analysis":"数据处理的目的是为了使数据更加有用和有意义，而不是简单地收集更多的数据。数据处理可以通过清理、转换和整合数据来清楚地展现数据的趋势和特征。"},{"id":97033,"order":979,"type":"judge","question":"数据质量检测的作用是协助企业保障数据的准确性、完整性、一致性和可靠性。","options":[],"answer":"正确","analysis":"数据质量检测是对企业数据进行质量检测和监控的过程。它的主要目的是评估数据集的质量，以确保数据质量达到预期标准。其作用主要是帮助企业保证数据的准确性、完整性、一致性和可靠性。这有助于企业在决策制定和运营管理等方面做出更加准确和可靠的决策。"},{"id":97151,"order":980,"type":"judge","question":"求异法指的是：通过比较现象存在与不存在的场合，将唯一的差异因素确定为原因。","options":[],"answer":"正确","analysis":"异法（差异法）是归纳逻辑中确定因果关系的核心方法，属于“穆勒五法”之一。其本质是通过严格对照现象存在（正例）与不存在（反例）的场合，​锁定唯一差异因素作为现象的原因"},{"id":96986,"order":981,"type":"judge","question":"文件名、扩展名、大小、创建日期和最后修改日期，这些通常都属于文件系统的属性。","options":[],"answer":"正确","analysis":"文件系统的属性通常包括文件名、扩展名、大小、创建日期和最后修改日期等元数据，这些信息有助于操作系统和用户有效地管理和访问文件。"},{"id":97264,"order":982,"type":"judge","question":"利用 R 语言无法实现数据规范化、填充缺失数据、将数字类型数据转换为分类类型数据、处理离群数据、删除变量等操作。","options":[],"answer":"错误","analysis":"R语言提供了数据整理方法，包括数据规范化、填充缺失数据、把数字类型数据转换为分类类型数据、处理离群数据、删除变量、观测数据有缺失值的变量等。"},{"id":97232,"order":983,"type":"judge","question":"抽样检验能够辅助全样检验进行，并且可以提高数据标注的准确率。","options":[],"answer":"正确","analysis":"抽样检验方法辅助全样检验，是在全样检验完成后的一种补充检验方法，主要作用是减少全样检验中的疏漏，增加数据标注的准确率。"},{"id":97039,"order":984,"type":"judge","question":"使用爬虫时，无需考虑相关的法律法规以及隐私政策。","options":[],"answer":"错误","analysis":"在使用爬虫时，需要遵守相关法律法规和隐私政策，特别是涉及到用户隐私数据的爬取。在爬虫的实现过程中，需要注意相关规定，不能在业务过程中侵犯他人的权益，否则可能引起法律纠纷。因此，爬虫的使用需要遵守相关法律法规和隐私政策。"},{"id":97055,"order":985,"type":"judge","question":"数据处理遵循的原则之一是“确保数据的准确性”，这意味着在数据处理全程中不允许出现任何误差","options":[],"answer":"错误","analysis":"虽然确保数据的准确性是数据处理的一个基本原则，但事实上在数据处理过程中，难免会出现误差。因此，正确的说法应该是“尽可能地保证数据的准确性”。"},{"id":97075,"order":986,"type":"judge","question":"数据标准化意味着消除数据在量纲以及取值范围上的差异，并依据一定比例把数据缩放到特定区间","options":[],"answer":"正确","analysis":"数据标准化是指消除数据量纲和取值范围差异，将数据按比例缩放到特定区间，以便于进行数据比较和分析。标准化后的数据可以消除不同量级之间的影响，使得数据更具有可比性。"},{"id":97046,"order":987,"type":"judge","question":"HTTP属于有状态协议，其每一次请求和响应之间相互独立。","options":[],"answer":"错误","analysis":"HTTP协议是一种无状态协议，每一次请求和响应都是相互独立的，服务器不会记录客户端的请求状态，因此客户端每一次请求都需要重新传递请求的相关信息。由于这种无状态的特性，服务器就不能根据之前的状态来做出相应的响应，导致很多应用无法处理复杂逻辑。"},{"id":97281,"order":988,"type":"judge","question":"智慧交通是把先进的信息技术与交通系统相融合，运用互联网、云计算、人工智能等技术，来提升交通运输的效率、安全性和环境可持续性。","options":[],"answer":"正确","analysis":"智慧交通是将先进的信息技术与交通系统相结合，运用互联网、云计算、人工智能等技术来改善交通运输的效率、安全性和环境可持续性。"},{"id":97201,"order":989,"type":"judge","question":"一致性作为衡量文本标注质量的标准之一，意思是不同标注者对同一段文本进行标注后，得到的结果是否相同。","options":[],"answer":"正确","analysis":"一致性是衡量文本标注质量的重要标准之一。它关注不同标注者在标注同一文本时的一致性程度，即它们的标注结果是否相似或相同。一致性高表示不同标注者对文本的理解和标注方法接近，增强了标注结果的可信度。"},{"id":97248,"order":990,"type":"judge","question":"数据质量管理体系标准仅适用于大型企业和机构，对于中小型企业及个人用户而言并不需要。","options":[],"answer":"错误","analysis":"数据质量管理体系标准确实对于大型企业和机构来说更为重要，因为这些组织通常需要处理大量、复杂的数据，并且需要满足更高的数据质量要求。但是对于中小型企业和个人用户来说，数据质量管理体系标准也是有一定的参考价值的，可以帮助他们建立和维护一定的数据质量管理体系，提高数据的准确性和可靠性。"},{"id":97236,"order":991,"type":"judge","question":"在数据标注规则中，规则制定者需要在注意事项里列出标注方应避免的错误，其中要包含需要留意的细节以及额外的处理方式等内容。","options":[],"answer":"正确","analysis":"在数据标注规则中，标注方的错误预警具有警示作用，因此规则制定者在注意事项中应列出标注方应避免的 错误、标注方法中应注意的细节及额外处理方式等。"},{"id":97174,"order":992,"type":"judge","question":"在图像分类过程中，图像特征提取是十分关键的一个步骤。","options":[],"answer":"正确","analysis":"图像特征提取是图像分类的一个关键步骤。其中，图像特征提取可以提取图像中的关键特征，用于描述图像的特征向量，并将其作为分类的依据；图像分类则是使用分类算法，基于图像的特征向量将不同类别的图像进行分类。"},{"id":97190,"order":993,"type":"judge","question":"数据审核中的一致性审核，指的是数据是否与前后及其他数据集合保持一致。","options":[],"answer":"正确","analysis":"一致性审核主要检查数据的格式、单位、命名等是否符合规范要求，数据之间的关联关系是否正确。因此数据审核中的一致性审核是指数据是否与前后及其他数据集合保持统一。"},{"id":97290,"order":994,"type":"judge","question":"智能系统在安防领域的应用无需考虑数据隐私保护问题，因为所有数据都是针对公共场所的。","options":[],"answer":"错误","analysis":"智能安防系统会涉及到大量的人员、行为、环境等相关数据的收集和存储，其中包括个人的隐私信息。因此，在设计、开发和使用智能安防系统时，需要充分考虑数据隐私保护的问题，保障用户的合法权益。"},{"id":97191,"order":995,"type":"judge","question":"对数据标注流程开展审核工作，其核心目标在于保障标注数据的精确性与可信性。","options":[],"answer":"正确","analysis":"数据标注流程审核是指在标注任务完成后对标注数据进行审核的过程。该过程的主要目的是为了保证标注数据的准确性和可靠性，从而提高机器学习模型的精度和可靠性。"},{"id":97274,"order":996,"type":"judge","question":"采用手动部署法时，安装软件需严格依照官方文档的步骤操作，但不必对软件的配置文件做任何修改。","options":[],"answer":"错误","analysis":"手动部署法虽然强调人工操作，但软件的配置文件通常需要根据实际的部署环境进行修改，以确保软件能够正常运行。例如，数据库连接信息、服务器地址等配置参数可能需要根据具体情况进行调整。"},{"id":97050,"order":997,"type":"judge","question":"于Xpath而言，采用“//”选择器能够匹配当前节点及其所有子孙节点。","options":[],"answer":"错误","analysis":"在Xpath中，“//”代表选择当前节点的所有子孙节点，不包含当前节点。"},{"id":97175,"order":998,"type":"judge","question":"图像分类属于监督学习的过程。","options":[],"answer":"正确","analysis":"图像分类是指对输入的图像进行分类，将其归属于某一类别。监督学习是通过训练数据和标签来学习模型的过程，而图像分类需要训练数据和标签来进行有监督的学习。"},{"id":97152,"order":999,"type":"judge","question":"求异法在科学研究中是用于验证假设的最终目的，而非用于确定因果关系的归纳方法。","options":[],"answer":"错误","analysis":"差异法是科学研究的工具性方法，而非最终目的。科学研究的目的是揭示规律或解决问题，而差异法是实现这一目的的手段。"},{"id":97120,"order":1000,"type":"judge","question":"OPTICS 算法和基于层次聚类的算法在聚类数量的预先设定方面相似，都需要提前确定聚类的数量。","options":[],"answer":"错误","analysis":"OPTICS算法通过形成一条核心对象的链条来确定聚类结构，不需要提前指定聚类数量。"}];
        const newList = [{"id":102681,"order":1,"type":"single_choice","question":"下列哪项不是 Python 中常用的可视化库？（）","options":[{"label":"A","text":"SnowNLP"},{"label":"B","text":"pyecharts"},{"label":"C","text":"seaborn"},{"label":"D","text":"Mathplotlib"}],"answer":"A","analysis":"Python中常用的可视化库主要是Mathplotlib、seaborn、pyecharts等，而SnowNLP是中文自然语言处理库，专为处理中文文本而设计"},{"id":102682,"order":2,"type":"single_choice","question":"sklearn 的 linear_model 模块提供了 LinearRegression 类，用于构建最小二乘回归模型，该类中用于表示是否复制样本特征集的参数是（）。","options":[{"label":"A","text":"n_jobs"},{"label":"B","text":"copy_X"},{"label":"C","text":"normalize"},{"label":"D","text":"fit_intercept"}],"answer":"B","analysis":"copy_X参数表示是否复制样本特征集。"},{"id":102683,"order":3,"type":"single_choice","question":"数据标注审核流程中，开展（）工作能够确保标注数据的准确性和质量。","options":[{"label":"A","text":"标注数据展示"},{"label":"B","text":"标注数据分析"},{"label":"C","text":"标注数据记录"},{"label":"D","text":"质量控制"}],"answer":"D","analysis":"质量控制确保标注数据准确性和质量。"},{"id":102684,"order":4,"type":"single_choice","question":"以下（）表达式能够选取所有包含文本内容\"hello world\"的p元素。","options":[{"label":"A","text":"//p[text()~\"hello world\"]"},{"label":"B","text":"//p[text()=\"hello world\"]"},{"label":"C","text":"//p[text()*=\"hello world\"]"},{"label":"D","text":"//p[contains(text(),\"hello world\")]"}],"answer":"D","analysis":"使用//p[contains(text(),\"hello world\")]可选取包含该文本的p元素。"},{"id":102685,"order":5,"type":"single_choice","question":"求同求异并用法的核心逻辑步骤包括（）。","options":[{"label":"A","text":"仅通过反面场合共性排除干扰变量"},{"label":"B","text":"直接对比正反场合的唯一差异因素"},{"label":"C","text":"两次求同（正反场合）与一次求异（对比结果）"},{"label":"D","text":"先求异后求同，再结合共变分析"}],"answer":"C","analysis":"求同求异并用法的主要特点是两次求同，一次求异"},{"id":102686,"order":6,"type":"single_choice","question":"著作权人所享有的权利，其有效期限为多久（）。","options":[{"label":"A","text":"终身+死后50年"},{"label":"B","text":"50年"},{"label":"C","text":"20年"},{"label":"D","text":"10年"}],"answer":"A","analysis":"根据《中华人民共和国著作权法》第二十三条规定，自然人的作品，其发表权、本法第十条第一款第五项至第十七项规定的权利的保护期为作者终生及其死亡后五十年，截止于作者死亡后第五十年的12月31日；如果是合作作品，截止于最后死亡的作者死亡后第五十年的12月31日"},{"id":102687,"order":7,"type":"single_choice","question":"开展数据可视化工作的目的是什么？（）","options":[{"label":"A","text":"减少数据的误差"},{"label":"B","text":"缩短数据分析的时间"},{"label":"C","text":"直观展现隐藏于数据中的规律"},{"label":"D","text":"增加数据的存储量"}],"answer":"C","analysis":"数据可视化通过图表直观地展示数据间的量级关系，其目的是将抽象信息转换为具体的图形，将隐藏于数据中的规律直观地展现出来"},{"id":102688,"order":8,"type":"single_choice","question":"数据质量检测能够开展哪些工作，从而保证数据的正确性和完整性？（）","options":[{"label":"A","text":"数据加密和解密"},{"label":"B","text":"数据清洗和整理"},{"label":"C","text":"数据验证和校验"},{"label":"D","text":"数据备份和恢复"}],"answer":"C","analysis":"数据质量检测的主要手段包括对数据进行验证和校验，确保数据的正确性和完整性"},{"id":102689,"order":9,"type":"single_choice","question":"在分类预测场景中，必然属于过拟合情况的是（）。","options":[{"label":"A","text":"训练误差较高"},{"label":"B","text":"模型学习过多的随机噪音而无法泛化"},{"label":"C","text":"模型过于简单，无法适应数据"},{"label":"D","text":"数据不足的情况下，模型无法拟合数据"}],"answer":"B","analysis":"过拟合是一种现象，表现为模型在训练时过度适应训练数据，学习过多的随机噪音而无法泛化"},{"id":102690,"order":10,"type":"single_choice","question":"结合图像数据的不同应用场景，（）的功能是对图像中特定对象的类别进行识别并明确其所在位置。","options":[{"label":"A","text":"对象分类"},{"label":"B","text":"情感分类"},{"label":"C","text":"场景分类"},{"label":"D","text":"目标检测"}],"answer":"D","analysis":"目标检测（Object Detection）的核心任务是在图像中定位特定对象的位置（如边界框）并识别其类别（如“猫”“车辆”）。其应用场景包括自动驾驶中的障碍物识别、医学图像中的异常组织定位等。与单纯分类不同，目标检测需同时完成定位与分类，是计算机视觉中的高级任务"},{"id":102691,"order":11,"type":"single_choice","question":"在 Word 2019 中，能通过什么方式将一个段落的字体颜色设为红色（）。","options":[{"label":"A","text":"选择“段落”选项卡，选择“更多颜色”，选择红色"},{"label":"B","text":"选择“段落”选项卡，选择“字体颜色”，选择红色"},{"label":"C","text":"选择“开始”选项卡的“字体颜色”，选择红色"},{"label":"D","text":"选择“字体”选项卡，选择“红色”"}],"answer":"C","analysis":"在Word中，可以选择“开始”选项卡的“字体颜色”，选择红色来将一个段落中的字体颜色设置为红色"},{"id":102692,"order":12,"type":"single_choice","question":"智能系统在家庭居住领域的主要应用场景包括（）。","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"智能家居互联"},{"label":"C","text":"智能家居安全"},{"label":"D","text":"智能家居控制"}],"answer":"A","analysis":"智能系统在家居领域的主要运用包括智能家居控制、智能家居安全、智能家居互联、智能健康管理等等"},{"id":102693,"order":13,"type":"single_choice","question":"下面哪种行为属于侵权行为（）。","options":[{"label":"A","text":"对他人财产的合法使用"},{"label":"B","text":"合法拍卖行为"},{"label":"C","text":"对他人人身自由的侵害"},{"label":"D","text":"合法债权行为"}],"answer":"C","analysis":"侵害他人人身自由属于侵权行为。"},{"id":102694,"order":14,"type":"single_choice","question":"在运用爬虫时，哪种方法是最简便直接且能有效降低IP被封禁风险的呢（）。","options":[{"label":"A","text":"隐藏爬虫程序"},{"label":"B","text":"减少爬取频率"},{"label":"C","text":"使用多个账号轮流登录"},{"label":"D","text":"使用多个IP地址轮流爬取"}],"answer":"B","analysis":"在使用爬虫时，减少爬取频率是最简单直接来降低IP封禁风险的方法"},{"id":102695,"order":15,"type":"single_choice","question":"在 PowerPoint 中，用于给幻灯片设置切换效果的操作是（）。","options":[{"label":"A","text":"在“切换”选项卡中选择一个切换效果"},{"label":"B","text":"在“开始”选项卡中选择“幻灯片切换”，选择一个切换效果"},{"label":"C","text":"在幻灯片编辑模式下，按下“Ctrl+Shift+T”，选择一个切换效果"},{"label":"D","text":"无法为幻灯片设置切换效果"}],"answer":"A","analysis":"在PowerPoint中，我们可以选择“切换”选项卡中的切换效果来为幻灯片设置切换效果。"},{"id":102696,"order":16,"type":"single_choice","question":"在 PowerPoint 中，要让文本从左侧飞入，正确的操作方式是（）。","options":[{"label":"A","text":"选中文本框，选择“动画效果”选项卡中的“飞入”选择“效果选项”的“自左侧”"},{"label":"B","text":"右键文本框，选择“动画效果”，选择“从左侧-进入”"},{"label":"C","text":"点击文本框，按下“Ctrl+Shift+L”，选择“从左边-进入”"},{"label":"D","text":"无法使文本框从左边划入"}],"answer":"A","analysis":"在PowerPoint中，选中文本框，选择“动画效果”选项卡中的“飞入”选择“效果选项”的“自左侧”来实现文本框从左侧飞入的操作。"},{"id":102697,"order":17,"type":"single_choice","question":"下列哪个应用场景最适合运用关联规则分析？（）","options":[{"label":"A","text":"分析医疗数据中不同病症之间的关系"},{"label":"B","text":"分析股市交易数据中不同股票之间的关系"},{"label":"C","text":"分析某超市中不同商品之间的销售关系"},{"label":"D","text":"分析人口普查数据中的受教育程度与职业的关系"}],"answer":"C","analysis":"关联规则分析也称为购物篮分析，最早是为了发现超市销售数据库中不同的商品之间的关联关系，其目的是在一个数据集中找出各项之间的关联关系"},{"id":102698,"order":18,"type":"single_choice","question":"最小二乘回归是最为常见的（），它的优势在于计算简便、容易理解，不足之处是对异常值极为敏感。","options":[{"label":"A","text":"随机森林回归"},{"label":"B","text":"决策树回归"},{"label":"C","text":"多项式回归"},{"label":"D","text":"线性回归"}],"answer":"D","analysis":"最小二乘回归是最普通的线性回归，它的目的是获得最佳的拟合直线(回归线)，在因变量和一个或多个自变量之间建立一种关系，通过最小化每个数据点到线的垂直偏差平方和来计算最佳拟合线"},{"id":102699,"order":19,"type":"single_choice","question":"下面哪一项属于文本数据标注的相关规范？（）","options":[{"label":"A","text":"保持标注数据的一致性"},{"label":"B","text":"进行文本标注数据测试"},{"label":"C","text":"储存文本标注数据"},{"label":"D","text":"增加文本数据量"}],"answer":"A","analysis":"在文本标注中，保持标注数据的一致性非常重要，需要在不同数据标注员间进行统一"},{"id":102700,"order":20,"type":"single_choice","question":"在异常值检测的众多方法中，以下哪一项不属于基于聚类分析的异常值检测手段？（）","options":[{"label":"A","text":"DBSCAN"},{"label":"B","text":"K-Means"},{"label":"C","text":"LOF"},{"label":"D","text":"One-ClassSVM"}],"answer":"D","analysis":"基于聚类的异常值检测方法有DBSCAN、LOF和k-means等，而One-ClassSVM基于的支持向量机是一种分类算法。"},{"id":102701,"order":21,"type":"single_choice","question":"为了让实时检查更高效地开展，能采取的措施是（）。","options":[{"label":"A","text":"对数据集进行删减"},{"label":"B","text":"对数据储存进行升级"},{"label":"C","text":"对数据集进行分段标注"},{"label":"D","text":"对数据集进行转换"}],"answer":"C","analysis":"对数据集分段标注可提高实时检查效率。"},{"id":102702,"order":22,"type":"single_choice","question":"计算机系统中的内存条，其功能是临时存放用户当下正在处理和运行的数据，它是一种（）。","options":[{"label":"A","text":"执行指令"},{"label":"B","text":"高速缓存"},{"label":"C","text":"用户数据和程序"},{"label":"D","text":"操作系统核心文件"}],"answer":"C","analysis":"内存条用于临时存储正在运行的用户程序与数据。"},{"id":102703,"order":23,"type":"single_choice","question":"下面哪种行为不属于勤勉好学的表现（）。","options":[{"label":"A","text":"保持学习的兴趣和热情"},{"label":"B","text":"不需要改进工作方法"},{"label":"C","text":"拥有持续学习和自我提升的意识"},{"label":"D","text":"乐于接受别人的建议和指导"}],"answer":"B","analysis":"勤勉好学的基本要求之一是保持谦虚，即从业人员应该保持谦虚和开放的心态，虚心接受他人的建议和批评。愿意向他人学习，不断改进自己的工作方式和方法。"},{"id":102704,"order":24,"type":"single_choice","question":"在语音数据标注里，属于语调标注带来的难点是（）。","options":[{"label":"A","text":"音素划分"},{"label":"B","text":"语音中的语调变化"},{"label":"C","text":"多语言"},{"label":"D","text":"声音质量"}],"answer":"B","analysis":"语音语调变化是语调标注的主要难点。"},{"id":102705,"order":25,"type":"single_choice","question":"关于使用爬虫时的注意事项，以下哪种说法是正确的（）。","options":[{"label":"A","text":"爬虫抓取的数据可以自由分享和使用"},{"label":"B","text":"使用爬虫抓取网站数据前，需要获取网站所有者的许可"},{"label":"C","text":"在爬取敏感信息时不需要考虑用户的隐私权"},{"label":"D","text":"爬取数据不需要考虑网站的版权问题"}],"answer":"B","analysis":"在使用爬虫进行数据抓取时，必须遵守相关法律法规，比如《中华人民共和国网络安全法》等"},{"id":102706,"order":26,"type":"single_choice","question":"数据验证所采用的主要方法包括（）。","options":[{"label":"A","text":"数据采集、数据筛选、数据建模"},{"label":"B","text":"逻辑验证、范围验证、唯一性验证"},{"label":"C","text":"相关性验证、异常值验证、一致性验证"},{"label":"D","text":"缺失值验证、异常值验证、重复值验证"}],"answer":"B","analysis":"数据验证方法包括逻辑验证、范围验证、唯一性验证等。"},{"id":102707,"order":27,"type":"single_choice","question":"关于实时检验，下列说法正确的是（）。","options":[{"label":"A","text":"实时检验只能应用于少数特定产品的生产"},{"label":"B","text":"实时检验能够及时发现问题"},{"label":"C","text":"实时检验不需要准确的检验数据"},{"label":"D","text":"实时检验只适用于生产领域"}],"answer":"B","analysis":"实时检验能及时发现问题，适用于多个领域。"},{"id":102708,"order":28,"type":"single_choice","question":"Apriori 算法是关联规则分析中常用的方法，它的核心思想是什么？（）","options":[{"label":"A","text":"基于K均值算法聚类数据集"},{"label":"B","text":"基于梯度下降法迭代求解关联规则"},{"label":"C","text":"基于分治策略求解频繁项集"},{"label":"D","text":"基于滑动窗口统计支持阈值"}],"answer":"C","analysis":"Apriori算法是目前最为经典和常用的关联规则分析算法之一，其核心思想是通过连接产生候选项及其支持度，然后通过剪枝生成频繁项集，即基于分治策略求解频繁项集"},{"id":102709,"order":29,"type":"single_choice","question":"下列哪一项不在数据审核的步骤里（）。","options":[{"label":"A","text":"数据备份"},{"label":"B","text":"数据准备"},{"label":"C","text":"数据报告"},{"label":"D","text":"数据检查"}],"answer":"A","analysis":"数据审核的步骤包括数据准备、数据审查、意见反馈、数据报告"},{"id":102710,"order":30,"type":"single_choice","question":"下列哪一项不属于智能系统在家庭居住领域的应用范畴？（）","options":[{"label":"A","text":"智能病例诊断"},{"label":"B","text":"智能音响娱乐系统"},{"label":"C","text":"智能照明控制"},{"label":"D","text":"智能家庭安全系统"}],"answer":"A","analysis":"智能病例诊断属于智能医疗领域的内容"},{"id":102711,"order":31,"type":"single_choice","question":"属于AGNES 层次聚类的缺点的是（）。","options":[{"label":"A","text":"只适用于欧氏距离"},{"label":"B","text":"需要大量计算"},{"label":"C","text":"能够保持数据的完整性"},{"label":"D","text":"聚类结果受初始聚类中心的影响"}],"answer":"B","analysis":"AGNES层次聚类的缺点包括需要大量计算、容易陷入局部最优解、不适用于处理噪音数据等"},{"id":102712,"order":32,"type":"single_choice","question":"数据整理的主要步骤有（）。","options":[{"label":"A","text":"数据加密和解密"},{"label":"B","text":"数据清洗和去重"},{"label":"C","text":"数据验证和校验"},{"label":"D","text":"数据备份和恢复"}],"answer":"B","analysis":"数据整理的主要步骤包括对数据进行清洗、重复处理、异常处理等操作，以确保数据的准确性和完整性"},{"id":102713,"order":33,"type":"single_choice","question":"数和数据都可以直接或者经过转换之后，用来进行什么（）。","options":[{"label":"A","text":"语音处理"},{"label":"B","text":"文本处理"},{"label":"C","text":"图像处理"},{"label":"D","text":"数值处理"}],"answer":"D","analysis":"数和数据主要用于数值处理，如图像文本语音处理需特定算法。"},{"id":102714,"order":34,"type":"single_choice","question":"在追求卓越的基本要求中，“持续改进” 具体体现在哪些方面（）。","options":[{"label":"A","text":"提升个人社会地位"},{"label":"B","text":"改进工作方法和流程"},{"label":"C","text":"扩大个人权力范围"},{"label":"D","text":"增加个人经济收益"}],"answer":"B","analysis":"根据\"追求卓越\"基本要求，持续改进体现在从业人员持续改进自己的工作方法和流程，寻找更好的解决方案。不断反思和总结经验，主动寻求反馈意见，并将其应用于工作中，以提升工作效率和质量。"},{"id":102715,"order":35,"type":"single_choice","question":"（）图是专门用于分析数据分布情况的。","options":[{"label":"A","text":"直方图"},{"label":"B","text":"数据表"},{"label":"C","text":"折线图"},{"label":"D","text":"散点图"}],"answer":"A","analysis":"直方图是一种常用的描述数据分布情况的工具，通过将数据划分成若干个区间，统计每个区间数据的个数或比例，来反映数据的分布情况。"},{"id":102716,"order":36,"type":"single_choice","question":"在图像数据的各类归类方式里，哪一种常用于解决单目相机的深度相关问题？（）","options":[{"label":"A","text":"RGB-D图像"},{"label":"B","text":"灰度图像"},{"label":"C","text":"彩色图像"},{"label":"D","text":"二值化图像"}],"answer":"A","analysis":"RGB-D图像是指同时获取了颜色和深度信息的图像。通过计算距离信息可以得到场景的空间结构和物体的深度信息。在解决单目相机深度问题中应用广泛。参考资料：https://baike.baidu.com/item/RGB-D%E5%9B%BE%E5%83%8F"},{"id":102717,"order":37,"type":"single_choice","question":"可编程性是计算机的主要特点之一，这一特性意味着计算机能够（）。","options":[{"label":"A","text":"可以同时处理多个任务"},{"label":"B","text":"可以根据用户的需求执行不同的任务"},{"label":"C","text":"可以执行复杂的算术和逻辑运算"},{"label":"D","text":"可以自我学习和适应环境"}],"answer":"B","analysis":"可编程性指计算机可根据用户需求执行不同任务，无需改变硬件。"},{"id":102718,"order":38,"type":"single_choice","question":"pyecharts 库属于（）。","options":[{"label":"A","text":"一个游戏开发库"},{"label":"B","text":"一个网络爬虫库"},{"label":"C","text":"一个机器学习库"},{"label":"D","text":"一个数据可视化库"}],"answer":"D","analysis":"pyecharts是Python的一个数据可视化库，方便用户在Python语言下快速生成各种图表"},{"id":102719,"order":39,"type":"single_choice","question":"在进行异常值检测时，通常采用哪些方法来检测异常值？（）","options":[{"label":"A","text":"箱线图"},{"label":"B","text":"直方图"},{"label":"C","text":"散点图"},{"label":"D","text":"饼图"}],"answer":"A","analysis":"箱线图是一种常用的检测异常值的方法。通过箱线图，我们可以看到数据的分布情况以及是否存在异常值。"},{"id":102720,"order":40,"type":"single_choice","question":"在 Word 里，插入脚注和题注所具有的共同作用是（）。","options":[{"label":"A","text":"在文中加入更详细的解释和说明。"},{"label":"B","text":"索引文中的内容，方便读者查找。"},{"label":"C","text":"在文中引用其他文章和资料的信息。"},{"label":"D","text":"记录下文中的图片和表格的来源和版权信息。"}],"answer":"A","analysis":"脚注与题注均用于在文中添加详细解释说明，辅助阅读。"},{"id":102721,"order":41,"type":"single_choice","question":"在 Python 中，能够指定层次聚类所使用的距离度量方式的是（）。","options":[{"label":"A","text":"调用cophenet函数时指定metric参数"},{"label":"B","text":"调用fcluster函数时指定metric参数"},{"label":"C","text":"调用linkage函数时指定metric参数"},{"label":"D","text":"调用dendrogram函数时指定metric参数"}],"answer":"C","analysis":"在Python中，可以通过在调用linkage函数时指定metric参数来指定层次聚类的距离度量"},{"id":102722,"order":42,"type":"single_choice","question":"审核报告应当包含哪些（）方面的内容？","options":[{"label":"A","text":"审核目的"},{"label":"B","text":"审核范围"},{"label":"C","text":"审核结论"},{"label":"D","text":"以上选项均正确"}],"answer":"D","analysis":"审核报告应包含审核目的、审核范围、审核时点、审核方法、审核结论和建议等内容，以便全面表达审核结果。"},{"id":102723,"order":43,"type":"single_choice","question":"在Python编程里，下列（）函数能够去除列表中的重复元素。","options":[{"label":"A","text":"set"},{"label":"B","text":"remove"},{"label":"C","text":"pop"},{"label":"D","text":"del"}],"answer":"A","analysis":"使用set()转换列表可去重。"},{"id":102724,"order":44,"type":"single_choice","question":"DENCLUE 密度聚类之所以对噪声和异常值有良好的鲁棒性，是因为该算法通过（）方式来统计密度。","options":[{"label":"A","text":"中位数"},{"label":"B","text":"众数"},{"label":"C","text":"核密度估计"},{"label":"D","text":"平均值"}],"answer":"C","analysis":"DENCLUE算法采用核密度估计来统计密度，利用核函数的平滑性抑制噪声影响，而非中位数"},{"id":102725,"order":45,"type":"single_choice","question":"智能系统在零售业当中，可能起到的作用是（）。","options":[{"label":"A","text":"增加人力成本"},{"label":"B","text":"个性化推荐"},{"label":"C","text":"规避金融风险"},{"label":"D","text":"降低企业管理效率"}],"answer":"B","analysis":"零售业中智能系统的作用包括个性化推荐、智能支付、库存管理与预测等方面"},{"id":102726,"order":46,"type":"single_choice","question":"在 Word 里，下列哪种方式不能进入页眉的编辑页面（）。","options":[{"label":"A","text":"双击页面顶部"},{"label":"B","text":"在“布局”选项卡中选择“页眉”命令"},{"label":"C","text":"在“插入”选项卡中选择“页眉”命令"},{"label":"D","text":"已有页眉的情况下，右键单击页面顶部，选择“编辑页眉”命令"}],"answer":"B","analysis":"“布局”选项卡中没有相应的页眉命令"},{"id":102727,"order":47,"type":"single_choice","question":"下面哪一项能准确阐释文本数据的定义？（）","options":[{"label":"A","text":"以上选项均正确"},{"label":"B","text":"文本数据是指以人类语言或符号为载体传递的、有一定结构和意义的数据"},{"label":"C","text":"文本数据是指通过语音来记录的数据以及通过语音来传输的数据"},{"label":"D","text":"文本数据是指指用数值表示的各像素的灰度值的集合"}],"answer":"B","analysis":"文本数据是指以人类语言或符号为载体传递的、有一定结构和意义的数据"},{"id":102728,"order":48,"type":"single_choice","question":"下列哪一项不属于文本数据标注的难点？（）","options":[{"label":"A","text":"标注者的专业能力"},{"label":"B","text":"标注过程的效率和速度"},{"label":"C","text":"数据隐私性和合法性"},{"label":"D","text":"标注任务的主观性"}],"answer":"B","analysis":"标注过程的效率和速度并不是文本数据标注的主要难点，其他选项都涉及到了标注的困难之处"},{"id":102729,"order":49,"type":"single_choice","question":"在回归预测算法中，通过给回归估计增加一个平方偏差（也就是 L2 正则项），以此来减小标准误差，该算法是（）。","options":[{"label":"A","text":"线性回归"},{"label":"B","text":"弹性网络回归"},{"label":"C","text":"Lasso回归"},{"label":"D","text":"岭回归"}],"answer":"D","analysis":"岭回归通过L2正则项减小标准误差。"},{"id":102730,"order":50,"type":"single_choice","question":"下面哪种系统部署方法具备高度的可移植性与扩展性，还能简化部署流程、降低维护开支？（）","options":[{"label":"A","text":"局域网部署"},{"label":"B","text":"无服务器架构"},{"label":"C","text":"容器化部署"},{"label":"D","text":"传统服务器部署"}],"answer":"C","analysis":"容器化部署具有高可移植性、扩展性，简化部署并降低维护成本。"},{"id":102731,"order":51,"type":"single_choice","question":"数据集成中的数据匹配具体所指的是什么？（）","options":[{"label":"A","text":"将数据清洗和预处理"},{"label":"B","text":"将数据转换为可视化形式"},{"label":"C","text":"将数据按照一定规则进行分类和组织"},{"label":"D","text":"将两个或多个数据集中的相似数据进行匹配和合并"}],"answer":"D","analysis":"数据匹配指匹配合并多个数据集的相似数据。"},{"id":102732,"order":52,"type":"single_choice","question":"下列哪一项属于 DIANA 层次聚类法的优点之一（）。","options":[{"label":"A","text":"簇的个数不需要预先指定"},{"label":"B","text":"对初始聚类的选择敏感"},{"label":"C","text":"易于处理噪声和异常值"},{"label":"D","text":"计算复杂度较低，适用于数据量较大的情况"}],"answer":"A","analysis":"DIANA层次聚类法的优点包括：（1）易于解释和理解；（2）簇的个数不需要预先指定；（3）容易可视化；（4）不需要选择初始聚类中心点"},{"id":102733,"order":53,"type":"single_choice","question":"以下哪种数据采集行为属于非法操作（）。","options":[{"label":"A","text":"从公共数据库中提取数据"},{"label":"B","text":"从互联网上收集公开数据"},{"label":"C","text":"通过技术手段获取用户IP地址和浏览历史"},{"label":"D","text":"调查用户对某个产品的使用体验"}],"answer":"C","analysis":"获取用户的IP地址和浏览历史属于侵犯用户隐私的行为，不符合合法性要求"},{"id":102734,"order":54,"type":"single_choice","question":"在动态网页数据爬取过程中，（）步骤是可以在浏览器中执行的。","options":[{"label":"A","text":"发送http请求获取网页内容"},{"label":"B","text":"使用正则表达式提取数据"},{"label":"C","text":"解析网页结构"},{"label":"D","text":"确定数据抓取规则"}],"answer":"D","analysis":"确定数据抓取规则是动态网页数据爬取的重要一步，一般可以通过在浏览器中查看网页的html代码和网页元素，确定需要抓取的数据所在的位置，进而确定抓取规则。"},{"id":102735,"order":55,"type":"single_choice","question":"在下列应用场景里，语音数据标注能够助力模型性能提升的是（）。","options":[{"label":"A","text":"语音情感识别"},{"label":"B","text":"图像分类"},{"label":"C","text":"文本摘要"},{"label":"D","text":"机器翻译"}],"answer":"A","analysis":"语音数据标注在语音情感识别中提升模型性能。"},{"id":102736,"order":56,"type":"single_choice","question":"在 Word 里，插入脚注的正确操作步骤是（）。","options":[{"label":"A","text":"在“设计”选项卡中选择“脚注”。"},{"label":"B","text":"在“页面布局”选项卡中选择“脚注”。"},{"label":"C","text":"在“参考文献”选项卡中选择“脚注”。"},{"label":"D","text":"在“引用”选项卡中选择“插入脚注”。"}],"answer":"D","analysis":"在Word中插入脚注的方法是在“引用”选项卡中选择“插入脚注”"},{"id":102737,"order":57,"type":"single_choice","question":"如何解释数据离散化这一概念？（）","options":[{"label":"A","text":"将数据转化为多个类型"},{"label":"B","text":"将数据进行归一化处理"},{"label":"C","text":"将离散性数据转化为连续性数据"},{"label":"D","text":"将连续性数据转化为离散性数据"}],"answer":"D","analysis":"数据离散化是指将连续性数据按照一定规则转化为离散性数据，通常用于数据挖掘、机器学习等领域，方便数据的处理和分析"},{"id":102738,"order":58,"type":"single_choice","question":"在线性回归中，损失函数的作用是（）。","options":[{"label":"A","text":"更新模型的权重和偏置"},{"label":"B","text":"控制模型的复杂度"},{"label":"C","text":"表示回归系数的重要性"},{"label":"D","text":"计算预测值与真实值之间的误差"}],"answer":"D","analysis":"在线性回归中，损失函数用来计算预测值与真实值之间的误差"},{"id":102739,"order":59,"type":"single_choice","question":"关联规则分析指的是什么？（）","options":[{"label":"A","text":"分析数据集中的分类变量"},{"label":"B","text":"分析数据集中的异常值"},{"label":"C","text":"分析数据中的缺失值"},{"label":"D","text":"分析同个数据集中不同变量的关联关系"}],"answer":"D","analysis":"关联规则分析是数据挖据中最活跃的研究方法之一，目的是在一个数据集中找出各项之间的关联关系，而这种关系并没有在数据中直接表示出来"},{"id":102740,"order":60,"type":"single_choice","question":"下列哪项属于反爬虫技术所采用的方式（）。","options":[{"label":"A","text":"垃圾邮件过滤"},{"label":"B","text":"SSL加密"},{"label":"C","text":"跨域请求"},{"label":"D","text":"IP限制"}],"answer":"D","analysis":"IP限制是一种常见的反爬虫技术"},{"id":102741,"order":61,"type":"single_choice","question":"在数据集成方法里，ETL所代表的含义是什么？（）","options":[{"label":"A","text":"数据监控和报警"},{"label":"B","text":"数据抽取、转换和加载"},{"label":"C","text":"数据质量检测"},{"label":"D","text":"拓扑一致性检测"}],"answer":"B","analysis":"ETL是数据仓库中经典的数据集成方法，包括数据抽取（Extract）、转换（Transform）和加载（Load）三个过程，是将异构的数据从不同来源进行同构化的重要手段"},{"id":102742,"order":62,"type":"single_choice","question":"职业道德的职业性，具体是指（）？","options":[{"label":"A","text":"与社会关系无关"},{"label":"B","text":"与个人主观意愿相关"},{"label":"C","text":"要求从业人员具备专业技能"},{"label":"D","text":"职业道德的内容与职业实践活动紧密相连"}],"answer":"D","analysis":"职业道德的职业属性指的是职业道德的内容与职业实践密切相关，要求从业人员遵守和践行该行业或职业所特有的道德规范"},{"id":102743,"order":63,"type":"single_choice","question":"数据审核的定义是（）。","options":[{"label":"A","text":"对数据进行存储优化和清理"},{"label":"B","text":"对数据进行完整性和准确性检查"},{"label":"C","text":"对数据进行权限管理和访问控制"},{"label":"D","text":"对数据进行定期备份和恢复"}],"answer":"B","analysis":"数据审核是对数据的完整性、准确性、一致性、和合法性检查"},{"id":102744,"order":64,"type":"single_choice","question":"在数据质量控制过程中，（）是预防数据质量问题的基础。（）","options":[{"label":"A","text":"数据备份"},{"label":"B","text":"数据清洗"},{"label":"C","text":"元数据管理"},{"label":"D","text":"数据可视化"}],"answer":"C","analysis":"数据质量控制过程中，元数据管理是预防数据质量问题的基础"},{"id":102745,"order":65,"type":"single_choice","question":"在 OPTICS 算法里，距离临界值 e
